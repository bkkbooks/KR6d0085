body:
  text: 金臺即山居後學大義集妙法蓮華經方便品第二今品名方便者一品之中方便文字共有三十三處經家據若干文義因而詺品大意是指昔日三乘方便至今法華開捨方便顯會真實亦只名方便耳方便字面雖同權小方便義意逈然言外問最上一乘究竟圓滿何於正宗分首便云方便與昔三乘方便何所揀別答經不云乎正直捨方便但說無上道又云開方便門示真實相今名方便者意含前後權實二義前權方便者乃於一佛乘分別說三後實方便者乃開權顯實會三歸一之第一方便也問何不名真實品答此經大義開顯會歸之旨若盡廢昔日之方便却將何等會顯真實所以仍標方便先分後合即權即實圓融活潑善巧無加故名方便品方便者法用也法有方圓用有差會葢隨眾生樂欲非佛本懷文云令離諸著出三界苦是故如來稱歎方便非今品意以是體外方便化物之權隨他意語故又方便者門也門名能通通於所通方便權略皆是弄引為真實作門文云開方便門示真實相非今品意亦是體外方便自行化他之權隨自他意語故又方便者秘妙也妙達於方即是真秘點內衣裏無價珠與王頂上唯有一珠無二無別指客作人是長者子亦無二無別如斯之言是秘是妙文云唯我知是相十方佛亦然止止不須說我法妙難思正是今品之意是同體方便自行之權隨自意語故以自文殊答彌勒今相如本瑞是諸佛方便則說經入定放光動地皆方便矣經云吾從成佛已來種種因緣譬喻廣演言教無數方便則方便不止於今經放光動地乃從成佛已來種種言教皆方便也文云過去無數劫無量滅度佛種種緣譬喻無數方便力則方便又不止於釋迦一佛乃十方三世諸佛出世說法皆方便也又云更以異方便助顯第一義則方便又不止於三乘六度萬行之正經乃至舉手低頭沙為塔爪畵像或出於誠敬或出於戲樂無非一大事因緣之方便也如此則降迹皇宮六年苦行多子塔前拈華雙樹林中入滅以及德山棒臨濟喝無往而非方便也正宗分首置此二言則知七卷經文無非方便一切眾生本有佛知佛見故也第二正宗分文有十九品以本經綱要分為四段此品至法師品為開佛知見寶塔天授二品為示佛知見持品至壽量四品為悟佛知見分別功德至常不輕四品為入佛知見且初開佛知見文有九品分二初八品說三周法授三根記二法師品歎持經人與所持法初又二初略開三顯一動執生疑二廣開三顯一斷疑生信初中又二初略開三顯一二騰疑致請初中有長行偈頌長行分二初寄言歎二智二絕言歎二智初中分二初明諸佛權實二明釋迦權實初又分二初經家提起爾時世尊從三昧安詳而起告舍利弗爾時者文殊答彌勒已竟之時也安詳者申申夭夭從容自得之貌佛常在定何故言起此有所示往古諸佛說此經時必入無量義定今佛亦爾對入言起世界悉檀故從定起歷履法緣二俱審諦說必不謬增長物信為人悉檀故從定起佛寂而常照尚須入定方乃說法況復散心妄有所說對治悉檀故從定起入定緣理安心實相出定令他安心實相第一義悉檀故從定起告舍利者身子為法說得記之當機乃小乘中智慧第一之人故告之首標萬二千而獨告身子者必有所因也法說後身子自述領解則曰我昔從佛聞如是法見諸菩薩授記作佛而我等不預斯事等四大弟子則曰我等居僧之首年並朽邁乃至不生一念好樂之心則身子願學菩薩授記作佛唯恐不得久矣故因而告之問與大品方等阿含有同異否答各處不同阿含發起生滅法輪故告方等彈斥大品加被今經開顯故告也論云告身子不告別者智深故不告菩薩者有五一為聲聞所作事故二迴向大菩提故三令無怯弱故四為發餘人善思念故五令不起所作已辦心故二正歎權實分三初雙歎二雙釋三雙結且初雙歎二智諸佛智慧甚深無量至一切聲聞辟支佛所不能知諸佛一句標實智也諸佛有二一是十方三世諸佛即下十方三世佛佛道同之義二是釋迦一佛即下分身諸佛現在說法者是一往智即慧慧即智分之智能分別事理慧能決斷精麤智慧之體即一心三智是諸佛自覺聖智之境在佛為阿耨菩提涅槃妙心正法眼藏在眾生為佛知見常住真心元湛妙性今經云一乘實相家業寶所等甚深無量者稱歎之辭諸佛實智竪徹如理之底故甚深橫窮法界之邊故無量無量甚深深高橫廣如根深枝茂源遠流長實智既爾權智亦然其智一句標權智也以道前方便有進趣之力故名為門從門入到道中道中稱實道前為權也難解難入者稱歎之辭由無量故難解由甚深故難入不謀而了無方大用七種方便不能測度又智慧門者自有方便智慧為門得入佛智慧如瓔珞經云二觀為方便道得入中道第一義諦是也自有佛智慧為門得入佛智應即今經所歎其智慧門是也又權智稱門者以實智寂滅離言固不可說今用權智曲唱傍通開方便門示真實相故權智名門即方便門也清凉疏云方便門有二一遠窮之四十年前所說諸法為今經方便權門故云雖示種種道其實為佛乘近言之入定放光等事為此會方便權門故云今佛放光明助發實相義一切二乘所不能知故言難解難入也別舉二乘不知者為執重故華嚴頓照如聾若啞故言不知方等彈斥保住艸庵故言不知般若轉教無心希取故云不知今大機啟發放光動地彼此今古佛佛道同猶懷疑惑故云不知利根菩薩節節能知鈍根二乘是亦不知也正是激發二乘之言二雙釋二智所以者何佛曾親近至勇猛精進名稱普聞先雙徵二智佛曾等釋實智也良由諸佛往昔因中劫劫生生未曾離佛以佛為師常隨佛學所近之佛非一佛二佛曾經百千萬億無數諸佛如此則外值佛多稟承至要故實智甚深若事其師而不學猶勿師也學其道而不行猶不學也由是事一佛盡行一佛無量道法事無數佛盡行無數佛無量道法所積者深所造者廣如此則內行純厚躬行實踐故實智無量勇猛等釋權智也勇猛者果敢直前難行能行故精進者志無退屈長劫無厭故名稱者十號具足舉事得宜故普聞者圓彰法界聲名遠著故良由諸佛勇猛精進能入難入之門既入門已澤被無疆物欽勝德故名稱普聞勇猛一句釋權智深名稱一句釋權智廣權智雖無深廣之語例實智此義得成三雙結二智成就甚深未曾有法隨宜所說意趣難解稱理究竟圓滿果德曰成就覺盡心源到彼岸底曰甚深昔所未說故未曾有此結實智稱機所說故言隨宜非七方便所知故言難解此結權智又成就等結自行權實隨宜等結化他權實自行權實俱名為實化他權實俱名為權此中親近二言案至化城天授以親則智佛與佛及十方佛皆父子兄弟之親近則提婆為師佛為弟子奉事千歲為近故盡行二言案至不輕品以惡罵捶打尚致禮讚為盡行故名稱一句案至藥艸品以大音聲普告天人等神力品諸天於虗空中唱言有國名娑婆佛名釋迦皆佛之名稱普聞也又成就等案至寶塔品去涌塔變土集分身出眷屬談壽量分別功德乃至提婆得記龍女成佛皆是佛所成就未曾有法一向不與二乘人說今經說之所以難信難解也又親近一句所學之深也盡行一句所造之深也勇猛一句建志之深也名稱一句積德之深也成就一句所證之深也隨宜一句方便之深也如此歎者顯二乘人所學所造建志積德所證方便皆不深也正發二乘之願慕使其內心自惺諸佛如是勤學深造名稱普聞我等云何於佛法中心生疲怠果能如是思惟庶幾進入一乘所謂風之積也不厚則負大翼也無力小知不及大知宜乎二乘不知如來智慧也上歎諸佛權實二智竟二歎釋迦權實二智分三初歎權釋權二歎實釋實三結權結實對上科凡有三意一者前諸佛二智合歎明二智體同也釋迦二智開歎者表二智功用有異故二者明垂迹之本故諸佛先歎實明顯本之能故釋迦先歎權三者諸佛顯自行故先實釋迦明化他故先權初歎權釋權又二初歎權智舍利弗吾從成佛已來至引導眾生令離諸著成佛已來近指菩提場遠指塵點劫以三種化他之權逗會眾生故言種種因緣也譬喻者小乘中以芭蕉水沫為喻大乘中以乾城鏡幻為喻廣演者能於一法出無量義也無數方便者即七種方便也離諸著者說散十善令離三途著說淨十善令離欲界著說諦緣法令離見思著說菩薩法令離涅槃著說佛法令離順道法愛著二釋權智所以者何如來方便知見波羅蜜皆已具足由於方便善巧故能種種因緣等知即三智之知見即五眼之見悉到事理邊底故悉名波羅蜜皆具足者權實悉究竟之謂此中知見即實智由證此實智故能種種行權此歎權釋權竟二歎實釋實又二初歎實智舍利弗如來知見廣大深遠廣大一句稱歎也廣大明橫即前無量深遠明竪即前甚深實智本非橫竪寄言往歎論其橫竪照無限極如函大葢大也二釋實智無量無礙力無所畏至成就一切未曾有法無量四無量心也無礙四無礙辯才也力十力也一是處非處力二業智力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力佛悉遍知無能勝無能壞故名力也無所畏四無所畏也一一切智無所畏二漏盡無所畏三說障道無所畏四說苦盡道無所畏通名無畏者於大眾中廣說自他智斷既決無失則無微致恐懼之相也禪即實相之禪定即楞嚴大定解脫者佛地位中諸解脫門也三昧者二十五王三昧也深入釋深遠無際釋廣大成就等總攝佛地所具一切功德歎實釋實竟三結權結實又二初結權智舍利弗如來能種種分別至言辭柔軟悅可眾心種種巧說即上種種廣演也言辭柔軟者巧法逗機而不暴戾也悅可眾心者隨眾生樂欲也由具足方便知見故能種種巧說令人悅可也二結實智舍利弗取要言之無量無邊未曾有法佛悉成就取要者大略言也未曾有法即結上成就一切等以佛地不共功德無量無邊深入無際皆未曾有之法也要知諸佛之權即釋迦之方便釋迦知見即諸佛智慧非權無以導實非實無以開權有實無權則沉埋中下有權無實則屈枉大根權實並行方能曲成小大而不遺出定雙歎葢為此也寄言歎三智竟二絕言歎二智分三初正絕言歎二徵釋絕言三釋權實相且初正絕言歎止舍利弗不須復說歎到恰好處而止者欲杜口不說也滿心要說且示絕言敦機令信故止而歎之不須復說者以此法深寂是絕相門口談詞喪心緣慮忘故止而不說以自覺境界非餘所知故止而不說設慈悲為說聞不能解恐傷善根故止而不說二徵釋絕言所以者何佛所成就至乃能究盡諸法實相成就者圓滿具足義以果對因諸佛所證權實不二是第一法所得微妙故是希有法如優曇華故是難解法所不能知故降斯已還所證之法皆非第一希有難解也唯佛等者唯佛與十方諸佛究竟實相邊底如十五之月體無不圓光無不遍故諸法權也實相實也諸法即實之權也實相即權之實也即實而權權外無實即權而實實外無權斯為同體妙權妙實法華開顯如點銕成金妙在此也此四字是法華之大本諸教之端首釋義之關鍵眾生之依止發心之憑仗權謀之用體迷悟之根源果德之理本一化之周窮五時之終卒佛所成就者正目此也唯佛證極窮源所以止而不說三釋權實相所謂諸法如是相至如是本末究竟等南嶽大師讀此文皆云如故呼十如智者大師依義讀文凡有三轉謂如是相是相如相如是等諸法者總指世出世間法凡拈一法即具十如如是者隨事指法之辭謂諸法有如是之相等相以據外覽而可別名相性以據內自分不改名性主質名體功能名力構造名作習因為因助因為緣習果為果報果為報初相為本後報為末諸法歸趣為究竟平等如一人有形相心性身體力用作為過去因現在緣為人是果窮富延促根身全缺是報生為本死為末研究平等又如是二字直指當體之詞以此諸法若言其相相即無相故云如是相若言其性妙性天然若言其體體自真常若言其力力用稱真若言其作作而無作若言其因生本無生若言其緣性空成事若言其果果不離因若言其報業性昭然若言其本末始終一際故云如是本末以上諸法一一皆是如是之法故云究竟平等寂滅無二此諸法之實相也權實之法不可思議是三世諸佛所證之境唯佛與佛乃能究盡者此也二偈頌有二十一行分二初十七行半頌上長行二有三行半略開三顯一初又分二初四行頌寄言歎二智二十三行半頌絕言歎二智初又二初二行合頌二佛二智爾時世尊欲重宣此義而說偈言世雄不可量諸天及世人至無能測量者長行權實各歎表化緣異故頌中二智合歎示二智體同故世雄者乃雄猛絕世之稱以難行能行難斷能斷難捨能捨難證能證故古云出家乃大丈夫事非將相所能為能證之人出乎其類所證之法豈住思議此頌上諸佛智慧也不可量頌上甚深無量也亦該權智以實智不可量權智亦爾次三句推廣上不知之人此中與長行有三異一上舉人又標法故云諸佛智慧今但頌人將人以美法故云世雄二上開歎今合頌以法別故須開人總故須合三上云一切二乘不知今言一切眾生類不知耳佛力下頌釋迦二智佛力等實智也諸餘法權智也云餘者指化他之權是實智之餘助耳即以自行而為化他從一法中開出無量種種因緣種種譬喻所有方便無不即權即實故亦無能測量二二行合頌二佛釋歎結歎本從無數佛具足行諸道至我已悉知見此頌上二章釋結之意而文字變化不必一一拘配由甚深故難見微妙故難了無量劫行道權智滿也道場得果實智滿也所得之果即法界海慧曠劫修因所感之果也葢謂甚深微妙之權實最為難見難了由我與諸佛本從無量佛所具足盡行無量道法於無量劫行此道已乃坐道場得成佛果故能悉知悉見此權實法也頌寄言歎竟二十三行半頌絕言歎分五初半行頌釋權實相二半行頌徵釋絕言三半行頌正絕言歎四十行半頌不知之人五一行半頌第一希有之法唯佛能知且初半行頌釋權實相如是大果報種種性相義大即妙也種種即十如差別不同義即究竟等先舉果報次舉性相中間可知顯逆順觀法無拘也又大在果前即不變隨緣義在相後即隨緣不變義二半行頌徵釋絕言我及十方佛乃能知是事是事即諸法實相也唯佛與佛乃能究盡諸法實相深造自得乃能知之三半行頌正絕言歎是法不可示言辭相寂滅實相非方所故不可示非言語道故言辭寂滅古德云佛法大煞有只是舌頭短是此意也又前云大果報者自證境界正指華藏世界無量莊嚴圓融果海交徹無礙故云種種性相義佛與諸佛乃知是事以果海離言故言辭寂滅此離言之道非思量分別之境豈二乘所堪哉故止而不說正顯究竟一實之地為今日所歸之極致長行未盡偈中發明也四十行半頌不知之人分七初一行許信力能解二一行半揀二乘不知三一行揀身子不知四一行半揀大弟子不知五二行揀辟支佛不知六二行半揀發心菩薩不知七一行揀不退菩薩不知且初一行許信力能解諸餘眾生類無有能得解除諸菩薩眾信力堅固者此下十行半推廣一切眾生類無能知佛者申明諸佛二智甚深無量難解難入也然人則一層高一層義則一句緊一句只要發揮一切聲聞支佛所不能知唯佛與佛乃能究盡之義初二句總揀七方便人不知次二句許信力菩薩能入此菩薩即圓教十信滿心也若此妙法除佛之外究竟無人能解者說之何益故許以信得入言堅固者圓教菩薩是過量大人一聞此法直下承當即以自性不動智以立信體信得自心與佛無二心境一如即契實相如將重擔肩荷直前亦若香象渡河截流而過如此方名信力堅固也二一行半揀二乘不知諸佛弟子眾曾供養諸佛至其力所不堪一切漏三界見思也最後身二乘極果也不堪者以二乘是寒灰枯木之人力量淺薄不堪重任古德云若欲擔荷大法須是枯木摻華寒灰發𦦨始得三一行揀身子不知假使滿世間皆如舍利弗盡思共度量不能測佛智謂上佛弟子雖多或少智慧容有不知即如一身子之智慧聲振五天假使滿世間人皆如身子之智慧盡其思量忖度亦不能測則甚深無量難解難入可知矣四一行半揀大弟子不知正使滿十方皆如舍利弗至亦復不能知謂不但滿世間人如一身子正使滿十方世界人皆如身子之智慧更加神通如目連頭陀如迦葉說法如滿慈多聞如阿難密行如羅雲等亦滿十方剎土盡其神思忖度測量亦所不知五二行揀辟支佛不知辟支佛利智無漏最後身至莫能知少分逆順觀緣故名利智自行權實俱名為實謂不但聲聞不知即利智如支佛遍十方界數如竹林如此人眾心一時長且久亦莫能知佛智之少分耳則二智甚深無量又可知矣六二行半揀發心菩薩不知新發意菩薩供養無數佛至不能知佛智或指六度三祇未斷惑者或指小始教中發心之人彼於當教各能了達四諦義趣依之發於四弘誓願各能敷演當教道法展轉望前皆稱妙智謂不但緣覺即新發大乘意之菩薩供佛無數有福超二乘矣了義說法自利利人有慧超二乘矣其多不但如竹林且如稻麻竹葦之多又充遍十方剎土又非散心小智乃一心妙智又非少時少劫如恒沙之多劫咸共思量亦復不知則二智之甚深無量又可知矣七一行揀不退菩薩不知不退諸菩薩其數如恒沙一心共思求亦復不能知不知圓理具一切法即一切法故云不知又視佛菩提如隔羅糓觀月故謂新發心雖是大乘容有退息固不能知即八地已上不退地位諸大菩薩數如恒沙一心思求亦復不知則二智之甚深無量愈可知矣頌不知之人已竟五一行半頌第一希有唯佛能知又告舍利弗無漏不思議至十方佛亦然此法稱無漏者純一實相實相之外無餘法故不思議者即權即實即實即權離過絕非心言斷故甚深微妙者唯佛所契證故唯我二句頌上可知此頌長行權實二智竟二三行半略開三顯一分二初一行半明諸佛顯實舍利弗當知諸佛語無異至要當說真實諸佛語無異者顯諸佛化道是同也於佛二句勸信法久二句顯實久後說實可見從前所說皆非真實此破昔之執生今之疑下文將非魔作佛由聞此語也二二行明釋迦開三告諸聲聞眾及求緣覺乘至引之令得出上明顯實今明開三顯實必開三開三必顯實佛佛道同互現一邊耳告諸下正明昔日所示之三聲聞為小乘緣覺為中乘我令二句即擬六度菩薩大乘也何以知之修六度即免四趣苦縛未能入滅度三祇百劫乃得涅槃逮之言遠乃及耳佛以二句正斥三乘皆是方便一總非實後二句出示三之意引令出著不得已而說三非為真實但是方便門耳上略開三顯一竟二騰疑致請分二初經家敘疑爾時大眾中有諸聲聞至而今不知是義所趣由聞三偽一真執動疑生也有諸下敘千二百疑聲聞從因稱也羅漢從果稱也獨標陳如為疑首者以佛最初成道聞四諦法得解脫者故下疑佛說一解脫義為言成道一年度五人二年度耶舍長者五十人三年度三迦葉一千人五年度身子目連各一百人故有千二百五十五人為常隨眾耳及發下敘四眾疑即有學眾也上斥三乘皆是方便敘疑但在二乘者以執重疑深故偏舉耳下文云求佛諸菩薩大數有八萬亦皆有疑故知三乘僉疑偏舉二乘也何故殷勤等者謂今者世尊何故出定之後殷勤稱歎方便前云無數方便引導眾生又云佛以方便力示以三乘教若然則四十年來所說皆方便權巧耶我等所證亦方便耶此疑方便佛所得法甚深難解者謂今世尊何故而作是言佛所得法甚深難解前云諸佛智慧廣大深遠成就希有難解之法若論佛所得法三乘大小之別諦緣始終之理窮神盡奧諒無餘蘊今日何故又言甚深若然則今日難解之法非昔日之法乎今日甚深之法深於昔日之深乎此疑實智有所言說意趣難知者謂今者世尊何故又言有所言說意趣難知四十年來親見如來色心業勝耳提面命有所言說我等已知之矣何故今日言難解難知若然則昔日之所解更有未解之旨乎昔日之所知更有不知之意趣乎此疑權智今日何故又言一切聲聞所不能及於三乘人獨說我等不及我等既不知而菩薩能及之乎抑菩薩不知之乎此疑己等不知又佛一代所說唯一解脫義耳昔日讚歎三乘是真出要此佛說一解脫義也我等依而行之亦得此解脫之法遂出生死證得涅槃師資之分尊卑有別師資之道解脫則同何故如來成就我等不知將非解脫之名同而理有異乎豈如來之所證證於我等未證乎我等之所證證於如來之不證乎若爾何故同出生死不爾何故見斥我等此疑己所證三乘既皆方便不知何為真實言既異常理必神怪及門之徒蹶然有疑故云我等不知是義所趣二當機正請文有三請二止合前為三止初止為理深難解初請為自他求決二止為驚疑不信二請為久植必解三止為謗必墮苦三請為利根得益且初請有長行偈頌長行又二初陳疑爾時舍利弗知四眾心疑至甚深微妙難解之法心疑者根心之疑也一光圓現二士酧酢其疑猶緩出定歎斥三乘方便久後說真動彼昔執搖蕩其心憂兕不泰所疑者急也身子以盡智無生智知四眾心疑自亦未了然矣諸佛下疑權甚深下疑實二陳請我自昔來未曾從佛至甚深微妙難解之法我自下陳己請今者下陳眾請何因何緣應下大事因緣身子疑為法說得記之案阿若四眾等疑為後二周得記之案疑乃悟之關也不疑則不開悟不開悟則不得記疑有淺深根有利鈍所以法有三周記有先後矣二偈頌偈有十一行分五初三行半頌疑二智二三行總頌三乘四眾疑三一行半別頌自己疑四一行別頌三眾疑五二行總明同疑致請且初三行半頌疑二智爾時舍利弗欲重宣此義而說偈言慧日大聖尊久乃說是法至諸佛之所得三智圓明能破癡暗故云慧日又天無日不見四時運化之功佛無慧不見三乘修證之道故以慧喻日久乃之久應上久後言是法指上說真實道場所得指自行權實應上道場得果無能發問應上諸佛弟子眾乃至不退菩薩不能測佛智我意難測者應上假使如舍利亦復不能測佛智亦無能問者謂不退菩薩及我身子既不能問則亦無有能問者矣出定稱歎所行道自行權也佛所得智慧自行實也二三行總頌三乘四眾疑無漏諸羅漢及求涅槃者至願佛為解說及求一句即六度菩薩猶獸名性多疑聞有聲則豫上樹是事指久後真實三乘方便三一行半別頌自己疑於諸聲聞眾佛說我第一至為是所行道究竟法果也所行道因也此二句兩向若就不能測佛智言謂為是佛究竟果法耶為是佛因修所行道法耶若就斥三乘皆方便言疑三乘各有因果若云方便非真實者為是所證果非真實耶為是所行因非真實耶四一行別頌三乘疑佛口所生子合掌瞻仰待願出微妙音時為如實說聞佛說法法身得生故云佛口所生以三乘學人皆傾誠仰待願出妙音如實說也五二行總明同疑致請諸天龍神等其數如恒至欲聞具足道數如恒沙其人多也求佛菩薩其根大也萬億國土其來遠也合掌敬待其心誠也欲聞具足道者言此多眾大根之人皆從遠方而來至誠之極非求半珠在獲全璧應上我今已具得身子求心切而請辭迫故一聞法說即領解得記亦有由矣二止為驚疑不信爾時佛告舍利弗至諸天及人皆當驚疑連言止止不屑之嚴也天人驚疑者驚為怪誕疑必不信不信必起謗法之愆說之無益不說無損不若止之二請為久植必解舍利弗重白佛言至聞佛所說則能敬信爾時舍利弗欲重宣此義而說偈言法王無上尊惟說願勿慮是會無量眾有能敬信者重言惟願者因止之愈嚴而請之愈切足見悟機之熟也然日光不為無目而隱佛法豈為癡者而默況今會中無數眾生曾見諸佛宿種非淺善根成熟一聞大道擔當不怯智慧超拔入耳即信勿以人天驚疑為慮不疑者多而敬信者廣當為信者說則損者少益者多何得不說乎縱有不信以結信受之緣無慈之慈慈之大矣說則兩益止則雙傷豈可因少疑而害多信缺其慈悲矣三止為謗必墮苦佛復止舍利弗至增上慢比丘將墜於大坑爾時世尊重說偈言止止不頌說我法妙難思諸增上慢者聞必不敬信佛法常儀一請便說況今無問自說反再請而不許者正為增上慢輩耳上以天人不信為辭此以增上慢為辭言緩意迫輕重漸及佛慈而威又可見矣大坑即地獄凡人不信佛言則墮地獄豈可說法令人招苦驚疑不毀其障猶輕增慢之流望望而去若將凂焉怨生心謗於口必墮地獄深坑萬苦不反不惟無益而且有損是以辭之深而絕之至也三請為利根得益爾時舍利弗重白佛言至長夜安隱多所饒益爾時舍利弗欲重宣此義而說偈言無上兩足尊願說第一法至則生大歡喜此身子又以類己多者為請生死無明為長夜涅槃果德為安隱從佛受化必能敬信永別生死長夜得大安隱之樂所益多矣偈中初四句為己求願說等者由前斥三乘是偽又聞久後說真實在二乘未知法華是實但據斥三非真三外必更有法故云第一法是會下為八部求文殊謂諸人今當知等是也我等下為同道者求所謂諸求三乘人等是也文淡義濃求之深而語益該矣則會中雖有不信之人佛亦不能顧其難而欲慈悲矣上略開三顯一動執生疑已竟二廣開三顯一斷疑生信文分三周一法說一周被上根二喻說一周被中根三因緣一周被下根初法說一周分五一正法說二身子領解三如來述成四與之授記五四眾歡喜且初正法說有長行偈頌長行分三初許說二受旨三正說且初許說爾時世尊告舍利弗至汝今善聽當為汝說汝已二句順許也洪鐘在架扣無不應殷勤三請豈得不說雖欲無言不可得也汝今下誡許也諦聽是聞慧善思是思慧念之是修慧大經明四善法為涅槃因一親近善友二聽聞正法三思惟其義四如說修行惟此四法是涅槃因善友即如來餘三即三慧也分別解說四字按品題正是方便論文義則為一經應前啟後之大關鍵初佛止云止不須復說身子請云是事為云何願佛為解說第三止云止止不須說身子請云惟垂分別說則分別解說四字元是身子請辭佛今允可但加吾當為汝四字此論文勢相承之妙若論所詮義者前云是法不可示言辭相寂滅可容分別乎又云無漏難思議甚深微妙法可容解說乎則知佛所得法元不可分別解說今云吾當等者是為身子等無有能得解者不得已而以言語為方便將諸佛所知不可示者而分別之將佛所證不可思議者而解說之下文自如是妙法以去皆為二乘人分別解說也說此語時下揀許也五千在座如來三止今將許說威神遣去故禮佛而退五濁障多名罪重執小翳大名根深未得三果謂得三果未證無學謂證無學名增上慢有如此失者謂有障執慢三種之失所謂黃流不注瓦缶福澤不降淫人諸佛心印豈薄德所堪是以不住也不制止者佛法常儀默為應允制如天子稱制之制勅命也上聞開三顯一言約義隱猶未生謗足作繫珠因緣去則有益若聞廣說乖情起謗住則有損是故不制止也問五千在座既不蒙益去有何益答此非當機是結緣人耳昔大通時亦有無量眾生心生疑惑世世與師俱生今皆得度乃至如來滅後猶故未盡此五千亦爾爾時下佛自述不制止之意乃佛自慰之辭後文今我喜無畏者是也枝葉細末不任器用斥五千非載道之器尋常在語言上做工夫鬼窟裏作活計摘葉尋枝莫窮其本大品云攀附枝葉棄於根本是人為不黠即此義也貞本榦也對枝末言實果實也對華葉言凡物有榦實不愁無枝葉若有枝葉而無榦實則何益也此句美在會之眾為大器也退亦佳矣者應知上慢不全無法但以淺位自謂增上名增上慢既以小自翳復妨他大光今退無謗法之愆復無障他之過故云佳矣上枝末未去故如來三止真實願聞故下身子四請師弟鑒機非徒靳固也此五千慢流乃金口所唱序中為權云何通耶大師必有洞見如來心宗之處不然何故諸佛許之今有三義知是權現一者燈明六十小劫說經會中無有一人身心懈倦則知高會如栴檀林豈有凡材此五千於未出定前已契離言之旨今聞許說故禮佛而退二者若實慢人則望望然而去今既禮佛而退默契此理以此法離言今許分別解說乃落二落三之談故三者尊佛語故由前云若說是事等此五千假飾慢流為進會中增慢之儔耳不然序文大違經文汝今下結許善聽者誡其詳審而聽不可鹵莾莫著名相果能句下翻身言中得意脫體而會方不徒說二受旨舍利弗言唯然世尊願樂欲聞唯諾也唯聲速而質諾辭緩而文禮記云父命唯而起師命亦然樂聞者如渴思飲等三正說分二一明四佛章廣上諸佛權實二智二明釋迦章廣上釋迦權實二智上句逗少是文略總云諸佛是人略但開三顯一是義略此下章句多是文廣明五佛是人廣明六義是義廣六義者一歎法希有二說無虗妄三開方便四示真實五舉五濁釋權六揀偽敦實歎法令生尊重無虗謬止其誹謗開方便使莫執小示真實使其悟大舉五濁示必施三揀虗偽要必真實於五章中一一應備六義前後互出不具足者葢如來巧說不煩文耳且初四佛章分二初總明諸佛二別列三世初總明諸佛中應有六義今但四義一歎法希有二說無虗妄三開方便四示真實缺二指後文耳且初歎法希有佛告舍利弗如是妙法至如優曇鉢華時一現耳法喻雙舉即出題名時乃說之者諸佛同出五濁必前開三如今世尊四十餘年始顯真實久默斯要不務速說故久不說者為人不堪故時未至故五千未遣故今人已堪時已至五千已去決定說大乘故又向上一乘聖人存而不論論而不議者待時也非時而說者失言也時而不說者失人也時而後說者人不厭其所以言言不失其所以人機會兩得故云時乃說之優曇華者此云靈瑞亦云瑞應三千年一現現則金輪王出表三乘調熟已後方說妙法授法王記般泥洹經云閻浮提內有尊樹王名優曇鉢有實無華若金華生者世乃有佛乃佛之兆也施設論云繞贍部洲有輪王路廣一踰繕那無輪王時海水所覆無能見者若輪王出海水減少金沙路現此華乃生作金輪之先兆也問如是之法時說時現夫一時字有何義耶答一是從漸說頓以最後為一時一是因頓說頓三際平等是無時之時名為一時如蓮華無始無終以明一相一味之旨問有以青白論蓮色是非莫決可得義否答佛在處以蓮瑞表圓行開敷之相初無五色之云若以色論則是隨機隨教而見今法華一相一味之教但取喻蓮華那論青白問一相一味權實互徹請以義示答三乘之權是分證之真一乘之實是對待之真皆是接引之辭只須權實互融大小迹忘如太虗空無內外相如一蓮華無同異相法喻雙舉理固如是二說無虗妄舍利弗汝等當信佛之所說言不虗妄汝等當信者勸信無虗妄人說無虗妄法也此理至深理與昔異此言至妙言與昔反此行至普行與昔乖此人至勝勝於昔劣恐物生謗故勸信也三開方便舍利弗諸佛隨宜說法至唯有諸佛乃能知之諸佛下開三隨宜等者文承於前義釋於上謂諸佛法妙以時而說如優曇華以時而現而不虗妄者是何法也有何妙也法者即我出定所歎諸佛隨宜所說方便權法妙者其間隨宜所說而佛意在實物莫能解故言意趣難解所以下釋舉今佛之權能釋諸佛之方便巧慧同故借此釋彼謂諸佛隨宜說法意趣難解者何也且勿論諸佛隨宜難解為妙即我成道已來以種種等演說諸法諸佛方便亦如我也是法下結二乘用七識思量六識分別不知諸法妙義非思量分別也佛意難知唯佛與佛能了稟教者謂三諸佛知一耳四示真實分四初標出世意二重徵出世意三正明出世意四結成出世意且初標出世意所以者何諸佛世尊唯以一大事因緣故出現於世出對入言現對隱言一者一實相也非三乘五性七方便故言一大者其性廣愽愽三乘五性七方便故言大諸佛出世之儀式故名事眾生機感名因佛乘機而應名緣又佛知見為大事生佛無二名一眾生性具為因善友開發為緣四十年前權說此知見今但實說此知見謂諸佛證此如實之相乘此實道出現於世只要眾生得此實相惟為此事曾無他事二重徵出世意舍利弗云何名諸佛至一大事因緣故出現於世將欲分別更重提起以為言端又此大事佛所尊重故重示之如釋論明父王欲多聞太子名數數說之無有厭足三正明出世意又分二初明大事因緣諸佛世尊欲令眾生至一大事因緣故出現於世法華論作三番釋一無上義除一切智更無餘事二同義聲聞辟支佛性法身平等故三不知義謂二乘人不知究竟唯有一佛乘故四為令證不退轉地現與無量智業等論言次第初開佛知見為無上次示三乘同有佛性法身雖明佛智無上但恐佛獨有故次明三乘同有雖三乘同有而二乘不知示其令悟雖知而不得不退故第四令得不退二番約菩薩開如上說示者諸菩薩有疑令知如實修行故悟者未發菩提心合發心故入者已發菩提令入法故三番約凡夫開亦如上示其有佛性故悟令外道眾生覺悟故入令入大菩提故嘉祥云開示約能化悟入約所化能化有大開之與曲示但說有性為大問言此是凡夫性此是聖人性因果理行即曲示也所化有始悟之與終入豁然了知故名為悟修行契證目之為入即始淺終深也欲令二字是佛本懷眾生指九界眾生故字應上因緣清淨二字從開字顯啟閉曰開佛知見三字應指性具本有知見佛即知見持業釋也清凉云性即知見圭峯云知見即本覺靈源的指六根中性諸經詮顯不一古德稱謂不同智者知是佛性愚人喚作精魂皆目此也但為二障迷倒封閉故開令顯現使得清淨者顯是在纏之體如眼被色染乃至意被法擾不開未即清淨一開即遠離迷倒封閉色是佛色聲是佛聲內之身心外之世界皆如來藏妙真如性是為清淨矣出告曰示謂出己所有以昭告於人也佛之知見即諸佛修證已成果德之知見依主釋也眾生有性具知見而未逮修成若但開其性具而不示修成如鑛金璞玉終無究竟故就己修證而告示焉自惺曰悟承上開示本有而自惺悟性具之知見也親到曰入知見道者修證果上知見之門路也例如道諦承上告示修成而親到修證境界也前二在教後二在機一三屬性具二四屬修成又當知眾生是九界別用之名佛是一界同體之號九界差別名眾生知見十界十如名佛知見眾生知見者迷妄有故覆真失性有所不知有所不見遇緣住著有知而貪有見而求故曰妄知見楞嚴云知見立知即無明本也佛知見者徹了實相萬派根源悟妙明體無所不知無所不見如日照世似鏡現相無心而應無念而現故曰真知見今經云如來觀知一切諸法之所歸趣亦知一切眾生之所心念也舍利下結二明會權歸實佛告舍利弗至無有餘乘若二若三昔日方便教化三乘理實而言但化菩薩如彼窮子自謂客作長者觀之是真子也三乘眾行名之為諸為圓故諸即是一事一事云何唯以佛之知見開悟眾生也圓頓之教名一佛乘降斯已還皆名有餘之說即不了義今言但以一佛乘者純說佛乘也無有二三以二三非本懷故諸佛以此大事而教菩薩以此而說法以此而所作以此而教化眾生二三之談豈真實哉四總結出世意舍利弗一切十方諸佛法亦如是結文義長序中因光橫見萬八千土引古竪明二萬諸佛無不為實施權會權歸實至於一切十方剎海無盡世界淨穢差別無盡諸佛出世亦無不先權後實大事因緣如此而已故云法亦如是上總明諸佛竟二別列三世佛分二初別明三佛開權顯實二總結諸佛出現大事初又分三初明過去佛二明未來佛三明現在佛應具六義但出二義四准前後且初明過去佛舍利弗過去諸佛至究竟皆得一切種智過去諸佛者即莊嚴劫諸佛逆推即日月燈明大通威音雷音雲自在等無數方便下開權是法下顯實是法二字及釋迦章如此二字皆指權為實述其施權意在顯實過去眾生從過去佛聞法得果仍呼眾生者乃因名何佛不從眾生中而成哉二明未來佛舍利弗未來諸佛至究竟皆得一切種智未來佛者即彌勒等星宿劫諸佛華光山海慧自在蹈七寶華等皆未來佛也開顯可知三明現在佛舍利弗現在十方至究竟皆得一切種智現在諸佛者即賢劫中諸佛亦即三變所集分身佛妙音品淨華宿王智勸發寶威德上王等是與釋迦同時之教主現在說法國土之名各各不同諸佛之號尊尊有別立言設教先權後實無不同也故曰雖說百千億無數諸法門其實為一乘也初標出世意次明開顯可知二總結諸佛出現大事舍利弗是諸佛至欲令眾生入佛之知見故上明四佛章廣上請佛權實二智已竟二明釋迦章廣前釋迦權實二智於六義中無歎法希有就分五初開方便二顯真實三舉五濁釋權四揀偽敦信五說無虗妄且初開方便舍利弗我今亦復如是至而為說法先權後實與諸佛不異故云亦復如是知諸下開權種種欲者即五乘根性樂欲也過去名根能生為義現在名欲取境為義未來名性不改為義深心所著即根也方便力者即隨宜開三乘權法也二顯真實舍利弗如此皆為至尚無二乘何況有三如此二字承前開方便意在於實古德云𪄕鵄樹上啼意在麻畬裏十方下稱實而顯十方世界無非法界真如妙理湛一如空尚無二乘之名何況有三哉但隨根性投其好樂不得已而隱一實施三權耳三舉五濁釋權分二初標名顯相舍利弗諸佛出於五濁惡世至見濁命濁如是世本非惡因濁故惡濁者如土投水水失清潔土亡留碍容貌汩然名之為濁此經五濁與楞嚴不同彼自晦昧已來九界俱濁唯佛為清欲示澄濁頓入涅槃義乃窮源也今經局在穢土減劫明諸佛隱實施三由於五濁惡世正顯善權方便不可思議乃截流也人壽八萬減至三萬未名為濁至二萬歲為五濁始釋迦出世正值百歲時也劫濁無別體四濁熾盛假立此名眾生濁亦無別體攬見慢果報三法假立煩惱以五鈍使為體見濁以五利使為體命濁以連持色心壽煖識三法為體四濁增劇聚在此時瞋恚增劇刀兵起貪欲增劇饑饉起愚癡增劇疾疫起三災起故煩惱倍隆諸見轉盛麤獘色心惡名穢稱摧年減壽眾濁交凑如水奔昏風波鼓努魚龍攪擾無一憀賴時使之然此劫濁相也當此之時世衰道喪人事雜亂求其上古無為清淨之世不可得矣貪海納流未嘗飽足未得患得既得患失是也瞋虺吸毒撓諸世間狐假虎威是也癡暗頑嚚過於漆墨世之造黑業是也慢高下視凌忍無度恃才勢伎巧是也疑網無信不可告實世之不真實是也若此則心煩惱熱貪瞋互起空華翳眼狡詐橫生此煩惱濁相也當此時舉天下求一不識不知守純抱朴者不可得矣攬於色心立一主宰喻如黐膠為物不著流宕六道處處受生此眾生濁相也如此眾業相生不奔命於名勢即匿心於財貨不淹沒於色聲即覊縻於情識求其果腹而嬉擊壤而歌者不可得矣無人謂有人有道謂無道十六知見六十二等如羅網稠林纏縛屈曲不能得出此見濁相也如此邪知妄見淳風彫削道德澆漓情竇日開渾沌日死執斷執常計因計果求其真知真見不可得矣朝生暮死晝出夕沒波轉烟迴瞬息不住此命濁相也如此短年促壽嗜欲愈深天機愈淺風雲氣少兒女情多求其了達自然慧命者不可得矣五濁體相如此而已若論五濁次第煩惱見為根本從此二濁成於眾生從眾生有連持命此四經時為劫濁今不次義勿錯二乘時開三舍利弗劫濁亂時至於一佛乘分別說三如來出世正值此五濁雜亂之時也以良心喪滅澆漓非常人不遂生物不安理故云亂時舉劫濁四濁全該眾生罪垢深重縱貪瞋癡在己者拔一毛而利天下不為在他者縱貪婪而不厭嫉人之賢妬人之能三途苦本眾惡根基五濁障重智淺根劣至愚至癡難調難伏若不隨其所好投以大法難矣故諸佛不得已而於一佛乘分別說三止啼黃葉豈真金錢哉四揀偽敦信分二初揀別真偽二開除釋疑初又二初不聞不知非真弟子舍利弗若我弟子至非阿羅漢非辟支佛弟子與師神交氣聚命脉相關隨順師法繼續傳燈有所言說諦信無疑羅漢具智斷之能辟支有覺悟之智舉一三反聞即解了法王法中雖有二乘之名而無二乘之實如來出世但教化菩薩而已那有二乘不過假立以引之耳昔三之權今一之實傳此乃真弟子悟此乃真羅漢覺此乃真辟支今我弟子自謂羅漢辟支不聞不知但教菩薩事無二無三之旨此非佛弟子非阿羅漢非辟支佛二聞不信受成增上慢又舍利弗是諸比丘至若不信此法無有是處此敦逼時眾令信受也五濁障重暫令息苦故說見思斷盡名為羅漢不復受生名最後身出同居分段苦輪名為涅槃無明別惑尚在何得名羅漢變易生死浩然何得名最後身化城未是寶所何得名究竟涅槃倘自以為足不復進求無上菩提皆是增上慢人耳所以下反顯若實得阿羅漢者今聞此經即便信受進求菩提不信此法者未之有也此輩未得羅漢而謂羅漢未得最後身而謂最後身未得涅槃而謂究竟豈不是增上慢哉二開除釋疑除佛滅度後現前無佛至於此法中便得決了承上若佛在世說此經不信不受成增上慢即開云除佛滅後現前無佛許此一類偏執權經不信圓法聽許非增上慢是無佛處容可稱尊也聽許者何以滅後雖有此經求其受持及解義者難得其人人既難遇致此輩不信不受不聞不知所以聽許非慢也若遇下釋疑恐疑曰若滅後羅漢不遇此經不遇誦持之人則當永滯小果終不聞耶故釋云是人雖生滅度之想捨命已後便生有餘之國值遇餘佛於此大法一言之下便得決了又餘佛者四依菩薩也羅漢遇之聞經決了又修念佛定見十方佛為說決了又行人苦到懺悔見佛為說亦得決了揀偽敦信竟五說無虗妄舍利弗汝等當一心至無有餘乘唯一佛乘先勸信迦文實說次勸信諸佛誠言所以止疑謗也然此勉勵當機者上來三請之篤故世尊婆心大切一縱一奪乍抑乍揚展轉至此無上妙理八字打開滿盤托出只欠當機一信解耳故結勸云汝等當一心等若待思而後知見而後信當面錯過不知幾千里矣惟在句下承當直信不疑便能通身顯露脫體全彰諸佛稱性而說言不虗妄但發肎心必不相賺此而不信吾末如之何也已矣上長行已竟二偈頌共有一百二十一行分二初四行一句頌上許答二有一百一十六行三句頌上正法說且初四行一句頌上許答爾時世尊欲重宣此義而說偈言比丘比丘尼有懷增上慢至舍利弗善聽上慢我慢不信四眾通有但出家修道得禪謬謂聖果偏起上慢故近事男挾財勢等多起我慢故近事女智淺偏僻多起不信故不自見過者三失覆心藏疵揚德不自省察是無慚人也若自見過是有智人也缺漏者律儀有失名缺定共道共有失為漏無道定故內起惡覺如玉含瑕無律儀故外動身口如玉露疵護惜即覆藏也覆罪者恐彰己短護惜者恐失利養小智者不得學無學智而有世間小慧糟酒之滓也糠米之皮也五千但有世間禪而無無漏禪定潤如糟但有文字解而無理慧之實如糠喻此眾內無實智一向空腹高心執著聲教如糟糠之濫於五也今佛開大機顯大用不向語言中作活計正欲篩簸糠粃獨存實仁彼等見如此之威德故禮佛而退故云佛威德故去若斯人者薄福少德不堪受是一乘之大法也此眾二句頌佛自慰舍利一句頌許答也此中缺漏以破器責之瑕疵以玷病責之糟糠以不醇粹責之小智以無大智責之枝葉以不貞實責之惟有過故缺漏缺漏故護惜護惜是小智小智是尠福德尠福德故不堪受大法也二有一百一十六行三句頌上正法說分二初七十三行一句頌四佛章二四十三行半頌釋迦章初四佛章分四初三十四行三句頌諸佛二二十七行半頌過去佛三六行半頌未來佛四四行半頌現在佛且初三十四行三句頌諸佛然與長行有三異一彼此互無長行有歎法無五濁今頌有五濁無歎法二前後間出長行先歎法次不虗開權顯實今頌先開權顯實後明不虗三開合不同長行勸信不虗合說今分勸信隔於不虗又長行以釋迦方便釋諸佛之權今頌中以釋迦顯一釋諸佛之實正顯佛佛道同故也文分為五初五行三句頌諸佛開權二十三行頌諸佛顯實三四行半頌諸佛勸信四九行半頌諸佛五濁開三五二行頌諸佛不虗且初五行三句頌諸佛開權諸佛所得法無量方便力至為是說涅槃所得法即道場所得權實法也方便逗機故言無量照九法界機說七方便教九是所被教不出七說七被九漸令入實隨何等機說何等法遇機便逗無有一定故云無量方便力而為眾生說現起希望名念法門不同名種種心念存於中事業彰於外也過去所習名性現在樂欲名欲心念不一事業不一故云若干善惡業者七方便人傳迭論善惡先世善惡若干差別非一緣一喻一方便所能度脫唯佛權智照了隨其機宜說九部法投其念欲令其歡喜也修多羅契經也伽陀云孤起不重頌也本事者說本昔世界事也本生者說本昔受生事也未曾有者種種神力眾生怪未有也因緣者一切佛語緣起事皆名因緣也譬喻者月隱重山舉扇類之風息太虗動樹訓之祇夜云重頌優波提舍云論議如上九部言昔施權為七方便人說也若十二部更加方廣授記無問自說鈍根下結施權意前世根鈍今世無機不堪聞大故言不行深等前世貪著障重今世眾苦所惱故唯可聞小故言為是說涅槃也二十三行頌諸佛顯實分二初三行頌大事因緣我設是方便令得入佛慧至以故說是經長行先明出世大事因緣開示悟入佛知佛見次明會權歸實但一佛乘無有餘乘若二若三今頌會歸之意明顯開示悟入總以佛慧大乘攝之承上謂此涅槃是一時權設非決定說非真實說其實潛巧密誘令入佛之智慧但不曾說汝等當成佛道所以未曾說者根未熟故時未至故今之根器既熟說時已至乃決定說真實說撤去籓籬直授大乘平等實相妙法故云決定說大乘也又當知往昔所說九部之法皆是隨他意語非我本懷九部隨順眾生入大乘是佛本懷以是之故先說此九部經也二十行頌會權歸實有佛子心淨柔軟亦利根至此事為不可有佛子下頌但教化菩薩也心淨者不與萬法為侶諸塵作對非若貪著五欲如癡蠅粘喃不肎放捨也柔軟者調伏柔和易受化度非若剛強麤獷如狂象難調難伏也利根者見鞭影而即行非若樂著小法如駑駘策之不進也近佛行道因深緣勝非若遇佛不求勝法當面錯過也如斯方是大根方稱佛子堪受大法不獨為說大法亦復授記成佛疑云如此佛子為說大法宜矣何故又授記耶答以深心故樂修一切善法念佛故志求無上菩提持戒故具足清白梵行若此人者一聞授記大喜充身一肩擔荷由彼發心既深念佛又切持戒又淨佛知其心又知其行是故為說大乘聲聞下正明會歸然此大乘平等之法不說則已若說此法無論三乘人天但得一偈染神皆得成佛如伽陀藥但得沾唇無疾不瘳不可有一毫疑慮存於胸中也無疑二字乃喚醒之辭問佛道懸曠經劫積行一偈成佛何其易耶答佛性在纏如神珠之在衣小向外求故甚大艱難今經直指當體故不求自得一偈成佛庸何疑焉十方下正頌但以一佛乘為眾生說無有餘乘若二若三也諸佛下頌上諸有所作常為一事也唯此一事不以小度者常為一事之意也佛自住下釋上不以小度之意平等之理生佛共同以斯道覺斯民聖人之任也不以斯道覺以餘道豈平等乎夫道非一人之道乃天下人之道欲天下之人共道於天下之道斯則以道公人方稱聖心豈可獨善而不及他哉故云若以小乘化等三四行半頌諸佛勸信分二初二行半舉果勸若人信歸佛如來不欺誑至為說實相印信根成就歸敬於佛載道之良器也如來二句謂若信歸我我則待之以誠不欺小機不誑末學不貪法利不嫉物勝也佛心清淨無明慳垢眾惡已斷淨心中說內心可信也無畏者圓證三大位極四天萬靈仰德群魔歸化何所畏乎相嚴等者即他受用身略說有九十六種大人相廣說有十蓮華藏微塵數相好莊嚴洞然無碍所謂十方世界一時開現也眾尊者即華嚴中諸世間主有四十二眾跽足而禮袒誠致敬或雨華奏樂香葢彌空稱功誦德辭流若海身相炳著光相端嚴內無暗惑外有光明為眾所尊外色可信也釋論云諸小乘經若有無常無我涅槃三印印之即是佛說修之得道無三法印即是魔說大乘但有一法印即諸法實相名了義經能得大道若無實相印是魔所說又一乘實相心印如世國璽代代相禪得此為真天子又將相之權以印攝事得者上承王命下服兆姓一時無權法無所施千佛授受唯傳心印得此心已為真佛子紹佛位行佛事威德無畏不為魔壞未得不為魔壞者難矣二二行舉因勸舍利弗當知我本立誓願至皆令入佛道本願即寶藏佛時所發五百大願也我昔誓願非但自誓菩提亦誓眾生同入佛慧今酧誓故說是亦可信此舉昔誓如我下明願滿問佛初立誓誓度一切今眾生尚多願云何滿荅三世益物無有窮已且約一期機熟得度而言即名願滿也四九行半頌諸佛五濁開三分四初一行總明五濁障大二六行別明五濁障大三一行明為五濁故說小四一行半明為大故施小且初一行總明五濁障大若我遇眾生盡教以佛道無智者錯亂迷惑不受教中含云劫初光音天下生世間無男女尊卑眾共生世故言眾生據最初說也若攬眾陰而有假名眾生據一期受報說也若言處處受生故名眾生據業力五道流轉說也正法念經有十種眾生謂長短方圓三角青黃赤白紫也長者在地獄時身受無邊苦心念無邊惡畜生時身相吞噉心相逼惱鬼時身若燒山心如沸鑊人時身作不饒益事心念不饒益事天時縱逸嬉戲不聞正法是生死長也短者在地獄能一念寂靜心取戒畜能一念靜心歸三寶鬼能一念心淨諸根人修六度孝養等天時捨天樂修梵行是名短也方者如單越於一切物無我我所捨身上天從天又上昇唯向善處方楞也圓者唯在三途四趣團圞圓轉如旋火輪也三角者善惡無記三性在生死中不脫也青者恒在黑暗地獄也黃者餓鬼饑羸萎黃也赤者畜生相噉遞相流血赭然也白者人天白業善道如天死餘天語言汝生人道去人死知識語言汝向天上去也紫乃修羅謂天鬼畜如紫間色也眾生以苦惱自煎諸佛以大悲濟物悲與苦對故云相遇又佛如眾生如一如無二如天性相關故若遇眾生教以人天四諦六度等法我則墮闇惑慳貪偏僻止免三途青黃等生死止出二十五有非教佛道也皆令眾生同得實相妙慧是出世本懷故云盡教佛道無智則錯亂修習迷惑則不受大法遇則盡教佛道故五濁不能障大無智不受故云障大二六行別明五濁障大分互初二行明眾生濁二一行明命濁三一行明見濁四一行明煩惱濁五一行明劫濁且初二行明眾生濁我知此眾生未曾修善本至備受諸苦毒善本者真如實相也不依此種善根故不感大善根劣也五欲者色如熱金丸執之則燒聲如塗毒鼓聞之必死香如憋龍氣齅之則病味如蜜塗刀䑛之則傷觸如臥師子近之則嚙也此五能生行人樂欲之心故名五欲即諸惡之本惡業強也癡即無明愛即貪愛從癡有愛故現生苦惱後墮三途眾生沉於六趣者不出善惡五戒人十善天慳貪鬼牴突畜生十惡地獄瞋恚修羅也經歷六道備受苦毒眾生濁也二一行明命濁受胎之微形世世常增長薄德少福人眾苦所逼迫微形有二一攬四微所成故二妄認蕞爾之軀故處胎經云五位增長初七羯羅藍此云凝滑狀如凝酥二七遏浦曇此云疱狀如瘡疱三七蔽屍此云凝結狀如就血四七徤男此云硬肉漸堅硬故五七鉢羅奢佉此云形位具諸根形故經三十八七日出胎從生至老死故云世世增長薄德二句明命濁相也大福德人住胎如畵宇香風觸之漸漸增長少福人臭風觸之眾苦逼迫如胎經中說又微形者非胎中微小之形乃中陰隱微之形以生生投胎不斷故云世世增長也三一行明見濁入邪見稠林若有若無等依止此諸見具足六十二五見交加如稠林密茂若有是常見若無是斷見因此二見生六十二如外道計我有四句謂色即是我離色是我色大我小我在色中我大色小色在我中四陰亦然是為二十三世為六十并根本斷常共六十二見五見中單舉邪者末世之下此見多故今之不禮塔寺誹謗正法撥無因果者是也四一行煩惱濁深著虗妄法堅受不可捨我慢自矜高諂曲心不實浮名幻利認為真實故云深著堅受即貪也根本舉貪慢小隨舉諂以攝其餘打自大鼓竪我慢幢故云矜高搖尾乞憐心意屈曲故云不實五一行明劫濁於千萬億劫不聞佛名字亦不聞正法如是人難度長時無佛法人事雜亂四濁聚時名劫濁難度者五濁障重不信一乘則不可度也別明五濁障大竟三一行明為五濁故說小是故舍利弗我為設方便說諸盡苦道示之以涅槃此說四諦法也謂五濁障重大法難投不得已而說四諦方便以漸引之苦即苦諦義含集諦道即道諦涅槃即滅諦也四一行半明為大故施小我雖說涅槃是亦非真滅至來世得作佛五濁障大故說三界惑盡為得涅槃但是方便則非真滅無明別惑尚在變易生死浩然豈真滅耶若了諸法從本以來未曾動著一毫性自真常體自寂滅則為真滅矣法雖本寂若不修道無由契會故云佛子行道已來世得作佛上諸佛五濁開三竟五二行頌諸佛不虗我有方便力開示三乘法至唯一無二乘先明釋迦開三次明諸佛顯實今此下正明不虗前權後實巧為五濁施此方便誠言不虗勿生疑也初頌諸佛章已竟二有二十七行半頌過去佛章此章廣明微因小善皆成佛道正顯一言一句無非一乘之緣一香一華無非菩提正因二乘何不自省又未來未至現在始行搆之虗言不若騐之實事故於過去廣明只要二乘自信作佛耳分二初三行略頌開顯過去無數劫無量滅度佛至令入於佛道初二行開三人時各異氏族不等不可以數量思量能知之者是諸下顯一二二十四行半廣頌開顯分二初一行半總明方便助顯又諸大聖主知一切世間至助顯第一義正因佛性即第一義若用圓妙正觀則是實相方便不稱為異今用五乘七方便而助顯之名異方便即下六度小善稱名供像等六度乃正行云何為異以第一義中即佛之一字以為異耳良由眾生樂欲不同故諸佛方便有異然方便雖異助顯則同既顯實已此異非異殷勤稱歎正由於此二有二十三行別明開顯之相分二初二十二行約眾善顯緣因功德二一行約聞經顯了因功德初分七初二行約六度明開顯二一行約悲戀心明開顯三四行半約供舍利明開顯四三行約造佛像明開顯五三行半約畵佛像明開顯六七行約供塔像明開顯七一行約稱佛名明開顯且初二行約六度明開顯若有眾生類值諸過去佛至皆已成佛道正因佛性生佛體同幻障若深永不值佛得值佛者則是內因力強得感出世之緣然其深心所欲不同所以諸佛說法亦異在彼一時或聞頓法或聞漸法或修布施等或單修一法一行或兼修餘法餘行或專或助種種不同故云種種修福慧前五為福後一為慧如是下開顯由今觀之皆已成佛矣此中聞法智慧似宜屬於了因讓後聞法華故但屬緣因也二一行約悲戀心明開顯諸佛滅度後若人善軟心如是諸眾生皆已成佛道承上不但值佛聞法修行者成佛也即諸佛滅後能於如來起悲戀心一念之間捨惡從善化剛為柔在彼一時似屬人天二乘由今觀之已成佛矣三四行半約供舍利明開顯諸佛滅度已供養舍利者至皆已成佛道文中先造七珍八寶塔次造香木凡材廟承上不但悲戀心者成佛即諸佛滅後碎身若干是諸人等為供舍利而起塔為供肖像而起廟隨人力之大小不等其嚴飾有精麤文質不同如金銀以至木樒玫瑰以至磚瓦差別不可盡言事業則殊敬心則同乃至積土為廟聚沙為塔童戲無心功不唐捐在彼一時則謂功德或大或小或有或無由今觀之資一簣之因成嶒崕之勢皆已成佛矣玻瓈西方水玉也玫瑰石珠也說文火齊珠也徐氏曰火齊象珠赤色起之層層各異長安有木名樒亦任造像情未開純和未喪曰童子乃未冠之稱如牛無角山無艸亦名童按佛示滅既茶毗後大迦葉言如來舍利非我等事自有國王大臣長者居士等樂福田者廣修供養我等事者宜應結集三藏勿合正法速滅由此觀之迦葉傳佛心印以先務為急人天樂種福田以供養為先就彼修供養時所發三乘五乘之心願不同而過去佛之方便力故久久之後未有不歸於佛道者又經中造塔之法如來十三級支佛五級四果如位輪王無級級者輪相也今時人動輙起塔以凡濫聖為戾不輕語云君子愛人以德縱令弟子敬師豈可陷師於濫聖之罪又縱令死者冥冥寧不顯生者之碌碌耶四三行約造佛像明開顯若人為佛故建立諸形像至皆已成佛道承上文不但供舍利起塔廟者成佛即隨用何物建立形像者亦成佛矣或刻木為形雕鉛為像或聚實銅而溶或摶土泥而塑成之以膠漆繪之以眾彩物有精麤價有高低心有誠否願有遠近在彼一時功德似乎有大有小由今觀之已皆成佛矣鍮鉐黃銅似金膠漆即脫沙像優婆塞戒經造像不許用膠得失意罪此經用者古師云外國用樹膠耳有云大豆汁可代膠清造像功德經有十一種功德一者世世眼目清潔二者生處無惡三者常生貴家四者身如紫摩金色五者豐饒珍玩六者生賢善家七者生得為王八者作金輪王九者生梵天壽命一劫十者不墮惡道十一者後生還尊敬三寶又云若人臨終發言造像如麥能除三世八十億劫之罪五三行半約畵像明開顯彩畵作佛像百福莊嚴相至度脫無量眾承上不但造佛像者成佛即畵像者亦然至於肖影於帛指畵於地自作使人乃至童戲誠敬不等皆出作者之妙意三寶功德純是諸佛之悲願在彼一時則謂功德或有或無由今觀之小善起於眾生之事迹印於藏識永為菩提之果種已成佛矣但化二句明成佛化他事六七行約供塔像明開顯若人於塔廟寶像及畵像至如薪盡火滅承上不但起塔廟造像畵像者成佛即於塔廟寶像畵像之前修諸供養皆得成佛貝者大螺也簫者虞舜所造編小管為之參差不齊象鳳之翼今謂笙非也臨川王氏曰大者二十三管長一尺四寸小十六管長一尺二寸又有洞簫無底者之稱又簫者肅也其聲肅肅而清也說文笛七孔羌笛三孔武帝時丘仲所作笛者滌也滌除邪穢納之雅正長一尺四寸琴者神農所作長三尺六寸象朞之日廣六寸象六合五絃象五行腰廣四寸象四時前廣後狹象尊卑上圓下方象天地十三暉象十二月餘一象閏後文王加文武二絃亦名少宮少商琴乃禁也乃制邪婬正人心之樂也箜篌師延所作靡靡之樂也後出於桑間濮上之地葢空國候之所存也其形小似鼓顙今太廟有之琵琶長三尺五寸象三才五行四絃象四時手前推曰琵手後推曰琶唄此云讚頌即梵音也供像功德獻以香華奏以伎樂唄頌一音之小散心一華之誠或珍重肅容而禮拜或倉卒高率而低頭雖敬有輕重發心是一無心之緣而積有心之因有為之作階於無漏之果在彼一時則謂功德必有差別由今觀之已皆成佛非但自成佛道亦能化度眾生入於涅槃子果縛盡名無餘機薪既盡應火云亡故云薪盡火滅七一行約稱佛名明開顯若人散亂心入於塔廟中一稱南無佛皆已成佛道承上不但五塵三業供塔像者成佛即散心稱名亦成佛矣南無此云歸命亦云度我亦可云敬從西國有事天像者以金為頭盜來取之不能稱南無佛便取去明日眾謂天像失頭便是無天天附人曰盜稱南無佛諸天驚動是故失頭眾曰天不如佛隨事佛盜稱一聲尚得天頭況賢者稱佛名乎如人持一石置水必沒無疑若持百石置舡必不沒有惡人一死必墮地獄如石置水臨終念佛得生西方如舡力故使石不沒而到彼岸也又佛世一老人求五百上座度觀宿世無善根不許佛後度之證羅漢上座問言此人云何度證佛言此人於無量劫前入山採薪遇虎懼念佛一聲善根成熟所以得度由其別無他善久流生死劫數長遠故非聲聞道眼所知既證羅漢必成無上菩提明矣夫散心稱名既已成佛況一心不亂哉一念相應一念佛一曰相應一日佛是心作佛是心是佛信然上約眾善顯緣因功德竟二一行約聞經顯了因功德於諸過去佛在世或滅後若有聞是法皆已成佛道是法指法華開顯之法也上來六度乃至像教供養乃至稱名並是諸佛以異方便助顯真實尚得開之成妙緣因況復此經正顯真實若有聞者即了因種寧不成佛在世者及門膾炙其口滅後者私淑受學於人聞廣聞略得文得義至心散心事非一槩亦得義論五乘差別一歷耳根永為道種若遠若近終因斯脫未有一人不成佛者此諸佛真實語不可不信上過去佛竟三六行半頌未來佛章分二初一行開三未來諸世尊其數無有量是諸如來等亦方便說法二五行半顯一分三初一行半正明顯一二一行明佛本願三三行重明開顯且初一行半正明顯一一切諸如來以無量方便至無一不成佛此中方便即該前章緣因功德聞法即攝前章了因功德無漏智即一切種智也二一行明佛本願諸佛本誓願我所行佛道普欲令眾生亦同得此道三三行重明開顯未來世諸佛雖說百千億至導師方便說初一行明開權終歸一實百千等指五乘七方便一切權說其實一句出說權之意說雖在權意本在實次偈釋上說一乘以唯一性故謂若有二性容有兩乘既唯一性故說一乘耳知法常無性者知即證知法即所證知法謂色心等一切諸法也常無性者所證理也即如無性理覺諸法故云何無性謂色心等從本已來性相空寂非自非他非共非離湛然常寂故曰無性而言常者謂有來即無非推之使無故曰常無性即無相性無性性也佛種從緣起者有二義一約因種即正因佛性故涅槃經云佛性者即是無上菩提中道種子此種即前常無性理涅槃又云佛性者即是第一義空無性即空義也緣即六度萬行是緣因佛性起彼正因令得成佛是故說一乘者唯以佛性起於佛性更無餘性故說一乘稱理說也體同曰性相似名種故關中云如稻自生稻不生餘穀此屬性也萌榦華粒其類無差此屬種也二果種性關中云佛報唯佛其理不差即性義也說法度人類皆相似此種義也果之種性緣真理生故云從緣起佛緣理生理既無二是故說一乘耳意謂證理成佛稱理說一也後偈重釋前偈言是法者即前所知之法所以常無性者由住真如正位故以緣生無性緣起即真由即真故上云無性言法位者即真如正位故智論說法性法界法住法位皆真如異名世法即如故皆常住謂因乖常理成三界無常若解無常之實即無常而成常矣常與無常二理不偏故涅槃況之二鳥今於道場證知一切世間無常即真常理猶懸鏡高堂萬像斯鑒二而不二不可言宣以方便力假以言說一尚假說況有二三清涼云上法字指諸法下法字指真如言一切諸法皆住真如正位理中既住於中全體即如性常相亦常故云世間相常住即諸法如義也前解依此肇法師云皆指諸法一切諸法皆住法之自位以緣生無性一剎那間此法生即此法滅無容遷至餘處昔不至今今不至昔此不至彼彼不至此豈非法住法位乎上未來佛章竟四有四行半頌現在佛章分三初一行半標出世意二一行頌顯實三二行頌開權且初一行半標出世意天人所供養現在十方佛至亦說如是法此章應上長行先標出世意現在既爾過未亦然二一行頌顯實知第一寂滅以方便力故雖示種種道其實為佛乘知即證也寂滅即所證理也三二行頌開權知眾生諸行深心之所念至隨應方便說知眾一句即種種所行道也深心一句即眾生心所念也過去一句即先世善惡業也欲性二句即若干諸欲性也應機隨欲法門不一故云種種等總上七十三行一句頌四佛章已竟二有四十三行半頌釋迦佛章分二初二行總頌開權顯實二四十一行半別頌開顯六義初又二初一行頌顯實今我亦如是安隱眾生故以種種法門宣示於佛道例上四佛同是先權後實故云亦如是安隱者即大涅槃常樂住處此處寂靜無五濁障故名安隱即對不安隱言謂三界有五濁障名不安隱眾生即五道受化之徒五濁八苦既不安隱如來出世挽回世道憂世憂民安隱此眾耳種種法門權也佛道實也本以一門利物事不獲已施種種法門施權之意本在顯實故云宣示佛道二一行頌開權我以智慧力知眾生性欲方便說諸法皆令得歡喜智慧力者即權智力也眾生性欲即五道根性有三乘差別諸法即三乘法也知眾生者鑑小機也方便說者正施權也令得喜者隨宜稱機也二偈雖略收一代開權顯實原始要終罄無不盡故稱略頌二四十一行半廣頌開顯六義分六初四行頌五濁二十七行半頌施權三六行頌顯實四五行半頌歎法希有五二行半頌不虗六六行頌揀偽敦信且初四行頌五濁舍利弗當知我以佛眼觀至而起大悲心我以一句明能見之眼佛眼觀者准下文長者在門外立應是法身地上以常寂佛眼圓照法界也又天眼通非礙肉眼礙非通法眼能觀俗慧眼了真空佛眼如千日照異體還同若觀色法應用天眼分別根機應用法眼云何言佛眼耶謂佛眼圓通舉勝以該劣耳又四眼入佛皆名佛眼見六下明所見五濁見六二句眾生濁也貧窮等為眾生濁者貧故由無福癡故由無慧癡貧眾生聚在一處故名為濁入生死二句命濁也生死險道即六道也眾生踐之如臨深履薄之險何以知之以功名觀之朝視廟堂暮謫海嶺以身命觀之昨夜畵堂今朝黃壤以三世觀之生在人天死墜惡道豈非險乎世人不思曲突之防自速焚燋之患既造有漏之因必致無常之果生死相續如旋火輪故云苦不斷深著四句煩惱濁也𤛆牛者獸如牛而尾長眼被毛塞所見不真故云盲瞑說文云西南夷長𤛆牛牛愛其尾就身護尾人愛其尾故殺其身喻人貪五欲一味愛著終害其身其猶牛之愛尾而墮坑害身也不求二句劫濁也佛有勢力法能斷苦不求佛不聞法不近僧亦在其中矣眾濁交湊如水奔昏世衰道喪人心澆漓故名為濁又終日業識不求自己天真禪定脫苦不求靜慮省察也深入二句見濁也六十二見故名為諸塗灰裸形糞穢先人之遺體牛狗等戒自甘畜生之常食將此苦行無利勤修欲望捨苦反得苦報行苦因而希出苦者豈可得哉為是二句明大悲赴應為五濁眾生大悲熏心應入三界施設方便引趣佛慧也二十七行半頌施權分二初六行半念用大乘擬宜不得二十一行念同諸佛三乘隨宜初又三初一行半大乘擬宜二三行眾生無機三二行念欲息化且初一行半大乘擬宜我始坐道場觀樹亦經行至微妙最第一至理無時假時化物約此番為化之初故言始道場在摩竭提國去泥連河不遠佛初在此處修治得道故言道場坐此樹下得成菩提故名道樹感樹恩故觀察念地德故經行樹地無有分別豈須報恩未曾有經云只以通化傳法為報恩耳擬此即不離菩提樹上昇忉利天等塵塵剎剎皆有盧舍那佛主伴重重演大華嚴時也於三七日下道成賽澤之時欲以大法擬宜眾生也過去因果經云佛成道初一七日思惟我法妙無能受者二七思惟眾生上中下根三七日思惟誰應先聞法即至波羅柰為五人說四諦等我今所得之智慧固非世間聰明之所能知此是般若之實智實慧微妙難入於世出世間為勝為最勝為上為無上為等為無等等是第一希有難解之法豈以世智辨聰而能彷彿領略者哉教我如何說向於人也二三行眾生無機分二初一行障重不堪聞大眾生諸根鈍著樂癡所盲如斯之等類云何而可度諸根即六根也若眼根利即以色塵發揮而引度之餘五可知諸根若利我即頭頭法法發揮此理其柰眾生諸根暗鈍何貪著世樂五欲所纏也癡愛所盲無明所翳也以微妙之大法投鈍根之小機如方木不逗圓孔以第一之智慧訓癡盲之眾生猶揭鼓而求亡子法不投機說置兩難故曰如斯之等類云何而可度云何二字正世尊思惟擬度也二二行梵王請佛說法爾時諸梵王及諸天帝釋至請我轉法輪此中悉准大通時十方梵王請法之儀如來自述故不煩文若據四天下只一梵王為三界天主今云諸梵王者如來統御大千有百億四天下則有百億梵王故名為諸若論請法正在初禪三界天主也諸梵雖請說大佛知無機所以不說如何得知請大據下佛言但讚佛乘故知請大也上眾生無機竟三二行念欲息化我即自思惟若但讚佛乘至疾入於涅槃我即下明無機此二七思惟我若即轉最上法輪眾生正沒苦海順其法則法不應機順其機則機不達法無機強毒聞必不信起謗破法墮落三途是說法無益而反有損也我寧二句正欲息化我寧者願詞也如云寧可如此思惟至此至矣盡矣故出此絕歎之辭已矣乎我寧不說法乎我即速尋入於涅槃乎我寧捨此眾生不度而息化者乎如仲尼浮海之歎此科為下施權張本念用大乘擬宜不得竟二十一行念同諸佛三乘隨宜分二初十行明化得二一行釋疑初又分四初一行明三乘擬宜二六行半明有小機三一行半正明施化四一行明受行悟入且初一行明三乘擬宜尋念過去佛所行方便力我今所得道亦應說三乘非不知開三欲憲章諸佛故尋念也仍念雖無大機不容永捨要以方便濟度應說三乘教法二有六行半明有小機又分二初四行半明諸佛讚善作是思惟時十方佛皆現至但為教菩薩作是思惟三句是佛自敘佛現也初七循己所得之法微妙難投故諸佛不現二七循人根鈍難信諸佛亦不現三七忘其人已上循諸佛下化眾生佛佛道同為實施權雅合諸佛本懷故皆現耳善哉下是諸佛之言上欲大化於彼無機故諸佛不讚今欲說小曲會根緣則始終得度所以歎善也釋迦是姓此云能仁淨名疏云天竺語釋迦為能文文為儒義即名能儒為一說三引入佛慧即為第一導師無上法即實智微妙第一也用方便者隨十方佛以方便法巧逗眾生也此正歎釋迦能隱實施權我等四句諸佛明自己亦隱實施權所得是一為眾生說三也少智四句明隱實施權所以謂眾生少智不自信作佛所以隱實為樂小所以施權分別說諸果者人天三乘果報皆權巧分別引諸童蒙耳雖復二句結顯本懷雖復說三終為顯一在機有三乘之別在佛但教菩薩耳二二行明釋迦酧順舍利弗當知我聞聖師子至我亦隨順行我聞下發言酧順一聞諸佛歎善即酧曰南無諸佛此用敬從義復作下念順物機濁惡之世大法難投隨順諸佛方便說三此明不得已而說三非佛本懷也上明有小機竟三一行半正明施化思惟是事已即趣波羅柰至為五比丘說波羅柰即鹿野苑之境號婆沙云有河名波羅柰去其不遠造立王城中印土境或翻江繞城亦云鹿苑諸法寂滅相者即中道實相無性之理以諸法一如體自寂滅性自真常本不可以言語宣示今以方便力故作三乘之談佛念五人當往先度故至此為五人三轉四諦法輪五人者一陳如二十力迦葉為母族二人三阿濕波四䟦提五摩訶男拘利為父旅三人往世饑饉佛為赤目大魚五人為木匠先取魚肉故今先度四一行明受行悟入是名轉法輪便有涅槃音及以阿羅漢法僧差別名流演圓滿曰輪自我至彼曰轉轉佛心中化他之法度入他心名轉法輪陳如初得初果即斷見惑分證滅諦亦是分得有餘涅槃涅槃之音起自於此由此得成無學便有羅漢之名能說者名佛所說者即法初果羅漢名僧三寶差別之名於是現於世間也功成妙智道登圓覺佛寶也玄理幽微正教精誠法寶也禁戒守真威儀出俗僧寶也此三為四生導首六趣舟航故名為寶此中是名便有及以差別名等字面是世尊提醒二乘何不自己忖量從昔已來所聞之法所證之果為真耶偽耶以中道實相性相湛然元無差別若謂有佛頭上安頭眼中金屑若謂有法好肉剜瘡虗空釘橛若謂有僧鉢盂安柄為蛇添足何不改途移轍造詣於無差無殊不生不滅非即非離一乘中道之實相乎上化得竟二一行釋疑從久遠劫來讚示涅槃法生死苦求盡我常如是說此一偈釋二疑恐疑師云佛初未能鑑機尋念諸佛始知根性即釋云非我不知用於方便特欲引同故念諸佛非始念方知從久遠劫來見其樂小已為讚示令盡諸苦所以聞小即得解脫也又疑弟子云何故眾生一世暫聞即證羅漢即釋云從久遠劫來為其讚小稱於本習故速得道果也久遠指大通結緣之後故下云父知諸子先心各有所好也上頌施權竟三六行頌顯實分四初二行大乘機動二二行一句明佛歡喜三三句正明顯實四一行受行悟入且初二行大乘機動舍利弗當知我見佛子等至方便所說法亦名索果由機發故索果索果由於機發應有四句自有障除機未發如諸羅漢在昔教時以樂小故濁障雖除大機鈍故妙機未發自有障未除大機發如法華中諸凡夫等雖未斷結以大根利故機發自有障即除機即發如說無量義時證小果即於此座大機發自有障未除機未發如五千退席等是也志求佛道即索大果索有三意一大機有感果之義機中論索二情中密索如身子云為得為不得三發言索即殷勤三請是也昔教機情今經發言咸以恭敬二句即四眾圍繞等如身子請云諸天龍神等乃至合掌以敬心欲聞具足道也曾從二句身子請云無數眾生曾見諸佛又如我等比等下文二萬億佛曾受教化若約一化言阿含方等般若具歷諸教調熟故云曾從諸佛聞方便所說法也二二行一句明佛歡喜我即作是念如來所以出至今我喜無畏作念由求佛道佛慧即一切種智佛知見也為佛慧故出現於世昔障重無機不得即說佛慧中間障雖除無機又未得說今機發求大正是說時故云今正是說大乘之時也舍利下釋昔未是說時以昔日根鈍智小著相凡夫具大憍慢不能信受一乘大法恐其謗法墮惡故未是說時今諸佛子既以恭敬曾從佛聞則知根利智大不著相不憍慢能信此法堪得大乘利益故喜無畏喜其方稱本懷不畏機小謗大起罪墮惡故三三句正明顯實於諸菩薩中正直捨方便但說無上道五乘七方便是曲而非直是偏而非正今捨彼曲偏之方便但說正直一乘無上道也四一行受行悟入菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛初聞久後真實三乘方便菩薩羅漢動舊執起新疑今菩薩聞法除疑非獨菩薩羅漢亦爾二乘授記成佛菩薩亦爾未有成佛不除疑者未有除疑不成佛者互影耳聲聞成佛法華以前未之聞也始自今日自出定已來東語西語引例攀條只為此一語耳上顯實已竟四五行半頌歎法希有如三世諸佛說法之儀式至過於優曇華如三世下頌如是妙法如三世者引同諸佛用權權是引物之儀式無分別法者引同諸佛顯實實則言語道斷豈存儀式權實本無分別為鈍根小智分別權實名為儀式今還悟入一三不二即知說三一無分別法也諸佛皆爾何獨我耶又說法儀式即是先權後實之規模妙法必待時而說也我今亦如諸佛先三後一之儀式說無分別之妙法也諸佛興下頌時乃說之如華時一現耳諸佛出世生在前後值遇甚難如一眼之龜值浮木孔懸遠者如諸梵王云一百八十劫空過無有佛等又釋迦去後過五十六萬億歲彌勒方出世豈不懸遠乎久久懸遠時有佛出此舉佛難正使二句舉法難縱佛出世眾生根器不等未必就說此法四十年來久默斯要節節調停至今方說無量二句聞法難法音盈耳五千越席聞法豈不難乎能聽二句能聽人難法會大眾身子先達中下之機雖聽未了猶待後說以上四難舉華喻之此華非時不現現則維其時也時時猶久久也又此法待時而說此華待時而現故云時時乃法喻雙舉聞法下舉聞法之人合喻此中一言讚歎過於曇華之希有下文謗斯經者三途苦報可不慎諸五二行半頌不虗汝等勿有疑我為諸法王至諸佛之秘要初六句勿於可信人生疑夫為人王者言則不二佛為法王豈容虗說方便可是權假真實寧應是妄聞法王說法勿生疑也次四句勿於可信法生疑四十餘年蘊在佛心他無知者名之為秘一乘直道總攝萬途故言要秘要之法當信勿疑也六六行頌揀偽敦信分二初三行揀偽以五濁惡世但樂著諸欲至廣讚一乘道以五濁下四句頌揀非佛弟子何者若樂諸欲是行魔業故須揀之長行著涅槃尚非弟子此中著生死那是佛弟子互揀非耳不求佛道者頌上揀增上慢未得上法謂得上法是故其人終不求佛道也當來世四句頌如來滅後解義者難得不善之人勿為說也五濁為欲所迷聞法多不信受無益有損默之則宜有慚愧四句頌若遇餘佛便得決了志求佛道為說一乘善人當為說也慚愧者自咎自責如云我乃堂堂丈夫云何甘為下劣也慚愧清淨之人孳孳求道得此良機理應告示不失人不失言其庶幾乎二三行敦信舍利弗當知諸佛法如是至自知當作佛初六句敦信於權諸佛法如是者結上秘要先以萬億方便然後乃示真實方便之教盡是隨宜而說一乘之宗却是本懷之旨其或不能習學如來權實之典必不曉了開權顯實之說故云其不習學不能曉了正是惡人聞不信受也兼對習學者能曉能了正是慚愧善人志求佛道也汝等六句敦信於實方便施權正為於實權實無疑自知作佛下身子云我定當作佛葢領此語也自放光已來諄諄至此無非叮嚀此事要在當機自肎一言之下回頭轉腦諸佛知見全體現前其於如來智慧不勞肎綮矣何喜如之自知二字最為捷要即悟入佛知佛見若不自知自證雖佛大慈亦末如之何上正法說已竟
