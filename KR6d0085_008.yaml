body:
  text: 金臺即山居後學大義集妙法蓮華經隨喜功德品第十八由前分別持經功德已為殊勝未盡其極此品以一念隨喜功德校量方為極則也又上品直起隨喜科中但舉人相至此方明功德顯一念隨喜之功德尚然況受持讀誦者哉隨非用意在先乃不期而遇隨其所聞也喜者非但形色乃心悅誠服也功者行之所趣即一念隨喜之功德者功之所歸即行隨喜之功所得福報之德也謂如來滅後有人偶至法會見人説法一入耳根毫無違逆不生毀訾隨喜於心能生歡喜名自利之隨喜隨其所聞喜為人説名利他之隨喜也又前八部諸天見身子授記生隨喜心即得授記地涌菩薩聞如來度生之事亦生隨喜即得付囑此由如來説法色心業勝易生隨喜也若如來滅後後五百歲雖有説經之人或解行未能相應或典章尚乏稽古因人輕法易生毀訾隨喜實難此隨喜功德所以必校量也二格量隨喜功德分二初彌勒請問爾時彌勒菩薩摩訶薩至而説偈言世尊滅度後其有聞是經若能隨喜者為得幾所福彌勒意謂前來受持讀誦具行六度者既有如上功德如來滅後聞是經者生喜信受義理染神舞蹈之慶發於天然一念隨喜豈無功德故云得幾所福二如來垂答有長行偈頌長行分二初明隨喜能説功德二明聽法勸人功德初分四初展轉相教爾時佛告彌勒菩薩至如是展轉至第五十先標四衆內攝人天三乘歸依三寶者及餘智者乃未歸三寶之人也或治世名賢隱士高流好間野叟旁門異道故云餘智若長若幼若男若女或有意來法會或無心到講堂或聽一章一段一句一偈直起好樂之心故云聞經隨喜已從法會出遇處相傳隨力所能為人演説者標猥褻之處以況法會之精嚴聽衆非誠以況深信之隨喜在法會時其説處輝煌儼煥而説者臨之以莊具四辨之弘宣詳而文也其聽者視之以誠攝一心之諦審精而思也至潔者僧坊間地至陋者聚落田里或都城縣邑華街柳巷鄉黨閭閻猥褻之處其説者或弟男子姪隨力演説其聽者或父母宗親人事雜亂校法會之詳文精思猶雲泥之隔也是諸人等展轉至第五十人者此標第二輩聞經轉教至第五十輩方為校量也諸人等即前父母宗親等人也聞已隨喜者是在僧坊田里處聞最初從法會出之人隨力演説而聞已亦隨喜於心喜為人説復行轉教第三之餘人也此諸餘人聞已心生歡喜又復轉教四輩五輩展轉相傳至一十二十乃至最後第五十人其中説聽之人或高僧名士良朋善友或黃童白叟愚夫愚婦其間相傳之處或茶坊酒肆旅店遊場或豆棚菜園樵徑漁舟如斯展轉相傳漸傳漸遠至第五十人人愈卑而處愈猥説愈乖而聽愈淡尚得向下如是功德況最初在法會中誠意之精勤信力之堅固豈第五十人可同日語哉必以五十為論者由一念隨喜溪爾開明與實相相應斷除五陰中五十種惡也二舉格量本又三初誡聽許校二舉受施之人三舉能施之人且初誡聽許校阿逸多其第五十善男子至我今説之汝當善聽意謂汝云一念隨喜得幾所福姑且不論如展轉相傳第五十人之功德我今説之知五十人之功德則知一念隨喜之功德矣二舉受施之人若四百萬億阿僧祇世界至如是等在衆生數者六趣者隨所作之業趣向六道也卵唯想生胎因情有濕以合感化以離應也俱舍云人旁生具四地獄及諸天中有唯化生鬼通胎化二若有等示四生體性及住止之處有形欲色也無形無色也有想空處識處也無想無所有處也非有非無者非識處之有想非無所有處之無想即無色第四天也爾雅云有足謂之蟲無足謂之豸二足四足多足可知三舉能施之人有人求福隨其所欲至皆得自在具八解脫有人下隨上若干衆生所欲出所施之物也是大下出行施之時也作是念下念其衰老訓以佛法各得道果也金光明云法施有五勝利一者法施兼利自他財施不爾二者法施能令出於三界財施不出欲界三者法施能淨法身財施唯增色身四者法施無窮財施有盡五者法施能斷無明財施唯伏貪愛舉格量本竟三問答顯勝於汝意云何是大施主至何況令得阿羅漢果寧為多不者謂如許之宇宙土俗不同若干之衆生好惡各異博施濟衆聖所病諸是為難事是大施主行惠布德依正兩事享用之資饋給不絶經長年而不厭怠使天下之遂生若此復念財施有益於生不益於死給於世不給於道又訓導以法均證四果庶免沉溺之患使天下之復性又若此所謂先天下之憂而憂後天下之樂而樂斯人矣乎以因推果所得功德感報何如彌勒意謂桴鼓一接擊重而聲洪鸞鏡交涉形妍而像麗其人因深果大應若影響其福無量無邊可涯量哉但資身之施德已難盡況益之於聖道乎四正為格量佛告彌勒我今分明語汝至阿僧祇不可得比不如是等者以多寡相形則輿薪安比寸金貴賤相校則連城不易尺璧如是布施不如聞經一偈彼以其福我以其慧彼有其權我有其實即施充滿四百萬億世界之諸珍施有漏也然一念含裹十虗之深信隨喜無涯也論其教則偏果豈敵圓因論其行則事度安等理度論其理則漸明焉同頓悟論其人則粗人莫貴妙人論法施説十二部經則易説一乘妙法則難論法門則小乘與大乘逈別如斯校量彼布施之功狹而短也此隨喜之德廣而長也其功德豈算數所能知哉如是第五十人況顯最初隨喜者字經三寫烏焉成馬況五十人之道聽塗説其處之陋人之卑説之訛聽之乖信之淺解之謬尚獲如是功德何況最初法會中親聞耶其福勝無比又何況受持讀誦耶為人解説耶其福愈校愈不可窮矣一二明聽法勸人功德分四初自往聽經又阿逸多若人為是經故至珍寶輦輿及乘天宮為是經故往詣僧坊重道之精昭然坐立聽受寸誠之心斯顯故轉生得自受用之功德也車馬士夫所乘者象輦王種所乘者天宮天人所乘者須臾聽經有專心散心隨喜不同故功報有天人君王士夫之異也二分座與人若復有人於講法處坐至若轉輪聖王所坐之處勸坐分座不同故報有天上人間之別一坐之間揖讓之德尚感天位其創席弘經之福又何如哉三勸往聽經阿逸多若復有人至見佛聞法信受教誨若復下生善處報合伴往聽須臾聞法其事甚微其益弘大心與聖相冥合形與法身共處形神俱勝道果可知也十地論陀羅尼菩薩居五地利根下六根好報言不成音聲不出口曰瘖啞不瘖啞音聲清徹也不臭者常出香也舌無病語言敏捷也曰無病不歪斜也齒不等白淨齊密也亦不等堅固端正也不下垂不脫脣也不褰縮不短脣也不粗等色赤而潤無病不缺脣也不咼鈄口不戾也鼻非平薄塌鼻亦非窊陷歪鼻也面不等面如滿月也文中具六根功德利根智慧意根也不瘖啞舌根也鼻修高直鼻根也見佛眼根也聞法耳根也餘皆身根四具聽修行阿逸多汝且觀是至為人分別如説修行二偈頌有十八行分二初九行頌隨喜能説功德二九行頌聽法勸人功德初又三初一行半頌展轉相教爾時世尊欲重宣此義而説偈言若人於法會得聞是經典至至於第五十二五行半頌舉格量本最後人獲福今當分別之至三明八解脫不牢固二句如云是身無常無堅速朽之法身如聚沫不可撮摩身如泡不得久立身如𦦨從渴愛生三二行頌正為格量最後第五十聞一偈隨喜至初聞隨喜者二九行頌聽法勸人功德分四初五行頌勸往聽經若有勸一人將引聽法華至常從其口出昔育王請僧入宮供養有一比丘名優鉢羅口中乃出優鉢華香王疑比丘年少何以口中含香即敕水洗洗已倍香王曰久近含此香也曰非也過去迦葉佛時人壽二萬歲我為高座法師讚揚佛法故四十九億歲生人天中口出此香王聞益敬今勸人往聽復讚此經深妙得如是報法華神功豈思議哉二二行頌自行聽經若故詣僧坊欲聽法華經至及乘天宮殿三一行頌分座與人若於講法處勸人坐聽經是福因緣得釋梵轉輪座四一行頌具聽修行何況一心聽解説其義趣如説而修行其福不可限上二品明證解功德已竟妙法蓮華經法師功德品第十九此品明末世法師內有宿因種子外借佛法熏習恆常精進一心勇猛受持此經會旨情忘根塵兩淨六根互用之妙發於藏性故云以是功德莊嚴六根皆令清淨也法指教體有軌持義師謂模範取陶鑄義以法律己為己之師推以訓物為人之師五種功備曰功於五種功中而得六千德圓曰德前法師品依持經之人以彰圓記此品依持經之人以彰圓德名同意異故加功德二字別之二明持經根淨分二初總列六根清淨爾時佛告常精進菩薩至莊嚴六根皆令清淨六根清淨功德自非精心不雜進道不倦者未易能致故常精進為此品之當機也受持則堅守不失讀則熟文陶義誦則吟味資神解説忘詮薦己書寫潤於竹帛是五種法師之行是人下明所得功德若論六根功德總括始終六根各各功德有千二百若論互用之妙則一根能作諸根用一識能緣一切境六根各各圓滿六千功德且依常眼等世數論之故有千二八百之盈縮也如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻唯八百功德如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一常知身唯八百功德如意默容十方三世一切世間出世間法惟聖與凡無不包容盡其涯際當知意根圓滿一千二百功德皆令清淨者以法師精持此經開示悟入則見聞覺知無非真覺證諸實相則色香味觸無非真法故云清淨既云清淨無盈無縮六根互用得大自在不可思議也二別作六章解釋分六初眼根功德有二先長行是善男子善女人至果報生處悉知悉見清淨即互用自在也肉眼即浮塵根也謂眼如蒲萄朵耳如新卷葉鼻如雙垂爪舌如初偃月身如腰鼓顙意如幽室見俱舍云眼根極微在眼星上傍布而住如頗胝迦耳根極微在耳穴內旋環而往如卷樺皮鼻根極微在鼻頗內背上面下如雙垂爪舌根極微布舌上形如滿月身根極微遍在身分如身形量浮根五塵即扶清淨根照境自體不能照以浮根是粗顯色為清淨根之所依故此中清淨亦即勝義根也浮塵意根即肉團心由最初吸取附著於中以奔法也見是能見分山河等是所見相分也三千等者一日月一須彌六欲初禪為一世界外一鐵圍繞之如此倍增千數上覆一二禪天外一小鐵圍繞之名小千增小千千倍為中千即百萬日月等一千二禪一個三禪上覆外有中鐵圍繞之合千個中千名一大千即百億日月等百億二禪千個三禪上覆一四禪天外有一大鐵圍繞之總名三千大千世界業緣果報即善惡業緣受報好醜等次偈頌爾時世尊欲重宣此義而説偈言若於大衆中以無所畏心至肉眼力如是彌樓山此云光明山以金色光明故即七金山也肉眼所見不遠天根見大千內外今因經之力有勝根用即此肉眼作天眼之功也文中具五眼之用見大千天眼也衆生業報法眼也其目清淨慧眼也一切悉見佛眼也此中父母所生即人人本具者清淨肉眼即衆塵不隔者不隔即正智現前故大千內外一切色像悉知悉見所謂應眼時如千日萬象不能逃影質也問理則然矣事如之何答六湛圓明本所功德現量如是但隨所證耳夫小羅漢見小千大羅漢見大千支佛見百佛界菩薩見千佛界如來見微塵界也非獨果體那律不離父母生身觀大千如掌果則其中一切烏乎不見蓋塵消覺淨冥遠則一何理然事不然乎眼根功德竟二耳根功德有長行偈頌長行分二初總標耳聞復次常精進至其中內外種種語言音聲二別列諸聲分八初明雜類聲象聲馬聲牛聲車聲至鐘聲鈴聲笑聲語聲二明六對聲男聲女聲童子聲童女聲至喜聲不喜聲循道合理曰法聲無道無義曰非法聲三明八部聲天聲龍聲夜叉聲至緊那羅聲摩睺羅伽聲四明三災聲火聲水聲風聲五明惡道聲地獄聲畜生聲餓鬼聲六明二衆聲比丘聲比丘尼聲七明四聖聲聲聞聲辟支佛聲菩薩聲佛聲八結其功德以要言之三千大千世界中至而不壞耳根皆悉聞知者以聖凡雜類之音有情無情之聲一聞頓知了然不錯於聖人聲則知宗旨何如於鳥獸聲則知哀樂何如於樂音風動之聲則知吉凶何如古之觀窗草聽驢鳴秀支替戾岡僕谷劬禿當是其驗也三千大千世界一切音聲萬籟俱作一聞盡解非稱性之用焉能如是細研其意實有駭域之奇大矣哉法華之學也問分別音聲不壞耳根如何是壞不壞義答常人聞聲聒耳不能分別是壞義今此行人聞三千大小之音善惡之聲如在耳邊分別不錯不致混亂是不壞義又欲聞即聞不欲聞即不聞不能聒耳不昧諸聲動靜自在方是耳根不壞也二偈頌有十八行分二初一行頌總標耳聞爾時世尊欲重宣此義而説偈言父母所生耳清淨無濁穢以此常耳聞三千世界聲二十七行頌別列諸聲分七初一行半頌雜類聲象馬車牛聲鐘鈴螺鼓聲至聽之而不著二一行半頌六對聲無數種人聲聞悉能解了至童子童女聲三五行頌惡道聲山川險谷中迦陵頻伽聲至於此悉聞之迦陵此云好聲鳥靈山有鳥名共命一身二頭神識各異報命則同故云命命彌陀經云共命勝天王經云生生涅槃經云耆婆耆婆皆此鳥也楞嚴云四種修羅一分下劣者生大海心沉水穴口旦遊虗空暮歸水宿今云大海邊擬此類也四一行半頌諸天聲其諸梵天上光音及遍淨至悉皆得聞之五一行半頌二衆聲一切比丘衆及諸比丘尼至悉皆得聞之六三行頌四聖聲復有諸菩薩讀誦於經法至悉皆得聞之七三行頌結其功德三千大千界內外諸音聲至功德已如是略三災不頌八部義含耳根亦具五耳之用故能遍聞十界音聲也聞六道即肉天二耳聞二乘聲即慧耳聞菩薩聲法耳聞佛聲即佛耳又父母所生即肉耳能聞內外即天耳聽之不著即慧耳悉能分別即法耳一時互聞即佛耳耳根功德竟三鼻根功德有長行偈頌長行分二初總標鼻聞復次常精進至上下內外種種諸香二別列諸香分五初人間無情香須曼那華香闍提華香至於此間住悉能分別須曼那此云善攝意華闍提此云金錢華末利此云鬘華堪作鬘故瞻蔔此云黃華波羅羅此云薰華多摩羅跋此云性無垢多伽羅此云木香二人間有情香又復別知衆生之香至悉皆得聞分別不錯三天上無情香持是經者雖住於此至和合所出之香無不聞知波利質多羅此云圓生樹在帝釋殿前根莖枝葉逆風熏五十由旬順風百由旬拘陀羅此云大遊戲地樹天諸采女與帝釋共遊戲娛樂處也四天上有情香又聞諸天身香至并聞諸天所燒之香帝釋受娛樂時每夜有八千天女侍奉帝化八千身以娛之妙法亦云善法帝釋所居之處四齋日帝釋與諸天在此堂中集議人間如法不如法事五四聖人香及聲聞香辟支佛香至為他人説憶念不謬問鼻根不壞不錯如何答常人聞香臭諸氣觸鼻法爾不禁是壞義不能分別香臭是錯義今此行人遠聞三千世界香氣如在鼻端然不使觸鼻受熏是不壞義又分別遠近歷然明白是不錯義又欲聞即聞欲不聞即不聞雖不使觸鼻亦不昧香臭有無自在為不壞不錯也二偈頌有三十行分二初一行頌總標鼻聞爾時世尊欲重宣此義而説偈言是人鼻清淨於此世界中若香若臭物種種悉聞知二二十九行頌別列諸香分三初十六行頌人間無情有情香須曼那闍提多摩羅栴檀至出處及所在須曼一行頌無情香也及知下頌有情香也諸天一行天上有情香也此應在後譯者誤也諸樹下無情香有情香也阿修一行長行無而偈頌有也曠野下異類有情香也問象馬牛羊等有何香耶答持經法師得清淨鼻根正知獨露不二體現觀一切有情具有智慧無不具法身功德之香也若有下有情生産香也投胎生産今何詳明欲人知虗妄因緣輪回根本故地中下知伏藏貴賤出處也二七行頌天上無情有情香天上諸華等曼陀曼殊沙至聞香悉能知天上等無情香也上中下者六欲四禪各別天王臣民有異也天園下有情娛樂等種種香也初生者初生天上也退沒者天福受盡也亦是此天退沒初生彼天故三六行頌四聖人香諸比丘衆等於法常精進至先得此鼻相諸比丘等聲聞也或在林樹等支佛也菩薩下菩薩也在在下佛説法香衆生聞法修行香也雖未下結菩薩離分段生六根皆依無漏法生故鼻身意皆言無漏也鼻根亦具五鼻之用父母所生肉鼻也聞內外香天鼻也不染不著慧鼻也分別不謬法鼻也一時互用佛鼻也鼻根互用經文顯然知好惡別貴賤覩天宮等有眼用也讀經説法聞香能知有耳用也知諸華蘇油香有舌用也入出生沒五欲戲嬉即觸聞香能知有身用也知染欲癡亦知修善有意用也鼻根自在勝用若此鼻根功德竟四舌根功德有長行偈頌長行分二初總標舌淨復次常精進至如天甘露無不美者二別明説法分四初聞法歡喜若以舌根於大衆中至能入其心皆令歡喜快樂二八部供養又諸天子天女至皆來親近恭敬供養三王民供養及比丘比丘尼至盡其形壽隨侍供養王有小大輪有四異故七寶者若金輪王出世七寶自然而現一輪二珠三象四馬五主兵臣六主藏臣七玉女以是下菩薩善巧説法四衆盡形供養也四佛聖護念及諸聲聞辟支佛菩薩諸佛至又能出於深妙法音此結舌根利益也二偈頌有八行半分二初一行頌總標舌淨爾時世尊欲重宣此義而説偈言是人舌根淨終不受惡味其有所食噉悉皆成甘露二七行半頌別明説法分五初一行半頌聞法歡喜以深淨妙聲於大衆説法至設諸上供養二一行頌八部供養諸天龍夜叉及阿修羅等皆以恭敬心而共來聽法三二行頌王民供養是説法之人若欲以妙音至常來聽受法文中歡喜聽法供養互現長行偈頌有無可知四二行重頌八部諸天諸天龍夜叉羅剎毗舍闍至常來至其所五一行頌佛聖護念諸佛及弟子聞其説法音常念而守護或時為現身五舌之用文不明顯能作六道語即肉天二舌能作二乘語即慧舌能作菩薩語即法舌一時互用即佛舌舌根功德竟五身根功德有長行偈頌長行分二初總標身淨復次常精進至衆生喜見其身淨故二別明現像分二初身中現六趣三千大千世界衆生至所有及衆生悉於中現二身中現四聖若聲聞辟支佛菩薩諸佛説法皆於身中現其色像二偈頌有七行半分二初二行半頌總標身淨爾時世尊欲重宣此義而説偈言若持法華者其身甚清淨至餘人所不見又如下法喻合明以顯菩薩淨身現相猶如明鏡照物歷歷分明本無染著長行其身淨故是也二五行頌別明現像分二初三行頌身現六趣三千世界中一切諸羣萌至皆於身中現二二行頌身現四聖諸佛及聲聞佛子菩薩等至一切於中現若獨者住禪定中現光明身也在衆者現身為衆説法也悉皆現者皆於行人身現其色像也無漏性身離於分段常體不離分段惟清淨故現一切也身根亦具五身之用世界所有身中現者肉身用也上至有頂身中現者天身用也二乘於身中現者慧身用也菩薩於身中現者法身用也佛於身中現者佛身用也夫十界頓現海印森羅一多相容大小無礙各不壞相即事事無礙義也身根功德竟六意根功德有長行偈頌長行分二初標意根淨解復次常精進至通達無量無邊之義聞一偈一句通達無量無邊義者獲大總持豁然貫通一聞千悟也二明淨意説法解是義已能演説一句一偈至亦是先佛經中所説西域歲分三際謂雨際熱際寒際四月即一際如此方一季意演一句偈至一歲者一真如性無法不攝稱性之談豈止一季一歲哉剖一塵經能書三千界事演一字義海墨不窮者此也不違實相皆順正法者萬法唯心以實智了知無非正法瞬目揚眉語默動靜皆合乎道也寶積見屠子而有省樓子聞淫辭而悟道知一切法即自心性世諦語言皆順正法也三千下觀機由於意淨言説皆合佛説也二偈頌有十一行分二初一行半頌意根淨解爾時世尊欲重宣此義而説偈言是人意清淨明利無濁穢至通達無量義二九行半頌淨意説法次第如法説月四月至歲至持法華經故次第下頌上可知十方下廣前聞解是人下結顯利益意根亦具五意之用世間治世皆順正法即人意淨天所行天所作即天意淨聞一句通無量義即慧意淨與實相不違背即法意淨籌量皆佛説即佛意淨詳此品雖談所得功德皆歸功於此經由持説此經冥契實相入佛知見脫去情塵六根清淨以清淨根照清淨境遂見山林周匝禽獸鳴叫殊形異意無非實相無非妙法即一身而圓證遍六處而常彰本不欠缺曾無窒礙受持讀誦妙法華經者於此宜盡心焉上持經根淨竟妙法蓮華經常不輕菩薩品第二十由前精進持經得六根清淨但明證入之法最妙此品顯能證之人為希有也以此妙法悟入為難既悟守之為難若於惡世弘持此經尤為難也所以世尊憂懸意深叮寧情切引自往昔之事勸人當來進修自持品已來皆明持經之功文雖不一意實一貫此品攝前數品之義以顯能證之人也云常不輕者二執已盡四相不生虗心弘道忘己利物內懷不輕之解外敬不輕之境身立不輕之行口宣不輕之教人作不輕之目故名常不輕即釋迦多劫之前身於威音王時精持妙法以一聲佛號遍記四衆不專讀誦見人則拜打擲罵詈歡喜忍受菩薩不專讀誦持無相經忍辱罵詈修無我行遍記成佛生佛平等非入佛知見深達實相人法雙空者不能也正宗之唱畢於此品三顯能證之人有長行偈頌長行分三初雙舉前品罪福二雙開今品信毀三雙明信毀果報且初雙舉前品罪福爾時佛告得大勢菩薩至眼耳鼻舌身意清淨告得大勢者此品一聲佛號遍記四衆經歷多年常被罵詈非人法兩忘得大法勢者不能也如前所説者如法師品云若有惡人以不善心常毀罵佛其罪尚輕若人一言毀訾在家出家讀法華經者其罪甚重也亦如二卷所明如向所説者即上品所説六根清淨也二雙開今品信毀分二初明事本得大勢乃往古昔至有二萬億佛皆同一號此云事本者通舉往昔威音王時為不輕事之本也乃往下明時節長遠有佛下舉佛名號威音王者以形聲二益得大自在故劫名二句劫國莊嚴離衰者時清道泰正法興隆離諸衰惡故大成者説法利物所益弘多究竟佛慧集大成故其威下説三乘教法得大下明壽命無量正法下明法住久近正法像法下有二萬億佛出世同一名號二明本事分二初標時節人名最初威音王如來至爾時有一菩薩比丘名常不輕云本事者以最初佛時不輕菩薩所行之事為本事也增上慢有大勢力者末法之人身雖出家性具三惡意中未得謂得身有打擲之勢口有罵詈之力為三惡也更加留連濁世時風熏習粧飾畫瓶出入豪門結交權貴我慢貢高不肯進修非得大法勢三業至善者不能化導所以告大勢也不輕菩薩是其人矣二徵釋不輕之名又二先明不輕之行得大勢以何因緣至汝等皆當作佛深敬二字是菩薩入道之基本苟敬之不深安能視彼如佛又安能受其罵杖哉末法僧徒役役權豪栖心世務無所不至豈是菩薩道但菩薩以等心觀之無非菩薩道耳所謂治世語言等皆順正法也深敬不慢意業善也故往禮拜身業善也我不輕於汝等口業善也三業至善具大忍力方名常不輕也次明得名所以四衆之中有生瞋恚至號之為常不輕四衆以瞋恚心罵詈打擲菩薩以慈忍力遍記成佛也昔國清誦戒衆集拾得拍手曰聚頭喧喧那事如何維那叱之拾曰大德無瞋即是戒心淨即出家我性與汝合平等元無差所謂瞋來慈應也常作是語故者結信者深信不休也四衆為作名者結毀者毀訾不止也問釋迦出世踟蹰不説不輕一見造次而説者何也答釋迦所化者昔曾下種本已有善故以小乘而將護之不即為説大也不輕所化者本未有善欲與下種故以大法而強毒之三雙明信毀果報分二初信者果報二毀者果報初又二初正明果報二結會古今初又三初明現報是比丘臨欲終時至聞其所説皆信伏隨從臨終具聞更增壽命六根清淨現報也威音雖滅法音不滅故先所説經可以具聞於空中聞者示忘能所絶影像無人無我方能具此法故四衆聞經信伏者始而身業至善故往禮拜終則得大神通六根清淨始而口業至善不專讀誦終則得大辨才廣説妙法始而意業至善深敬不慢終則得大善寂壽命無量慢流見菩薩有如是力皆深信敬從隨法化矣二明生報是菩薩復化千萬億衆至於其法中説是法華經三明後報以是因緣復值二千億佛至功德成就當得作佛前云為十六王子説經此中威音像法中日月燈佛雲自在燈王佛為比丘皆説此經足見然燈授記王子覆講皆方便也又此引威音日月雲自在者意明釋迦遠從塵劫直至今生宣布法華流通此道要使現前末世説是經者如威音王得大無畏明是道者如日月燈相繼無窮布是利者如雲自在覆潤無極也得大勢下明因圓果滿二結會古今得大勢於意云何至疾得阿耨多羅三藐三菩提於意下結會若我下明得果由於此經以此經乃佛果之直徑未有不由此經而證果者未有由此經而不證果也然此果報一科文雖淡其意最深序中文殊答彌勒遡其原委文殊乃釋迦九代師翁今不輕既是釋迦歷二萬億威音二千億燈明二千億雲自在燈王復值千萬億佛則釋迦又不知是文殊幾許代之師翁矣又大通時結緣今據此文則結緣在威音時矣又授記諸子文中皆云過無數劫恐佛道長遠之計不除故引不輕菩薩經無數佛無數劫方得成佛也二明毀者果報分二初正明果報得大勢彼時四衆至教化阿耨多羅三藐三菩提此明毀者得善惡兩報由謗罵故千劫地獄受苦惡報也由聞佛名下一乘種復遇教化菩提善報也以是義故上慢尚成遠因聞信寧無現益問若因謗墮苦菩薩何故為作苦因答其無善因不謗亦墮因謗墮惡必由得益如人倒地還從地起也二結會古今又二初結會得大勢於汝意云何至三藐三菩提不退轉者是跋陀婆羅此云善守思益經云若衆生聞名畢竟得菩提故或云賢首位居等覺為衆賢之首故有將尼字連上句者據正法華云師子月等五百比丘比丘尼則師子月自是比丘不應稱尼有將尼字連下句者考因緣經云思佛千優婆塞等則又不應連下姑存俟考私謂連下意順於出家舉比丘等比丘尼於在家舉優婆塞等優婆夷也此等昔為慢衆今為哲人昔人豈昔人哉形骸雖異秉性是一謂菩薩之名起自聞謗之日罵藥服之愈病打沉燒已還香依經所化者豈思議哉蓋昔迷今悟由迷悟不由人也然迷者其誰乎悟者其誰乎作昔人者其誰乎作今人者又其誰乎此由人不由迷悟也昔人非昔人非不昔人哉噫人性皆善習迷有殊善緣相熏其善可復闡提不斷性善即斯衆矣二勸持得大勢當知是法華經至讀誦解説書寫是經經有大功終成大果應當勤修五種之行也二偈頌有十九行半分二初五行半頌雙開今品信毀二十四行頌雙明信毀果報初又分三初一行半頌事本爾時世尊欲重宣此義而説偈言過去有佛號威音王至天人龍神所共供養後曰將前曰導言威音以神智妙力前後導達羣生使趨於道也天人二句八部恭敬二一行半頌時節人名是佛滅後法欲盡時至時諸四衆計著於法是佛一行時節人名也時諸二句頌增上慢也是法不可示若定謂是有即是著法乃至定是非有非無亦是著法大論云執有與無諍如牛皮龍繩俱不免患龍繩入水牛皮向日彌益堅緊如著法慢流也三二行半頌不輕之行不輕菩薩往到其所至不輕菩薩能忍受之二十四行頌雙明信毀果報分三初四行半頌信毀果報其罪畢已臨命終時至漸具功德疾成佛道初一句準長行當在諸著法衆之下明慢衆畢是罪已復遇菩薩聞經教化成就菩提也古以此句謂菩薩罪畢也以由四衆輕賤作不輕之名又以瓦石打擲悉能忍受所有宿罪因此罪畢是故臨終聞經根淨如金剛經云是人先世罪業應墮惡道以今世人輕賤故先世罪業即得消滅同也臨命終下頌上菩薩現報諸著法下頌毀者果報不輕命終下頌菩薩生報後報也此文錯訛將不輕命終等置廣説是經下頌信者果報將諸著法衆移疾成佛道下頌毀者果報其義與長行方合二三行半頌結會古今彼時不輕則我身是至今於我前聽法者是彼時二句頌信者古今時四部下頌毀者古今也三六行舉益勸持我於前世勸是諸人至世世值佛疾成佛道我於下舉經益由聞此經令住涅槃世世下明妙法難遇衆等億億萬劫得聞諸佛億億萬劫方説也是故下正頌勸持末世之中聞經生信一心受持解説書寫流通此經斯人者世世值佛速成佛道上十九品正宗分已竟妙法蓮華經如來神力品第二十一此品來意總收正宗三周法竟寶塔涌出顯平等大慧唱滅募人故藥王等二萬菩薩發願此界弘經五百聲聞八千比丘六千尼衆發願他土持經其次他方八十萬億那由他菩薩十方世界往返遊行如來示以四行召本弟子開本壽量顯師弟之遠本破人天之近迹五種校計持經之勝六根清淨法師之勝不輕菩薩得益之勝開示悟入佛知佛見正宗既訖意將流通利澤萬古故此品地涌之衆願分身所在國土持説此經如來現大神力嘉讚經德發起群心將此一部法華遍空遍界顯説密説塵塵剎剎一切大衆見聞信受大喜充身故流通分首而明如來神力神名不測力名幹用不測天然之體深幹用則轉變之力大為付囑則深法現十種大用故名神力品大章第三流通分文有八品就分八段且初神力嘉讚有長行偈頌長行分三初菩薩受命二佛現神力三結要勸持初又二初經家敘儀爾時千世界微塵等至瞻仰尊顏而白佛言二發願弘經世尊我等於佛滅後至解説書寫而供養之舉其處則曰於佛滅後分身所在國土滅度之處如來分身無量國土無量滅度之處亦無量悉能周遍廣説此經無來往之相則與周旋往返者不同舉其意則曰亦自欲得是真淨大法而供養之上不恃佛下不畏衆則與敬信忍惡遙見守護者又不同也法乃一乘妙法曰真非四十年前之談曰淨如蓮華之在穢曰大囊括十虗包羅羣品此地涌之衆非但奉命益他亦欲自得持説供養自他兼濟二利並隆如來召本門弟子者正為此也二佛現神力分二初明所對衆爾時世尊於文殊師利等至人非人等一切衆前文殊等迹中所化之衆舊住乃十方本化之衆即下方住者一切衆即他方來者及從分身來者並此土四部衆皆是也二正現神力分十初舌相上舒現大神力出廣長舌上至梵世此第一神力也舌相出現者顯今經所演開三顯一開近顯遠三世益物誠諦不虗也福德人舌至鼻三藏佛舌至髮際今至梵天者出過凡聖之外極於淨天之頂相既殊常説彌可信二通身放光一切毛孔放於無量至現神力時滿百千歲第二神力也通身毛孔遍體放光周遍十方無處不照顯智境究竟也衆寶下分身諸佛亦然顯此智光自我而人自人而我塞乎天地無入而不自得也滿百一句光相時節三攝舌謦咳然後還攝舌相一時謦咳第三神力也謦咳者將語之狀亦是通暢之相四十餘年隱祕真實今得申舒無復遺滯出世大事於今通暢是故謦咳又欲以此妙法付諸菩薩令於末世導利衆生將語斯事是故謦咳一謦咳事了一謦咳付他也四諸佛彈指俱共彈指第四神力也彈指者隨喜也隨喜得記證解菩薩持真淨大法將來獲無上法寶此一彈指橫竪徹亘也五十方震動是二音聲遍至十方諸佛世界地皆六種震動第五神力也二音聲者謦咳彈指聲也六動者開會表六番破無明惑今正宗已竟又動者表法會大衆開示悟入六根清淨也六普見大會其中衆生天龍夜叉至皆大歡喜得未曾有第六神力也七諸天唱勸即時諸天於虗空中至亦當禮拜供養釋迦牟尼佛第七神力也八衆生歸命彼諸衆生聞虗空中聲已至南無釋迦牟尼佛第八神力也九遙申供養以種種華香纓絡幡蓋至遍覆此間諸佛之上第九神力也諸物變帳覆諸佛者心通法變合衆物而成一也問衆生見會諸天唱勸然後歸依興供此四何得為如來神力耶答不由如來光明遍照震動十方發起群心彼十方衆生何能見聞此會歸依興供哉十世界合一於是十方世界通達無礙如一佛土第十神力也通為一者情消理融合衆界而為一也開會至此將此一卷大經普覆世界徹上徹下無有絲毫覆藏故下文叮寧讚歎令其一心受持也三結要勸持分三初稱歎付囑爾時佛告上行等至説此經功德猶不能盡告上行等者乃地涌導師之大衆也以八萬等各有本事之佛各受本師付囑上行等乃本時所化嫡嗣欲傳吾道必我弟子非弟子不足以囑纍故又上行等乃舊住此界之宿學如來如是神力非耆宿不足為證故又前召本弟子地涌初出禮拜讚歎於二世尊四上首合掌問訊本師應當付囑弘經彼時彌勒領八千恆沙菩薩決疑請問如來不及付囑就顯壽量到此在範已盡兼地涌發願故如來欲付囑先告上行等也以是神力者總收十種以如是莫大之神力不盡此經功德者如來一切深妙功德盡萃於此經故不可窮盡也二結要付囑以要言之如來一切至皆於此經宣示顯説要者統攝意一切語寬取略而言四語殆盡法即道場所得權實之法衆生性具如來修極雖有在纏出纏之異其法體本來真淨故開佛知見者開此也自在神力者即稱性示現三輪設化三世益物放光現瑞駭動物情等示佛知見者示此也祕要藏者即此法不可示諸佛安身之鄉三德祕密之藏久默不説等悟佛知見者悟此也甚深事者即深固幽遠無人能到諸有所作常為一事唯一佛之知見示悟衆生等入佛知見者入此也於此經示説者總結此經功德説之不盡撮其樞要唯此四語而授與之也三勸持付囑又二初勸持起塔是故汝等於如來滅後至是中皆應起塔供養應一心者或聞思修得佛教道如渴思飲更無餘想故經所在處其處有七雖有城市山林僧俗淨穢之不同起塔供養一也二釋起塔意所以者何當知是處至諸佛於此而般涅槃四處起塔是道場即法身主處餘三如文經功難盡四要撮略盡在此經顯示此經所在之處即應起塔起塔之處即阿含四處四處即此經宣示顯説之四要語也道場釋上所有之法菩提釋上甚深之事轉法輪釋上自在神力般涅槃釋上祕要之藏此之四要攝盡全經二偈頌有十六行分二初六行頌上長行二十行明持經功德初又分二初三行頌佛現神力爾時世尊重宣此義而説偈言諸佛救世者住於大神通至地皆六種動濁惡之世衆生垢重示現降迹維持世道挽回人心故稱救世者十種神力後五不頌前五於佛切近故二三行頌結要勸持以佛滅度後能持是經故至不可得邊際初二行讚美持經次一行顯持經功德如虗空無邊二十行明持經功德分五初一行半明得見三佛能持是經者則為已見我至教化諸菩薩見三佛者靈山一會也又見等者開示悟入佛知佛見教諸菩薩説今經也二二行明諸佛歡喜能持是經者令我及分身至亦令得歡喜斯道得傳稱可佛心故皆歡喜也三一行明得近佛果諸佛坐道場所得祕要法能持是經者不久亦當得四四行明得大辨才能持是經者於諸法之義至畢竟住一乘四無礙如文如風於空中者風喻説法空喻理風有聲無形空有名無相稱性之談即言忘言如風行空中復何障礙比興顯理曰因緣文脈潛通不失倫次曰次第能破衆生無始妄習如日月能除幽暗一言入耳默沾懸記曰畢竟住一乘五一行半總結應持是故有智者聞此功德利至決定無有疑神力嘉讚竟妙法蓮華經囑纍品第二十二由前地涌菩薩發願弘經如來神力嘉讚已竟故此品摩頂以付囑也言囑纍者囑是佛所付囑纍是煩爾宣傳謂將此妙法付囑於汝纍汝末世宣傳古德云你若不是這等人自然不來殃及你之意此從佛旨得名又囑是頂受所囑纍是甘而弗勞此從菩薩敬順得名又囑是如來金口所囑纍是菩薩甘心頂荷此從授受合論得名此如來叮寧至囑如人王之託孤臨大節遇顛沛不忘靈山之遺命繼往開來信與不信方便善巧示教利喜使道統相傳斯文不泯末世之下知有所歸也此是諸佛一片慈悲之禍祖禰不了殃及兒孫遞代相傳故曰囑纍聖言歷三災而不朽優曇映七日而恆榮賴此囑矣問作佛則曰授記持經則曰囑纍者何也答正顯作佛難而持經為法師者尤不易也成佛如登九五位作法師如定天下時也蓋闢土開疆經無量勤苦然後大業成就故知作法師難於作佛也欲紹法王位曰授記令其行法師事曰囑纍如來先以法王授諸弟子後以法師囑纍菩薩所望於法師者重矣居法師位者寧不自重歟二囑纍薪傳分二初囑纍授受二時衆歡喜初又三初如來付囑二菩薩領受三事畢唱散初又三初正明付囑爾時釋迦牟尼佛至令一切衆生普得聞知法座起者從第一義空而起無邊慈悲之用也以一手一時遍摩諸菩薩頂故名大神力摩頂如世間父囑子拊其背而告之之意菩薩弘經如來付囑勉其諦聽令無忘失故舒其手而摩其頂也無量菩薩即千世界微塵數地涌之菩薩也如來授道化他名權智手菩薩自行受道名實智頂以權智手摩實智頂顯即權即實權實不二也又頂是最上義諸佛授受皆摩頂付囑今欲付囑無上妙法故摩無上最尊頂也難得者約修則三祇練行百劫調心約斷則五住究盡二死永亡故流布增益者以此妙法流傳後世布散十方自今而後自狹而廣等法界而無遺衍塵劫而不滯一切見聞共登長者之堂均獲髻中之珠各各開示悟入也三摩者示付囑之諄諄殷勤也令一切者勿論責賤等普得見聞也二釋付囑意所以者何如來有大慈悲至勿生慳吝所以令汝等廣宣此經普得見聞者何也以如來是衆生之大施主具三行能與衆生三智汝等應當隨學也一大慈悲行平等滋濟故二無慳吝行竭內外財故三無所畏行不憚煩難故以此三行能與衆生佛智離二乘見故如來智離菩薩見故自然智離諸取證不由他悟故三智唯是一乘實智但隨德用其三稍異佛覺了一切逈異二乘即一切智也如來果號揀異因位即道種智也自然者任運而知不然而然俯會無差如月臨淵即一切種智也又慈悲行如來室也無慳吝如來衣也無所畏如來座也室中能施三智衣座亦然三軌各具三智能施衆生果地三智之用方為大施主也汝等既願弘經當學如來三行末世之下隨今日之見聞宣傳流布不可生一毫慳吝心也三誡勉隨宜於未來世若有善男子至則為已報諸佛之恩若根深智利直説佛慧若根器下劣不具正信當祕此妙法於餘法中方便善巧而引導之一乘佛慧是深權漸餘法亦云深者是法皆為一佛乘故亦得云深也指受曰示教詔為教令得利益得大歡喜當知佛恩無可報唯宣大法續佛慧命始名報佛恩也二菩薩領受時諸菩薩摩訶薩至唯然世尊願不有慮聞佛付囑得如所願皆大歡喜踊躍無量三業虔誠仰謝如來也如來再三付囑珍重此法也菩薩三反領受敬謹奉行也願不有慮者謂如來勿以將來為慮也我等今日耳提面命親聞是經親得付囑將來之世如佛教敕如法教化如説修行也三事畢云散爾時釋迦牟尼佛至多寶佛塔還可如故多寶為證全經而來分身為開寶塔故集前開塔後如來即云以此經付囑有在今開塔事畢付囑已竟故遣分身各還本土隨所安然以大法得傳化身應隱故後説未周尚須圓證故留多寶以大旨聊圓幽宗未竭故又如故者前開今閉也此下如來出塔與大衆復降靈山再説後六品經文其實流通上二品已竟向下六品不過勗勉今會新得記者以堅固其志願耳二時衆歡喜説是語時十方無量至聞佛所説皆大歡喜化他事遂故諸佛歡喜自行得法故菩薩歡喜得記作佛故聲聞歡喜均獲廣記故八部歡喜囑纍薪傳已竟妙法蓮華經藥王菩薩本事品第二十三此品顯精苦為法弘傳斯道竭其神力盡其形命殷殷虔虔志猶未已故以菩薩本事以立名焉楞嚴云我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酸鹹淡甘辛等味是冷是熱有毒無毒悉能遍知了知味性非空非有非即身心非離身心分別味因從是開悟如來印名藥王觀經曰昔名星光從尊者日藏聞説佛慧以雪山上藥供養衆僧願我未來能治衆生身心兩病舉世歡喜名曰藥王以此菩薩遍知藥性故能觀機逗教應病發藥一切衆生身心二病淨盡無餘於諸法中會取自性得大自在故名藥王也菩薩者悲智雙運二利齊修故本事者本昔之事也下文明一切衆生喜見菩薩頓捨一身復燒兩臂輕生重法命殞道存舉昔顯本故言本事品三藥王苦行分四初宿王請問二如來垂答三聞品利益四多寶稱善且初又三初總問遊化爾時宿王華菩薩至云何遊於娑婆世界此品明藥王宿昔苦行非宿昔自在久行因行者不能啓發也又前因藥王告八萬者豈無故而然也故宿王華舉而問之菩薩既知藥性遍治衆病凡有利益之處菩薩當云何遊化耶二別問苦行世尊是藥王菩薩至那由他難行苦行苦行雖多難行者唯捨身耳三請答歡喜善哉世尊願少解説至及此聲聞衆聞皆歡喜菩薩苦行多端願於多中少分説一二事也八部得懸記他土願弘經聲聞得記發起願樂故聞皆歡喜也不言地涌本門所化知之不言觀音文殊影響大化不在此例分身從來者各還本土故二如來垂答分二初正答苦行二歎經功深初又二初明事本爾時佛告宿王華至歌歎於佛以為供養爾時下明劫數長遠有佛下通別名號明德云淨者不為塵垢所染故自利也如日月能破衆生惑暗利他也其佛下明眷屬衆多佛壽下明壽命長遠彼國下明國土嚴淨一箭道者補注云二里也今取射垛為則或一百二十步一百三十步一百五十步也諸寶臺下明諸天供養二明本事又三初彼佛説法二廣修供養三結會古今且初彼佛説法爾時彼佛為一切衆生喜見菩薩至説法華經彼佛普度一切衆生故為喜見及諸三乘説經但喜見為當機付囑流通如今身子同也二廣修供養又二初明現在二明未來初又二初修行得法是一切衆生喜見菩薩至得現一切色身三昧樂習苦行者菩薩之行行人所難行也精進經行者即般舟三昧也等持三昧半行半坐一行三昧長年坐定般舟三昧不坐不臥也一心求佛者以精進苦行專求佛道也萬二千歲得三昧者依根塵十二處圓融互照以一實相融一切根塵於一根塵現一切色法交徹融攝重重無盡是名萬二千歲得一切色身三昧也此三昧有三義一者內現如今經身根清淨十界依正於身中現如明鏡現像二者外現如妙音觀音隨機示現十界色身三者內外現如大集經觀於己身衆生身諸佛身悉於己身中現又見己身衆生身現佛身中又見衆生身中現己身佛身也二作念報恩又二初以三昧神通力供養得此三昧已心大歡喜至價直娑婆世界以供養佛先念歸功此經次念供佛及經即時下以神通力雨華香供佛得此三昧理無出入表用三昧神通之力故言入耳海此岸者正法念云妙高山南海此岸即南岸也六銖者二十四銖為一兩六銖即一兩中四分之一也二以正報色身力供養又三初正明燒身作是供養已從三昧起至八十億恆河沙世界神力所化不過外財財不及法故復然身作法供養薰陸出大乘國西域記云薰陸香樹葉似棠梨兜樓婆出鬼神國此云香草畢力迦即丁香膠香即松香身為道器但色身不淨欲作供養須滌之令淨故服六香以表無上清淨之道器也供養淨明德佛者淨因淨果因果一致也六香即六度行諸華香油表微細小行也千二百表根塵十二處也塗身表外淨欲希淨德之果必內外一如廣行六度萬行鎔鑄根塵破色身之妄執證法身之真常也神通力願者明不以世火還依三昧智火自然身者表爍滅幻緣故光明照等表顯發真光照明法界故又正燒身時若覺痛同於凡夫若不覺痛同於木石當燒之時且道喜見菩薩在甚麼處二諸佛稱歎其中諸佛同時讚言至作是語已而各默然善哉下乃八十億恆沙諸佛之語也真法供養者菩薩內運智觀觀此色身由惑因故感斯惑果即幻緣假合今用空慧之火而蕩除之故言真法也能燒者火所燒者身能供養者身火所供養者佛法也能觀者智慧所觀者身火能供所供境智不二能所斯亡以不二觀觀不二境成不二行會不二空作如是觀燒身苦行等皆為正行所以投巖無招外行之論赴火不為內衆之譏若不爾者無利勤苦佛有誠誡良由心正行正智邪事邪行不可廢智不可亡後之學者無失法利問律制燒身得偷蘭遮罪燒指得突吉羅罪此中云何讚燒身耶答大小開制不同小制結過大制令燒故梵網云若不燒身臂指供養諸佛非出家菩薩故知順小行易不燒何難從大誠難燒乃不易今藥王久證并出開制重法忘懷發起神通之願為軌下愚當深思焉昔智大師初見南嶽思師於光州大蘇山師一見乃曰昔日靈山同聽法華宿緣所遣今復來矣授以普賢道場令修法華三昧大師誦經至此二句寂然入定見靈山一會儼然未散豁然大悟以所證白思思曰非汝不證非我不知汝所得乃法華三昧前方便獲一旋陀羅尼自是以後照了法華如曦和臨於萬象達諸法相似清風遊於太虗矣亦所不及者彼華香繒幡之勝特外緣耳國城妻子之重特愛緣耳非法供養故皆不及也夫為法忘身不特佛氏至人得道皆外形骸若孔子甘於夕死楊雄不羡久生達本知常恃有不亡者存焉若識念未亡諸蘊違礙不達法行空慕其迹彌增業苦善男子下顯法施尊上作是二句經家敘相三明燒身時節其身火然千二百歲過是已後其身乃盡六根六塵一切洞徹我相乃盡只怕此身煉不盡此身燒盡我無依者此也萬二千二前後照應皆明十二處鎔鑄鍛鍊也上明現在竟二明未來又分五段初生在王家一切衆生喜見菩薩至結加趺坐忽然化生由無女人故云化生三昧功成生死去來猶如夜旦故父師不離淨德表真俗常修妙行故二説昔本事即為其父而説偈言大王今當知我經行彼處至捨所愛之身説是偈已而白父言至我今當還供養此佛經行彼處者即於淨德佛所聞法華經一心求佛精進經行也心者罪之源身者業之藪世人癡故愛之菩薩悟故捨之有本於此偈後添二句義雖足乃後人擅加考笈多所譯亦但六句法護所譯但四句耳晉本偈後有父王歎善同詣佛所之文其義更足日月下明前身供佛得法聞經也一切衆生語言者勿論雞鳴犬吠鵲噪鴉喧得此三昧普皆了知又寶積經云復有三昧名解一切衆生語言得此三昧者善能宣説一切語言於一字中説一切字了一切字皆同一字故初聞經後得色身三昧者由證得法身故應物現形無非妙體然身之後得語言總持者由離諸相見故圓通衆音無非真説體無非妙則森羅萬象皆一切色身説無非真則鵲噪鴉鳴皆語言三昧非深證行境超情離見者何以當此俱舍論云甄迦羅亦云矜羯羅五十大數中第十六數也頻婆羅亦云頻跋羅第十八數也阿閦婆亦云阿芻婆第二十數也或云那由他是百萬億甄迦羅是千千萬億頻婆羅是百千千萬億阿閦婆是萬千千萬億大王下欲還供養三往詣佛所白已即坐七寶之臺至合十指爪以偈讚佛容顏甚奇妙光明照十方我適曾供養今復還親覲爾時一切衆生喜見菩薩至世尊猶故在世坐臺升空者菩薩以神力燒身以神力化生復以神力見佛也大抵得此三昧來去自由縱橫無礙方稱普現之名三十二相曰奇妙紫金光聚曰光明曾供養者即前生三昧力正報力二供養也還親覲者即今生值遇又當供養也問候之語不多讀之不勝親熱令人想見當時重法之殷殷也覩其容顏奇妙之相且喜現在之未滅意謂前生既親近弟子又轉生矣何幸又遇復還親近哉欣欣切切翹翹顒顒有不可以言語形盡者故但云世尊世尊猶故在世猶故二字當玩如云弟子轉生世尊還在世正啓下唱滅付囑之意四如來付囑爾時日月淨明德佛至於夜後分入於涅槃告一切下唱滅也又勑下付囑也先總付家業通指三乘人天等法及諸下別囑出世本懷獨指大乘佛果亦以下付依報國土正報使役已我滅下託身後事供養舍利起若干塔也付囑已竟出世事畢故入圓寂於夜後分者表無為正位故五奉命任持又四初滅後起塔爾時一切衆生喜見菩薩至垂諸幡蓋懸衆寶鈴悲惱戀慕者準涅槃經世尊受純陀最後供已即説涅槃欲入滅時脫却伽黎上升虗空唱言大衆當觀如來金色之身只此一見不復再見如是七度展轉二十四反示身二十四反八禪然後臥師子床中夜入滅大衆悲痛感戀如波羅奢佉問見道之人已斷見愛何至此乎答大士之情非悲於人而痛於法也以如來聖道所託今逝矣人天眼滅七衆何依斯道無傳亘古長夜故菩薩悲傷感戀而痛慕之𧂐聚也謂聚此香闍維如來也疑栴檀為𧂐者當準此土佛入滅已以轉輪王法茶毗即時作七寶金棺微妙白氎兜羅綿栴檀沉水百千萬億種種香華等積如須彌況彼淨土庸何疑焉又佛説火化之法在己則顯三昧之力播熏煉之功故火化自焚舍利迸透在人則掩臭腐之穢免螻蟻之食其魄不滯其神清升而此方臥淤膿於荒郊埋腐骸於朽壤為是且以火化為不忍方其穴地負土全體而坑之為可忍耶二者皆出於不得已耳達人觀之一等歸盡沉之可也露之可也棄諸溝中內諸石槨無不可也收舍利下起塔莊嚴供養高三世界者三千世界也小千覆初禪中千覆二禪大千覆三禪云高者至四禪天也二燒臂供養爾時一切衆生喜見菩薩至七萬二千歲而以供養一切大衆即佛所付之衆汝等一句誡無散亂也臂云百福者種種因行所感也七萬等燒臂時節問塔有八萬四千所起定非一處一身然臂何能遍供乎答菩薩證諸法實相稱理而供不壞一相而普供無遺也問燒身但千二百歲今燒臂何故七萬二千歲耶答前約自行身盡入滅今為弘法令物獲益故燒身時少而燒臂時長也又前表破六識中我法二執今表破七識中我法二執也三時衆獲益令無數求聲聞衆至皆使得住現一切色身三昧令發菩提心者不令此衆住於小果也皆得住三昧者以己之所證而證於人也彼佛以大衆付囑豈徒然哉菩薩善繼善述信不誣也四燒臂還復爾時諸菩薩天人阿修羅等至一切人天得未曾有大衆憂惱者皆謂大士佛法所寄兩臂既然形神將沒如之奈何由此憂惱以初心菩薩愛見未忘故喜見作誓已全其臂者達境唯心物隨心轉然臂復臂心之所致也善伏忍辱復全身等皆斯旨也問兩臂還復二執復起否答前破二執此表證二空理也由斯等者謂燒身身生然臂臂復不住之因稱其性而淳且厚皆出於福德至誠之力智慧神通之妙非今之好奇惑衆也當爾下結顯希奇上廣修供養竟三結會古今佛告宿王華菩薩至百千萬億那由他數其所捨身下結答若干苦行中捨身之一事也上正答苦行已竟二歎經功深分三初明供養較勝二歎所持經法三明持經福德初又二初供塔顯勝宿王華若有發心至諸珍寶物而供養者夫指有三節足一指者三節俱焚也能然手指是燒一節也愚謂即手一指足一指無不可也楞嚴云我滅度後其有比丘身然一燈燒一指節及於身上爇一香炷我説是人無始宿債一時酬畢長揖世間永脫諸漏此中手指足指皆身分也表行人不能斷二執於六七二識中相應貪瞋等心所隨斷一分得一分真理耳手指內身也妻子外身也國城等身外之餘物也內重外輕功福有異故然指供養勝於身外諸珍寶也二供人顯勝若復有人以七寶至乃至一四句偈其福最多三千世界七寶供四聖人不如持經一偈者以財況法也蓋法是聖師能生能養能成能榮發心受持此經由法為生始終隨法進修為養令滿極果為成能應衆機為榮四雖不同以法為水如父母必以此四而護其子也四句偈者長行名散華偈四言五言等名貫華偈云一四句者以少況多之謂二歎所持經法分二初歎法體二歎法用初又曲分十一段初河海淺深喻宿王華譬如一切川流至所説經中最為深大川流江河四水喻前四教海喻法華四水狹淺大海汪洋喻四教不普大法圓收故最為深大以説窮本地為深包羅一切為大若別論川水獨清通四壑之寒泉淺源止渴成六合之神功喻小教偏空明四諦之真理劣志己利得六通之妙用流水長遠涉十方之要津來往通渠濟萬物之枯乏喻始教大乘行十度之初門自他俱利集萬善之莊嚴江水通湖混一味之涇渭信流進浦送人船之到岸喻終教歸中顯一心之體用智波入俗蕩我法之雙空河水一連接天際之高流源從萬壑通南北之行程喻頓教一乘悟法身之真理心空萬緣脫根塵之妄惑海水洪深納百川而同味淵源浩大容萬派以朝宗喻法華甚深攝四教而同圓妙理廣大會三乘而歸一故云最為深大也二群山高低喻又如土山黑山至於諸經中最為其上土山者土石諸山也黑山者俱舍云南洲從中向北各有三重黑山小鐵圍者繞小千界大鐵圍者繞大千界十寶山者華嚴云雪山香山軻利羅山仙聖山乾陀山馬耳山尼民陀山斫迦羅山宿慧山須彌山群山土積十寶矮形鐵圍雖高非金所成須彌四寶為體坐鎮四洲下旋香海上宅群天居然群山之王也諸教勢同群峯一乘須彌齊峙三星月校光喻又如衆星之中月天子至諸經法中最為照明星月俱是陰精同是夜現朗夜之光星不及月喻前諸教乃照世之典權不及實也照明二字取喻以大寶在暗非燈莫照一乘實相隱於藏識不得今經開示衆生佛知佛見不明故最為照明也四日光破暗喻又如日天子能除諸暗至能破一切不善之暗日當中天幽衢頓破此經入耳昏障潛消以此經明一乘實相能破一切衆生不善惑暗故五王位尊卑喻又如諸小王中轉輪聖王至於衆經中最為其尊小王封列一國之尊金輪承統四洲之主三乘之典各偏一宗一乘之談圓統其旨尊卑之名分昭然也六天王優劣喻又如帝釋於三十三天中王至諸經中王帝釋乃忉利之主群天為輔佐之伴喻群經為權道之宗此典乃實教之旨七凡聖為父喻又如大梵天王至及發菩薩心者之父梵王統三千界為六趣之父此經詮一乘理乃三乘之父八約聖顯説喻又如一切凡夫人中至諸經法中最為第一支佛超七賢七位之群拔四果四向之萃獨顯支佛一遠離行亦得涅槃更侵習氣故為第一喻此經但一佛乘一超直入傳心之典理拔群説故稱第一九法妙人尊喻有能受持是經典者至於一切衆生中亦為第一法妙故為第一人弘妙法故於一切衆中為第一也十乘分大小喻一切聲聞辟支佛中至諸經法中最為第一聲聞小草菩薩大樹大樹之材非藥草可比也十一唯佛獨尊喻如佛為諸法王此經亦復如是諸經中王如來乃究竟果人非因人可比於諸法中得大自在故此經位在三乘之上理御諸教之宗無因不收無果不攝群經了義中王者此也此上歎妙法之體隨機在處最尊最勝也二歎法用又三初歎拔苦用宿王華此經能救一切衆生者至離諸苦惱此經能令九界衆生難分段變易二種生死之苦惱故云能救一切衆生者二歎與樂用此經能大饒益一切衆生至如賈客得海如炬除暗此經二句標饒益滿願下諸得字皆是充滿之意清涼等十二事皆是與樂之用此經如池者醍醐上味故如火者發智慧𦦨故如衣者功德莊嚴故如主者證法身真理故如母者衆生恃怙故如船者載到彼岸故如醫者療身心病故如燈者破無明暗故如寶者常可如意故如王者統攝群機故如海者涅槃性海故如炬者慧𦦨破惑故三總結二用此法華經亦復如是至能解一切生死之縛今經力用能拔一切衆生生死病痛之苦而與究竟涅槃之樂能解一切衆生惑業之縛而與究竟解脫之樂歎所持經法竟三明持經福德分二初舉聞全經福若人得聞此法華經至所得功德亦復無量若人下明聞經書寫功德若書是經下明華香種種供養功德瞻蔔黃華也須曼那善攝意華也波羅羅熏華也婆利師迦夏生華也又云雨華雨後生故那婆雜華也摩利鬘華也諸華皆可作油然燈供佛二舉聞今品福分二初格量次囑纍初又分四初明聞品益宿王華若有人聞至盡是女身後不復受先總明聞品功德次明女人聞品受持利益持經者障陋盡除後不復受者轉女成男也二明勸修益若如來滅後後五百歲中至恆河沙等諸佛如來若如來下依經修行往生淨土也準大集經有五五百歲第一解脫堅固第二禪定堅固第三持戒堅固第四多聞堅固第五鬪諍堅固後五百歲即鬪諍堅固時也末法時代善根轉少大法冥利雖女人猶獲勝利況男子乎問此中但云如説修行即淨土因如何修行耶答即受持讀誦深信解相問彌陀攝念佛人生極樂今聞法華何故亦生耶答由解安樂行故聞佛壽量故此經名蓮華故了明唯心故然諸經指歸淨域佛佛讚往西方淨土法門乃衆生歸依處也故文殊大智求生普賢萬行願往遠公始創東林蓮師繼踵雲棲若幽若顯乃聖乃凡三學高士九流名賢無不修持若萬派以朝宗似群星而拱北彌陀願力弘深衆生專念必往希淨土者宜盡心焉不復下明離諸塵垢貪瞋癡乃根本煩惱憍慢等垢乃隨煩惱既到安養所依者淨業所會者善人故遠離一切諸垢也得菩薩下明證理根淨心寂根淨故能見若干諸如來也三諸佛遙讚是時諸佛遙共讚言至智慧禪定無有與汝等者善男子即前女人修行往生得忍根淨也受持為人説者即前聞經如説修行也實相之理非有為之福故水火不能焚溺稱實相理海墨不窮故千佛共説不盡諸魔賊即五陰煩惱等生死軍即無明六識等餘怨敵即隨情對境之惑業賊能侵害軍能攻擊由得無生忍故能摧滅一切煩惱諸垢也無如汝者顯諸佛守護與如來把手共行豈天人所及哉無有與汝等者以三乘智慧禪定皆權也思惟是經是實也權漸不及圓實豈三乘可等哉四結聞品益宿王華此菩薩至所得功德如上所説此菩薩一句總收藥王苦行神通三昧種種功德智慧也若有下明聞品隨喜讚善之益一稱經名蓮華出口一念隨喜法香在身善種不亡功成自著也上説功德即前往生離垢遙讚等格量已竟次囑纍是故宿王華至應當如是生恭敬心是故下先以一品囑當機流通宿王下次教當機神力守護全經所以下徵釋守護之意此經開悟佛知佛見却除癡愛病緣故云良藥癡愛病除生死緣斷頓證真常何復老死如般若智照能空五蘊度苦厄無老死是也汝見下明見持經者散華作念生心如佛想也取草者佛成道時吉祥長者施軟草為座也吹螺擊鼓者既成佛已説法警悟一切群生也是故下結上如來垂答已竟三聞品利益説是藥王菩薩本事品時至一切衆生語言陀羅尼此結會衆聞此品之益也四多寶稱歎多寶如來於寶塔中至利益無量一切衆生非宿昔因行成就得大自在不能發起是利故雙歎善哉善哉上藥王苦行竟
