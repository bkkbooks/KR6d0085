body:
  text: 金臺即山居後學大義集妙法蓮華經五百弟子受記品第八此品具記千二百聲聞而品題但標五百者以五百得記同一名號劫國莊嚴等故又五百同聲說喻領解故五種眷屬此五百乃應生其餘皆實行故此五百或為七百之師故但標五百又準前文云其數五百皆當授記故準下文云其不在此會汝當為宣說其餘七百不在會故前授記從佛立名故云授今從弟子故言受謂受如來之記也二後二品正明授記分二初授千二百記二授二千人記初又二先授滿慈記次授千二百記初又二初經家序其默念領解二如來與之述成授記初又分四初序得解之由爾時富樓那彌多羅尼子至有大自在神通之力聞是智慧領法喻兩處顯實方便等領法喻兩處開權又聞下指五尊者授記復聞下化城宿世之事復聞下如來三達無礙觀彼久遠猶若今日即大自在神通力也二序得解歡喜得未曾有心淨踊躍至瞻仰尊顏目不暫捨由昔未聞開權顯實而今得聞故云未曾有如上授記因緣自在等皆未曾有也除保證涅槃之愛斷破無明別惑故云心淨開佛知見是故踊躍此屬內解歡喜即從下外形恭敬雖默契於心而未聞其命欲呈解於口而復難其辭但鞠躬以聽可否故目不暫捨瞻視仰望於世尊也三序默念領解而作是念世尊甚奇特至我等於佛功德言不能宣上二周身子等得悟皆發言領解此何默念蓋身子等為下根未悟事須彰言勸動今下根已悟無所勸動故默念不言而但讚奇特希有也又默念是真領解自受用境言說不及淨名默然真入不二法門故又權實不可思議非言非念而念而言非言而言故身子等口陳領解非念而念故滿慈等默念領解即說時默默時說也隨順世間者投其好樂也若不隨順必生誹謗衆生不一種性各別方便隨根說七種法如來種種法拔衆生處處著耳如著有引拔入空著空引拔入中著中引拔入於佛慧也佛之功德無量無邊非言議能盡前云無量劫說不能盡我等豈能宣說哉又四子說喻比興曲巧形容周詳尚無量劫說不能盡我等豈過於四人者乎四念發迹請記唯佛世尊能知我等深心本願我等者通念請發諸人迹也我等既從大通時受化歷劫至今時長行遠寧無深心本願乎但愧於宿命淺近不能有遠達之智加以隔陰之昏不無遺忘之患照前古之委悉鑑群情之宿業其唯佛乎故云唯佛能知也深心是本今現作是迹本願即上求下化也上求即求記下化即求發迹又從深心故明三世助宣佛化從本願故即與授記問上二周何不求發迹答為下根未悟故今下根已解權化事足為誘物機示有三根若下根之迹一發則上中之迹不發自明矣二如來與之述成授記有長行偈頌長行分二初述本迹二與授記初又三初約釋迦世行因發迹二約過去世顯其本行三約三世佛所述其修因初又二初舉示其人爾時佛告諸比丘汝等見是富樓那彌多羅尼子不汝等見否有二意一見其迹為小乘否二見其本願功德否衆人但見迹為聲聞不知本是善薩故問大衆見否二發迹顯本我常稱其於說法人中至無能盡其言論之辨常稱者四十年處處稱歎不獨今日始也以辨才說法雄辭麗句能令迷者得悟疑者生信異見者風靡矯抗者唯諾故云說法第一若非妙本何有勝迹此舉迹以顯本也亦常歎等者顯本地福慧萬行法門故云種種功德本地既有種種法門迹中何但為二乘耶此舉本以明迹也精勤下出種種之義助宣我法者迹在鹿苑迹受彈斥轉教今經得悟四十年無一會而不護持助宣我法也本具權實功德迹於五時助佛調熟實行衆生豈非精勤護持助宣我法乎能於一句取宣法化四衆蒙益也具足一句有諸己而施諸人也而大一句助佛饒益同行衆生也自捨等者降佛已還七方便人不知本地言論之辨也以縱橫之才殺活之機欲窮其辨非佛不能知故雖以佛智抑滿慈實歎揚滿慈種種功德則知滿慈之賢非群賢之賢可比也二約過去世顯其本行汝等勿謂富樓那至常作佛事教化衆生勿謂禁辭也若以滿慈而視滿慈則失其所以滿慈也今示深遠之本令同學不可以近迹而視之也言滿慈不但止於我所助化亦於久遠佛所助宣佛化今日助宣為迹過去助宣為本本有遠近遠本冥邈為信良難今但舉九十億之近本令其生信也於彼第一者以玄辨之能不惟拔萃一時實乃獨映千古九十億諸佛若是之多羽翼之屬不為不廣豈無賢能滿慈歷彼猶稱第一其內證之深可知矣所說二句以諸佛所說之法皆明第一義空而滿慈明達不疑也精見曰明透徹曰了無礙曰通深造曰達此言造道深入見法精透內證之深豈易及哉得四一句智即辨故一義無礙智謂知諸法義理了了通達無滯故二法無礙智謂知一切諸法名字分別不謬故三辭無礙智謂一切殊方異語辨說無礙令諸聞者悉解其言故四樂說無礙智於一字中能說一切字一語一法誨人不倦故不為利譽故言清淨審諦機宜故無疑惑由具神通力故能隨其壽命常修清淨梵行身在道在乾乾不息功就不就至極不極故云常修彼佛等者非但今時人皆不識自昔經世之久知識者多猶以聲聞擬之以貌取人失之子羽也所以然者聖人之在人中戴天履地無異於人自有異於人者存乎戴履之中但非淺識之所得窺所以今古皆謂聲聞不言是菩薩也然利物之道非方便不能滿慈用斯方便以修佛事饒益衆生也又化令立者使之卓然自立堅固道心如銀山鐵壁也為淨三句借利他之行而嚴淨自己佛土若不與物結緣菩薩成佛時無機可度也三約三世佛所述其修因諸比丘富樓那至常勤精進教化衆生七佛者依諸文所出毗婆尸佛尸棄佛毗舍浮佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛此以莊嚴劫後三佛賢劫初四佛為七佛也若據今文佛自云於七佛說法人中今於我所說法人中則知以七佛為過去釋迦為現在彌勒等為未來應指莊嚴劫後四佛賢劫初三佛為七佛也上述本迹竟二與授記分三初明因圓果滿二明國土嚴淨三明劫壽法塔且初明因圓果滿漸漸具足菩薩之道至天人師佛世尊漸漸下因圓也過無量下果滿也此土表法界之理於此得果者顯聖賢之道靡不資始乎此而歸極乎此也說法破世昏愚若杲日當天故別號法明二明國土嚴淨分四初國土嚴淨其佛以恆河沙等至人天交接兩得相見掌如佛手非同世人掌也有云海底有石名掌石無有一微塵許不平無有等出地平義皆平等心之所感也七寶等由種種法寶莊嚴衆生心地之所感也人天交接者以人道完天道人之未始非天天之未始非人以道相應人天相近不以霄壤為限也二純是善道無諸惡道亦無女人至一者法喜食二者禪悅食無惡者無三途也以滿慈說法聞者依教修行不造三惡八難之因故成佛時有此淨土也淨名云直心是道場菩薩成佛時不諂衆生來生其國深心是淨土成佛時具足功德衆生來生其國以果推因滿慈之因可知矣化生者如極樂國無有女人也既皆化生離諸欲染故有光明之身金色之體如是妙體人固有之特為濁欲染蔽故阿難云欲氣粗濁等苟斷淫欲不受胎生則本來體相無復染蔽通光莊嚴自能發現以世考之吐納精華猶能輕舉妙體精明飛行自在無足疑矣月藏經云法食喜食禪食今經云法喜禪悅法食聞法也如安養國生蓮華中常聞彌陀觀音說法喜食者正聞屬法食聞已屬喜食禪食者以禪定自資不假段食善業衆生福慧如是三三乘衆多有無量阿僧祇千萬億至六通三明及八解脫教化衆生之類者各隨其類而教化之也四總結莊嚴其佛國土有如是等無量功德莊嚴成就有如是功德者結上國土若此之廣大境內如是之皎潔人天若此之秀美聖衆如是之萃拔皆從當人性內流出除心之外無有片法也三明劫壽法塔劫名寶明國名善淨至起七寶塔遍滿其國善人增盛體皆金色故云寶明國無淫惡皆以化生故云善淨其佛下明佛壽法住佛滅下明起塔供養二偈頌有二十一行半分二初十四行頌發迹顯本二七行半頌與之授記初又二先七行總發諸聲聞本迹次七行頌發滿慈本迹初又五初一行總標為行難思爾時世尊欲重宣此義而說偈言諸比丘諦聽佛子所行道善學方便故不可得思議混群類而不知入塵勞而不染故曰善學欲益衆生必假方便為行難思已得垂迹之法不善學方便則不能也二一行明垂迹之由知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺大智方能擔荷大法是菩薩事也小法易修是聲聞事也諸菩薩知衆樂小故隱其圓極而速於取證知衆畏大故亦作聲聞於菩薩法不生好樂也三二行垂迹利益以無數方便化諸衆生類至漸當令作佛小欲者示求小乘也懈怠者示退大乘也諸大弟子方便權巧潛通密誘化諸衆生令入佛慧如迦葉聞說菩薩不可思議解脫法門謂舍利弗言如人於盲者現其色像非彼所見聲聞聞此法門不能解了亦如是也四二行明內祕外現內祕菩薩行外現是聲聞至方便度衆生少欲者去貪染也厭生死者欲出三界也雖是聲聞事業實淨自己佛土非但示為聲聞亦作外道凡夫三毒者五鈍也邪見者五利也衆生有此病聖人就此治之以毒攻毒令彼自愈也貪如難陀愛妻瞋如身子與羅度爭勝癡如調達害佛邪見如三迦葉事火若夫善星謗佛六群波旬皆有法身大士行同事攝也始則異而同終則同而異異其所以同不可得而同也同其所以異不可得而異也撫會之權活變若斯我諸弟子善學方便為行難思也五一行結略抑廣我若具足說種種現化事衆生聞是者心則懷疑惑恐衆生疑惑不信故且略說而不廣說也次七行頌發滿慈本迹今此富樓那於昔千億佛至成就一切智今此下五行頌過去本深也勤修宣護上求佛果智慧所說下化衆生諸根利鈍常演清淨法義令住大乘實淨自己佛土未來下二行頌未來行因二七行半頌與之授記分三初一行頌因圓果滿供養諸如來護待法寶藏其後得成佛號名曰法明二三句頌劫國名號其國名善淨七寶所合成劫名為寶明三五行三句頌國土嚴淨菩薩衆甚多其數無量億至我今但略說授滿慈記竟二授千二百記分三初默念請記二如來與記三五百領解且初默念請記爾時千二百阿羅漢至如餘大弟子者不亦快乎千二百已得小果不為見思所惱故云心自在既聞三周說法又見授諸子記故歡喜未有念欲請記也作念者心領悟而未能言但默然念記若論冥契因緣不減空生諦信作佛無慚鶖子但彼才高智廣出口成章敢以當面馳詞此等或內有餘而辨不足期期艾艾有難於所言故默申心願也不亦快乎者謂佛言千二百作佛今何不見授記耶設得授記則快然自足矣又我等同疑彼既授記我等亦當記矣二如來與記有長行偈頌長行分三初許記千二佛知此等心之所念至三藐三菩提記告迦葉者以下文七百不在此會敕迦葉代宣說故二別授陳如於此衆中我大弟子至天人師佛世尊陳如最初開悟居上座首故別與記問若其居首別記法說何不記耶答若約實行大小緣別兩初各異身子最初結大緣故初周先悟陳如先結小緣故初鹿苑先悟若約權行引物希向大權示現垂迹之法不可一定佛名下偈自釋三別記五百其五百阿羅漢至盡同一號名曰普明迦留陀夷此云黑光亦云粗黑顏色黑而光故優陀夷此云出現以日出時生故周陀亦云周利此云大路邊莎伽陀亦云槃特此云小路邊本行經云其母隨夫往他國久而有孕垂産思歸至中途即誕其子二度凡生二子故以大小別之又云西方風俗凡臨産日必歸母家兩次路生故問佛許千二百次第與記今但五百不見千二百得記答此五百即千二百數偈後一行半總授餘七百故二偈頌有十一行分二先九行半頌陳如五百名號爾時世尊欲重宣此義而說偈言憍陳如比丘當見無量佛至皆如上所說憍陳下一行頌因圓得果常放下釋佛名號其國一句頌國土嚴淨菩薩下二行一句頌眷屬微妙升妙樓閣遊十方國者依中現正正中現依一多無礙大小相容周遍法界互得圓融也須臾還國者如極樂還到本國同也佛壽下一行明壽命法住人天悲慕其五百下明五百一化皆同前佛之法既滅天人失望故憂後佛繼出轉記安隱天人也我滅度下轉次授記之辭次一行半總授一切聲聞記迦葉汝已知五百自在者至汝當為宣說初二句結上五百得記次二句記餘七百後二句敕迦葉代宣後持品云我先總記一切聲聞蓋指此也如來與記竟三五百領解有長行偈頌長行分二初經家序喜爾時五百阿羅漢至頭面禮足悔過自責爾時下慶今得解悔過一句愧昔不解廣如法喻二自陳領解分二初法說二喻說初又二先悔得少為足世尊我等常作是念自謂究竟滅度此悔責昔迷得少為足不知求大也次責根鈍難悟今乃知之如無智者至而便自以小智為足此責根鈍始悟今知小非究竟大為真實回觀昔日如無智愚人也所以下徵釋以今觀之如來智慧我等應得意謂昔證聖果位在有餘校一切智猶螢火日光便自為足此則驕秋潦為大海登丘陵作崑崙豈智者之所為乎二喻說分二先喻說次法合初又二初醉臥不覺喻世尊譬如有人至親友家至若少有所得便以為足喻上自悔得少為足不知求大領前三周中施權之意譬如下繫珠喻有人者即二乘之機也親友者昔日第十六王子也家即大乘教也醉酒而臥者當時大衆暫發無明暫伏以得聞經內心微解如人至親友家也以無明重故還復迷失如醉酒而臥醉有二義一重醉都不覺知二輕醉微覺尋忘亦名不覺雖有二義終成繫珠之義官事當行者明王子餘處機發逗緣往應故云當行弘法化他知非私務故云官事無價珠者一乘實相真如智寶也繫其衣裏者慚愧忍辱能遮醜恚及防外惡即是外衣信樂之心內裏善根即是內衣於時聞法微信樂欲即了因智願種子也約結緣則圓解為珠為說為繫煩惱昏醉少有微解故曰繫珠約天性然昔繫亦非新無未知令知故云繫耳其人二句醉臥不覺喻以無明厚重尋復不憶所謂醉無明酒臥生死關也起已下起已遊行喻善根欲發厭苦求樂天上人間植福修行故云起已遊行無明覆解不知向本求大乘衣食故云到他國求於小乘衣食也若魔佛相望生死魔界為他國佛法大小皆為本國大小相望小乘未免生死猶是他國大乘永免生死乃為本國背大乘本國往小乘他國不知從珠取給而傭作自資獲一日價得少為足也又遊他國隨業受淪也求衣食小道資神也勤力者不識正法不求正行也艱難者外道苦行崇火事水也少為足者樂著小果所作已辦也此喻望三周而會通者法中始坐道場大法擬宜喻中二萬億佛常教化因緣中大通時王子覆講皆繫珠也法中無機息化喻中追還悶絶因緣中中路懈退皆醉臥不覺也法中尋施方便喻中三車引得因緣中中間接小皆起已遊行也二親友覺悟喻於後親友會遇見之至常可如意無所乏短喻上自責根鈍今乃知之領前三周中顯實意也於後下呵責喻會遇見之喻緣熟相值也四十年來及門受業心印不傳若逢不逢猶然未見也今悟此理同聲共氣覿面呈機方名為見咄哉一句激發甚切也意謂冠天履地乃一男子何口體之營營若此乎喻二乘龍象之材何自滿自足於小道哉我昔下示珠喻重序因緣之意五欲者乃出世勝妙非世間粗弊世之五欲資益色身人之所好成就生死也出世五欲能資法身佛之所樂成就菩提也一無量法寶如意纓絡之財二無量相好紫金光聚之色三十號具足名聞十方之名四法喜禪悅解脫自在之食五那伽大定體復真常之睡某年月日者指大通佛所也現在者昔聞一乘熏種未亡也自不知有心外取法故云勤苦憂惱為求自利故云自活迷大向小困守化城故云甚癡汝今下勸貿喻即今經授記也珠雖價值無數必須貿易方有濟用了因內解雖復究竟必須行解相應珠體不竭貿易無窮更聽更修方顯寶之功用如華嚴得摩尼珠十種瑩治方能雨寶行解相應方堪佛記從是已後具有寂滅忍衣首楞嚴食自行化他無量衆寶無功用道彼此不窮方名如意無乏若會三周法中我令脫苦縛等動執生疑喻中我先不言等因緣中汝等善聽皆呵責也法中五佛開顯喻中三車一車因緣中宿世覆講今還說大皆示珠也法中身子得記喻中四子得記因緣中下根得記皆勸貿也二法合分二初合醉臥不覺喻佛亦如是為菩薩時至資生艱難得少為足佛亦下合繫珠而尋下合醉不覺知煩惱所覆故不覺知既得下合起已遊行未離法縛故云資生艱難二合親友覺悟喻一切智願猶在不失至甚大歡喜得未曾有一切下合呵責我久令下合示珠世尊下合勸貿二偈頌有十二行半分二初一行半頌得解歡喜爾時阿若憍陳如等欲重宣此義而說偈言我等聞無上安隱授記聲至自悔諸過咎我等下頌慶今得解今於下頌愧昔不解諸過有四忘本願故怖大乘故樂小法故得小足故二十一行頌自陳領解分二初一行頌法說於無量佛寶得少涅槃分如無智愚人便自以為足於無下頌悔得少為足如無下頌責根鈍難悟二十行頌喻說分二初六行頌喻說二四行頌法合初又二初四行頌醉臥不覺喻譬如貧窮人往至親友家至有無價寶珠譬如下頌繫珠喻肴膳喻大通時先聞方便等教繫珠喻王子覆講結大緣也時臥一句頌醉臥不覺喻是人下頌起已遊行喻二三行頌親友覺悟喻與珠之親友後見此貧入至五欲而自恣與珠下頌呵責喻示以下頌示珠喻富有下勸貿喻二四行頌法合我等亦如是世尊於長夜至身心遍歡喜我等下頌合繫珠我等無智二句頌合醉不覺知得少二句頌合起行今佛二句頌合呵責得佛二句頌合示珠我今下頌合勸貿上授千二百記竟妙法蓮華經授學無學人記品第九研真斷惑為有學真窮惑盡為無學以三果四向研修真理慕求勝見故名有學研理已窮勝見已極無所復學故名無學此品題若合說局在有學其實羅雲等早證無學若開說學即有學人無學即羅雲等此二千人或是有學或是無學同是一流一時授記同一名號故別為一品二授二千人記分二初二千請記二如來授與初又二先二人請記次二千請記初又二初默念請記爾時阿難羅睺羅而作是念至設得授記不亦快乎二尊者思惟者乃素志也但未聞此法不敢承認未曾授記恍惚未安故悵怏不快也設若授記與群賢同科豈不快然二發言請記又二初引例即從座起到於佛前至唯有如來我等所歸應有分者引同及門之徒應當有授記之分也唯有如來等者謂諸子已得記矣我等終滯小果乎唯有如來我所歸向也又諸子先事外道後歸於佛今已得記我二人親蒙度脫唯歸於佛豈容無記乎二引望又我等為一切世間至我願既滿衆望已足衆所知識者正容悟物德望可歸見者知其族姓聞者識其賢能或師之或友之也二人於佛最親時衆所望羅雲是佛之子俗中親重阿難持佛法藏道中最勝勝重二人不蒙授記則衆望不足次二千請記爾時學無學聲聞弟子二千人至住立一面二千人但有默念瞻仰引例引望同二尊者故云如二人所願以才器雖不同而持守自不異也思齊之念孰能無乎住立者引領而望也因前文云若有聞法無不成佛又云汝等在會及未來弟子是也我等雖居學地亦與上首同聞其法忝在聲聞之數諸人既已得記我輩不知云何故住立一面仰視如來也二如來授與分二先記二人次記二千初又二初記阿難二記羅雲初又分五初長行正與授記爾時佛告阿難汝於來世至所共讚歎稱其功德以多聞之慧護持法藏因功致德其果智巍乎若須彌群峯不可及淵乎若大海汪洋不可測故名山海慧今為佛侍者護持法藏六十三億佛所如今不異爾後證果此自行修因得道也教化下果後化他令他修因得果也常立勝幡者以正法命世為世所歸如梵剎懸幡令見者生敬也仙音演法隨機各異應濟無遺故劫名之問壽劫之說悠然不窮何所據依視不覩睫況渺冥乎曰萬物死生而不亡者存壽有終窮乎古今代謝而曾無紀極劫有終窮乎大聖離生死至道無代謝雖倍倍之劫未足盡其靈長矣二偈頌重明果德爾時世尊欲重宣此義而說偈言我今僧中說阿難持法者至種佛道因緣頌上長行可知佛道因緣不出三心四願六度等三八千菩薩生疑爾時會中新發意菩薩至而諸聲聞得如是決通疑一切聲聞今日發心即蒙佛記國淨若斯何故昔於方等記諸菩薩過無量劫修行乃得佛記有何因緣正欲如來發迹顯本也四如來發迹釋疑爾時世尊知諸菩薩心之所念至故獲斯記知衆念故發迹以釋其疑也俱舍論云空王佛乃釋迦三僧祇所逢之佛同發大心即是同學發心則同踐修有異彼樂多聞我常精進多聞者得空王之語言長於討論短於自修所以猶滯因門精進者得空王之心智兼於萬行全於衆德所以登於果位然阿難護法之勤迹為侍者使斯文衍於後世於上有繼述之功於下有作成之德其弘化之心深重之願本地如此今得妙記何足疑哉五阿難顯本述歎阿難面於佛前自聞授記至爾時阿難而說偈言世尊甚希有令我念過去至護持諸佛法聞記而喜者一喜因深同如來發心於空王故二喜果勝莊嚴超諸同學故不惟滿其素願亦幸得之於非望也憶念等蒙佛提醒得宿命通也偈頌可知二記羅雲分二初長行爾時佛告羅睺羅至當得阿耨多羅三藐三菩提華表妙行由行證果猶躡華升階故云諂七寶華長子者即普賢長男之意荷負聖道非行不能故幹蠱之道意在普賢妙行今云長子表此行故多聞密行常相資發故羅雲之果並同阿難當來亦為其子也二偈頌爾時世尊欲重宣此義而說偈言我為太子時羅睺為長子至以求無上道本是菩薩迹為小乘以迹覆本名為密行示諸衆生無量功德安住佛法求無上道上求下化因圓果滿次記二千分三初長行授記爾時世尊見學無學二千人至正法像法皆悉同等柔軟者已知授記有分也寂然者屏息諸緣清淨者開佛知見一心者希記之切觀佛者待說之誡問見不者意欲觀其動容知具造詣也言已見者諸人一念淨信形容非故神各新發所謂晬然見於面盎於背施於四體也一問一答師資唱和可見矣紫金之身內外清潔故云寶相同時成佛壽命等悉皆一同二偈頌重明爾時世尊欲重宣此義而說偈言是二千聲聞今於我前住至漸入於涅槃大聖出世神通設化如放光等故云神通度衆生三得記歡喜爾時學無學二千人聞佛授記歡喜踊躍而說偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌實智之慧照徹諸法能破惑障故云慧燈明上說三周法授三根記已竟妙法蓮華經法師品第十此品來意有三一由世尊廣讚一乘甚深微妙能信受者即得成佛然此一乘乃衆生本具正因之性如來開示為助顯之緣諸大弟子各得授記以今證昔既知大通之本因緣至今不失則知今日一會之法緣又為將來無盡之種子故以法師標品意在以法華之正因要託法師以開顯以為末世窮劫之勝緣所以廣記持經之人為將來法師展轉相傳緣緣不絶矣二由前授記已定法王法王之位未有不由法師而證入者故授記之後次以法師品夫法主為道統之總持法師為道統之流派總持如海流派如川不有大海則川流無歸不有川流則大海可竭故法王法師之位定而釋迦之道繩繩無盡矣三由前說三周法授三根記收機不盡故此品文中四衆八部及佛滅後聞經隨喜皆與授記乃圓教之統要也有此意故繼三周而說法師品焉法者軌則也師者訓匠也法雖可軌體不自弘布在方冊通之在人五種通經皆稱法師一受持二讀三誦四解說五書寫大論明六種一信力故受二念力故持三對文為讀四不忘為誦五宣傳為說六注義為解今合受持為一合解說為一足書寫成五以五法自軌為自行法師以五法教詔為化他法師若束五為四即四安樂行束四為三即身口意亦即三門行此五法福德門也弘宣五法化他門也皆順佛教報恩門也又即三軌讀誦書寫外行如來衣也受持內行如來座也解說化他如來室也自方便至此品盡為開佛知見有二意在佛為開示顯發要令聞者自肯自信在機為開悟以諸大弟子一向不知故多疑慮今聞佛說豁然了悟又蒙授記決信無疑是開佛知見之象也二歎持經人與所持法分二初歎美五種持經之人二歎美五種所持之法初有長行偈頌長行分四初明廣記現在二明懸記未來三明現未功報四明逆順罪福初又二初揀出人類爾時世尊因藥王菩薩至求辟支佛者求佛道者因者憑寄也以藥王焚身燒臂有功於斯文故因之本託藥王又告八萬者以法華祕密付諸菩薩故如涌出品本門眷屬方堪此任顯餘人不能也汝見下由前三周開示群賢各得授記其餘四衆八部及三乘初心物未之記前云我等隨喜回向佛道聞法成種皆是現前結緣之衆故揀出以普記之二普為授記如是等類咸於佛前至當得阿耨多羅三藐三菩提若於佛前聞法妙悟者如五人五百二千等總與授記已竟今所揀者八部四衆三乘初心故云如是等類咸於佛前者明同一時節值佛說法也一偈一句聞法極少一念時節最促隨喜者自未有行但隨喜其法及隨喜其人也皆與記者明聞法極少時節極促隨喜之功遂得佛果何況具足得聞盡形受持五種弘經三業供養聞法少解者尚記況多深者乎二明懸記未來佛告藥王又如來滅度之後至三藐三菩提記佛雖去世斯文賴四依傳宣若人聞此經者私淑與及門不異也我亦與記者未來聞法極少佛亦懸遠記之正顯此經無論現前滅後但得聞經一言之下心地開通一句之中義天朗曜如與醒人繫珠也或聞不解喜未信者如與醉人繫珠也此與十六王子覆講授記一板脫出故現在今日之得珠是過去沙彌之繫珠也今日之繫珠又未來弟子得珠之地也三明現未功報分二初現在法師功報二未來法師功報初又三初明法師供養若復有人受持讀誦至乃至合掌恭敬五種法師略舉十種供養一華香草木所生名華具香氣者二纓絡珠寶穿貫而莊嚴者三末香沈檀為細末者四塗香即清淨香水也五燒香成炷而焚爇者六繒蓋絹帛作蓋以障塵穢者七幢幡飄揚左右驅除鼠者八衣服首尾表裏錦繡裝經者九技樂手舞足蹈而奏絲竹者十合掌恭敬歸命頂禮以盡誠敬者二明法師功報藥王當知是諸人等至何況盡能受持種種供養者曾供養佛者先世因深也愍衆生生人間者現在功大也若有下明未來報重也何以下釋出報重之相世間瞻奉者七衆歸依也如來供養者敬視如佛也當知下明菩薩欲圓滿菩提承願弘經何況下況顯謂一句之少十種之微尚獲如是功報何況受持全經興種種供養者其功報又不可以形容也三明法師悲願藥王當知是人自捨清淨業報至廣演此經大悲願牽捨於清淨之土而生濁惡之世演說此經二未來法師功報分二先明法師說經若是善男子善女人至說法華經乃至一句竊私也謂雖得一句之解既不廣聞多學異義不可對衆而說恐難問有所不通便令大教不得弘宣若欲說此一句之解當竊為一人說耳釋論云有小慧無多聞如小雨無雷又云有慧無多聞亦不知實相譬如大暗中有目無所覩多聞無智慧亦不知實相譬如大明中有燈而無照無聞無智慧喻如人身牛有聞有智慧是所說應受故知廣為人說者必是多聞多慧人也次明法師功報當知是人則如來使至何況於大衆中廣為人說經是如智所說說於如理今日行人秉此如教宣於如理即如來所使也如來以如智照如理為事今日行人依如教行如理即行如來事也又如來使者受靈山付囑也所遣行事者代佛揚化也何況下況顯謂竊為一人說一句義理尚是如來所使所遣行事何況人天衆前為人開演全經者乎四明逆順罪福分二先明逆者得罪藥王若有惡人至讀誦法華經者其罪甚重不善心者邪見自驅奔於名利藐視聖賢長時罵佛不善之罪莫過於此其罪尚輕者佛既惑盡冤親平等惡不干逼豈能障礙以佛無損益故如紂犬吠堯堯何損焉佛之為道猶在象帝之先大浸稽空而不溺大旱金石流土山焦而不熱惡邪小人徒自貽戚故云尚輕初心學人讀誦此經既具煩惱若加毀訾障礙能令所學事廢則佛種斷絶故獲罪甚重也次明順者得福藥王其有讀誦法華經者至三藐三菩提故佛以定慧莊嚴而說此經若人讀誦此經則是能修佛之定慧故以佛嚴而自嚴也在背曰荷在肩曰擔此經是如來全身故讀誦是經者則為如來背之所荷肩之所擔奈何衆生常在如來肩背而不知也此人有所趣向悉與實相相應故所至方衆生應隨方向而禮當興供養先以人中上供次以天寶況之寶非一種故曰寶聚所以下釋上應供之意為求法師歡喜說法須臾得菩提故二偈頌有十六行分五初二行獎勸爾時世尊欲重宣此義而說偈言若欲住佛道成就自然智至并供養持者自然智即本覺真智無修無證平等大慧也欲住佛道成就此智必借法師發明故當供養受持者一切種智即諸佛果智因修萬行果具萬德之所證也欲求佛果疾得此智必依此經修證當自持并供持者二四行頌現在功報若有能受持妙法華經者至供養說法者三三行頌未來功報吾滅後惡世能持是經者至行於如來事四六行頌逆順罪福分二初二行頌逆者得罪若於一劫中常懷不善心至其罪復過彼二四行頌順者得福有人求佛道而於一劫中至我今獲大利福過彼者佛既惑盡毀譽不動讚之者但利於己無益於佛毀之者但損於己無損於佛毀佛讚佛罪福實重意在損益一邊故言輕也毀讚持經罪福復過者以持經之人功行未圓若加毀訾所學事廢若加讚敬所修事成意在損益兩邊斷續自他法身慧命故罪福更重於彼也億劫供五塵之因暫時聞一乘之法故慶得菩提欣獲大利也五一行結歎此經尊妙藥王今告汝我所說諸經而於此經中法華最第一諸法中上衆經中王者此也歎美能持之人竟二歎美所持之法有長行偈頌長行分二先歎經法次示方軌初分五初約法歎爾時佛復告藥王至猶多怨嫉況滅度後由法勝則人尊人尊則處貴處貴則因巧因巧則果妙次第五段有序也已說者大品以上頓漸諸說也今說者法華也當說者涅槃也大品以前諸說皆帶方便取信為易今經論法則一切差別融通歸一論人則師弟本迹俱皆久遠人法悉與昔異故難信難解也祕要藏者隱而不說為祕總一切法為要真如實相包蘊為藏不可分布者妙法難信深智可授無智不信謗乃獲罪故不可妄授也太陽妄授平侍而門庭衰達摩得神光而風化盛此得失之戒豈可妄授於人哉從昔未顯說者於小教中不說二乘作佛不明師弟本迹方等般若雖說實相之藏亦未說五乘作佛亦未發迹顯本頓漸諸經未曾融會故如來現在多怨嫉者濁障未除為怨不願樂聞為嫉四十餘年不務速說今雖欲說五千退座如來現在尚爾何況未來理在難化也又由前深密等立三乘為極今被法華破斥三乘習以成性故聞破而怨嫉也佛現在世時根俱勝頓革舊習尚生怨嫉況滅度後時根俱劣封執己聞故撥深宗也二約人歎藥王當知如來滅後至則為如來手摩其頭此法在人則人尊也衣即寂滅忍衣謂若能持說此經是修學大忍即如來衣所覆也契合佛心故為諸佛護念自信己心成就慧身不由他悟故云大信如下文欲得是真淨大法故云至願如前云供養無數諸佛故云諸善根又四信為信力四弘為願力大智為善根力又至字作志謂志能率氣願能引志志氣無願徒勤無歸願無氣志虗心無得具大信心信道之篤方能憤發其修行之志願有此志願果敢勇前然後植諸善根也又信則信理理即法身至願立行行即解脫善根根固難動即般若三力即三德祕藏初心栖此與佛不殊故名與如來共宿也即夜夜抱佛眠四儀不離之意行人之頭表實智如來之手表權智感應道交故云摩頭即授記意也三約處歎藥王在在處處至皆近阿耨多羅三藐三菩提無論城邑山僻此經在處處即貴也阿含明四處應起塔佛生處成道處轉法輪處涅槃處此經是法身生處是得道之場是法輪正體是大涅槃窟故此經所在須起塔供養不須復安舍利者此中已有全身故也釋論云碎骨是生身舍利經卷是法身舍利此經是法身舍利不須復安生身舍利生法二身各有全碎生身碎者如今佛八斛四斗生身全者如多寶全身在塔中法身碎者諸方便教也法身全者法華一實相也此塔下明供養得見此塔即契實相則佛果可企及矣四約因歎藥王多有人在家出家至乃能善行菩薩之道未善行者秉前諸教未能巧度若聞是經即入圓教名為巧度乃善行也以此經為因因則巧妙善行不善行為下喻本五約果歎又分五初明近果其有衆生求佛道者至得近阿耨多羅三藐三菩提以見聞是經則近佛果故果妙也二譬喻藥王譬如有人渴乏須水至其心決定知水必近高原穿水不善求水也喻不聞是經不善行菩薩道濕土至泥善求水也喻聞是經乃善行菩薩道欲止渴必得水為要欲求水必得其方則易喻修道者必得佛為要欲求佛果必得其方則易此經是修道之要成佛之法也衆生具足煩惱為高原高原求水者修菩薩道而求佛不得其要也乾土施功不已者從乾慧地由漸而進也濕土喻歷聞般若至泥喻至今聞法華於佛智水近之而已所謂汝等所行是菩薩道漸漸修學悉當成佛三法合菩薩亦復如是至必知得近阿耨多羅三藐三菩提尚遠得近合喻可知如此經獲圓觀三慧方能近果非阿含方等般若教中聞解思惟修習也四徵釋近意所以者何一切菩薩至成就菩薩而為開示此釋上得近之意一切菩薩諸教中權因也三菩提菩薩所得權果也此權因權果皆攝屬於此經如乾土濕泥皆依於水也開方便門開權也示真實相示實也為實施權不知權是方便故方便門閉而實相不顯今方便門開即是實相治世産業皆與實相不相違背也又尋常不記聲聞是門未開也聲聞只是聲聞菩薩只是菩薩真實相未示也今法則會三歸一則方便門開矣人則即小成大則真實相示矣深不可測固不可搖幽則玄妙遠則無涯言此實相諸佛安隱之鄉無人能到唯佛究竟今為開示決聲聞法是菩薩道咸令衆生開示悟入佛之知見知見水無乾土也聞解修習得近菩提者此也五揀非藥王若有菩薩聞是法華經至當知是為增上慢者菩薩聲聞聞此經驚怖者悉是乾土尚非濕泥況見水乎驚疑者不肯承當怖畏者恐失所守猶葉公畫龍見真龍而怖走上慢即定性人得少為足未證謂證如空生等居僧之首於菩薩法不生喜樂也二示方軌分二先示方軌次明利益初又三初標章藥王若有善男子至爾乃應為四衆廣說斯經佛去世後聖道布於典章非機無論若堪受者以何方便而說此徵意在道聽塗說不足有為非培風之厚不能負大翼而南圖也是善下明四依之任預備三德方作佛事所謂善其事利其器也室衣座名為三軌末世弘經必賴此三自軌軌他方獲大利二解釋如來室者一切衆生中至如來座者一切法空是一切者總舉九界慈悲四無量之二是能緣之心衆生是所緣之境因衆生無邊故慈悲廣大也教入如來室者非是小乘空寂為室無慈悲心不肯度生今既聞此經當於九界衆生起悲濟心拔一切二種差別生死之苦作無緣慈與一切一乘平等涅槃之樂所謂悲能拔苦慈能與樂也慈悲覆物惠利歸己名之為室入此室者終日度生不見有生可度也忍辱六度之一柔能克剛和能攝物也教著如來衣者非是小乘離垢之衣超出三界不能忍苦今既得授記當出入塵勞令九界衆生修寂滅定得一切事究竟發正遍慧知一切法寂滅所謂定慧力莊嚴也忍辱運物遮彼此醜惡顯功德莊嚴名之為衣著此衣者終日忍辱不見有辱可忍也法空即佛自證平等妙法實相真空離一切相即一切法也教坐如來座者非是小乘人空座不達法空今既作佛應坐法空之座說一切諸佛權實之法使悟無二無三證一切諸佛實智之道令入一相一味所謂唯有一乘餘二非真常寂滅相終歸於空也法空安心於諸法中得最自在名之為座坐此座者終日說法不見有法可說也是故利物以慈悲為首涉有以忍辱為基說法以無我為本能行三法大教弘宣故名法師以事論之必登堂整衣坐座乃可敷演三勸修安住是中然後以不懈怠心至廣說是法華經五種法師用此三法自軌故云安住是中用此化他故云以不怠心說法故佛教入我室著我衣坐我座若無此三法豈得為弘經法師哉二明利益藥王我於餘國遣化人至我還為說令得具足我於下遣化人重在集字是發起衆乃說法者入慈悲室之所感也亦遣下遣化四衆重在聞法二句是當機影響衆乃著忍辱衣之所感也若說下遣八部山林無人八部作聽法衆是結緣衆乃坐法空座之所感也我雖下佛現身說法令其成就乃不懈怠之所感也見佛身則成佛有分聽佛說則具足總持弘經利益可勝道哉二偈頌有十八行半分三初一行總勸二十六行半頌長文三一行結勸且初一行總勸爾時世尊欲重宣此義而說偈言欲捨諸懈怠應當聽此經是經難得聞信受者亦難二十六行半頌長文分四初一行半頌譬喻如人渴須水穿鑿於高原至決定知近水二二行半頌法合藥王汝當知如是諸人等至近於佛智慧此經總記三乘廣收五教故云決了聲聞法以開佛知見直入佛慧故三三行半頌示方軌若人說此經應入如來室至念佛故應忍若人下頌標章大慈下頌解釋慈悲生一切善柔和遮一切惡法空蕩一切相若說下勸修又以忍力勸勉者末世弘經忍為急務也四九行頌利益我千萬億土現淨堅固身至能令大衆喜初一行現身必說法說法必現身形聲二益橫濶竪遠也下八行頌上可知化人衛護長行隱偈頌顯也三一行結勸若親近法師速得菩薩道隨順是師學得見恆沙佛親近者不離左右如影隨形也近不受教近之無益親近隨順得道見佛者以菩薩因行諸佛果德不離此妙法故也大章第一開佛知見已竟妙法蓮華經見寶塔品第十一此品顯示如來常住法身直指淨土實報真境欲令衆生知此見此乃為佛之知見也然此法身真境始自一光東照圓現生佛始終乃通示衆生心境之妙由當機未悟二聖傍通出定已來種種開示諸子已信自心作佛但生滅淨穢之情見未忘到此直示法身常住故七寶妙塔從地涌出多寶如來全身不散以消生滅之見即此穢變成淨土以除淨穢之執至於分身雲集充滿其中以彰法界塵塵剎剎觸目皆是實相真境惟此真境乃法身之安宅報化依之而起故諸佛證之為一切種智報身踞之為華藏莊嚴化身以之為神通妙用衆生迷之為五蘊身心八萬塵勞修心之士若不洞見總屬門外止宿不為實證故寶塔出現為示佛知見之象也見是大衆能見之量寶塔是所見實相之境梵云塔婆或窣覩波此云方墳亦云高顯處四處起塔此是先佛入滅之塔先佛已居今佛並坐當佛亦然故以見寶塔立品又此塔涌出為證前起後故證前三周說法皆是真實起後者若欲開塔須集分身明玄付囑召本弟子論於壽量四衆皆覩故云見寶塔品大章第二示佛知見分二初寶塔出現顯示實相二難易得果證法平等初有長行偈頌長行分三初寶塔涌現二分身遠集三釋迦唱募且初有六初塔現之相爾時佛前有七寶塔至高至四天王宮七寶表七覺支七聖財塔表實相之境為法身所依之處高五百者是二萬里竪表因中萬行果中萬德以因望果即高義也廣二百等是一萬里橫表萬善莊嚴即廣義也地乃無明心地涌出者顯生佛平等法身常住不離當人心地但無明封蔀心地未開故此塔不出今涌出者表破無明而顯實相也住空者住第一義空也以無所破而破無明以無所住而住第一義空所謂終歸於空也種種者以衆多定慧而莊校也欄楯是總持義龕室是無量慈悲之室幢幡乃神通勝相垂寶纓絡者表四十地功德上嚴法身下被衆生也寶鈴即八音四辨也四面出香者四諦道風吹四德之香也幡蓋表惠物之德無物不覆也高四天宮者表衆德尊勝故二諸天供養三十三天雨天曼陀羅華至恭敬尊重讚歎三多寶稱讚爾時寶塔中出大音聲至如所說者皆是真實此證前開權顯實不虗也大慧即道場所得云平等者平無高下等無差別此理人人本有含識同具所謂奇哉一切衆生等也如是者一如法相是歎佛所說稱於實故二如根性是歎佛五時方說不差機故四時衆驚怪爾時四衆見大寶塔至恭敬合掌却住一面大衆見此塔上涌穹霄風幡呈祥有駭世之瑞鈴樂和鳴奏鈞天之美又聞音聲稱歎故皆得法喜怪意有三塔從地出住在空中塔中有聲三事希奇焉得不疑故云未曾有却住一面者俟有所聞也五樂說請問爾時菩薩摩訶薩至又於其中發是音聲大衆怪未曾有合掌住立心各有疑佇聞開示此菩薩忍俊不禁發言啓白欲速決疑也又此菩薩與藥王同類上品傳三世弘經之方軌非有功於斯文者不足以因之此品會十方諸佛而付囑非具無礙之辨者不足以請問也問意有三以何因緣有此塔何故從地涌出何故塔中發大音聲以何因緣一句正顯一大事因緣也下文雲集分身唱入涅槃募人付囑出本眷屬開本壽量皆隱含之正啓下如來說出多寶願力欲以我身示四衆彼佛分身還集一處大樂說願見分身之問然後次第敷陳也六如來垂答分三初答第二問爾時佛告大樂說菩薩至為作證明讚言善哉國名寶淨者以七寶所成無諸垢穢故佛號多寶者以功德法財惠施無盡故上問何故從地涌出今答云以佛有願為證法華故從地涌出也二答第一問彼佛成道已臨滅度時至應起一大塔上問以何因緣有此塔今答云由彼佛臨滅遺命令造此塔也三答第三問其佛以神通願力至從地涌出讚言善哉善哉上問何故發是音聲今答云彼佛為親作證明故發大音聲也大樂說下結答釋論明多寶佛不得說法華而取滅度以是義故凡說法華經便隨喜作證私謂但是多寶佛因行願力故上文行菩薩道時作大誓願若我成佛等寶塔涌現竟二分身遠集文分七段初樂說請見多寶是時大樂說菩薩至我等願欲見此佛身以佛神力者欲開塔須集分身分身集明付囑付囑即召下方下方弟子涌出即應開近顯遠此是大事之由豈非佛力加被哉樂說雖聞其言未見容貌形儀故請願見佛身欲令群機決疑生信也二佛告分身應集佛告大樂說至在於十方世界說法者今應當集若我至現耳乃多寶願辭願集分身乃出現者有三義一表圓會圓證以多寶全身在塔必全身方見全身是攝用歸體古今一相所以寶塔一開則多寶釋迦同坐一座也二欲示無生滅之法身必會有去來之應身從法起應攝應歸法一為無量無量為一使忘生滅之見去來之相一多無礙方得見法身之本體也三欲集十方分身必變娑婆穢土遣去染淨之心限礙之識自他之情方得見實相之真境有此三義故集乃現耳大樂下謂彼佛既有如是之願我之分身今應當集也應集有二一多寶佛塔圓現十方釋迦一人分化法界今集者顯古今道同故二權小之人唯知佛化御堪忍不知分化無方今集者顯佛智深廣故觀佛三昧海經云釋迦東方所現化身國土氏族化法與釋迦相同者碎大千界塵猶不能數一方既爾況十方乎三樂說請集分身大樂說白佛言世尊至禮拜供養四如來放光遠召爾時佛放白毫一光至所照之處亦復如是先明依報莊嚴次明正報說法四方四維上下各五百萬億那由他恆河沙等國土諸佛一佛有無數千萬億菩薩乃是國土無量諸佛無量眷屬無量主伴重重為衆說法光相所照大衆承光見之無滯也五諸佛告衆同來爾時十方諸佛至并供養多寶如來寶塔彼此一體原非自他告衆來者乃隨機權應假分賓主耳可笑老老大大作恁麼拍盲佛事六嚴淨堪忍國界分三初變娑婆一界時娑婆世界即變清淨至一方所分之身猶故未盡大澤曰藪琉璃為地等顯出華藏之淨界無諸聚落等隱去娑婆之陋汙會衆緣熟則留天人非器則徙即染而即淨寶樹金繩不知自何而有城邑山河不知自何而無偶見淨而不見穢者以淨穢乃群情之見心境一如何有無之可論哉是時下分身雲集遍大千世界容一方分身未盡足見應化之廣也釋迦分身喻如一燈然百千燈真應無盡而器界有窮故雖大千不能容受二更變八方世界時釋迦牟尼佛至諸天寶華遍布其地一佛化境一方所分之身坐猶未盡十方分身森森雲來不得不更變也八方者娑婆外八方也目真鄰等小大石山也鐵圍小大圍小千大千也須彌云妙高四寶所成也通為一佛國者言十六百萬億那由他國土通為一國易染為淨莊嚴如前三更變八方世界釋迦牟尼佛為諸佛至諸佛如來遍滿其中為十方分身當來坐故復於八方各更變也爾時東方下明東方分身來集十方分身漸至也此諸佛遍滿其中儼然一幅華藏圖也大經云一切法門無盡海同會一法道場中者此也又云諸佛於一念中示現無量世界不可言說種種佛身此證分身也於一念中示現無量世界種種莊嚴證此淨土也問淨名丈室廣容多座釋迦化土何分身不能容而必三變乃爾答因事顯理以淨土妙境生佛本具法身化體物我無虧但衆生被識惑自蔽妄塵自局故因分身之來特與開示初變者表轉第三能變六分別識也二變者表轉第二能變末那識也三變者表轉第一能變阿賴耶識也又初表破見思惑出火宅二表破塵沙惑出化城三表破無明惑至寶所也的實而論即華藏世界一真無妄之境却除二乘染淨之執最初將娑婆入華藏世界說華嚴今將華藏入娑婆世界說法華三周記圓唱滅不遠到此全無絲毫覆藏六相十玄法門萬行如是體相究竟果報平等大慧如此而已問三變既皆移置天人云何又有諸天寶華遍布其地答經不云乎唯留此會衆豈此會無天龍八部耶問法華平等大慧何又移置天人答以事論之他土天人或時節未至未入此會不聞三周不聞授記豈可見示佛知見之真境如二乘不聞華藏不見舍那權且移置至神力品仍令聞其國名娑婆佛名釋迦經名妙法令種緣因善根不失平等之意以理論之移天人者非移天人身相乃移其知見令得佛知佛見乃見法身之全體佛國之淨相也七與欲開此寶塔分五初諸佛問訊說欲是時諸佛各在寶樹下至諸佛遣使亦復如是各持寶華者分身釋迦理論則是一人約迹則分彼此既分賓主不無人事故各遣侍持華申敬也以病惱為辭者從世儀也彼某甲佛者分身佛各教侍者代稱己名也即知分身不必皆名釋迦所謂我在異國更有異名是也多寶之願已酬樂說之請未遂故諸佛同欲開此寶塔也欲者希須為義欲明僧作法事意決同集但由緣差不遂情願令送心達僧知無違背其欲辭曰大德一心念彼某甲比丘如法僧事與欲清淨今諸佛同欲開塔如僧中作法與欲意同多寶願力須集諸佛復令時會知分身之多故知諸佛為開塔而來集集又不至各遣侍傳訊等狀如說欲故遣侍申問無說欲辭也問分身欲開寶塔必待釋迦豈神力不若乎答釋迦是化身本佛十方分身是化中之化多寶是全身本佛必全身方見全身故開塔必待迦文非神力之不若也二釋迦右指開塔爾時釋迦牟尼佛至如却關鑰開大城門塔在空中釋迦亦住空中者見一切佛究竟終歸於空也開塔表開權見佛表顯實却猶除也關乃橫木持其門者鑰即鎖也表執迹之障除顯本之機動也三四衆一同見聞即時一切衆會至及釋迦牟尼佛上衆會皆見多寶者如彌勒彈指樓閣門開門門有慈氏今如來按指多寶塔開人人見多寶也人皆有座塔人皆有多寶佛只是現在佛不靈不能按指塔戶不開多寶佛亦不現也快說者一證前暢懷意二開後速說意爾時下歎奇供養四二佛分座並坐爾時多寶佛於寶塔中至坐其半座結加趺坐開塔已尚在虗空故多寶分座而讓焉佛入塔中二身相稱如智稱境表報身也分身來集表應身也多寶全身表法身也從地涌出示不滅也分座其坐示不生也入塔示不常也現塔示不斷也分身示不一也全身示不異也多寶讓坐示不來也佛坐半座示不去也以此八不皆是真實前云示真實相者此也五四衆默念請加爾時大衆見二如來至接諸大衆皆在虗空此顯三乘八部既蒙授記皆住義空上分身遠集竟三釋迦唱募以大音聲普告四衆至妙法華經付囑有在普告下為法求人也誰能於此等者以堪忍界是世尊發心得果之本土又是大衆聞法得記之本國又此土衆生根利於他土故不久入滅付囑時至也有在者若佛在世隨機利物自說正法無待他人今化緣既盡欲令此法利益無窮故須付囑得人一近令有在付八萬二萬舊在娑婆此土弘經二遠令有在付本弟子下界微塵菩薩觸處弘宣也又以此二字重看莫認白紙黑字為法華經正謂此一部妙法渾渾圇圇巍巍逈逈絶言絶思頓在大衆面前只是無人覷破不肯流通故十方諸佛出現於世只至於今涌願塔集分身不過將此妙法覿面指出付囑與人展轉流通無令斷火絶烟故云付囑有在也二偈頌有四十八行分三初三行半頌寶塔涌現二八行半頌分身遠集三三十六行頌釋迦唱募且初三行半頌寶塔涌現爾時世尊欲重宣此義而說偈言聖主世尊雖久滅度至在在所往常為聽法云何不勤為法者謂古佛已證此法已入滅度本願不忘尚為法來汝等諸人雖得聞經尚未得證不肯發願者何也以多寶之來勉勵時衆當勤修習此法也法如優曇故云難遇彼佛下明願力處處聽經二八行半頌分身遠集又我分身無量諸佛至以是方便令法久住長文有七今偈略謂十方諸佛雲集於此不是無端欲令末世佛種不斷久住於世故來集耳為坐下頌三變淨土諸佛二句頌分身畢集如清二句謂佛在寶樹下如蓮華在池則色相莊嚴甚可愛也其寶樹下如暗中然炬則照曜嚴飾極可樂也身出下明衆生蒙佛身香熏被歡喜絶倒如大風吹小枝無不披靡則五分法身香熏喜不自勝也以是二句結顯三三十六行頌釋迦唱募分二初八行半舉三佛以勸持經二二十七行半舉難持以堅誓願初又三初一行半募覓其人告諸大衆我滅度後至今於佛前自說誓言雙標持說二門二利兼收五種具含也末世弘經非誓願不能故令說誓二三行舉三佛以勸其多寶佛雖久滅度至當發大願令得久住古佛誓願聞此經我以大願說此經分身遠集欲開寶塔當知三佛之意不可孤負諸佛子下欲使斯文不墜應發大願三四行釋上勸意其有能護此經法者至多寶如來及諸化佛若能護持演說此經即是供養三佛及見三佛也諸佛以濟物為懷若說此經克紹聖道不負顧命之囑與佛心相應精神交感乃為親見三佛也二二十七行半舉難持以堅誓願分二初二十行正舉勸持二七行半總釋勸意初分三初一行誡勸諸善男子各諦思惟此為難事宜發大願末世持經實為難事具大願力方堪承當願之所在即佛之所在故毗盧願周沙界釋迦本立誓願多寶願塔證經皆不離願也二十七行正勸分六初五行無願說難諸餘經典數如恆沙至能說此經是則為難舌談群經手接須彌動大千於一足立有頂而傳經四者雖難不及說法之難者何也以持說群經處衆無畏具富那之辨者能之握須彌若秋毫擲大千如小芥得目連之通者任之威嚴處色頂之天鏗鏘流餘經之響負身子之智者足以辨壓群賢若三聖者尚發願於他國其難可知矣然濁惡之世二執高大不啻須彌無明堅厚不啻大千慢心增上不啻有頂若說此經能破二執能斷無明能滅慢心不信之人見之憎嫉罵詈等若無大願便生退屈是則為難也二二行無願書難假使有人手把虗空至若使人書是則為難太虗無相猶可把而行之妙旨垂文難染之簡翰者以末世怪迹易尚常道難行故也然此妙法雖言辭寂滅理實稱性即言可行離言莫證能書即言之經則證離言之道人難信故易憎嫉故是則為難也三二行無願讀難若以大地置足甲上至暫讀此經是則為難大地磅有神通可足置於天上一乘祕藏非圓根難讀之於惡世者以四大堅執無明厚重之人一念回光暫讀此經者難矣四二行無願持難假使劫燒擔負乾草至為一人說是則為難劫火洞然大千俱壞負草不燒出於神通誠信惡世持經在乎機器不怠若無願力終生退屈是則為難五三行無願聽難若持八萬四千法藏至問是義趣是則為難八萬法藏未若一乘之圓頓六種神通豈如三身之極證惡世之中能耳聆妙法之言神資實相之味能問一乘因果之宗四種安樂之行若無大願耳雖聽而心不受口雖問而身不行是則為難也六三行無願奉難若人說法令千萬億至如斯經典是則為難化恆沙人得證小果不如奉持此經者謂供養妙法一色一香皆成菩提持說恭敬合掌低頭悉得成佛若無大願不能供奉福慧雙修是為難也嗚呼擎空擲地人世所無說此經法即今所有但隱怪之徒好奇異而惡常道曲高和寡得人者稀故佛以非喻為喻數數勸持也三二行結勸我為佛道於無量土至若有能持則持佛身於諸經中為第一者乃群經之關鍵千聖之命門也能持持佛身者以諸佛全身不離此經故若持聞思修本妙靈機當體全彰觸處即是菩提豈易持哉次七行半總釋勸意諸善男子於我滅後至一切天人皆應供養諸善下募持經人此經下明難持能持諸佛歡喜暫持者謂入息不居陰界出息不涉衆緣常轉是經者勿論即有一念回光遵佛語而暫時持誦者諸佛亦皆歡喜稱歎也是則下明歎持能持即成勝行要以是道內自攝持得無畏力則是勇猛心不退屈盡行道法則是精進內外自正理攝三聚則是持戒脫體無染塵勢自淨則是頭陀疾得佛道者即心自性成就慧身不由他悟也化澆漓之世必藉淳風止於至善從法化生證法身理也開人天眼實資解義故能解能說者一切天人應當供養上寶塔出現顯示實相已竟妙法蓮華經提婆達多品第十二此品顯平等大慧是一而悟有難易也以聲聞久懷佛道長遠之怖不起好樂今既授記多劫乃得證果恐彼不肯勤求故佛自引本事昔為國王人中極尊不惜身命為奴求法聖中大智最易教者只至於今得成菩提此顯易中之難也恐彼難而不進又說文殊龍宮教化龍女獻珠之頃成等正覺海為生死沉溺之地龍乃三毒之一女為濁垢之品最難化者當下即能現證此顯難中之易也提婆達多此云天熱以初生時人天等衆心皆驚熱故亦云天授從天祈得故是斛飯王之子阿難之親兄入大乘論問彼達多世世為佛怨云何言是菩薩答若是怨者云何世世相值如二人行東西轉遠豈得為伴報恩經云若言達多實是惡人入地獄者無有是處大雲經云達多不可思議所修行業同於如來若夫自造逆罪及教闍王害父如此等事皆是大權示現行於非道通達佛道衆生根性不同入道有異一逆一順弘道益物故知現逆事者為懼惡人令不起惡耳又此品題標人以顯行菩薩行出塵沙今取四聖功業以明五行天授行於非道通達佛道病行也龍女悟理剎那證果天行也佛修六度而取菩提聖行也文殊入海大慈無染梵行也四行隨機施化嬰兒行也非天行不能證理非梵行不能涉有自修唯在聖行利生須假嬰病二行二難易得果證法平等分二初明達多通經釋迦資之成道二明文殊弘經龍女因之成佛初又三初師弟原委二結會古今三勸信生善初有長行偈頌長行分四初明求法時節爾時佛告諸菩薩至求法華經無有懈倦舉昔多劫勤求妙法激勵諸人云何而不勤求也二正明求法又二初明發願於多劫中常作國王發願求於無上菩提心不退轉二明修行又二先明六度行滿為欲滿足六波羅蜜至身肉手足不惜軀命先願後行行願相資方成佛道小教事度初教理度分教次第度後三圓融度也捨依正名檀度防七支名戒度打罵不報名忍度為事始終名精進度禪定名禪度智慧名般若度六波羅蜜者謂行此六法離生死此岸度煩惱中流到涅槃彼岸故滿足者如尸毗王代鴿檀滿普明王捨國尸滿仙人為王割截忍滿大施太子抒海並七日翹足精進滿尚闍黎巢頂上禪滿劬賓大臣分地息諍智滿勤行下施依正次明推求妙法時世人民壽命無量至吾當終身供給走使三求得法師時有仙人來白王言至若不違我當為宣說仙人白王感應道交也非此王則仙人無以取之為友非仙人則此王無以尊之為師王正求師仙人即來師資允諧希世之遇也然此妙典五明不能梗其軸四圍難以齊其駕理超四含故名大乘義控一乘故名妙法不違我者以道師人必言聽事遵非冒名沽寵而已又試其有所挾否如挾貴挾勢不足以語道也匹夫而為百世之師者此仙人也四受法奉行王聞仙言歡喜踊躍至精勤給侍令無所之身無倦役役勤勞心無倦孳孳妙法捐捨四海之富頓忘龍鳳之姿僕僕任婢之勞下心至此何其切也千歲不倦學而無厭侍給不乏恆心不輟然仙人高尚其事能下王者之心有道之士不臣天子不友王候仙人至矣知有其師不知有其身知有其道不知有天下則王者至矣二偈頌有七行半分五初二句頌求法時節爾時世尊欲重宣此義而說偈言我念過去劫為求大法故二一行半頌正明求法雖作世國王不貪五欲樂至身當為奴僕三一行半頌求得法師時有阿私仙來白於大王至吾當為汝說阿私此云無比其形與法皆無比也即達多昔名也四二行頌受法奉行時王聞仙言心生大喜悅至身心無懈倦木實曰果桃李之屬草實曰蓏爪瓞之屬五二行結證勸信普為諸衆生勤求於大法至今故為汝說師弟原委竟二結會古今分二初正結會古今佛告諸比丘至時仙人者今提婆達多是今之釋迦昔之國王昔之仙人今之達多形雖遷有不遷者存焉神雖不更有更者代耳不遷不更者二聖之神也有遷有更者二聖之形也所謂吾猶昔人吾非昔人也二明師弟功滿分二初明弟子功報圓滿由提婆達多善知識故至皆因提婆達多善知識故由提下因圓滿善知識有三一外護不揀黑白但能營理所需如母養兒調理得所舊行道募緣者是也二同行更相䇿發不昏不散日有其新切磋琢磨同心齊志如乘一船互相敬重者是也三教授宣傳聖言曰教訓誨於我曰授內外方便通塞妨障皆能決了善巧說法示教利喜者是也增一云莫與惡知識與愚共從事當與善知識智者而交通若人本無惡親近於惡人後必成惡人惡名遍天下善人反此令我具足等者明昔願昔寶藏佛時佛為寶海梵志發五百大願時有裸形梵志名亂想可畏曰善丈夫汝未來無量劫中行菩薩道時我於汝邊求乞國城頭目等助汝滿足六度早成佛果我為弟子與我授記寶海曰真我善知識無上道伴也慈悲喜捨從境得名以所緣衆生之境無量故能緣之心亦無量也能與他樂能拔他苦慶他離苦得樂緣他無憎無愛亦名四無量定三十二下明果滿始自足下安平乃至頂上肉髻有三十二種始自無見頂乃至手足有德相有八十也十力者始是處非處力乃至漏盡力四無畏者一切智無所畏漏盡無所畏說障道無所畏說苦盡道無所畏四攝法者一布施攝若為樂財衆生即以財施樂法衆生即以法施二愛語攝以善軟心隨順一切衆生安慰開喻一切衆生生親愛心依附受道三利行攝隨起身口意行能令一切衆生各沾利益四同事攝明見衆生分形散影普和其光同彼事業各使沾益云攝者衆生情之所愛唯此四法用此四法同情接引導以大乘正道而度脫之所謂先以欲牽令入佛道也十八不共者始自身口意無失終至知過現未來皆因下結以仙人非常之規模鋾鑄釋迦非常之德業故云皆因等二明法師妙果當成又三初正明得果告諸四衆提婆達多至世界名天道人天教中率性而修即人事而達天理故完天道大乘宗中率佛性而修萬行即諸法而證實相以完本然之理故世界喻天道而佛號天王也問達多造罪入獄佛說法尚未出獄何得授記答達多在獄阿難往問達多云如受三禪之樂只此一語便是天王如來何待授記今授記者要知達多今日之憎心不異昔日之妙法釋迦今日之怨家不異昔時之知識必如是方顯一乘實相平等大慧無怨無親也二明果後化度時天王佛住世二十中劫至得無生忍至不退轉天王佛住世說法一切衆生聞法得果也三明滅後利益時天王佛般涅槃後至發菩提心至不退轉滅後起塔供養得果也結會古今竟三勸信生善佛告諸比丘未來世中至若在佛前蓮華化生聞經生信不墮三途而生三善處也無而忽有曰化以非化言化如蓮華化生為父母也問以何信方得淨信不疑答有三一信實相平等不異即免餓鬼生十方佛前常得聞經二信不善人是善人之資即免畜生生人天中受勝妙樂三信佛心怨親無間即免地獄生淨土蓮華化生又此勸信之意以達多惡名素著今得妙果因果懸殊封教之流孰不疑焉若能敬信不疑者契聖賢自覺之境感世出世間之果必矣上達多通經釋迦資之成道竟二文殊弘經龍女因之成佛分二初明文殊通經二明通經利益初又分五初智積請退於時下方多寶世尊至白多寶佛當還本土意謂多寶出現為證此經證經已訖是故請退二釋迦止之釋迦牟尼佛告智積曰至論說妙法可還本土止之之意雖迹門事訖本門未彰故託文殊以留多寶佛之密意非菩薩之所知也三文殊尋來爾時文殊師利至共相慰問却住一面華表因行輪表圓具娑竭羅此云鹹水須彌山外香水海香水海外七金山七金山外有鹹水海也問序中文殊在會未見云去何自海而來答龍宮在娑婆世界靈山相去不遠如在本山故不言去又聖人一動一靜隨機顯法今借龍宮所化之事顯性海本覺之理故從海而來又文殊具大智神通豈以凡情測度不起此會於海化物理亦應然如十通品云菩薩無體性無動作往一切佛剎禮敬求法不曾動其本處況在娑婆之龍宮可執往來相乎所以智積不來相而來故請還本土文殊不去相而去故詣靈鷲山問三千大界之外各四百萬億那由他土無復大海移置天人今文殊所化龍衆何故仍從海涌出答有三義一既移置天人及變大海大智神通從所移不變處來二海衆縱移而龍宮不動宮雖不動而所居已變大智神通從變而不變處來三無緣者釋迦移去有緣者從文殊來此不思議山海宛然以佛神力會衆不見文殊既不起而往其土亦即穢而淨淨名云移置天人他土都不使人有來往相者此也四智積請問智積菩薩問文殊師利至所化衆生其數幾何意謂龍宮卑濕非說法之地龍性憍慢非載道之器其被化者恐難於多故云其數幾何五文殊垂答文殊師利言其數無量至於海教化其事如是意謂善說法者不擇其地善度生者不擇其機地愈卑而法化愈廣機愈憍而得道愈速故云其數無量等所言下蒙化集證也本聲下先秉權教住小道但說苦集等事今皆下今聞實相悉住大乘空義文殊下結其利益謂涉海行化所度若斯二明通經利益分十初智積偈問爾時智積菩薩以偈讚曰大智德勇健化度無量衆至令速成菩提初一行歎人次一行歎法正法華云至人慧無量化海衆無數惟為露聖旨分別說其意上二句歎人下二句歎法也露聖旨者隨自意語唯說實相分別說者隨他意語方便說三彼經問義明顯今經隱含謂汝所化之多衆為是演暢實相之義而化之乎為以一乘實相開闡種種權門引導衆生終歸一乘令速成菩提乎必有問意方與下文相應二文殊略答文殊師利言我於海中唯常宣說妙法華經祖述燈明憲章釋迦傳唯心之要旨披圓頓之方冊故云唯常宣說等三問有得果智積問文殊師利言至修行此經速得佛不罄千佛之底蘊曰甚深盡性相之幽宗曰微妙衍義無竭似摩尼珠乃希世奇觀群經莫及此歎經旨也頗有人依此勤修一生頓證否此問化機也四答有其人文殊師利言至志意和雅能至菩提有娑一句指族標人年始一句顯童蒙之年有高遠之智智慧下明慧利觀機得陀下明總持法藏深入二句明定慧具足於剎下明具德速證四悉隨機曰微妙皆歸一乘曰廣大慈悲濟物仁讓克己和則處物不乖雅則正己不苟有此風格立地成佛故云能至菩提此中於剎那頃應下龍女成佛謂時之促顯證之速也發心在住位之初不退當八地辨才當九地慈悲長養大悲功終當十地功德具足修證圓滿金剛等覺位此發心證果不離一剎那也所謂一修一切修一斷一切斷一證一切證如斬絲染色一剎那頃能至菩提豈存次第乎五智積疑問智積菩薩言我見釋迦如來至於須臾頃便成正覺難行能行者捨頭目等積功纍德者積千善而成千福相好纍萬德而成萬德莊嚴也三千下總結難行苦行廣顯釋迦捨身之多無芥子許處也不信此女等者智積意謂以妙法之希有得善說與能行成佛固當生信但以積功纍德之能仁校初心八歲之龍女遲速不能無疑若信速者則疑釋迦為無智鈍根若信遲者則疑龍女剎那發心焉能頓超釋迦之多劫哉故云不信等六龍女釋疑言論未訖時龍王女至却住一面以偈讚曰深達罪福相遍照於十方至度脫苦衆生言論下經家序現申敬偈中龍女讚佛證已深達二句明實智朗照無遺謂如來深達罪福自當證知我須臾而成佛也一往論之三途為罪人天等為福尅論之九界為罪唯佛界為福也凡情觀之則見有九界罪相佛界福相既有罪福相可得不名深遠明達若如來以不思議妙智觀之不見有九界之罪相亦不見有佛界之福相了達一切諸法唯一實相不見有罪福之相可得也然龍女以深達罪福而讚佛者蓋智積不信能得菩提以龍女畜類是一苦罪衆生見如來是福德莊嚴也若能深達罪福之相則不見龍女是苦罪如來是福嚴自信龍女須臾成佛無疑十方即十界既深達罪福不見九界佛界之相可得而十界泯絶矣雖則十界泯絶不妨十界宛然以不思議妙智遍照十方十界宛然罪福不失故也微妙下明法身清淨圓滿天人下明八部敬仰宗奉又聞下證己成佛度生引佛證見能至菩提以消智積之疑也我闡二句應下即往南方成佛演說妙法等七挾權難問時舍利弗語龍女言至云何女身速得成佛汝謂下總舉難端述彼所說陳己所疑也意謂我等秉丈夫之資負拔俗之秀終年幸聞此法成道猶待多劫況爾異類女質視佛果若此之易恐大言傷實取信良難所以下徵釋難信一者穢軀難信二者無因難信三者有障難信云五障者梵王淨行女人多染帝釋少欲女人多欲魔王堅固女人濡弱輪王仁慈女人妬害佛具萬德女具煩惱故超日月三昧經云淨修四禪為梵王淫恣無度受女身勇猛少欲作帝釋嬌姿多態受女身具十善法敬事三寶作魔王輕慢不順毀失正教受女身行菩薩道慈愍衆生作輪王無淨行受女身具菩薩行方得作佛女無此行故不作佛聞如是障當厭女身修丈夫行方得作佛八獻珠除疑又二先獻珠以表圓解爾時龍女有一寶珠至觀我成佛復速於此龍女意謂智積乃多寶之良胤身子乃釋迦之上足智積之疑猶略身子攻難愈詳二賢若此群賢可知若更持詞以辨終以為侫故借寶珠以為質欲顯速證也珠表智佛表理以智契理將因趨果也受疾表龍女證果之速也次果滿正除衆疑當時衆會皆見龍女至一切衆生演說妙法忽然成男者萬法如幻無有定相當何轉乎不轉而變即女而男也具菩薩行因圓也坐華等果滿也普為下說法也南方虗明之地自北而南從迷入悟而成一切種智也一珠稱性之施義攝萬行齊圓不住法施用力少收功多豈假大千身命多劫六度乎所謂千年之鳥不及朝生之鳳圓根與不圓根日劫相者即此意也九時衆得益爾時娑婆世界菩薩聲聞至發菩提心而得受記爾時下會衆歡喜禮敬無量衆生下彼土蒙益也娑婆世界下此土蒙益也兩土之緣厚薄不等入道之機多少之別既言衆生皆是凡夫頓證住不退地十會衆默然智積菩薩及舍利弗一切衆會默然信受智積未信為疑身子挾權為難到此方知龍女依圓修行速疾成佛目覩其實心允其說理屈於辨施命之執自泯五障之難氷釋故與一切衆會默然信受上二品示佛知見已竟妙法蓮華經持品第十三此品至壽量為悟佛知見由前二品顯平等大慧無生無滅無冤無親法華神功不可思議故如來唱滅募人欲令此道常存斯文不墜末世弘經非願力不能也所以此品有諸菩薩並新記聲聞發願弘經忍難雖善不若無難為美果能三軌自持四行自守杜諸難於未然之先又何須忍難於已然之後由是他方大士數過八恆河沙發願此土弘經如來止而不允以待本門弟子從地涌出其數無量慈氏疑問啓下壽量開師門之近迹顯佛地之遠本法會大衆悟得毗盧性海佛地遠本三世益物法身常住化化不窮無古無今空劫已前未為始盡未來際猶未終極盡窮源故此四品為悟佛知見之文此品以持字標名者以二萬菩薩奉命弘經故云任持若以青蓮目視八十萬億那由他等令其發願當云勸持以二萬菩薩是法師品別命之數八十萬億等前無別命今以目視有勸意焉雙該任持勸持故云持品大章第三悟佛知見分二初因迹門弟子通經文殊請問如來示軌四行二發本門弟子通經彌勒騰疑如來開本壽量初有二初明持經二示方軌初又二初明受持二明勸持初又三初菩薩奉命此土弘經爾時藥王菩薩摩訶薩至種種供養不惜身命藥王二萬等是法師品所因所告之人樂說又是寶塔品之當機既聞如求唱滅求人發願弘經故諸大士即奉命而發願也惟願不為慮者謂聖道載於典籍弘力在智者若未得其人則微言絶矣使斯文不明之於其人復不得行之於其世蒼生若八溝壑誠聖心之憂也今既克任此事故願聖心無慮也善根少衆生濁也增上慢見濁也貪利養煩惱濁也增不善命濁也遠離一句劫濁也世道交喪異端競作五濁之世正信者少邪見者多惟以徇利以豐四肢豈能存心而却五欲十惡自滋三空漸遠人倫之道尚有失於綱常方外逸宗寧得入於神化故云難可教化起大忍力者非深位大士忍力成就不能讀誦也忍衆惡而外形骸歷艱難而行此道故云不惜身命非土木身軀夢覺生死者不能成此志也二聲聞發願他土弘經爾時衆中五百阿羅漢至瞋濁諂曲心不實故此等道力未充難堪惡世發願他方異土弘法利生畏堪忍之難調難伏也所以下徵釋弊惡者謂損壞性德造積惡業之人也懷增上者未得謂得舉一兼七功德薄者縱有少善皆是有漏非稱性之因也瞋含貪癡渾濁慧性也諂曲即巧言令色阿附苟合之類此中瞋慢乃根本之二諂乃隨眠之首以二兼四以首統餘根隨全具成上弊惡義也具此諸惡僞詐無信故云心不實故以不實故難以語道故誓於他方異土廣說此經良由二乘見地偏枯不解揚波啜糟之變難以化於濁醉之世不得不若斯也三六千比丘尼衆請記分三初波闍波提請記又二先請記爾時佛姨母摩訶波闍波提至瞻仰尊顏目不暫捨憍曇彌乃尼衆之主故統六千而請記也衆尼見聲聞授記龍女成佛感發其志謂若以聲聞言之彼聲聞也我亦聲聞也聞法既同理應不異何授記不及於我等以女言之龍女女也我等亦女也既同其倫必同其道我等豈龍女不若乎由是心雖自肯踟蹰未決故悱悱然口欲言而又難其所言但翅首目視俟聞命焉次與記於時世尊告憍曇彌至得阿耨多羅三藐三菩提我先總說即指五百弟子品末迦葉汝已知等一行半偈也今汝下因記當得下果號一切喜見者因為法師以法喜悅人故果亦稱之是一切下轉次授記六千又云菩薩者指六千當來具菩薩道而言也二耶輸陀羅請記亦二先請記爾時羅睺羅母至世尊於授記中獨不說我名既聞總記豈不自知有分但見聖母覿面得記故亦請命其名欲以彰己德而撫群望也次與記佛告耶輸陀羅至佛壽無量阿僧祇劫耶輸示迹蓋表大悲法喜稱適大智智悲雙運然後萬德具足千相光嚴故果號具足千萬光相取相好莊嚴身光無盡之意壽無量等既曰善國仁人相踵秉命悠長故隨機之壽住世亦永也悲華云姨母元為水神生生願為佛姨母耶輸元為須彌山神生生願為佛婦求佛出家得道受記今與記者滿宿願也三尼衆領解發願爾時摩訶波闍波提至即於佛前而說偈言世尊導師安隱天人我等聞記心安具足諸比丘尼說是偈已至於他方國廣宣此經歡喜偈讚發願弘經文顯可了上受持竟二明勸持有長行偈頌長行分二先如來目視爾時世尊視八十萬億那由他諸菩薩摩訶薩以目視者觀諸大士位當亞聖道越小賢才足以任大道風足以維澆俗默然心遣令彼自薦也又此土他土分籌定欵不合聖意故視諸菩薩令其發願也次菩薩發願是諸菩薩皆是阿惟越致至在於他方遙見守護是諸下序德位承目視之意故避座向前思欲持經奈色在已而言未及故作念請敕復作下謂今佛默然意必有在未聞其命為計若何不敢自專意敬佛意有二一者目視即是遣使不待言也二者欲人擔荷此法持說不泯故我等繼志述事便是敬承聖意何待言命然後發願也本願者一乘之道已覺於己復以覺人上使法鼓常鳴下驚群迷不寐此是本願也一舉兩得故云敬順自滿躊躇已定近前舉願任此難事發言無畏故云師子吼也周旋十方者以諸賢各司一方分疆立界然世間無不可化之人亦無不可行道之處果時清道泰聖人何為故發言不揀善惡遍一切處令一切衆生書寫解說以利人正念修行以自利也此菩薩不同前二前乃自持此承如來付囑之意普令人持也皆是佛力者歸功於佛以佛三輪加被故惟願等者以此法乃諸佛慧命非餘人所能雖本願如是非佛力不克故賴其護念庶靈峯仙軫歷險直驅濁世含靈乘載脫苦也二偈頌有二十行分三初十七行廣明忍難二二行略明通經三一行總結誓願初又二初一行總明惡世弘經即時諸菩薩俱同發聲而說偈言惟願不為慮於佛滅度後恐怖惡世中我等當廣說聖人去世無人救正傷風敗倫者多故云恐怖惡世以聖道訓世令人遷善崇德故當廣說二十六行廣明所忍之境又四初一行總明忍惡有諸無智人惡口罵詈等及加刀杖者我等皆當忍正斥曰罵傍及曰詈下愚無信視正如怨嫉其法惡其人惡言毀之不足加刀杖而害之菩薩怨親平等不校不報以理自責以忠自恕惟道是務皆當忍之二三行三句邪慢行事惡世中比丘邪智心諂曲至假名阿練若此是弘經菩薩擬末世邪智人之行事也初一行邪慢存心或有下異言異服誑惑世俗是人下結惡顯假阿練若此云間靜處亦云無諍有二一以三昧力將護衆生令不起諍二隨順法性無違無諍具四德當住此處一多聞總持不忘二分別能解妙義三正念常不放逸四隨順如教而行寶雲經云阿練若者不與世諍不近不遠便於乞食有樹陰多華果足淨水無難事獨無侶誦所聞凡居此者謂調煩惱故自謂真道無多聞也與白衣說法不解妙義也懷惡心無正念也念俗事不順教而行也自舉蔑他非無諍行故云假名阿練若也三五行三句出過謗毀好出我等過而作如是言至皆當忍受之此擬惡世慢流謗弘經菩薩種種輕毀之語也上假名練若身業不善懷惡念俗意業不善此中口業不善其謗有五一謗貪利二謗邪說三謗自作四謗誑世五謗求名國王等乃菩薩之檀越對彼言過巧用間計令疏彼親己耳我等下敬佛付託告敕之命而忍諸惡為斯輕言者當面譏刺之辱汝等是佛者言似稱讚意實譏刺菩薩若聞不聞默然忍受以至人四相皆空是非一致尚不知有我況校是非哉四五行半敬佛忍難濁劫惡世中多有諸恐怖至皆當忍是事此菩薩敬佛弘經徇身忍難也輔行云一切行中瞋害尤甚故忍最難大論云天帝問佛若行忍者唯有一事最不可耐小人輕慢謂為怖畏故不應忍佛言若以小人輕慢為怖畏欲不忍者不忍之罪莫甚於此何故不忍之人賢聖之所輕慢忍辱之人小人之所輕慢二輕之中寧取何輕故知寧為小人之所輕不為聖賢之所賤無智之人輕於不可輕賢聖之人賤於所可賤為是義故須行忍辱也廣明忍難竟二二行略明通經諸聚落城邑其有求法者至願佛安隱住凡有求法之處菩薩往到其所以無所畏說此妙法也我當二句任持弘經願佛無慮安隱而住也三一行總結誓願我於世尊前諸來十方佛發如是誓言佛自知我心問此諸菩薩神通智力不可思議縱在末世說法誰敢不信而說如是種種弊惡者何也有三意一者欲現前發願弘經者預知末世有此弊惡使臨難不怖故二者欲當來聽法修行者知有此過當反邪歸正故三者欲世尊說以禦難之方俾五種法師皆安樂故初明持經竟
