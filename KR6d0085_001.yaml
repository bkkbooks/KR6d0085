body:
  text: 金臺即山居後學大義集人題姚秦三藏法師鳩摩羅什譯三譯斯經世宗秦本什師出處已具於前三藏法師顯二利德經契一心律規三業論甄邪正法義軌持師彰模範約自利以三藏聖法為自宗師約利他即傳三藏道法為天人帥也譯者易也易梵成華故周禮掌四方之語各有其官北方曰譯今經自西來而云譯者漢之北官兼善西語摩騰始至遂稱為譯今仍之也妙法蓮華經序品第一舉經題而立品題者經為總品為別也以品雖各取類聚總屬妙法經故序者庠序也謂階位賓主問答悉庠序也又爾雅云東西墻曰序所以別內外也謂見墻別宅舍之內外觀序知一經之由致也若從義釋謂次序由序述序如是等冠於經首次序也放光現瑞發起之端由序也問答釋疑正說弄引述序也梵語跋渠此云品以義類同者聚在一段故名為品諸經品名或佛自唱或結集所置或譯人添足今經藥王天授二品是佛自唱其餘皆是經家譯人所置陳教起之因由詳法興之緣始雖為一經之發起實括全經之始終故直名序品序則引興正宗品則總別名理第則節目有次一則貫數之始故云序品第一十別解文義大章分三序初序分二正宗分三流通分初序分有通序別序經後序經前序證信序發起序從如是我聞至退坐一面為通序通於諸經故通中有別以處衆歎德之不同故亦名經後序佛滅後結集所置故亦名證信序以說聽時處一一分明證其非謬令物生信故從爾時世尊至品盡為別序別在本經故亦名經前序未說此經以六瑞發起故亦名發起序以事相表示為正宗之前導故初通序有三初明建立之由二明建立之意三正解經文初明建立由者謂如是等因何而立於經首按龍勝論云佛將入滅阿難愁惱阿尼樓豆告阿難言汝是持佛法人且須裁抑當詣佛所咨問後事難曰云何後事豆曰汝問世尊在日以佛為師滅後以誰為師世尊在日依之而住滅後依何而住惡性比丘佛在世自能調伏滅後如何調伏遐益末世理宜結集一切經首置何等言阿難承教一一咨問世尊一一答之依四念處住以戒為師默擯惡性比丘一切經首當安如是我聞一時佛在某處與某大衆若干等以是因由凡佛經首皆有如是我聞等語無此語者悉僞造故二明建立意者謂安如是等語其意有三一斷疑二息諍三異邪斷疑者智度論云佛滅後諸天王等請迦葉言法城欲頺法幢欲倒當以大悲建立佛法葉受請往須彌山頂擊大楗槌諸聖弟子得神通者皆來集會葉告衆言佛法欲滅衆生可憫待結集已竟隨汝入滅諸來聖者受教而住畢波羅窟葉入定觀察衆中有煩惱者應逐去之惟有阿難煩惱未盡葉出定於衆中牽阿難言清淨衆中結集法藏汝結未盡不應住此是時阿難羞慚悲泣告言我能有力久可得道但為侍佛故留殘結不盡斷耳葉言汝更有六種突吉羅罪應於僧中懺悔阿難如法懺悔復牽出窟語言汝漏盡可來言訖自閉窟門阿難是時靡不精誠至於後夜頭未著枕朗然大悟三明六通得大羅漢來扣窟門葉言汝若漏盡可縱神通於戶鑰孔中而入阿難騰身入來禮拜僧足迦葉以手摩頂言我欲令汝速得道果汝勿嫌恨是時大衆請阿難升座結集法藏既登座已感身相好如佛大衆隨起三疑一疑佛重起說法二疑他方佛來三疑阿難成佛阿難唱言如是我聞則知非佛重起非他方佛非阿難成佛故云斷疑息諍者同為羅漢德業頗齊若不推尊從佛言自制作則諍論生焉既言從佛則授受有源非胸臆之談故云息諍異邪者不同外道經初安阿憂故阿者言無憂者言有意謂萬法雖異不出有無置之經首以之為吉初吉中後亦吉今佛經不爾故云異邪三正解經文六種成就謂信聞時主處衆也如是者舉所聞之法體我聞者能持之人一時者聞持和合非異其時佛者時從佛聞王城崛山聞持之處與大比丘等聞持之伴此則因緣和合次第相成六緣不具大教不興故云成就六為能成教為所成故且初信成就如是佛法大海信為能入故劈首明信信者言是事如是不信者言是事不如是也所以佛法無量信為入法之初基若無信心則不肯修習故五根以信為首十一善法居先信心之前更無善法依信為本然後興解起行乃至證入大經云信為道元功德母長養一切諸善法故云能入約法釋如是者衆生如隱故沉三界欲絶三界只要顯如聖人說法但為顯如除如之外皆是虗妄惟如為是故稱如是約本經釋者因果實相不異為如心境諸法無非為是又一乘因果曰如無二無三曰是二聞成就我聞我有四一凡夫遍計我二外道神我三二乘假我四法身真我今是隨世流布五蘊假我也阿難已達我空實不計我故名為假要揀賓主乃稱為我達耳曰聞大論云耳根不壞聲在可聞處作心欲聞以率爾耳識與同時意識衆緣和合故得有聞問耳根發識故聞應云耳聞何言我聞答耳是五官之別我乃一身之總廢別從總故曰我聞又六根中必用耳聞者此方教體故問阿難是佛成道之夜始生至二十年方為侍者二十年前所說之法並皆不聞何結集時通稱我聞耶答有三義一佛命為侍者時阿難從佛乞願不著退衣不隨受請二十年前未聞之法重為說過世尊許之故未聞之法亦得聞也二金剛華經云阿難得法性覺自在三昧力故故未聞之法皆能憶持與聞無異今經亦云世尊甚希有令我念過去等三不思議境界經云復有百千萬億菩薩現聲聞形其名曰舍利弗乃至阿難據此則是大權示現何法不通而言我聞不亦宜乎今經圓頓大教無我真我生佛同一法身能聞所聞心境不二實相即今經之我聞也合上謂如是之法我阿難親從佛聞顯祖述有據憲章得成非私淑讀古之徒也三時成就一時世事合會尚待昌期大法弘宣豈違嘉運故須良時方能成就蓋取師資合會說聽究竟之良時也不云年月日而但云一者以佛之說法殊方紀曆不可對同舉一會始末之期收六甲盈縮之數天地延促東西時際包盡無餘故總云一時約理心境一泯理智一融凡聖一如本始一會之時也約本經即正說法華之時化畢機熟之時如日卓午無所不照之時一切聲聞受記成佛之時也四主成就佛德位相稱垂文作則為百世師作衆生父也具云佛陀耶此云覺者亦云知者知三世常無常法故覺謂覺察覺悟悟即照真本有察則了妄本空妄本空則不逐於妄真本有則不迷於真真妄既明唯一覺耳佛獨稱之又自覺覺他覺行圓滿故涅槃云自覺自知有佛性覺他衆生悉有佛性圓滿自他無二佛性又自覺揀凡夫覺他揀二乘圓滿揀菩薩約人即高會教主中天竺迦毗羅國淨飯王太子出家成道別號釋迦牟尼非此大聖孰能演此一乘大法哉故云主成就又為六種成就之主故望前則際主之會成時聆主之語成聞受主之教成信望後則主之所居成處主之所化成衆六種共成歸重於佛也五處成就住王舍城耆闍崛山中謂能住住所住佛為能住即首楞嚴三昧所住者即忍土王城梵語羅閲祇伽羅此云王舍城國名摩竭陀此云不害言無刑殺也亦云摩竭提此云天羅即國王名也此王即駁足之父昔因王巡山中值牸師子衆人迸散師共王交後月滿來殿前生子王知是己子僞言因我無兒此乃天賜遂養為太子足下有駁紋時人號為駁足後紹王位喜噉肉每食甚多偶一時缺庖人取新死小兒為膳王食大美敕令當辦此肉庖人日捕一兒供王膳舉國愁歎後千小國謀兵討伐置於崛山中山中羅剎尊為鬼王因與山神誓取千王以祭山捕得九百九十九王唯普明王次後捕之王啼泣不已告鬼王曰我生來實語而今乖信願我國建無遮會未完駁足放之還國作大惠施委政太子仍歸山就死形悅心安駁足問之答曰得聞聖法故耳駁足令說之普明王廣讚慈悲毀訾殺害又說四無常偈天地及日月時至皆歸盡未曾有一法不被無常吞駁足乃大權示現一聞即證初地千王各取一滴血三根髮賽山神願駁足與千王共立舍宅都五山中為大國各以小國委子百姓在五山中作舍七度被燒王舍不燒民云排我屋為王舍庶免其焚故云王舍城又舍字亦可作赦字以王赦千王不殺故梵語耆闍崛此云靈鷲亦云鷲頭又云山南有尸陀林鷲鳥食尸竟栖止其山時人呼為鷲山此山近城不遠山有五穴佛居中穴餘穴諸弟子居之又前佛今佛皆居此山若佛滅羅漢居之法滅支佛居之無支佛鬼神住之皆是聖靈所居因呼為靈鷲山其城其山衆見不一或見土木草石或見七寶莊嚴或見諸佛遊行乃不思議聖境所住既爾能住亦然中者佛好中道升中天降中國中日生中夜滅皆表中道今處山中說中道義也六衆成就座無知音說將誰聽機感盈前不得不說所謂英才滿座可信吾德之不孤羽翼多人轉見斯道之有託故云衆成就也文分二初列衆二總結初又三初聲聞衆二菩薩衆三八部衆初又二初比丘衆二比丘尼衆初又二初無學衆二有學衆初又三初舉類標數與大比丘衆萬二千人俱與者共義釋論以七一解共謂一時一戒一處一心一見一道一解脫也大者多義勝義器量尊重為天王等大人所敬故言大超出九十六種外道故言勝遍知內外經書故言多又道大用大知大道勝用勝知勝道多用多知多總之數目多名望重德業隆故云大也比丘名含三義一破惡二怖魔三乞士破惡者出家持戒因戒生定因定發慧戒防形非定除心亂慧悟想虗三學能破身口七支及三界見思之惡故怖魔者既破惡必出三界展轉化度損減眷屬乖於魔意故驚怖出家從因至果凡三度魔怖謂出家時發大心時成正覺時前二但怖後一乃興戈為佛所摧莫不降伏乞士者乞法資道乞食資身士外形骸以理自勝故然必乞食者在家人以田商士三種如法用養身命出家人佛不許此惟乞食自濟身安道存福利檀越故亦云除饉因衆生福薄前世無法自資今生常受饑饉出家戒行能生物善除因果之饉乏故梵語僧伽此云和合衆一人不名和合四人已上乃名和合有二一理和同證擇滅無為二事和謂戒和同修見和同解利和同均身和同住口和無諍意和同悅又僧有四不依淨命破戒僧也不解法律愚癡僧也行五方便慚愧僧也若法忍真實僧也今是真實氣類如是數至一萬二千皆是影響大化本迹未定二明位歎德皆是阿羅漢至盡諸有結心得自在皆是一句明位阿羅漢義翻殺賊不生應供三義殺賊者殺九十八使煩惱之賊今經亦殺賊謂離小涅槃不生者無明糠脫後不受生死果報今經不生不生謂離無漏應供者具智斷功德堪為人天福田今經亦供應謂道供定供上比丘為因今羅漢是果始托鉢乞食福利衆生今證道果理應受供應供乃乞士果也始修三學破見思惑今賊已殺慧命得安殺賊乃破惡果也始發大心魔王恐怖今證無生不受後有不生乃怖魔果也諸漏下正歎上三德諸漏二句歎殺賊德諸漏者謂欲漏有漏無明漏也成論云失道名漏律云癡人造業開諸漏門毗曇云漏落生死論通因果律專在因毗曇在果煩惱者略即根隨二十六廣即九十八使能造惡業致生死苦忘法身失慧命喪重寶傷惱行人皆由此也因果俱亡曰已盡見思已滅曰無復煩惱是能潤諸漏是所潤能所俱盡殺賊義也逮得一句歎應供德逮及也由智斷功德證無為理故云己利己利成就方受人天供養應供義也律云忖己德行忖己利也如苦身而作端坐而食擎跽而拜逆立而受苟無己利之德其害非細法王座前知音少長者園內樹耳多學者慎之盡諸一句歎不生德因果不亡曰有有為受生之處云諸者即三有等結即惑習之業為諸有之生因今智斷不受後有故云盡結因盡果亡不生義也心得一句總上見思惑盡不染塵纍故云心自在定具足名心自在慧具足名慧自在慧自在未必心自在心自在必慧自在云心自在者顯定慧具足也此經要授聲聞成佛之記故歎德中寓有抑揚以己利揀無利他自在揀無法自在又天親論此五句為上上起門逆次可知三列名總結其名曰阿若憍陳如至如是衆所知識大阿羅漢等前是所證之法此是能證之人萬二千不勝其多今略舉有名望者二十一人其名曰三字乃指證之辭名者實之賓也要知諸聖皆備諸行隱能則各具一德引偏好故如陳如共上座有大德者相隨舍利共智慧者相隨目連共神通者相隨皆執一法引諸偏好若欲消名須識其行從德立名無往不可憍陳如姓也此云火器先人事火因命族焉又火照也燒也照暗不生燒物不生以不生為姓故阿若名也此云已知或云無知已知者最初知也無知者非無所知乃知無耳若依二諦即知真以無生智為名也乃摩夜夫人之弟并十力迦葉為母族二人父族三人者一阿濕波二跋提三摩訶男拘利五人承王命入山侍佛修道不耐苦遂捨佛往鹿苑修異道佛成道已先往度之初轉即悟客塵故往因佛為赤目大魚五人為木匠先取魚肉者阿含云我佛法中寬仁博識初受法味者拘鄰如比丘為第一摩訶迦葉此云大龜氏先人學道感靈龜負圖而應因命族焉曾於毗婆尸佛法中為金師有貧女得一金珠欲補塔中佛像金師不求價與治之因誓為夫妻自爾已來九十一劫身皆金色人天受樂其後生梵天命終生摩竭國具律陀婆羅門家身紫金色其家巨富勝於瓶沙王王有金犁千具為避王故唯少一犁時他國富家有一女身亦金色乃昔施金女也娉為姻室作無緣夫婦後夫婦投佛出家行頭陀行末後多子塔前拈華示衆尊者破顏微笑乃付金縷袈裟佛入滅已結集已竟持衣入雞足山入寂滅定待慈氏下生交衣方取滅阿含云我佛法中行十二頭陀難行苦行大迦葉為第一三迦葉同前優樓頻羅此云木瓜林近此林故又云木瓜癃胸前有癃如木瓜故又云禱禱此林神而生故伽耶山名即象頭山住此山故又城名近此城故那提河名依河住故毗婆佛時三人共樹剎柱緣為弟兄兄為瓶沙王師先事火龍度五百弟子二弟各度二百五十共行兄法佛作十種神變度之優樓雖覩神變邪執未改而言瞿曇雖神變不如我道真佛言汝非羅漢亦不得道豁然開悟領五百弟子歸佛二弟見水中漂下火具往視之其兄已作沙門亦歸於佛共成千羅漢阿含云優樓頻羅將護四衆供給四事令無所乏最為第一伽耶比丘觀了諸法都無所著善能教化最為第一那提比丘心意寂然降伏諸結精進第一舍利弗具云舍利弗羅此云身子其母好身形身之所生故云身子王舍城有難陀跋難陀二龍王降雨以時國無饑年王及大臣歲設大會置三高座王太子論師座焉身子八歲時步歷會中問曰三座何為人具告之即越衆登論床羣儒皆恥不肯與之論議謂若勝此兒無足顯譽脫其不如屈辱大矣皆遣侍者問之身子俱答問者盡墮無敢當者王及臣民咸謂我國慶幸有大智人出焉十六博覽古今大國論議無雙五天稱為第一以沙然梵志為師志之道術身子盡得沙然臨死欣然大笑身子問之志云世俗無眼為恩愛所親我見金地國王死夫人願生一處投火而死後見金地商人問之果然身子追悔未盡師術師不授我此法為我非其人師故祕耳自知未達更求勝法而無師可師雖不知此一法餘法皆通外道羣中最為第一與目連為友相約誰得好師即隨師之路遇馬勝威儀庠序因問師法答曰諸法從緣生亦復從緣滅吾師大沙門常作如是說隨詣佛所出家七日遍通佛法十五日證無學果為羅云和尚論梵作師阿含云我佛法中智慧無窮決了諸疑者舍利弗為第一大目連此云讚誦姓也名拘律陀乃樹名禱此樹而生故又云胡豆古仙人山居豆食因命族焉此尊者焚得勝之殿止耆域之車攝調達五百之徒而歸正法取迦毗五百之釋藏於梵天阿含云我弟子中神通輕舉飛到十方者大目連為第一迦旃延此云剪剃種上古多仙居山無人剃髮一仙人有二子往省其父次子為諸仙剃髮因立族焉尊者是其族又云文飾善論議故阿含云善分別義敷演道教者迦旃延為第一阿㝹樓䭾亦云阿那律陀亦云阿尼盧豆此云無貧亦云如意乃白飯之子淨飯之姪世尊之堂弟阿難之從兄羅云之叔父非聊爾人也如周公曰我是文王之子武王之弟成王之叔非卑賤人也此尊者因施稗飯獲金人而致富箭剔昏燈感天眼以證果阿含云我佛法中天眼徹視者阿那律為第一劫賓那此云房宿因禱此星宿而生故又與佛同房宿故尊者初出家時往佛處值雨借宿陶師家以草為座至晚一比丘入即佛也乃推草讓之自坐地上佛為說法證羅漢果又善知星宿明識圖像從解得名阿含云我佛法中善知星宿日月者劫賓那為第一憍梵波提此云牛呞病昔作沙彌時輕弄老比丘如牛哨自爾已來五百生中為牛次出為人五百生常有牛呞病今雖成道餘習猶在佛恐人謗招過與一數珠人見虗哨為其念佛恐人不知是聖人故常在天上受供佛入滅時尊者聞之乃云憍梵波提頭面禮妙衆第一大德僧聞佛滅度我隨去如象王去象子隨阿含云樂在天上不樂人間者牛跡比丘為第一離婆多此云假和合智論云尊者夜宿空亭有一鬼携尸而至復一鬼隨來諍之各言我持來共決於尊者自思依理枉理俱不免害寧實答之一鬼怒拔尊者手足而食一鬼取尸人手足補之等二鬼相食而去天明自思不測誰身若我自身眼見鬼食若是他身却隨我行住逢人則問見我身否時衆僧疑問其故知其易度謂曰汝身乃他人遺體非己有也即悟此身假和合而有由此漏盡得道阿含云坐禪入定心不倒亂者離婆多為第一畢陵伽婆蹉此云餘習昔五百世為婆羅門性多憍慢今雖成道餘習未亡每過恆河喚河神云小婢止流令我過去神白於佛令向神懺悔即合掌云小婢莫瞋大衆皆笑佛言實無慢心乃習氣也阿含云樹下苦坐不避風雨者婆蹉比丘為第一薄拘羅此云善容色貌端莊故又云重姓付法藏經云昔於毗婆尸佛法中以一果施病僧感九十一劫人天受福今生婆羅門家年一百六十歲無病無夭感五不死報一繼母置火爐中不死二從母索肉置沸湯中不死三隨母至河邊推落水中不死四大魚吞之不死五魚被人網剖之不傷其人遂以為子其父聞之去爭不與後議兩家為子故云重姓阿含云壽命極長終不中夭端莊不苟常樂閒居者薄拘羅為第一摩訶拘絺羅此云大膝乃舍利弗之舅從來論勝於姊姊孕則論不勝知懷智人寄辨母口況出胎乎即棄家往南天竺讀十八經時人笑之纍世難通遂喟然歎曰在家為姊所勝出外為人所輕誓不輟學無暇剪爪時人呼為長爪梵志十八年學訖回家問甥所在告云為佛弟子即大憍慢我甥八歲聲震五天彼沙門者有何道術誘我姊子遂往佛所思惟良久不得一法入心佛問汝意以何為宗志曰一切法不忍忍即安義言一切法我皆能破使不得安故佛問汝見是忍否志拂袖而去至中路乃省歎曰我義兩處負墮若我見是忍前已云一切不忍若我見不忍無以勝佛一切二乘不知唯佛菩薩知之於是歸佛出家阿含云得四辨才觸難能答拘絺羅為第一難陀即牧牛難陀此云善歡喜乃牧牛子也飯王逼十萬出家此其一也性極聰敏音聲絶倫以欣道而立名孫陀羅難陀上三字此云好愛亦云端正妻名也尊者四月九日生短佛四指儀容挺特若入衆有不識者謂是佛來揀牧牛難陀故連妻稱之乃佛之親弟與妻食息常隨不肯少離佛與阿難乞食到門正共妻在樓上食即起迎佛妻與之期待君還乃共食耳陀見佛云轉輪王子何得自辱持鉢取飯佛即還園持飯鉢至園奉佛佛令人剃髮握拳語曰誰敢持刀臨閻浮提王頂上逼不得止乃剃髮明日佛應請求住守寺意欲逃去佛令關門掃地逃回隱樹等佛將到天宮見嬋娥而欣樂復入地獄覩鑊湯而休心欲念乃止得無漏道富樓那彌多羅尼子此云滿慈子從父母立名七佛人中說法為最具四辨才一切經史無不間覽有大智慧阿含云善能廣說分別義理滿慈子為第一須菩提此云空生以初生時其家寶藏忽空故表解空之祥又名善現以食器皆空所欲皆滿故占相曰既善且吉又名善吉常好遊止山林石窟寂靜之處所修行業以空為本常入定住無諍三昧如嫉立故坐嫉坐故立以善物心不與諍也真諦曰東方青龍陀佛解空第一阿難此云慶喜佛之堂弟斛飯之次子調達之弟世尊成道阿難始生故名慶喜又云無染出家已來見女子不起染心故初出家得入流果楞嚴得二果結集時方證四果後入滅遺舍利四處起塔拘多指塔示育王曰傳佛聲教此尊者一人而已王喜以十萬錢供之阿含云知時明物所至無疑所憶不忘多聞廣達堪任奉持者阿難為第一羅睺羅此云覆障昔因塞鼠穴不看婆羅門六日故世尊始求出家父王不許殷勤乞求不已王言汝若有子聽汝出家遂指妃腹曰却後六年汝當生子因在胎中六年故曰覆障佛出家後耶輸有妊諸釋咸瞋欲得欲殺惡聲載道因焚火坑發大誓願我若為非母子俱焚若真遺體天當為證言訖投火變一蓮華捧體王及國人始復不疑時佛還國耶輸令羅云奉歡喜丸與佛父子天性自然於大衆中持以上佛耶輸以息謗謗由有子故言覆障祖王歡喜雖失其子而獲其孫孫為輪王吾何恨焉佛令出家父王不許耶輸將上高樓目連飛空取之佛度出家付舍利弗為弟子既出家已王位已失故言覆障佛法中密行第一如是衆所知識者總結上二十一人才德兼備為人宗仰故知識者師友之稱又聞名曰知見面曰識又識以明解為義知以決了為義謂解達事理決擇宗乘故大阿羅漢等者大拔群賢等該同類如是二字指諸尊者衆指天人八部所知識者結名也阿羅漢結位也等其一萬二千人皆具如是之德之名之美也要知阿難乃有學人亦列於此者是應生眷屬故又是羅漢非知識如萬二千未列名者是知識非羅漢如阿難羅云亦羅漢亦知識如此列名者是非羅漢非知識即下二千是也二有學衆復有學無學二千人上萬二千是無學此二千是有學也以見修所作未辦研真斷惑為有學以智斷修證皆完真窮惑盡為無學諸教不同或六地無學五地有學佛地無學九地有學等二千標數也此二千乃業生眷屬大通時下種者也比丘衆竟二比丘尼衆摩訶波闍波提比丘尼至亦與眷屬俱摩訶波闍波提此云大愛道以有知故方能愛道亦云憍曇彌此云衆主為衆尼之主故尼者天竺女人通稱乃佛姨母始求出家佛不許可阿難為之三請佛令行八敬方聽出家八敬者一百歲尼當禮初夏比丘足二不得罵比丘三不得舉比丘過四於僧中求受戒五若犯僧殘應半月向僧中行摩那埵六當於僧中求教授人七不應在無比丘處安居八夏訖詣僧中求自恣人六千數也羅睺羅母等者以子標母也此云華色以顏貌美色故亦云名聞謂在家具三從四德溫良恭儉德齊太子位至小君為菩薩妻羅漢母尼衆主天人知識豈無名聞人耶二聖母為尼衆之主故列其名而統其屬也眷屬者天性親愛謂之眷更相臣順故名屬法眷屬亦然說諸法門轉入他心得知法性由法得親故名眷親信臣順故名屬前比丘中以列名不列名分業應此中以標數不標數定優劣是什師之筆法也又萬二千及二千為三周得記之案尼衆為授學無學記品之案聲聞衆竟二菩薩衆論云菩薩為在家出家因衆中攝何故別列答有菩薩墮四衆者隨類應現故有四衆不墮菩薩衆者不發大心作佛故今舉同發心作佛者名菩薩衆文分為三初舉類標數菩薩摩訶薩八萬人具云菩提薩多摩訶薩埵菩提此云道薩埵云心摩訶云大合云道心大應云大道心以有大根具大智信大法解大理修大行立大因成大果故亦云覺有情約自行菩薩是一分能覺悟之有情非餘凡夫不自覺故約利他菩薩又能開覺法界之有情非餘二乘不覺他故覺是佛地正覺之智情是迷執諸情生菩薩上求佛覺下化有情非餘悲智全無或一故約教有五教約位有五十五位下文菩薩聞是法等約前四教說也又云不聞是經不善行菩薩道若聞是經乃善行菩薩道約圓教發心說也此衆菩薩本地難測或居等覺或齊法王如觀音文殊皆果後大人三輪益物迹輔釋迦可以意知八萬人標數也餘經集衆甚多此經八萬何其少耶或者但語大數如下地湧雲集豈止八萬二明位歎德皆於阿耨多羅至能度無數百千衆生皆於不退轉者明位皆得下歎德阿耨等此云無上正等正覺即如來應供正遍知之三號餘七兼收具含萬德以諸佛皆從真如實際中來示成正覺十界稱尊無相匹者無過上者故云無上又能順應四諦二諦道供法養法身故云正等又善知一切諸法之所歸趣明照一切衆生心行差別不墮偏邪故云正覺亦即三身三德三大乃證窮極果之稱皆於二字總上八萬不退轉者破見思惑名位不退永不失超凡之位故破塵沙惑名行不退永不失菩薩之行故破無明惑名念不退永不失中道正念故又般若位不退離二死故解脫行不退具諸行故法身念不退證實境故以此八萬本地難測無功用道任運流入薩婆若海故云不退轉也皆得陀三句約三業而歎三輪應物之德皆得二字貫下陀羅尼一句歎意業輪此云總持於一字能通無量法門於一門能攝無量義理如觀一華開能知天下之春一葉落能知天下之秋所謂總一切法持無量義也略說即普賢品三名廣說有無量如萬億旋陀羅尼是也樂說一句歎語業輪樂說乃四辨之一一法無礙於世出世法說不謬故二義無礙於為無為權實等義所說盡理故三詞無礙於一切文義瓶瀉成章故四樂說無礙四悉應機誨人不倦故以四辨弘宣稱令物聞如風吹萬籟也華嚴九地中有四十種辨才今略也轉不退一句歎身業輪輪者有運轉摧碾二義喻大法能轉入他心摧破無明故謂得十身靈相現身塵剎在物同類若權若實之說皆令衆生入一切種智故云轉不退轉法輪菩薩得是道以處己運是道以利人不似小乘不說法以自守也供養無量三句約因緣而歎福慧深廣之德供養佛外為勝友攝護即緣具足植德本內修萬行為資即因具足然有橫竪竪論之從無量劫供無量佛修無量德即福深橫論之於一念頃遍至十方世界供佛修行即慧廣又深則一一行皆與實相相應廣則一一門攝一切門故德本者含正道助道教道證道一行具足則成一德無量行具足則成無量德故云德本具此因緣深廣之德堪灌頂受職故為諸佛稱歎不似小乘喝為焦芽敗種也以慈二句約悲智而歎隨相離相之德以慈者以悲導智即隨相德慈兼四無量即空涉有純以四心適化衆生以利物之行而成己德故云修身觀音品慈眼視衆生華嚴大悲為門大悲為首等善入者以智導悲即離相德慧乃般若涉有不礙觀空即諸法而證實相以無得而證故云善入華嚴有破塵出經喻世典有罔象得珠說即斯義也菩薩以三界為家四生為子借度生入佛慧不似小乘視三界如牢獄四生如怨賊也通達下約本迹而歎伊梵三點之德智即智德轉八識成四智證大菩提故云通達大智彼岸喻斷德四相無明滅已證無住涅槃故云到於彼岸以超生死此岸度煩惱中流到涅槃彼岸不似小乘得人空智在中流也上二屬本名稱下即迹中恩德自本垂迹稱實相之理彰弘化之業如日照蒼穹有目皆覩無目則聞故云名稱普聞等不似小乘獨善其身名在一國也其道神無方易無體如摩尼天鼓無私成事既能曲濟無遺則必受化者廣故云能度等華嚴入法界品文殊在福城東說普照法界修多羅一時海中無量諸龍捨身在人天中萬龍於菩提得不退轉復有無量衆生於三乘各得調伏此經陀羅尼品藥王說呪六萬八千人得無生法忍淨藏淨眼現神力時其父等八萬四千人皆堪持經觀此即知諸大士益物之盛不似小乘成就衆生心不喜樂也此下諸菩薩證此種種功德因果該徹本迹圓融豈可以地位局判法華論分上支門下支門總相歎別相歎初皆於阿耨一句是總上支門也其餘諸句是別下支門也有十種不退轉陀羅尼一句示現聞法不退轉也樂說一句樂說不退轉也轉不退一句說法不退轉也供佛植本依善知識不退轉也諸佛稱歎斷疑不退轉也以慈一句入事不退轉也善入一句入一切智如寶鏡不退轉也通達一句依我法二空不退轉也到於一句如實境不退轉也名稱二句應作所作不退轉也三列名總結其名曰文殊師利至菩薩摩訶薩八萬人俱其名曰下列名也大士大名或從法門或從德行或從本願雖是一名備無量義今依經論銷十八菩薩名各就其一焉文殊師利此云妙德大經云了了見佛性猶如妙德等亦云妙吉祥生時有祥光滿室之兆故華嚴以菩薩表智又主信門故問明品為會主法界品為善財師今經一乘實相亦彼宗也非信不悟非智不證故首標其名所謂化滿塵方用周三際道成先劫名龍種尊王現證菩提名摩尼寶積未來成佛名曰普現在因為八王師在果為七佛祖談般若之玄致屢質本師說權實之雙行頻驚小聖乃影響大化迹為菩薩耳觀世音者天竺云婆婁吉低稅一名有二義一觀是能觀之實智世音即所觀之聲塵從聞思修入三摩地解六結越三空了塵性而證入圓通故二觀是能觀之權智世音即悲仰之時機以慈悲二用救七難應二求十九說法十四無畏等於十方稱名之機圓觀普應無苦不救無樂不與故過去為正法明現在為彌陀輔翼當來在西方補普光功德佛得大勢者即大勢至以念佛三昧輔翼聖化不動而遊不分而應化用不息復無化功其力用大之至也常精進者內發三心外修萬行於己不足於物不倦故不休息者在因不自為圓在果不自為滿唯乾乾不息功就在乎不就至極在乎不極故寶掌者寶位也聖人之大寶故自因至果四十二位皆聖人所踐之地大士寄此諸位掌握化機接物利生故又掌中出寶普濟衆生故藥王者在因為世良醫在果能以法藥救衆生身心二病因病與藥無疾不瘳應機說法無機不度故勇施者三檀不吝果敢勇為故又施以帥萬行破諸著如梟將力破重圍故寶月者月能隨數盈虧自無損益菩薩之道隨機隱顯自無增減故以喻名之月光者光能破暗猶智破愚也滿月者自覺聖智圓滿如十五之月故大力者有神變之力用一多無礙大小相容逈出思議之表超乎權小之上故無量力者有二一者三明六通十八不共等法校塵沙不能喻歷僧祗不能及故數重不可得也二者一一業用貫三際而無始終遍十方而無涯畔故無分際量也越三界者於三界中不出不在得大自在故跋陀陀婆羅此云善守謂守護三業故又衆賢之首故彌勒者具云彌帝利此云慈氏姓也又阿逸多此云無勝名也上生經云在波利村沒上生兜率閻浮提歲經五十六億萬年下生成佛凡在釋迦末法中精進修諸功德掃塔塗地以名香妙華供養或稱名禮拜除百億劫之罪命終上生內院當來隨彌勒下生更值賢劫千佛授記寶積者如來藏有恆沙功德如寶由曠劫積因而證故導師者導即引導入𨞬垂手為人天之師弘範三界導愚迷之衆故如是下總結如是者指上有名也等該無名也八萬乃上首之數眷屬在數之外以上諸菩薩皆果上大人影響輔化不可局定位次菩薩衆竟三八部衆古云凡夫衆却有聖人又云俗衆却有道者又云天人衆却有鬼神八部又少二部今依本經具列八部故云八部衆以夜叉攝在四天王部下摩睺羅伽攝在八龍王部下又此八部類雖異生理兼權實況諸天王多是寄位菩薩華嚴諸世間主各證毗盧一德豈異生而若是乎故知此衆亦同彼也夫三乘賢聖既仰德而歸八部該羅豈不虗心而衛由是繼菩薩而列八部衆焉文分七初天衆爾時釋提桓因至與其眷屬萬二千天子俱梵語提婆此云天天者自然也皆自然身勝樂勝諸天轉上轉勝故論云清淨光明最勝最尊者天也釋提桓因忉利天主也釋即釋迦姓也提桓因此云主以能為諸天主故忉利此云三十三四面各八城中善見城合三十三居須彌頂乃欲界天主故列在前此天住處縱廣八萬由旬七寶城壁善見廣六萬由旬人身長一由旬衣二由旬重六銖人間一百年此天一晝夜諸天身形時數轉上轉增轉下轉減皆以倍言唯服轉上轉輕轉下轉重耳雜阿含云本為人時行於頓施堪能作主故總有一百八名今一耳因中迦葉佛時為女人發心修佛塔有三十二人助成今為天主三十二人為列辟小乘中說是須陀洹清涼疏云是權而非實二萬等即部屬明月者月天子也梵語蘇摩此云月神月缺也以滿而復缺故此與日宮四天王皆住須彌山腰離地四萬二千由旬人間五十年此天一晝夜身長半由旬衣重十二銖長一由旬起世經云月宮縱廣四十九由旬城是七寶莊成以二分天銀一分青琉璃成就有千光明五百下照五百傍照其光清冷遙看似圓其實正方月中樹影乃人間閻浮樹照映月中有影非實有桂樹也普香者星宿天子即紫微也為群星之主統領二十八宿九曜星官等由人心善惡感現吉凶等象各星宮殿大小有別所司各有分野宰治之殊寶光者日天子也梵語蘇犁耶此云日神日實也起世云日宮縱廣五十一由旬二分天金一分頗黎成就光照同上此三乃帝釋內臣又劫初光音天來人間因食地肥身滅光明世間黑暗菩薩化作三辰寶吉祥作月天子寶光作星天子即普香寶意作日天子即寶光四天王者外臣也居四寶山高半須彌廣二十四萬里東提頭賴吒此云持國居黃金山領二部一乾達婆二富單那南毗留勒叉此云增長居琉璃山領二部一薜荔多二鳩槃茶西毗留博叉此云廣目居白銀山亦二部一羅剎二夜叉北毗沙門此云多聞居水晶山亦二部一毒龍二毗舍闍不令惱人風調雨順故稱四天王護世者自在大自在即欲界五六天自化五欲他化五欲也娑婆此云堪忍其土衆生安於十惡不肯出離從人立名故稱為忍亦名為雜以九道雜居故梵者此云離繫除下界繫上升色界故亦名高淨尸棄此云頂髻因習火光定破欲界惑從德立名然經標梵王復舉尸棄似如兩人釋論中正以尸棄為王今舉位顯名耳此天居初禪中間內有覺觀外有言說故得主領為王毗曇論云二禪以上無言語法不得為王故光明者二禪天也等三四禪并十八梵天也二龍王象有八龍王至各與若干百千眷屬俱梵語那伽此云龍龍者鱗蟲之長能幽能顯能大能小春分登天秋分入地有鱗蛟龍有翼應龍有角虬龍無角螭龍未升天曰蟠龍難陀此云歡喜跋此云善兄弟二龍常護摩竭提國風不鳴條雨不破塊五穀豐熟善應人心瓶沙王每歲設會賽之百姓聞皆歡喜從此得名即目連所降者也本住歡喜地迹令世間歡喜娑伽羅此云鹹海從海立名本住智度大海迹處滄溟深水和修吉此云多頭亦云寶稱本住普現色身三昧迹示多頭德叉迦此云現毒亦云多舌本住樂說辨才迹示多舌阿那婆達多此云無熱雪山頂有池名阿耨達池中有五柱堂龍王常處其內從池立名閻浮諸龍有三患一熱風熱沙著身燒皮肉骨髓以為苦惱二惡風暴起吹其宮殿失寶飾衣等龍身自現以為苦惱三諸龍娛樂時有金翅鳥入海搏取始生龍子食之以為苦惱此池無此三患故云無熱本住常樂我淨迹處此池摩那斯此云大身大力等修羅排海淹善見城此龍縈身以遏海水者本住無邊身迹為大身優鉢羅此云黛色蓮華從池立名本住法華三昧迹居此池三緊那羅衆有四緊那羅王至各與若干百千眷屬俱梵語真陀羅亦云緊那羅此云疑神似人而有一角人見之曰人耶非人耶乃帝釋法樂神居十寶山若身有異相即上秦樂佛說法時諸天弦歌而誦法門者即此神也法奏四諦也妙法奏十二因緣也大法奏六度也持法總前三也本住不思議不起滅定以千萬偈讚諸法王迹寄弦管歌詠十力四乾闥婆衆有四乾闥婆王至各與若干百千眷屬俱梵語乾陀羅亦云乾闥婆此云嗅香以香為食亦云香陰其身出香故乃帝釋俗樂神樂者緣幢倒擲之技樂音者鼓節弦管之流美者幢倒之勝美音者弦管之勝五阿修羅衆有四阿修羅王至各與若干百千眷屬俱梵語阿素洛亦云阿修羅此云無端正以男醜女端故又云非天有天福無天德故又云無酒採四天下華醞於大海龍魚業力其味不變瞋妬誓斷不飲故云無酒婆稚此云被縛因與天帝戰曾被縛故佉羅騫馱此云廣肩擁海水淹城者毗摩質多此云淨心亦云種種疑即舍支父也羅睺此云障持謂障持日月故起世經云有四修羅王在須彌四面大海下住因作福生瞋故感一日一夜三時受樂三時受苦也六迦樓羅衆有四迦樓羅王至各與若干百千眷屬俱梵語迦樓羅此云金翅鳥其翅金色兩翅相去三百六十萬里以龍為食莊生云垂天之翼水擊三千里擬此也大威德者德勝羣輩威攝諸龍故大身者身勝羣輩故大滿者所噉之龍恆充足己意故如意者頸有如意珠故此鳥以食龍業力命終身為業火所燒投入海底至金輪際復出至金剛山住山樹上燒然復入海如是七度力盡死於樹下頸有如意珠龍為護珠降雨諸龍爭珠故名如意此上為後慶讚及法師品廣記之案七人衆韋提希子阿闍世王與若干百千眷屬俱舉韋提顯子舉王該民韋提乃頻婆羅王之夫人闍王之母此云思惟以子害父故思善國不樂閻浮佛為說彌陀觀經令得法忍其子阿闍世王此云未生怨又云無指以未生時相占曰必害其父及生父欲擲死唯損一指故內宮將護呼為善見此王為太子時信調達新王新佛之謀故幽父於獄中絶食母帶炒蜜而入闍王知之以鐵汁治門母不能入父遙望靈山禮佛哀救佛令目連來為說法使無退心正說法日闍王與母共食闍王之子携犬而戲凡飲食共犬而食王愛子故欲子食將犬同食謂母曰兒為一國之王由愛子故共犬而食母悽然曰汝父初因汝足有瘡恐汝疼痛以口含指唇角流膿猶不嫌穢王聞慚曰誤信惡人之言造此逆罪速令開獄請父王時王為饑所逼問目連諸天飲食目連將說梵天禪思為食先說四天王飲食超勝人中王聞生著忽聽門外請王出驚曰吾兒取吾必見殺之怖懼而死生四天王宮中以久證初果當生兜率因著食故不果也王聞父死自悔無奈以殺逆故身感重疾其弟勸詣佛所求懺文殊與之懺悔得柔順忍命終入賓吒羅地獄即入即出生上方佛土得無生忍下生作不動菩薩後經多劫作佛號淨界如來其迹既爾本豈可量父子因緣出涅槃經要知說法華時預清淨衆至涅槃時引其逆罪何異迦葉於法華受記涅槃不堪付囑不可迷迹而惑於本也列衆竟二總結各禮佛足退坐一面總上四衆八部各禮退坐以待說法一面者佛在衆中說法無前後左右俱見佛面故云一面問佛在人中說法列人衆何少耶答文略不載人實不少下文及諸小王轉輪聖王等准無量義中列四輪王國王國臣國民王女其廣可知問天人龍神皆見佛聞法地獄一道無色一界何不列耶答有四句一戒乘俱急二戒緩乘急三戒急乘緩四戒乘俱緩戒急乘緩者為諸天眷屬乘急戒緩者為餘七部眷屬乘戒俱急者為諸菩薩乘戒俱緩者則墮三途無色無有身形地獄受苦不暇俱緩之流不預高會上通序竟二別序文分五段一衆集序二現瑞序三疑念序四發問序五答問序且初衆集序爾時世尊四衆圍繞供養恭敬尊重讚歎上二句明威儀下二句明供養世尊者圓收十號為物欽重天上人間所共尊仰故舊以在家二衆出家二衆為四衆此名局意狹今約一衆更開為四一發起衆權謀智鑒知機知時擊揚發動成辦利益如二大士等二當機衆宿植德本緣合時熟不起於座聞即得道如身子等三影響衆往古諸佛法身大士隱其圓極匡輔法王如觀音等四結緣衆力無引導擊動之能德非伏物鎮嚴之用過去根淺現在不解但作未來得度之因緣如授記等比丘既爾餘三亦然四四共十六衆以聖凡交聚尊卑忘懷據迹則品類實繁約機則不出此四故云四衆也圍繞者佛初出世人未知法淨居天人化為人像到已右旋旋已禮敬禮已坐聽因於天敬人以為楷由是凡見佛必先繞後禮然一乘海會諒無凡材觀四衆之威儀森肅猶列星之環拱北辰故云圍繞也供養者通論三業皆是供養別論施其依報名供養卑謹虔禮名恭敬至念專注名尊重發言稱美名讚歎又供養者表來儀之享恭敬者隆矜式之風來儀則香華羅列玉帛交陳矜式則踧踖與與嚴畏心情尊重者莊肅容儀讚歎者頌稱德業肅儀則進止安詳而不縱肆頌德則韵曲流暢比興合宜猶華嚴歎德各據一門也此中略無量義經中廣供養如天香天衣等恭敬如合掌叉手等尊重如一心瞻仰等讚歎如彼偈云大哉大悟大聖主無垢無染無所著天人象馬調御師道德香風熏一切二現瑞序夫瑞相之由以諸佛出世本為佛乘四十餘年抑之在懷圓音將興慮不尊重先以瑞相駭變常情令生渴仰故其瑞有六初說法瑞二入定瑞三雨華瑞四地動瑞五衆喜瑞六放光瑞有三對說經入定定慧一對天華地動因果一對大乘機發大光普照感應一對佛說經已時衆不散佛入定已猶待後聞天華悅眼地搖震心衆喜觀佛眉際分輝種種奇特萃於一時故稱為瑞也且初說法瑞為諸菩薩說大乘經名無量義教菩薩法佛所護念菩薩乃大乘之機大乘及菩薩之道斯教斯機如時雨降故云為諸菩薩也大者揀小義乘者運載義善戒經有七大一法大十二部也二心大求菩提也三解大解菩薩藏也四淨大見道心淨也五莊嚴大福德智慧也六時大三祇行行也七具足大以相好自嚴得大菩提也前六因大第七果大大因大果合為大乘經也此是舉其通名以大乘所攝部帙不同有悲華雜華之異楞伽楞嚴之別名無量義者舉其別目條然自揀然名隨義顯義借名彰羅人品八十餘門收楞伽百八之問理量超乎思議教量含乎衆妙故以無量義為名自覺場已來衆生根基不同如來說種種教法以方便引導一為無量也今說無量義者收無量為一也當知即是法華之別名法華論有十七異名無量義是一今申論義佛直說此名而入此定故知為法華之序也大品光明涅槃皆先唱名於序今經引古云經名無量義又云當說大乘經名妙法蓮華此亦序中唱名與論意同也按彼經釋無量義者經云大莊嚴菩薩並八萬大士同白佛言菩薩欲速成菩提修行何等法門佛言有一法門名無量義欲學此法門者當觀察一切諸法從本已來性相寂滅猶若虗空無有二法乃至無量義者從一法生其一法者謂無相無相不相名為實相從此實相生無量法所謂二法三道四果也今釋無相者無生死相也不相者不涅槃相也涅槃亦無故言無相不相指中道為實相也二法即頓漸也頓謂華嚴頓中一切法也漸謂三藏般若方等一切法也三道即三乘也四果即羅漢支佛菩薩佛也此等諸法名為無量實相為義從一義出無量法收無量入一義故今經一乘實相會四十年諸經之權是此也教菩薩法者用無量義教諸菩薩以大教應大機也下文云普令一切衆亦同得此道又云若我遇衆生盡教以佛道即此意焉佛所護念者無量義處是佛所自證得是故如來之所護念下文云佛自住大乘是也雖欲開示衆生根鈍久默斯要不務速說故云護念二入定瑞佛說此經已結跏趺坐入於無量義處三昧身心不動趺坐者以左壓右半坐更䟤右以壓左全坐也如龍蟠結故云雙趺往古諸佛及弟子衆盡行此法跏趺而起惡覺尚生他敬心況入深境界而不適悅天人耶又非世間受用法不與外道共能破諸魔軍故又具四悉故入無量三昧者三昧此云調直定又云正定三昧名多無量義揀之然那伽常定云何有入蓋未得定者見似有入耳其實無入可入亦無不入無入不入無定不定無處不處深徹諸法之源底了達實相之本根於無住而住住於祕密藏中謂之無量義處者此處唯佛與佛乃能究盡即諸法實相之體也從體起用故說無量義經攝用歸體故入無量義處定下文安詳而起自此起也殷勤稱歎歎此處也法說說此處也喻說喻此處也宿世因緣說此處也聞法領解得蒙受記即不無究竟不知此處也此處微妙難測思量分別之所不到故曰止止不須說我法妙難思絶言絶思還入此處故知法華一經唯談此處不談餘處故於未說此經之先現此難思之相以為說法之徵故入無量義處三昧然說已入定者定慧相成也非禪不智故先入定非智不禪故先說法即智而定即定而智先後出入無有隔礙也說已入定出定又說法華之前相著矣若作次第先入無量義三昧應入法華三昧若此則明文彰顯時衆自知何待慈氏殷勤文殊靳固故知作序其義轉明身心不動者與所緣之處相應也身之本源湛若虗空心之理性畢竟常寂文云身體及手足寂然安不動其心常惔怕未曾有散亂是也又身若金剛不可動轉心若虗空無有分別無量義處三昧持於身心故不動也問瑞相本論奇異之事說法入定佛之恆儀何得為瑞答說法雖竟時衆不散肅有所待不罷法座就入禪定此事奇特與常有異何意非瑞又文殊引古六瑞皆有此事若昔非瑞相何以證今今古同然稱之瑞相不亦宜乎三雨華瑞是時天雨曼陀羅華至而散佛上及諸大衆四種華舊翻小白大白小赤大赤小適意大適意小柔軟大柔軟今以適意柔軟釋之四十年前方便引導各證小果小適意故今經演唱一乘實相適悅諸佛本意大適意故故諸天以小大適意華以表之此經既是教菩薩柔軟之法不比剛強衆生不柔軟也四十年各各調伏小柔軟也今日各各授記行菩薩道恆順衆生大柔軟也故諸天以小大柔軟華以表之適意在佛下文如我昔所願今者已滿足是也柔軟在機下文學無學二千人其意柔軟寂然清淨是也散佛上者上契佛意也及諸大衆者下合機心也四地動瑞普佛世界六種震動普佛世界一佛化境准下答偈一切佛土皆震動也六種者動起踊震吼擊經略標二搖揚不安名動自下升高名起𡑝壠凹凸名踊此三形也隱隱有聲名震砰磕發響名吼令物覺悟名擊此三聲也一一中有三謂動遍動等遍動直動為動四天下動為遍動大千動為等遍動餘五可知表圓家六番破無明惑無明䃲未曾侵毀如地相堅固方將破壞故動地以表之五衆喜瑞爾時會中比丘比丘尼至歡喜合掌一心觀佛天三界諸天也龍有四種一守天宮龍持令不落者二興雲致雨益人間者三地龍決江開瀆者四守伏藏龍守輪王大福德人藏者夜叉捷疾鬼也乾闥婆俗樂神也阿修羅非天也迦樓羅金翅烏也緊那羅法樂神也摩睺羅伽大蟒神也人即人民非人即鬼神類小王粟散王也轉輪王有四人壽二萬歲鐵輪王出治一天下四萬歲銅輪王出治二天下六萬歲銀輪王出治三天下八萬歲金輪王出治四天下云轉輪者金輪王出世有七寶輪自現於前隨輪而轉王四天下故曰轉輪聖王四衆欣其嘉瑞八部瞻其聖容今日之所得從昔未曾有故各各歡喜合掌一心觀佛問喜怒人之常情何得為瑞答天華悅眼地動震心大經云動時能令衆生心動非常之喜而不為喜所動又能一心觀佛何得非瑞也華地是外瑞心喜是內瑞故法會大衆只知說經入定是佛雨華者天地動者地何不回頭轉腦乎六放光瑞爾時佛放眉間白毫相光至以佛舍利起七寶塔觀佛海三昧經云白毫相光佛初生時牽長五尺苦行時長一丈四尺得佛時長一丈五尺其毫中表俱空如白琉璃筒內外清淨從初發心中間行行種種相貌乃至入涅槃一切功德皆現毫中在兩眉中間表中道常也其相柔軟樂也卷舒自在我也其色潔白淨也由多生忍辱孝敬等感此相好三十二相之一也光表一乘中道之智照萬八千界境也以境智圓融理遍十方故本智瑩然洞徹無遺故云照東方乃動境表生滅門以真如隨緣能生十界一切諸法諸法雖動其體寂滅欲即動而證不動之理也靡不周遍者以寂而常照之智光無處不照無物不燭也橫遍之則方方萬八千之寬廣無不周遍竪窮之則上下天堂地獄之高厚無不周遍阿鼻此云無間成論明趣果受苦時命形五皆無間故地獄者從義立名謂地下之獄名為地獄婆沙云洲下過五百踰繕那乃有其獄是最下也阿迦尼吒此云質礙究竟乃色究竟天過此即四空天故是最上也中間鬼畜人修依正之報雖別善惡之形有殊於一光中悉皆見之無不周遍者此也於此世界等是明他土法界生佛事相始終於一光中悉見也於此忍土不移腳步開眼即見彼萬八千六趣衆生趣向也隨因招果趣向各別類分為六也五陰妄想和合有生故名衆生即下頌中六道衆生受報好醜等盡見與并見又見復見是換其字面然有二義一者三乘見量有限云盡見者承如來白毫相光力故二者大衆得未曾有一心觀佛由攝念一處山河大地應念化成無上知覺何限之有哉又見彼土等即下聖主師子演說正法等諸佛名號化儀國土種種不一聞其說法者諸土機緣不一權實法門設立有殊不離此處眼見諸佛形像耳聞說法音聲也並見彼諸等即下若人遭苦等修六度諦緣之行得菩薩緣覺聲聞之道是小始二教之三乘也復見諸菩薩等是終頓圓之大菩薩也即下頌中次第問不次第問三十一行半頌文種種因緣等是一串事如人信解行布施是菩薩道則國城妻子等皆歡喜布施而布施就是入道之因緣內有如是布施心外有如是歡喜相信解持淨戒是菩薩道則大乘等戒皆清潔受持而持戒就是入道之因緣內有如是不動心外有如是持戒相信解行忍辱是菩薩道則惡罵捶打皆柔和忍受而忍辱就是入道之因緣內有如是忍受心外有如是柔和相信解行精進是菩薩道則逆順等境皆勇猛果決而精進就是入道之因緣內有如是勇猛心外有如是雄毅相信解修禪定是菩薩道則深禪大定皆修習不怠而禪定就是入道之因緣內有如是專注心外有如是枯木相信解智慧是菩薩道則博覽羣典皆通達明了而智慧就是入道之因緣內有如是明利心外有如是活潑相因緣相貌信解多多不一故言種種復見諸佛般涅槃等即下頌中佛滅後供舍利造塔廟之文般涅槃梵言略也具云摩訶般涅槃那此云大滅度大即法身滅即解脫度即般若即三德祕密藏也又云圓寂以化緣既盡化法無施化身遂隱故舍利具云室利羅此云靈骨而有五色是三無漏學凝聚而成故梵語塔婆此云方墳亦云高顯處安置靈骨之處也碎身舍利是佛末後遺教令一切有情造塔修福故總前一見六趣二見諸佛聖凡一對三聞佛說法四見四衆得道人法一對五見菩薩行行六見佛般涅槃始終一對又是一串事既有可化之衆生即有能化之佛有佛即有說法說法即有弟子弟子即行始行始必致終也諸見字要悟得透徹即知萬八千土皆是本地風光從這裏流出古德云盡大地是自己光明無一人不在自己光明裏上來一光橫該竪窮是何等之高厚何等之廣大其間法界生佛事相始終善惡好醜許多差別境界只一光一時頌現於此土四衆目前了無障礙人人有此光明特衆生不自知耳若本明洞徹本智現前妙體實相昭然心目與佛何殊文殊曰今佛放光明助發實相義則此光是一卷離言法華奈何法衆不解又勞二大士旁通世尊出定歎揚全經文言顯此旨也現瑞序竟三疑念序分二初彌勒疑念爾時彌勒菩薩作是念至我今當問此有三念一正念六瑞二念問誰三念文殊文殊念起第二念消唯存初念但成一疑初念六瑞作是念三字是經家模寫彌勒口不言而自忖也作何等念謂今者世尊現神變相以何因緣而有此瑞神變相者總指此土他土之事夫聖人發一言為天下則行一事為天下法時措合宜必不徒施今者現其神通變其界相豈無故而妄施哉但不測以何等因緣而有如是鼓動不知其所以然而然也二念問誰既不測其所為之因緣則當請決於佛奈何今佛人於三昧然此三昧是佛自覺聖智之境理出希夷妙超情路是不可思議詳此境相事非常途必是希有之事若是尋常之事我以補處智罔象其懷雖不盡知亦可倣佛於二三我既不知佛又入定欲決此疑當以問誰若問必是才智兼備可以消我之疑若不能決疑徒問何益當是時彌勒左顧右盻用目循歷衆中求人歷觀聖賢交錯龍象相參以我例諸無不疑者當問何人以釋其事故云當以問誰誰是能答之人三念文殊復作二字緊隨誰能二字以彌勒左右尋察正念誰是能答之人忽擡頭看見文殊故復作念是文殊乃法王之長子衆中之白眉經劫供佛奉法行道所謂欲知山上路須問過來人事佛既多經目者廣必應見此希有之相故云我今當問請決其疑必應者果決之辭却被道著下文文殊略曾見答云我於過去諸佛曾見此瑞當問一句番上當以誰能二句此中以何當以誰能復作已曾必應我今等皆字法相生之妙又神者內也變者外也神明天心即天然內慧變名變動即六瑞外彰彌勒不測外變亦不知內慧故興疑作念有如此者若夫庸人不知術者散人不知定者凡人不知聖者小聖不知身子身子不知菩薩菩薩不知補處補處不知尊極此就極處彌勒亦不知也問彌勒值佛植善既多何容不倣佛知答隱明示暗權不知也正欲興起大教向無疑中生疑無念中作念無非鼓動人心令他生疑起信耳二大衆疑念爾時比丘比丘尼至是佛光明神通之相今當問誰法會大衆咸作此念謂佛放一光照見彼土此土有如許之神化通變之境相是希有事今當問誰經家恐繁故不序耳此念有二無念文殊疑偈云四衆欣仰瞻仁及我若無三念何事瞻仁當知偈出彌勒因問文殊大衆方瞻文殊未發問時無視文殊之文此海衆同疑即一乘之悟機若汙下庸流必無竦情之觀今困於心橫於慮仰求知者則啐啄之應可知時雨之會有以也此段經家敘置什師巧筆自疑他疑亦描寫當時之形容盡矣四發問序有長行偈頌且初長行爾時彌勒菩薩欲自決疑至悉見彼佛國界莊嚴欲自決疑者將說未說之貌此事希奇我疑大衆又疑衆中若有酬唱發問者消彼疑我疑自消所以語到口邊再三踟蹰不肯發問又觀四衆之心有瞪𥇋直視光相者有低頭疑念發悶者有彼此相顧瞻視者只無一個能問之人故彌勒忍俊不禁請問文殊決自疑以消衆疑也觀衆會之心者他人有心豫忖度之也以何因緣與下此非小緣必是一大事因緣照應六瑞之文此中二十四字該盡然此疑字最重以有疑始有信悟故問文殊彌勒德位相亞何故一問一答也答位雖齊等賓主宜異故又法門有權實權應問實應答又迹有久近近應問久應答也又今經授聲聞當來成佛非當來成佛之人不能問故彌勒大慈以問之非過去已成之佛不能答故文殊大智以答之又文殊表大智彌勒修唯識意顯此境唯智能入非識可知有此多義故彌勒問而文殊答也二偈頌偈者梵本略也或云偈他梵言訛也梵語阿㝹卒都波此云讚誦不論長行偈頌但滿三十二字為一偈祇夜此云應頌應上長行故伽陀此云孤起不應長行故嗢陀喃此云集施頌以少言攝多義施人誦持故長行後又說偈者按龍樹婆沙論云有四義一隨國土故有散華貫華之說如此方序後銘也二隨樂欲不同故有樂散華有樂章句者三隨生解不同故或於散華得解者或於章句得解者四隨根利鈍故利者一聞即解鈍者再說方解故又表佛殷勤慈誨故又為衆集前後故故有偈頌也又長行偈頌有五雙十隻之義有無前後隱顯廣略開合達此則於超頌追頌等義不迷矣偈有六十二行分二初五十四行頌上問二八行請答初又分二初四行問此土於是彌勒菩薩欲重宣此義以偈問曰文殊師利導師何故至身意快然得未曾有文殊下一行頌放光瑞導師稱佛以說法開導於人故雨曼下一行半頌雨華梵語栴檀或云此方無故不翻或義翻與藥能除病故香風者風本無香而香為奇特香本屬華華香如檀天華至妙豈有色而無香風香因華所謂風從華裏過來香也天華繽紛亂墜香風陳陳襲人適悅人心無不欣忭故云悅可衆心以是風送華香華落集地之因緣而地皆因華而嚴因風而淨矣此表因若趣果而果則嚴淨也而此二句頌地動瑞時四一行頌衆喜瑞長行總問此土六瑞今偈中長有香風地淨無說法入定觀文似缺義則兼之二五十行問他土分六初三行問六趣衆生二四行問見諸佛及聞說法三三行問他土四衆得道四一行半結前起後五三十一行半問種種因緣等六七行問供舍利起塔且初三行問六趣衆生眉間光明照於東方至受報好醜於此悉見土非金色因佛光明變為金色衆生是能趣之人生死是所趣之處善惡一句是能趣之因受報一句是所趣之果天堂人間是善是好地獄三途是惡是醜二四行問見諸佛及聞說法又覩諸佛聖主師子至照明佛法開悟衆生上只云見佛聞法此廣明說法之相聖主師子者聖即是主主謂主伴是諸菩薩伴中之主故言聖主者以道尊四大德邁十地以聖道自居聖德惠物有斯稱也梵語塢波僧訶此云師子又云狻猊大經云師子發聲震吼為壞詐師子為欲試自力等喻佛能摧伏魔軍示衆十力等以其功出有漏道證無極無常醉象害不能逐如師子無畏也永嘉云師子吼無畏說百獸聞之皆膽裂一音說法稱機圓應故云微妙玉轉璣旋籠羣說故云第一迦陵仙音不滯名相故云清淨赴機普遍言不激抗曰柔軟大根大機受化者廣曰無數四悉說法不泥文字曰梵音權實不同會旨則一曰深妙凡聞法者不厭其言曰樂聞諸佛所御各控一方故云各於世界其所說法千聖同軫故云說正法或引興之以種種因緣比況之以無量譬喻以至小而引至大以至易而況至難無非發揮佛法妙道以方便開悟衆生令其解入也照明二字取喻佛法即吾人之心以佛之正法眼藏隱於衆生藏識如寶在暗室無燈不見假燈方見人有至理不聞法不知必賴如來開示衆生方悟也此中聖主即舍那相演說第一如日照高山說華嚴也教諸菩薩七處九會也照明二句即始見佛身入如來慧也三三行問他土四衆得道若人遭苦厭老病死至求無上慧為說淨道若人一行聲聞乘也具明四諦苦含因果即苦集二諦厭老死即道諦說涅槃即滅諦亦可二句作集四句作道若小機遭苦所逼厭三界生死如桎梏為說偏空有餘涅槃修三十七品道法斷盡九十八使苦之分際令知苦斷集慕滅修道得聲聞乘也際字對上遭字諺云遭際也盡字有修行工夫對上厭字以遭際雖有分限能厭之則始能盡斷之又若人遭苦而造惡業苦不得盡若人遭苦而造善業苦亦不得盡若人遭於外道法中而求解脫但增見長非苦亦不得盡若人遭苦復厭生老病死感佛為說涅槃則能盡諸苦之分際也有福一行緣覺乘也若供佛少遭苦而致惱供佛多雖遭苦而有福故云聲聞三生種福支佛百劫種福形彼聲聞故言有福是修禪多也曾供養佛供佛多也有福即今世之果供佛乃前世之因志求勝法者深求緣起勝妙之理聞法多也望聲聞法故言勝緣覺者因觀十二因緣覺真諦理故云緣覺別行記云支佛修行不立分果深觀緣起久種三多福慧既隆預侵二習居聲聞上佛子一行菩薩乘也真慈大悲紹隆佛種故云佛子恆修六度故云種種無上慧佛慧也佛子大機也六度大因也無上慧大果也以大機大因而求大果故佛為說清淨六度之道六度無六蔽如藥中無病三輪體空不住於相故云淨道四一行半結前起後文殊師利我住於此至如是衆多今當略說於此悉見等即見演說經法等即聞大綱略足故云若斯是結前也及千億事開後也如是衆多指下所陳續後而說故云今當略說五三十一行半廣問他土菩薩種種因緣相貌等分三初一行總問二十五行次第問三十五行半不次第問且初一行總問我見彼土恆沙菩薩種種因緣而求佛道總問彼土行道之大士數如恆沙之多故以種種因緣一句牒醒其信解相貌在其中矣恆即恆河亦云殑伽河此云天堂來沙即此河中沙雪山頂有池名阿耨達此云無熱惱縱廣五十由旬八功德水充滿其中池有四口各一由旬四口出四河各繞池一匝四種寶色不相雜亂湍流入海各分二萬五千道大河流灌四洲東銀牛口出殑伽河銀沙混流入東南海南金象口出信度河金沙混流入西南海西琉璃馬口出縛芻河琉璃沙混流入西北海北頗肢師子口出徙多河頗肢沙混流入東北海此即黃河之源惟恆河沙細如麵外人計為福河入洗滅罪佛順俗故常指為喻但取其沙之多此以人數之多喻以恆沙故憑藉不一故言種種或布施持戒等因緣而求佛道也二十五行次第問分六初六行問檀二二行問戒三一行問忍四一行問精進五二行問禪六三行問般若且初六行問檀或有行施金銀珊瑚至欣樂施與求佛智慧金銀從礦出珊瑚出海多方取之色赤似鹿角古云長鯨一吸海水盡森森露出珊瑚枝也真珠出蚌蛤等摩尼此云無垢亦云如意硨磲出石以形有渠故碼腦出石似馬腦故此二似玉金剛最堅利者輦乃君王所乘輿乃公卿所乘駟馬者四馬共乘也詩云四匹在首又良駟也橫曰欄竪曰楯華蓋即傘蓋以彩帛為之黃帝戰尤於涿鹿虗空有祥雲之後人作傘蓋本此也軒即車廂馬援傳居前不輊居後不軒此中有三意寶珍奴婢貴賤共能此施駟馬寶車豪俠者所施手足身命達人乃能耳妻子寶珍身外之物財施也身肉頭目身內之物無畏施也不言法施讓後般若也以妻財者身之餘身命者道之餘菩薩視金帛如糞土觀妻妾如畫瓶見形骸如桎梏五欲如刀頭之蜜一命如井上懸藤於是隨順法性將此行施以破慳貪之惑而求妙覺之果也夫愛身命者天下之情外形骸者遺世之志二者天壤然寐者不覺藏舟夜負之急故愛之悟者深達瓶穿飛之理故外之也或云父母遺體不敢毀傷不聞捨魚而取熊掌乎父母遺其體是遺其道也苟離道徇身謂之愛遺體可乎達人以道愛身不以身愛身也二二行問戒文殊師利我見諸王至剃除鬚髮而被法服往佛所表往非餘專意來故所問尊極故云無上屈九五之尊尚一乘之道故曰問道捨窮域之珍所棄不輕故曰捨樂土畫棟雕梁曰宮殿率土之賓曰臣嬪妃侍媛曰妾身心俱離曰剃除鬚髮剃鬚髮絶世諦之容儀被法服整出塵之風度去髮染衣乃比丘相貌也約比丘而論戒以在家施易戒難出家施難戒易也詣佛問道攝善法戒捨其臣妾攝衆生戒剃髮染衣攝律儀戒又持三戒而證三身律儀者無惡不斷起正道行是斷德因修成法身善法者無善不積起助道行是智德因修成報身衆生者無生不度起不住行是恩德因修成化身有此利益所以諸王出家而作比丘也五王經云昔佛在世有五國王常宴一處一日大國王設宴臨行遠送郭門謂四王曰盍各言志一曰當此春光交媚之際馳馬試劍飛鷹走犬可以為樂一曰媛女左侍姬妾右隨可以為樂一曰統御甸四海來貢一曰父母康健子孫長聚大國王曰春去秋來時不待人此樂不常風月之交倐焉異世徒增苦本控御四方雖為一世之尊來生未必何道父母子孫恩愛牽纏纍劫難出四王曰願聞大王之志曰我願不生不滅等法四王曰云何可得隨引入精舍世尊為說苦空等法五王即悟出家而作比丘此約義引也三一行問忍或見菩薩而作比丘獨處間靜樂誦經典忍有三種間林幽谷惡人惡獸忍耐無瞋生忍也自節守志草衣木食苦行忍也為求佛道不樂小果第一義忍也作比丘苦行也獨處間靜生忍也樂誦經典第一義忍也宋徽宗時歐陽修客洛陽遊嵩山自至一寺入殿見一僧誦經修舉手欲語僧毫不顧視修異之少頃經歇問曰何經曰法華又曰住山久乎曰甚久又問古之高僧臨終自在何道致之耶曰定慧力耳曰今時何得寂寥曰古之人念念在定慧臨終安得散亂今之人念念散亂臨終安得自在修不覺跪地矣此靜處誦經服人者如此四一行問精進又見菩薩勇猛精進入於深山思惟佛道捍勞不怯曰勇猛精純不雜曰精進夫深山可畏非窳怯者可居惟勇進者能之所謂楖栗橫肩不顧人直入千峰萬峰去思惟佛道者窮壑邃谷深山曠島白雲留意鹿猿忘機思惟實相念念不休進求佛果菩提也苟心馳魏闕山居何益焉五二行問禪又見離欲常處空間至以千萬偈讚諸法王五欲為神足之纍故須離之仙人見王女起染心即失神足是也空間乃無欲之地故常處之飯糗茹草若終身焉禪定乃神足之體故深修之一念萬年如枯木耳大疏云神足自體即三摩地云深修者從一禪入一禪從一定入一定乃至九品轉轉為深轉變自在能發諸通故云得神通也纓絡云神名天心通名慧性天心者天然之心也慧性者通達無礙也有六謂天眼天耳他心宿命如意身無漏通也當知天然慧性與此六法相應故名神通今云五者未得究竟漏盡也上一偈世間禪下一偈明出世上上禪智辨讚佛者由禪定生智慧由智慧生辨才故安禪靜思佛德合掌措言成頌或擬三身而頌果或撮萬行以美因比興不同吟咏各異諸佛之聖德無盡菩薩之讚誦何窮故曰以千萬偈讚諸法王也問既安禪何言以偈讚佛答此圓教之禪非八背九次之所比也靜散不相妨礙不起寂滅定而現諸威儀如修羅之琴不拊而韵無緣無慮有感則形故能安於禪定以千萬偈而讚於佛即說時默默時說意也六三行問般若復見菩薩智深志固至破魔兵衆而擊法鼓決疑請問神悟秀援理窮性相教擇權實故曰智深發三心滿四願戴鐵輪而不退盡劫石以無疲故云志固扣關擊節善咨心要故能問聲入心通文義雙持故曰受持由智之深所以能問諸佛之妙法由志之固所以聞悉受持而不遺此具能問能持二嚴乃自利也下二行利他有定無慧曰癡定有慧無定曰狂慧由深修禪定則定具足是正定也由智深志固則慧具足是正慧也正定具足自性宗通正慧具足稟受有據以此定慧之自利方能近取諸譬以無量喻為衆講法以利人也為衆一句約中下根說化諸一句約上根說遇中下則循循善誘故云無量喻遇上根則直明大法故云說法觀機說法度生為事故欣樂之破魔擊鼓者以正道摧邪如擊鼓以破敵也云破魔者空觀破四魔假觀破八魔中觀破一切魔梵語魔羅此云奪命如死魔實能奪命餘煩惱五陰天主能作奪命因緣又此四魔能奪智慧命故既破魔已應轉法輪云擊法鼓者初發心住便成正覺百佛世界以真妙梵音警悟羣生即是圓擊梵輪法鼓也次第問已竟三十五行半不次第問問上次第問六度自收萬行何須更問太煩雜耶答次第漸一途也不次第者不定一途也既言種種因緣相貌何止二途而言煩雜耶詳此頌文慈氏善問井井有條什師善譯運斤成風不然經文才言布施又言布施等才云見諸菩薩又云又見佛子等只覺文字重疊錯雜顛倒今准長行詳察頌文始知妙哉聖經無一字之多無一語不善當知不次第者乃隨見隨問也以萬八千土中菩薩無數此處行布施彼處行布施者這裏坐禪定那裏又坐禪定等彌勒不暇次第隨見即問急急促促方見不次第之妙文分七段初二行問禪二一行問精進三一行問戒四一行半問忍五二行問禪六五行問檀七三行問般若且初二行問禪又見菩薩寂默宴然至濟地獄苦令入佛道初行入捨禪自行也寂則心境不纍宴離喧雜默絶言象坐破蒲團覷穿鐵壁白醭生於嘴邊百鳥都無尋處即使佛來讚歎尚不顧視何況天龍恭敬而遂動其心乎如空生林間入定帝釋空中稱讚是也二行入悲禪利他也山間林下深入禪定緣地獄苦煎放月愛光明不但濟其苦惱亦令入於佛道矣如華嚴菩薩放光八難衆生觸光頓超十地是也二一行問精進又見佛子未嘗睡眠經行林中勤求佛道不睡常行即般舟念佛三昧也睡眠乃四不定之一令身心不自在昧略為性障觀為業心極暗劣唯內門轉昧揀在定略別寤時心神昏重不能修觀故經行以遣之所謂晝三夜三決志不移古德云惺惺著莫受人瞞是也三一行問戒又見具戒威儀無缺淨如寶珠以求佛道無缺律儀戒也戒性如寶珠不受塵故具戒則篇聚無虧止持合宜威儀則防護嚴肅蕩諸染垢幽溪未足比其清飛雪無以方其素故云淨如寶珠如鵝珠草繫之類四一行半問忍又見佛子住忍辱力至皆悉能忍以求佛道忍辱者內心能安忍外所辱故有生法二忍生忍有二一於恭敬供養能忍不著不生憍逸一於瞋罵打害及蚊蚋等能忍不生煩惱法忍有二一者非心法謂寒暑風雨饑渴老病等二者心法謂瞋憂欲慢諸邪見等於此二法能忍不動是名法忍力有六種小兒啼為力女人瞋為力國王憍為力羅漢進為力諸佛慈為力比丘忍為力以物亂打曰捶以杖直刺曰打遺教云若不能忍受惡罵之毒如飲甘露者不名入道智慧人也僧以忍為尚古云有人打老儂老儂便睡倒儒云小不忍則亂大謀內外教中皆貴於忍也如常不輕忍辱仙人之類五二行問禪又見菩薩離諸戲笑至億千萬歲以求佛道戲笑防正業癡屬增煩惱近智識見廣一心不雜念攝念置一處離戲除三業掉悔蓋離癡除瞋蓋近智除疑蓋一心除貪蓋攝念除睡蓋以諸教禪皆離五蓋故寶積云有四法當急走捨離百由旬外一利養二惡友三惡衆四同住𩰖爭戲笑等又攝念即心寂定力深而智光發山林是境寂喧囂絶而寧靜生疾雷烈風不驚不動一念萬年萬年一念故云億千萬歲求佛道也六五行問檀或見菩薩肴膳飲食至歡喜無厭求無上道盛饌百味美食以充其腹丸散百種妙藥以療其疾暑須絺綌寒須裘貉或有價之名衣或無價之上服施之榮身以禦寒暑起居須舍坐臥須床以栴檀之寶舍揀非凡材衆妙之臥具揀非粗惡供佛及僧以便栖止四事具備若無園池遊戲三昧之地則亦不為如意之施故菩薩又施華果茂盛之園林蓊蓊有徘徊瀟灑之趣流泉清淨之浴池蕩蕩漾漾有沂水濯纓之歌如是種種務在精潔故曰微妙不含吝惜歡喜而施故曰無厭不求人天因果但求無上菩提故曰求無上道七三行問般若或有菩薩說寂滅法至以此妙慧求無上道至理寂滅本不可說有因緣故亦可得說故以種種方便教詔衆生此不可說而說般若也諸法性空本不可觀順性而修故可觀也觀是能緣智法性是所緣境智則三觀圓修境則三諦齊照以此而修則諸法無二相之性猶若虗空之廣大而無相此不可觀而觀般若也心無所著即心行處滅心不著故必離言說即是言語道斷由言語斷泯却不可說而說也心行滅泯却不可觀而觀也雖則雙泯不妨而說而照念念成佛不見有佛可成時時諸法不見有法可說常常度生不見有生可度外不循緣內不住定智窮法性行備理圓是名妙慧以此妙慧成佛必矣此說不可說觀不可觀而論般若也問光中事相多端彌勒申問獨將菩薩因相種種廣序一一詳問者何也答此正為聲聞說大乘經故名妙法蓮華教菩薩法也欲令凡小恥小慕大引權入實之旨也故知七卷經文一光托出更無餘蘊矣上問種種因緣等竟六七行問供舍利起塔文殊師利又有菩薩至如天樹王其華開敷滅後為供舍利造塔廟無數恆沙此塔之數也高五千由旬者一由旬四十里則有二十萬里之高直曰縱橫曰廣正等橫直四方一樣二千由旬則有八萬里之寬大此塔之量也恆沙塔廟各有千種幢幡者表摧邪輔正也露盤珠網交羅寶鈴節凑和鳴此塔之莊嚴也天龍技樂此塔之供養也文殊下結莊嚴塔廟其土自然妙好天樹王者大經云三十三天有樹名圓生根深五十由旬高五十由旬枝葉布五十由旬華香五十由旬光照五十由旬此樹為帝釋鍾愛故稱天樹王其華開時諸天遊樂其下叢集圍繞故當知此中佛遺舍利以作佛事菩薩奉之用求佛道塔供舍利廟供聖容梵剎櫛比幢幡鱗次故託喻於恆沙之多雕梁畫宇藻稅奇節故嚴飾於國界之中式樣巍我巧奪輪奐幡騰天上鈴響雲間珠交星燦幔鎖烟霞不唯崇敬之殊勝亦乃宇宙之大觀故有天龍雨華人神奏樂庶得正法興隆善人增盛其猶天樹華開艷麗故令天宮皎潔香風微動天人得其怡樂故曰如天樹王其華開敷也頌上問已竟二八行請答佛放一光我及衆會至瞻察仁者為說何等佛放一光能照也我及衆會依光能見之人也國界法會所見之境也只此一光見有如許種種殊特妙好之事問彼東方萬八千世界去靈山不知多少遠近不曰見彼而曰見此者何也答因佛光照即遠即近如在目前忘其彼此也神力智慧希有者謂世界廣大高厚計萬八千以凡聖因果情器劫時久近始終因緣相貌信解之多彚而無量無邊不移此而見彼無遠近也不移一時而見多劫無過現也聖凡隱顯因果彼此略無毫忽不見略無些須錯雜非諸佛神通智慧力安能如是故曰希有放一淨光者能照有分限也照無量國者所照事無量也自初說頌沿至前節皆申彌勒一己之疑應長行爾時彌勒作是念至我今當問之文此下為法會大衆申疑應長行爾時比丘至悉見彼土國界莊嚴之文故前頌曰我住於此我見彼土我見諸王皆以我為稱此則將欲求答以除其疑故兼大衆而云我及衆會我等見此始以己兼人而稱到此則專主衆會而請故曰願決衆疑四衆欣仰者承上文而言謂所現之瑞若是一向曾有之事則衆人不疑即疑我彌勒亦能為衆決之因向未有今忽見之四衆欣然欽仰各生其疑瞻察仁者仍視我身疑念世尊何故放此眉間光明照見生佛事相始終我既不能為衆決疑衆又不敢請問仁者故我雖為衆請實為自請仁者解我疑則衆疑自解矣故云佛子時答決疑令喜時答者乃求應時速答之意何所饒益等正出其疑謂佛尋常說經則不入定入定則不雨華雨華則不動地動地則不放光放光則光中未曾見許多事相今佛如此果何所饒益衆生之事而先演暢此光明也耶佛坐下謂佛今暢此光明還是為發明佛初坐道場所得妙法耶還是為諸菩薩授阿耨菩提記耶示諸下謂若說妙法往昔已說若謂授記往昔已授並不見佛眉間光明示萬八千世界之佛土衆寶莊嚴而清淨亦不曾見佛土中有許多之諸佛今者示土現佛故我定知此非小因緣必是為一大事因緣也只此說法授記二句彌勒已將一部法華經說畢了也向下文殊廣引世尊出定讚揚無非此也彌勒果不知乎古人於此一段立四伏難言伏難者文殊內心搆難不肯時答其意有三一此瑞希奇不可倉卒輕爾有判二智衆如海謙光推高三靳固前却生衆渴仰故以伏難潛而拒之彌勒彰灼釋難意亦有三一瑞大疑大若不為釋憂兕在懷妨聞正法二海衆雖多機在仁者三闔衆瞻仁故知注誠殷重所以彰言釋難請令時答初伏難因彌勒云佛子文殊願決衆疑文殊起伏難云汝云衆疑衆未曾疑若疑應問今衆不問是不疑也衆既不疑我何所決彌勒以偈釋云四衆欣仰瞻仁及我及我欲我問瞻仁欲仁答文殊即起二伏難云衆同有疑不易可答待佛出定然後決疑彌勒以偈釋云佛子時答決疑令喜有疑在懷憂兕不泰應以時答復知如來何時出定文殊起三伏難云我與仁者同居學地欲測佛意微共籌量獨令我答於理不可彌勒以偈釋云佛坐道場等我亦微心下思踟蹰兩楹為說妙法耶為當授記耶文殊起四伏難云若如汝說即是釋疑何煩我答彌勒以偈釋云示諸佛土此非小緣安得以我猶豫之心而判如來一大事因緣耶文殊伏難既窮謙光亦止故末偈結請彌勒意謂豫罔象其懷難決聖意子為法門冠蓋幸流三峽之辨蕩滌塵滯願垂長虹之手以發覆盆勿負我及四衆龍神瞻察仁者之心於此說法授記之事為說何等問辭鏗鏘意亦綢繆靈山一會賓主酬酢宛然目前也發問序已竟五答問序有長行偈頌長行有四一惟忖答二略曾見答三廣曾見答四分明判答夫以下測上止可罔象卜度惟昔儔今不可頓決所以初從倣佛次引略見略見未周更引廣見以多證一爾乃分明判答也且初惟忖答爾時文殊師利至吹大法螺擊大法鼓演大法義爾時下標章語者覿面相告也面對慈氏聲及衆耳大士者菩薩有三名或云大士大道心之士故或云開士開衆生信心故或云高士升出凡夫小乘故如我下正惟忖也如我一句是文殊發露佛道之真機故假思惟以弄引非實不知而惟忖也然二大老既為影響權現不復行實若不假思惟明明道破則簧鼓之儀不成所以下文明引燈明之事迹暗透釋迦之作略輕敲響賣實權內之玄機暗做明瞞乃權中之巧思耳前疑念中云當以問誰誰能答者誰能二字有暗指文殊之意彌勒既有暗指之權文殊豈無明彰之巧故曰如我惟忖如我者不如彼也惟者思惟也忖者忖量也意謂諸佛蘊奧理不易測彼此同科誰不疑者然目覩而心思意沉而默想引例攀條忖度聖意不出仁者兩疑之問如我思惟忖度將欲說大法等欲者將說未說也大法者妙法也意謂四十年前將此妙法開為三乘五乘七方便之教逐機之談曲順衆生隨他意語巧逗時機不名大法今日放光現相欲說此一乘大法隨自意語稟自行權實也又大即包羅義開三顯一會權歸實包羅三五七等雨者滋潤義四十年前所說之法如東山起雲東山雨西山起雲西山雨三草二木隨分受潤不名大雨今日欲以平等一味大法之雨充潤一切枯槁衆生是大法雨也如油然作雲沛然下雨下文一雲普覆等螺以號令為義四十年前以種種因緣譬喻循循善誘如號令前隊則前隊吹螺號令左哨則左哨吹螺各隨隊伍排兵布陳不名大法螺今日欲改三乘之號令歸一實之圓道以一音普告大衆是大法螺也如中軍帳吹螺則前後左右皆號令之下文云若有聞法者無一不成佛等鼓者䇿進義四十年前或擊天鼓使人種善戒惡引諸童蒙依教修行得二乘小果如兵不前進以鼓䇿之不名大法鼓今日欲擊塗毒大鼓䇿進懈怠小乘令至寶所是大法鼓也如將臺大鼓一擊則一切將卒無不勇進下文云今為汝等說最實事諸聲聞衆非實滅度等演者宣布也義者義理也四十年前但演生住異滅無常苦空六度差別之義皆以實相為體不名大法義今日欲發揮實相不二之義理諸法差別之本根故曰演大法義又欲說大法一句應法說一周開三顯一之旨雨大法雨應喻說一周灑火宅之乾𦦨令諸子得清涼三草二木不隔枯榮吹大法螺應因緣一周蕩化城之小教廢草庵之滯情廣記現在懸記未來擊大法鼓應法師功德至安樂行募人弘經行菩薩道是鼓舞意演大法義應涌出至經終開師門之近迹顯佛地之遠本並諸菩薩奉命通經以終普賢大行如是則全經旨要被文殊一惟忖而說盡了也二略曾見答諸善男子我於過去諸佛至故現斯瑞我於過去曾見等應彌勒疑中曾親近至必應見之文何以知佛欲說大法也以我曾見過去諸佛說經入定後便放光放光後即說大法今見如昔昔秖如今以是之故當知今佛現光亦欲說大法也欲令二字是諸佛本懷難信之法即一乘實相難信而曰一切世間者是不但惡道難信而人天猶然疑之不但凡夫難信而二乘猶然疑之不但二乘難信而菩薩猶然疑之故曰一切世間也昔日所說乘是三乘性有五性人之易信也今欲說三乘是一乘五性是一性人之難信也尋常但說唯佛一人獨得正覺今曰不令獨得滅度皆以如來滅度度之人之難信也要開示悟入佛之知見普令一切衆生個個聞知即心即佛無二無三之旨故現斯瑞耳此中欲說即說難信等是文殊不肯直說妙法微婉其辭以敦信耳令衆會舊疑既消新疑又生至判答中方分明說破又難信一句最重下文出定雙歎千二騰疑開近顯遠彌勒騰疑皆難信也三廣曾見答此中更分明於略見前彌勒因光橫見東方以為問此文殊引古竪見而為答橫竪顯諸佛道同也文分三初引一佛同二引二萬佛同三最後一佛同今初引一佛同諸善男子如過去無量無邊至成一切種智過去下明時節梵語僧祇此云無數劫波此云長時無量等言劫數之遠表一乘之道超諸群數也有佛下標名號別號日月燈明玄贊云日有二能一導明二成熟月有二能一除熱二清凉燈有二能一破暗二傳照顯佛有導迷至覺成器熟根除煩惱之熱得涅槃之涼化生傳法破愚癡暗有此功能故立其名亦三德圓滿之稱別號云何同當以名別義同釋之日是慧月是定定慧自行也燈明化他德也能仁能定慧能自他諸佛之號隨緣稱別義不殊故如來下通號如來者倣同先德號今佛倣同先佛之再來故不動本覺之理名如觀察照了始覺之智名來謂從凡夫起智斷惑惑盡智亡妙契如理始本不二名如來又無所從來亦無所去故名如來又諸法如義即法身德也應供者堪為福田號福慧雙具道證圓覺堪為人天種福之因故云應供後文云普於其中應受供養即解脫德也正遍知者遍知法界號正揀外道之邪遍揀小乘之偏現前松直棘曲鵠白烏玄皆了元因乃至恆沙界外一滴之雨亦知頭數即般若德也明行足者果顯因德號明是慧行是福以果德成就賴福慧故由奉持正法故明足供養諸佛故行足福慧雙隆果感萬德故云明行足善逝者妙往菩提號五住究盡行道圓滿窮盡妙覺然後倒駕慈航向今時門頭示成正覺故云妙往世間解者達僞通真號三世間內色心諸法無不淨故即以權實二智了達幻僞通一真實也一器世間謂山林等如器而盛有情故二有情世間謂四生六道各有分別情故三智正覺世間謂三乘賢聖各有所覺之正道故無上士調御丈夫者攝化從道號五住究盡二死永亡果德圓成超世出世間獨稱無上若人天三乘等覺皆名有上故調理控御能說能行故云丈夫一切衆生不悟佛之知見輪回六道無有休息故我世尊以三乘法調理控御使其自凡至聖悟佛知見故天人師者應機說法號模範人天應機說法三根普被令歸一寂故佛者三覺圓明號自覺揀凡夫覺他揀二乘圓滿揀菩薩故世尊者出世獨尊號世出世間唯佛獨尊故演說下明說法揀四圍等典曰正法即一切法曰大離一切相曰正不即不離是即非即曰妙皆一實相法也謂日月燈佛出現於世為諸衆生宣演正法令悉到於智地此句總標一代時教無非正法初善下一段古今注各不同天台獨釋華嚴合頓教序正流通如是則其語巧妙一句不合稱性之談實無巧妙之語溫陵釋此開三乘為三善皆應時契善故如是則其義深遠一句相違今釋三善者凡諸佛出世所說一代時教總分三時如西域一年三際一日三分義同此三善字乃至善之善指一乘實相之至理也言三時者初時說華嚴大教先被上根利智之機中時說人天三乘等教被三根之機後時說一乘實相平等之法總被三乘五性之機雖三時說法不同機自差別而如來所說之理本一實相流出元非有二故皆稱善無非歸於至善之地此文殊大智巧談先總標一代之理同下釋三時之義別其義深遠者釋上初善說華嚴也乃佛自修自證之道經曠劫而修歷三祇而證人天不知二乘莫測故曰深遠其語巧妙者釋上中善說三乘也一乘實相之法隨衆生性欲隱實施權分別說三即阿含等教隨他意語曰巧藉權顯實曰妙純一具足等者釋上後善說法華涅槃等教也純談實相之理會歸一乘之道曰純一無二亦無三唯此一事實曰無雜具修六度廣被萬行一塵不染性相雙融曰具足等上句法華下句涅槃為求下詳明說三乘之意因隨機宜而說三乘佛意唯為一乘元無二三謂有求聲聞者說四諦法以應之令斷惑而度生死入道而證涅槃聞佛音教曰聲聞四皆審諦不虗曰諦苦集世間因果滅道出世因果有餘涅槃那言究竟令彼欣樂取證方便說故有求支佛者說因緣法以應之應對求言隨樂欲故一無明無所明了故二行有造作故三妄念投胎名識四胎中心色為名色五胎中六根根有入塵之義曰入六觸出胎已後根對塵故七領納前境名受八貪於五欲名愛九追逐塵境名取十因果不亡曰有十一還受五衆之身為生十二身有熟壞曰老死展轉感果為因互相由藉為緣因觀十二覺真諦理故名緣覺為菩薩大根者說六度法以應之令得圓滿佛果三乘之教法雖別世尊之本意無殊無非令彼得無上菩提成一切種智也一切種智者謂能以一種智知一切諸佛道法知一切衆生因種一相寂滅相種種行類能知能解名一切種智即佛智也文殊巧談令法會二乘自思自惟四十年前欣樂小法執守偏空孤負世尊普令衆生成一切種智之意久矣二引二萬佛同次復有佛亦名日月燈明至所可說法初中後善二萬佛名號說法皆同頗羅墮者此云捷疾亦云利根以根利捷疾不違物情故亦云滿語所言不二滿衆心故初中後善若准天台此二萬佛但說華嚴不說三乘法華若准溫陵此二萬佛但說三乘無華嚴法華故知前科三善攝統一代無疑不然文殊序二萬佛但云三善何也又二萬佛始末七十餘言敘盡乃什師譯手之妙也三最後一佛同分三初曾見事與今已同二曾見事與今今同三曾見事與今當同取久遠為曾小近為已六瑞為今出定去為當也今初曾見事與今已同其最後佛未出家時至已於千萬佛所植諸善本事論燈明在俗為輪王實有八子雖明有子事同其實下文要出成第八子成佛號曰然燈約法八子表八識佛表心王在俗八子喻心王在纏轉變八識八子皆名意者意乃心之用也元是一心之體分成八識之用用雖有別其體是一故有意者眼識見色有見能別有生死苦有涅槃樂故善者耳識聞聲善惡分明善超諸有善入六塵故無量者鼻識嗅香無形無量無壞無雜故寶者舌識了味資身命寶又辨才無礙宣出世法寶故增者身識覺觸增減在身增有為苦減無為樂故除疑者意識知法除疑了達除事理疑了達生死惑故響者七識相應我癡等四恆審緣八為自內我如響隨聲故法者八識含藏有漏無漏善惡邪正一切諸法故威德自在二句八識功能任運自在故八識在纏被四大所拘故王出家成佛者心王離妄證真也捨王位者厭三界有漏之榮欣一乘無為之道亦隨出家者八識轉染成淨也所謂有是父必有是子迷則同迷悟則同悟燈明本也八子迹中八相也父生八子從本垂迹也隨父出家會迹歸本也大乘意者直等三心四弘誓願所行無汙具足清白曰梵行心無懈怠念茲在茲曰常修各以道備於己垂範於世曰法師已於二句明因深今入聖位非無因而至亦非邪因而至不於一二佛種諸善根也內因外緣為衆善之本故云善本問昔佛八子今佛一子云何同也答數雖不等一八赴緣各別並出同居之土八表八正道一表一道清淨也今取有子事同昔八子出家發大乘意今佛一子住小乘果云何言同昔化道已竟顯本事彰故言發大乘意今未發迹猶言羅漢至後顯本即是菩薩其義則同二曾見事於今今同又二初現相同是時日月燈明佛說大乘經至如今所見是諸佛土六瑞次第如文如今所見二句攝盡下至阿鼻乃至起七寶塔一段經家恐繁文耳二疑念同彌勒當知爾時會中至欲知此光所為因緣准前當有爾時某菩薩作念一段文今總舉法衆故以二十億樂欲聽法數句該之欲知此光所為因緣正疑念也問既言現相疑念而無衆集發問答問者何也答義推則有既說法必集衆既疑念必有問有問必有答若言昔日某菩薩問某菩薩答則不待文殊費辭矣既不言答亦不出問三曾見事與今當同又分六初因人同二說法同三時節同四唱滅同五授記同六通經同且初因人同時有菩薩名曰妙光有八百弟子聖人無名因德以彰神通莫測曰妙朗照群昏曰光又此菩薩深達權實即離為妙二智開覺群生為光昔佛八子師妙光佛起定為妙光說法華經今佛羅雲師身子下出定為身子說此經是因人同也或曰妙光是菩薩身子是聲聞云何同也比及發迹身子亦是菩薩妙光垂迹未必不是聲聞文殊巧說方便隱顯耳有八百弟子一句按下後文好出彌勒乃八百之一淨名疏云師有作成之能學有資稟之德資則捨父從師敬師如父師之謙讓處資如弟二說法同是時日月燈明佛從三昧起至教菩薩法佛所護念必因妙光者燈佛表本覺理也妙光表始覺智也以此理非智不能契入故因妙光說經又此妙光人人本具亘古常恆燈燈相續光光圓融所以說法華必因無斷續之妙光也經名妙法在前文殊云欲說大法又云難信之法費盡微婉曲折至此隱諱不住始唱出經名三時節同六十小劫不起於座至若身若心而生懈倦六十小劫如食頃今經五十小劫如半日是其同也經文非虗聞法之誠佛威難測一坐經劫忘其久耳如世黃粱一夢山中七日即可類推又則大覺設教有神變莫測之力能延一日為一劫促一劫為一時不可以六十小劫如食頃為荒唐之言也就增減言人壽十歲時子年倍父年如是增至八萬四千歲後百年減一歲如是減至十歲一增一減為一小劫二十番增減為一中劫成住壞空各二十番增減為一大劫今釋迦出世正當二十小劫中第九減劫也四唱滅同日月燈明佛於六十小劫至當入無餘涅槃梵色界主也魔欲界主也婆羅門云淨行在家修行者中夜表無為正位昔佛說法華竟即唱滅今經寶塔品云如來不久當入涅槃化道已足唱滅事同也涅槃此云圓寂衆德皆圓諸妄永寂故又云滅度滅二障度二死故又云無為離生滅故又云安隱最寂靜故總之一真理也小乘亦有無餘子縛已盡果縛尚在為有餘身智灰泯為無餘大乘以五住究盡二死永亡為無餘一往釋耳統論有三一性淨凡聖平等法身也二圓淨出障圓明般若也三方便淨現生現滅解脫也大論開四一自性清淨涅槃即真如理本來不生滅雖為客障所覆其性本自寂然衆生等有不關修得二有餘依見思已寂真如出煩惱障猶餘最後身智分段生死苦依三乘證無學道所得三無餘依以煩惱既盡餘依亦滅衆苦永寂無有餘依三乘無學身智盡時所證四無住處謂真如復出所知障悲智相應不住生死不住涅槃盡未來際寂而常照利益衆生此四凡夫唯一聖人有三唯佛具四五授記同時有菩薩名曰德藏至阿羅訶三藐三佛陀言德藏者恆沙功德無不具足含藏義自利也以此德遍施衆生出生義利他也聖言說與曰授果與心期曰記淨身者以相好嚴身其體明淨故多陀等即如來應供正遍知之三號問昔佛說經授菩薩今經授聲聞何言同也答昔事已成故言菩薩今正會歸故言聲聞問何故為妙光說經而授德藏記也答妙光為當機必有遠記意謂往事不遑序故又一燈分二𦦨一傳妙光弘法利生化化無盡斯道不泯故一傳德藏為人天依止燈燈有續故六通經同又三初滅後通經二教化弟子三結會古今且初滅後通經佛授記已便於中夜至滿八十小劫為人演說授記已入滅者斯道有賴故本願已暢故化緣已畢故故於中夜便般涅槃入於常寂光中今經有唱滅之言無涅槃之事當知說此經已即詣雙林說涅槃而入滅矣滅後妙光持經者燈明因妙光而說經則囑纍在妙光矣妙光受遺囑而持經是行法師事所以燈明一燈分作二燈一燈授德藏為法王一燈付妙光為法師此法王法師之位是如來道統之傳出世本懷正為此也言法王者道無不傳德無不備功無不圓行無不滿位無不極也言法師者學法王道修法王德行法王行傳法王法遵法王戒入法王定得法王慧如是經無量劫功圓行滿然後紹法王之位法師乃法王之基本所以妙光持經演說自利利他作大法師也弟子弘經多師二十劫青出於藍智過於師顯佛鑑機無差也二明教化弟子日月燈明佛八子皆師妙光至供養恭敬尊重讚歎燈明八子不以父為師以妙光為師者古人易子而教故羅雲以身子為師尊師道也語云父以生之燈明有焉師以成之妙光有焉八子師妙光妙光教化令其堅固菩提復近佛多因圓果滿皆成佛道所謂堅固精進者早已成佛然燈者大論云太子生時一切身光如燈故以至成佛亦名然燈是釋迦第二僧祇授記之本師又增一云十方一切諸佛八萬四千法門皆同唯有精進一門不同精進者得早成佛懈怠者雖有成佛之日亦遲劫數矣八百弟子下明懈怠者猶待當來前云八百弟子正謂此處顯彌勒是八百中之一人耳號求名者抑其名利役心志分神耗種諸善根值多諸佛者揚其因深緣勝方成聖果所以引八百八子者近則釋疑密開壽量釋疑者或謂彌勒補處為大文殊非補處為小小不應答大不應問故舉彌勒是昔日妙光八百弟子中之一人意謂妙光是我文殊彌勒是妙光弟子弟子應問師應答故今釋疑非謬密開壽量者八子相繼成佛最後號然燈然燈又是釋迦授記之本師八子皆師妙光則妙光是釋迦九世師翁九代孫今成佛師祖尚為弟子師弟無定密顯生非生滅非滅之意又釋迦受妙法於然燈然燈續繼於七兄八子皆行妙光教道迭相致果妙光又受囑於燈明二萬逆之於最初燈明唯此傳此秉此續此也乃至二萬億威音纂芳烈𦦨者不過此妙法而已顯此妙法非今日始有之妙法其來久矣可見文殊上受於威音燈明下傳於八王後代祖述有據後昆可準名稱於實當決衆疑也三結會古今彌勒當知爾時妙光菩薩至求名菩薩汝身是也今日之文殊昔日之妙光昔日之求名今日之彌勒也上廣曾見答竟四分明判答今見此瑞與本無異至教菩薩法佛所護念言今日所現之瑞相與本昔日燈明所現之瑞相無有異也妙光是我文殊求名是汝彌勒彼此眼見耳聞今日迦文所為不異昔日燈明故事故曰是故惟忖等今經題目佛未出定法未出口文殊預先說之可見三世一切諸佛所說皆名妙法蓮華經也詳上彌勒善問文殊善答縱散之談收放自如波瀾浩瀚若吞舟之巨浪首尾跌宕似斷弦之復續妙哉此經無以尚矣二偈頌有四十五行分二前四十三行頌上長行後二行結勸待聞初中不頌惟忖略見二答於廣見中但頌前後不頌中間二萬佛分二初四十一行頌廣曾見答二二行頌分明判答初又二初二行頌引一佛同爾時文殊師利於大衆中欲重宣此義而說偈言我念過去世無量無數劫至令入佛智慧念即宿命通也過去劫數頌時節有佛二句頌名號世尊下頌說法利生人中者諸佛現相人中以整心慮趣菩提唯人道乃能耳二三十九行頌最後佛同又三初一行頌曾見已同二十五行半頌曾見今同三二十二行半頌曾見當同且初一行頌曾見已同佛未出家時所生八王子見大聖出家亦隨修梵行二十五行半頌曾見今同又三初四行頌此土瑞相二十行頌光照他土三一行半頌疑念且初四行頌此土瑞相同時佛說大乘經名無量義至現諸希有事六瑞如文長出天鼓自鳴表無問自說也此鼓在妙法堂上正諸天娛樂之時其鼓自鳴為諸天衆說苦空不淨等法希有事總結六瑞二十行頌光照他土同此光照東方萬八千佛土至說法求佛道長行但云如今所見是諸佛土文略此中廣出應上光中所見他土事相示一切二句頌六趣衆生業明生死之因報明生死之果處即二十五有也有見下長出佛土莊嚴玻瓈水玉也琉璃具云吠琉璃此云青色寶亦云不遠西域有山去波羅奈城不遠山中出此寶故名及見下長出八部供養又見下長出諸佛成道三身圓滿自然成道者七地以前方便道加功修習八地以上發真道無功用行即自然任運流入果海也甚微妙者以金山正報之佛身坐於衆寶依報之光土如琉璃內現金像耳自然成佛法身也金山報身也端嚴化身也世尊在大衆下明說法深法義者將法顯人法既深玄必逗大機即上光中見佛聞法一一下將人顯法人既二乘法必諦緣即上光中四衆修行又見下即上光中種種相貌等此一行總明六度又見深入別明禪定又見知法別明般若三一行半頌疑念同爾時四部衆見日月燈佛至是事何因緣自相問正疑念也言人人自己忖量自言自語共相咨問一光所現之事不知有何因緣三二十二行半頌曾見當同分六初二行半頌因人同二一句頌說法同三一行一句頌時節同四五行頌唱滅同五一行半頌授記同六十二行頌滅後通經同且初二行半頌因人同天人所奉尊適從三昧起至令妙光歡喜聖人出世人天奉敬尊崇故云所奉尊也世間眼者人天眼目七衆歸依也所以然者能奉持法藏故令妙光歡喜後乃因之說經例今出定告舍利弗也二一句頌說經同說是法華經三一行一句頌時節同滿六十小劫不起於此座至悉皆能受持妙光受持燈明之法如身子受佛付囑也四五行頌唱滅同佛說是法華令衆歡喜已至汝等勿憂怖初二行唱滅燈明出世本懷已暢衆生知見已開各各歡喜也尋即下告衆唱滅汝一心一行昔佛付囑亦與今同如遺教經云汝等比丘我滅度後當珍重波羅提木叉如暗遇明如貧得寶等世尊下昔日大衆聞佛入滅而生悲仰也亦與今同如大經云涕泪盈目遍身血流如波羅奢華即重法慕人之誠也世尊諸子等者是燈明世尊法會三乘諸子等也聖主一行昔佛慰喻時衆亦與今同如遺教云汝等比丘勿懷悲惱若我住世一劫二劫會亦應滅會而不離終不可得自利利人法皆具足若我久住更無所益五一行半頌授記同是德藏菩薩於無漏實相至亦度無量衆無漏實相者以離虗妄分別之相名為實相即無相之相也內證無漏實相理外感光明清淨身故佛號淨身六十二行頌滅後通經同又三初三行頌滅後通經二八行頌教化弟子三一行頌結會古今且初三行頌滅後通經佛此夜滅度如薪盡火滅至廣宣法華經薪盡火滅者小乘佛以果報身為薪智慧為火慧依報身身滅智亡故云薪盡火滅大乘以機為薪逗應為火衆生機盡應形亦滅故云薪盡火滅莊生云指窮於為薪火傳也不知其盡衆生機薪無盡如來應火不滅故倍精進者遵佛勿放逸之命各自努力以求佛果唯妙光受囑廣演妙法二八行頌教化弟子是諸八王子妙光所開化至其數無有量天中天者涅槃有四種天一世間天如諸國王二生天從四王至非非想三淨天四果支佛四義天謂十住菩薩見一切法是空義故今佛超出四天名天中天仙乃大覺金仙有神化莫測之能故名仙上明八子行圓久已成佛是妙光下明一人方成今住補處此中文殊稟師家作略作大老腔調將個彌勒抑其貪利求名揚其因深成佛說得非凡非聖亦凡亦聖令人不識所謂彌勒真彌勒化身千百億時時示時人時人真不識也三一行頌結會古今彼佛滅度後懈怠者汝是妙光法師者今則我身是二二行頌分明判答我見燈明佛本光瑞如此至助發實相義本昔燈明放光現瑞而說法華今日世尊現相如本昔無異故知欲說法華但放光現瑞是諸佛方便助顯發明實相義耳末二行結勸待聞諸人今當知合掌一心待至令盡無有餘文殊前來廣引證今瑞相已竟故結勸以待聞也充足求道者謂昔日未滿足者今日充滿之若三乘有疑惑者有悔責者今日為除之斷之盡無餘也又除斷一句文殊將千斤擔子推在佛身入海弘經以脫不退之斥大智先見之明如是又此二行是文殊提醒二乘之言辭甚鋒鋩宛然諸佛之師吐聲發氣自是本色作家充足二字為下身子等得記之案疑悔二言悔字為下身子追悔之案疑字為下陳如等疑念之案天台於此立四伏疑由前彌勒釋四伏難使文殊必答此中文殊斷四伏疑使彌勒不復更問第一疑因文殊廣引先佛曾說法華彌勒即潛疑欲問諸佛赴緣人時各異古佛雖說法華今佛何必如是文殊以偈斷云我見燈明佛等昔佛既說法華今佛亦然此斷疑名之問彌勒即潛二疑欲問自有名同義同亦有名同義異此名何所顯召文殊以偈斷云今相如本瑞等此斷疑體之問彌勒即潛三疑欲問實相無相何人會之文殊以偈斷云諸人今當知等此斷疑宗之問彌勒即潛四疑欲問佛雨法雨止洽菩薩亦潤二乘耶文殊以偈斷云諸求三乘人等此斷疑用之問彌勒聯翻搆疑文殊頻煩為斷既事窮理盡即得之於懷不復再疑矣序分已竟
