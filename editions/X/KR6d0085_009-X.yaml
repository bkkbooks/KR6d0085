body:
  text: 金臺即山居後學大義集妙法蓮華經妙音菩薩品第二十四此品明菩薩深體妙法以妙音聲隨類演說流通斯道也四辯說法顯默投機曰妙音名雖妙音實彰妙行顯形聲二益弘化無迹有斯德業故立品名觀其昔奉雲雷音王佛十萬種技今遊行他國音樂自隨昔奉八萬四千寶鉢今有爾許道器眷屬圍繞昔得一切眾生語言陀羅尼今得普現色身三昧以妙音聲遍吼十方弘宣此教以獻樂奉鉢蘄在妙音說法妙行隨應故報在宿王智佛國果能有是神力欲令新得記者體是妙行隨類演說故說妙音品四妙音說法文分六段初放光東照二奉命西來三十方弘經四兩土得益五還歸本土六聞品進道且初放光東照爾時釋迦牟尼佛放大人相至白毫光明遍照其國大人相者大相海也遍體毛功德不及一好功德眾好功德不及一相功德三十二相從下向上展轉相勝不及白毫功德白毫功德不及肉髻功德故是大人相也佛有九十七種大人相肉髻頂乃其一焉開會及召分身但放白毫光今召妙音兼放肉髻光者肉髻是無見頂相為最上果光今將宣示妙音隨類之行乃極果行相故以極果之光照現也國乃妙音故墟佛乃所師教主國表所證理佛表能證智本覺體上自具恒沙德相故云淨光莊嚴始覺之用能證果德智行互嚴因果合體猶華果同時故云淨華宿王智妙音妙行依此示現故光照其國二奉命西來分二初明發來之緣二明正共發來初有六初經家敘德爾時一切淨光莊嚴國中至恒河沙等諸大三昧植德供佛成就深智福慧兩足也得字貫下十六句即證得也摧邪表正而不住相故云妙幢相深入一乘證諸實相故云法華性德真淨物莫能染故云淨德實智證理權智照機善巧逗會得大自在故云宿王戲不求而應應即無應不說而說說則無說不緣而緣平等大慈故云無緣一心三智印一切法故云智印語言如前釋萬德圓備無不具足故云集一切功德六根無染互用自在故云清淨變化自在遊諸世間故云神通遊戲平等大慧如炬破暗故云慧炬性具萬德緣了莊嚴融通自在故云莊嚴王性淨照明離諸垢染故云淨光明具足權實功德含攝一切名為淨藏即二邊之定不共偏小故云不共實智功德大千圓照故云日旋恒沙三昧交徹融攝重重無盡皆妙音之所具故云得如是等二光照其身釋迦牟尼佛光照其身光透絕域意在斯人乃獨照之三辭師願往即白淨華宿王智佛言至莊嚴王菩薩藥上菩薩既蒙光照默契聖心欲來親近理非自專故白本師云我當往詣等以釋迦佛乃運斤之師諸大士亦摶風之侶近之有盡堊之功會之有逍遙之益可師可友能不親之近之乎四彼佛垂誡爾時淨華宿王智佛至若佛菩薩及國土生下劣想分別人我高下長短淨穢名下劣想以正知正見本絕同異故師及弟子智斷具足師權現丈六弟子身形亦小依報國土乃正報所感慈臨大千宜須高須下勿覩卑小之身形穢惡之國土生下劣想也以六百八十萬由旬之師身四萬二千由旬之資身校之丈六卑小之身形則長短逈異以淨光莊嚴之國土比之穢惡充滿之世界則淨穢自別夫兩土淨穢身之長短皆現識相分若了唯心自無分別豈以淨華之淨光而輕釋迦之穢土乎故誡之令除執情然妙音乃法身大士豈見穢而生劣想哉恐其所將眷屬有未達者故寄彼而規此耳五妙音受旨妙音菩薩白其佛言至如來功德智慧莊嚴如來既以勿生劣想為誡妙音受旨白佛即示無下劣想也意謂我今所往其力用其神變皆假如來之德皆出如實之道則於一切法無不如矣何復勝劣之異哉是以不動彼土遊化十方現種種形說種種法而於神通智慧無所損減為如故也六先現來相又六初妙音先現華瑞於是妙音菩薩不起於座至甄叔迦寶以為其臺閻浮檀金者西域有河近閻浮樹此河因樹得名其金出彼河中故名之甄叔迦此云鸚鵡寶赤如其嘴故西域記云甄叔迦樹其華赤色此寶色似此華因名之未來此土先現瑞者示來相之前導故啟會眾之景仰故法法座不遠者為供養佛法故又華以金銀剛寶為莖葉鬚臺者表開示悟入教行理果也意顯圓妙之教妙音所說為開佛之知見也圓妙之行從妙行所行為示佛之知見也圓妙之理從妙心所解為悟佛之知見也圓妙之果從妙體所證為入佛之知見也是以妙音未來將此全經和盤托出於靈山會上大眾之前所謂妙音處處為諸眾生說此經也二文殊發問何緣爾時文殊師利法王子至甄叔迦寶以為其臺問妙音未現來相即欲要見文殊等若文殊位下妙音不應求見若文殊位高相來那忽不識答妙音乃法身大士文殊是果後行因二俱深位那分高下豈真不知為會眾見瑞不了發起令知故示問耳又華表因行妙音遣華乃妙行之境欲契此行必假大智故文殊發問也三如來答以欲來爾時釋迦牟尼佛告文殊至亦欲供養聽法華經欲來此土禮拜於我供養是經以是因緣故現此華四文殊請見其相文殊師利白佛言至彼菩薩來令我得見種何善根文殊豈不知欲眾知故勤修行等文殊豈未修欲眾修故令我得見文殊豈未見欲眾見故所以然者欲令大眾法於妙音深造實智也五釋迦推功多寶爾時釋迦牟尼佛告文殊至當為汝等而現其相文殊願世尊以神通力為現妙音而世尊歸功多寶者多寶以神通願力在處證經欲假其神通願力也又多寶表法身釋迦表報身楞伽云報化非真佛亦非說法者實相之理須從法身邊薦取方乃相應故迦文不召妙音多寶一呼即至六多寶命彼來會時多寶佛告彼菩薩善男子來至欲見汝身多寶妙音雖隔塵剎宛若對面此顯從法身體起應身用也發來之緣竟二正共發來又六初眷屬經歷於時妙音菩薩於彼國沒至百千天樂不鼓自鳴與八萬四千共來者示妙音隨類演化八萬四千塵勞也所歷國土乃百八萬億那由他恒河沙等佛世界也蓮華遍雨表妙行隨類示現也天樂自鳴表妙音離於作意也問靈山去淨華宿王智佛國所隔國土有百八萬億那由他恒沙之多所歷程途又不知幾多何多寶一呼而妙音隨即發來耶答的實而論多寶乃實相之體妙音是實相之用寶相無相無相不相遍一切處無非實相多寶一呼即具大妙音也前云入此三昧身不動搖此中於彼國沒俱共發來即實相無相也多寶一呼實相發妙音之用俱共發來妙音歸實相之體也二敘相登臺是菩薩目如廣大青蓮華葉至娑婆世界耆闍崛山肇師云天竺有青蓮華其葉修廣青白分明有眼目之相故云目如廣大等和合猶積聚也那羅延此云天力士名端正殊妙志力雄猛故三問訊傳旨到已下七寶臺至安隱少惱堪忍久住不問示居堪忍之事貪瞋等皆堪忍難度之事也五情即五欲亦即五情根佛無病惱同居施化示同人法故又順世儀法爾而然故四請見多寶世尊我今欲見多寶佛身惟願世尊示我令見分身既散塔閉如故多寶居於塔內故願示之令見又寶塔高遠仗佛求見表尊敬耳五世尊為通爾時釋迦牟尼佛語多寶佛是妙音菩薩欲得相見六塔中稱善時多寶佛告妙音言至并見文殊師利等故來至此問妙音未離本土即云及見文殊文殊請現其相釋迦推功多寶多寶即云善男子來文殊欲見汝身妙音既至此土問訊釋迦請見多寶釋迦轉通云是妙音菩薩欲得相見多寶塔內稱善並無文殊見妙音處亦無妙音見多寶處何也答約理而論妙音未離他土與多寶文殊相見已竟文殊不問釋迦與妙音相見已畢事論兩土風俗不同人事各異故須一一請問上奉命西來竟三十方弘經分二初問答善根神力二問答住何三昧初又二先華德疑問爾時華德菩薩白佛言至修何功德有是神力華德乃妙莊嚴王之後身欲助揚妙音發顯妙性成就妙果故發此問所問之車皆文殊之所問者次如來垂答又二初正答善根功德佛告華德菩薩至百千萬億那由他佛一音利潤開覺羣動故名雲雷音根身器界皆能隨應故名現一切世間由利潤隨應故名喜見十萬種技樂者有歌有舞歌則味其辭以聲播之舞則動其容以曲隨之主於和宣著人之德業二南雅頌皆古人之行事本於心關國家之興衰金石絲竹通世人之娛耳然妙音所獻必是鈞天之樂非雅頌等倫其陽春雪曲之歌高山流水之趣備寓於中矣鉢云應量乃道器也妙音所獻非瓦銕之所成乃七珍之寶鉢若之技樂供佛今得天樂自隨昔之寶鉢奉佛今得眷屬圍繞由奉鉢獻樂之功德善根以是因緣今得果報有是神力也華德下結會古今是妙音下結答善根二廣明神力應化又三初總舉二別明三總結且初總舉華德汝但見妙音菩薩至為諸眾生說是經典二別明又二初應六凡次應四聖初又六初應天眾或現梵王身或現帝釋身至或現毗沙門天王身梵王即色界天主也帝釋即地居天主也自在天即欲界頂梵云婆舍波提此云他化自在假他所作以成己樂即是魔王也大自在即色界頂摩醯首羅也天大將軍大經云八健提天中力士又稱鳩摩伽此云童子騎孔擎雞持鐸捉赤旛者又韋紐此云遍聞四臂捉貝持輪騎金翅鳥者皆是天大將軍毗沙門此云多聞以福德之名聞四方故即北方天王也二應人眾或現轉輪聖王身至或現童男童女身長者有長人之德居士愛談名言清淨自居宰官剖斷邑輔政於王婆羅此云淨行劫初種族山野自閑故人以淨行稱之童男未冠之稱童女未嫁之名三應八部或現天龍夜叉乾闥婆至人非人等身而說是經說是經三字貫上諸種身以現身必說法說法必現身妙音妙行常相須也四應惡趣諸有地獄餓鬼畜生及眾難處皆能救濟諸應皆言現身說經獨於惡趣不言者惡趣方沉無由聞經但以神力救濟而已五應宮禁乃至於王後宮變為女身而說是經王宮禁地為化良難菩薩以神力亦現身說經也六結前廣顯華德是妙音至於十方恒河沙世界中亦復如是菩薩種種變化現身說法於神通變化智慧無損減者明妙音所證自利之實智謂證得此智能觀一切法盡歸真如平等自性不增不減於一切法皆如實知故智慧明照者方便開導也各得所知者隨類各解也是妙音所用利他之權智方便開導因緣譬喻一音所說隨機得解也二應四聖若應以聲聞形得度者至示現滅度三總結華德妙音菩薩摩訶薩至其事如是結顯妙音由昔獻樂奉鉢之勝因感今神通智慧廣大無邊其事如是上問答善根神力竟二問答住何三昧又二初問爾時華德菩薩白佛言至在所變現度脫眾生承佛垂答已知菩薩善根深遠福德廣大也世尊下問菩薩今住何定而能現十界身說一乘法如此自在利益也次答佛告華德菩薩至能如是饒益無量眾生此雖答華德亦答文殊行何三昧說其名字之問也菩薩住此三昧如淨摩尼隨方現色難思妙行根於此矣十方弘經竟四兩土得益說是妙音菩薩品時至亦得是三昧及陀羅尼兩土菩薩皆具體而微者故因說是品皆得發明三昧與陀羅尼體一而用異寂用為三昧持用為陀羅尼又色身變現名三昧音聲辯說名陀羅尼又舌根清淨名陀羅尼餘根清淨名三昧皆是六根清淨法門耳五還歸本土爾時妙音菩薩摩訶薩至得現一切色身三昧所經國土等於彼發來所經亦爾示來往經行不離是道也菩薩舉措尚能傍益一切眾生況佛放光傍照諸國豈無利益哉六聞品進道說是妙音菩薩來往品時至華德菩薩得法華三昧無生法忍得妙法之體也法華三昧得實相之用也妙音說法竟妙法蓮華經觀世音菩薩普門品第二十五悲華經云過去散提嵐界善持劫中時有佛名曰寶藏有轉輪王名無量淨第一太子三月供佛齋僧發菩提心若有眾生受三途等苦惱凡能念我稱我名字為我天眼天耳聞見不免苦者我終不成菩提寶藏佛云汝觀一切眾生欲斷眾苦故今字汝為觀世音楞嚴菩薩自陳云由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧成就三十二應十四無畏四不思議彼佛如來歎我善得圓通法門於大會中授記我為觀世音號又大悲經云此菩薩不可思議威神之力已於過去無量劫中作佛號正法明如來大悲願力安樂眾生故現為菩薩耳別行玄云觀世音者西方正音名阿耶婆婁吉底輸此云觀世音觀者能觀之智世音者所觀之境能觀則明明不昧了了常知卓然獨存返觀獨照故稱觀也所觀則有正覺之音眾生之音器世界之音雜類之音故稱世音也能所合標境智雙舉故云觀世音普是遍義行彌法界隨心益物稱體而周故為普門是通義出入無壅法法全彰事事無礙故為門此菩薩不思議神力照窮法界萬像流動殊音異類普現色身隨機說法妙行圓應無所障礙故云觀世音菩薩普門品又妙音現形說法救濟眾難與觀音無異但略而未普妙而未圓觀音不離是行而能大千圓應無去來相所謂自在之業普門示現則進於妙音矣其實二聖一道相為終始故後頌觀音之德而兼云妙音是知二聖一道即妙音之行而演為普門是知相為終始欲體前法須兼二行從妙而普有始有終然後圓備故繼妙音而說普門焉五普門圓應分二初問答顯德二聞品獲益初有長行偈頌長行有兩番問答初番問答觀音人又二初無盡興問爾時無盡意菩薩即從座起至以何因緣名觀世音此品因無盡意發起者表普門圓行應現無盡也若愚讚云世間無邊塵擾擾眾生無數業忙忙愛河無底浪滔滔是故我名無盡意觀音之行亦若是矣偏袒右肩者此方以袒為慢外國以袒為敬露右者示執奉為便表事師充役之儀故以袒為恭也合掌者此方以拱手為恭彼國以合掌為敬表不敢敬誕專至一心也向佛者以萬善之因向萬德之果也世尊下問觀音人意謂觀音之名望尊法界風偃羣賢名不自有因義而彰觀音之所以為觀音者果何因緣有斯名也因緣甚多略言境智以眾生善惡兩機為因菩薩靈智慈悲為緣大經云具二莊嚴能問能答今無盡意具定慧二種莊嚴故能問如來究竟二種莊嚴故能答也二如來垂答分三初總答二別答三勸持名答此三科即楞嚴十四無畏功德彼經菩薩自陳此經如來所說彼從因陳此從果彰彼經但明能應此經雙明機應兩經合論方知大士名稱其實也且初又四初標舉人數佛告無盡意菩薩善男子若有無量百千萬億眾生十法界機實是無量而言百千萬億者非謂十界共有此數葢指一業有如許人如一地獄同受一苦以苦騐人知同一業以例諸趣皆亦如是故知此數是標同業之意此舉境眾機多以顯菩薩觀深應大二總明遭苦受諸苦惱此舉現遭苦厄也自有多苦苦一人多人受一苦一人受多苦一人受少苦今文百千萬億多人也受諸一句多苦也舉多顯少多尚能救况少苦耶上言百千萬億是業同者共受一苦今言諸苦者一苦是一業即有百千萬億苦也上明數同此明業別用此意歷十法界萬機之徒不可說不可說數也三聞名稱號聞是觀世音菩薩一心稱名由過現惡故遭諸苦由過現善復得聞名此以善惡相帶合成機感也一心有事有理若用心存念念念相續餘心不間一心皈憑更無二意是名事一心稱名也若達事中一心自他俱離俱不可得無心無念定慧相應能稱所稱皆不可得是為理一心稱名也四即得解脫觀世音菩薩即時觀其音聲皆得解脫上聞名即稱是機速稱名即應是應速皆得解脫者即是蒙應利益皆者非但顯於多機眾益亦顯圓遍之應也冥顯感應可知問十界機無量云何一時令得解脫答喻如父母念子心重多智多財具大勢力眾子在難即能俱救菩薩亦如是無緣慈悲重權實二智深聖財無量神通力大十界雖多應有餘裕問今見稱名累年不蒙寸效者何也答一心稱名有事有理二途無取何能感聖喻如臨鏡背照對谷閉口何能致影響哉楞嚴云一者由我不自觀音以觀觀者令彼十方苦惱眾生觀其音聲即得解脫以觀觀之體聞聞之性本無苦樂眾生不能返聞循聲流轉故受苦惱菩薩離塵復性諸妄自脫能令苦惱眾生持名蒙觀亦得解脫乃真淨慈悲觀力加被然也琳法師稱名七日而免難於唐孫敬德誦經千遍而全生於魏者是其騐也二別答分三初免七難二離三毒三應二求初又二初正明七難二結其神力初又七初免火難若有持是觀世音菩薩名者至由是菩薩威神力故此下不出三業為機七難持名口業機也三毒常念意業機也二求禮拜身業機也若有設有等皆不定之辭經云二者知見旋復令諸眾生設入大火火不能燒見覺屬火知見旋則離火塵幻塵既離真性斯存所以無火害也由菩薩離塵復性之威力加被故眾生入火持名亦不能燒應騐傳云祝長舒晉元康年中於洛陽為延火所及艸屋大風必無免理一心稱名風回火轉鄰舍而滅里人淺見謂為自爾因風燥時舉火燒之三擲三滅眾方懺謝二免水難若為大水所漂稱其名號即得淺處云大水者以小水不成難故經云三者觀聽旋復令諸眾生大水所漂水不能溺聞聽屬水聞聽旋則離水塵所以無溺害也傳云道冏三人同伴乘氷度孟津垂半一人前陷一人次沒冏進退水上必溺無疑一心稱名脚如踏板至夜遇赤光竟達岸三免羅剎難若有百千萬億眾生至以是因緣名觀世音入海求珍結伴無定雖無定數終不可獨往故舉百千萬億總數不定判多少也入海者賢愚經云田殖百倍商賈千倍任宦萬倍入海吉還得無量倍故入海也阿含云風加以黑怖之甚也羅剎乃食人鬼也一人稱名餘人悉解脫者以其同患難故雖口不同唱心助覓福故俱獲濟也經云四者斷滅妄想心無殺害令諸眾生入諸鬼國鬼不能害由菩薩滅妄斷殺故遠離鬼害也傳云外國百餘人從師子國泛海忽遇惡風飄墮鬼國便欲盡食合舡皆稱觀音名號中有一小禪者不信不稱鬼索此禪者禪懼甚學稱一聲亦得免脫四免王難若復有人臨當被害至尋段段壞而解脫言刀杖段段壞者明人執殺具一折一來隨來隨斷彌顯大士拔苦之力也經云五者六根銷復同於聲聽能令眾生臨當被害刀段段壞使其刀兵如割水吹光性無搖動既同聲聽無復形礙故使刀兵如割吹耳傳云晉大元中彭城一人被枉為賊常供金像帶髻中後伏法刀下但聞金聲三斫不傷解髻像有三痕由是得放五免鬼難若三千大千國土至尚不能以惡眼視之況復加害言滿中者假設之辭也鬼所以畏者菩薩有威有恩若非懷恩則是畏威所以聞名尚不能加以惡眼豈興害心經云六者聞熏精明明遍法界則諸幽暗性不能全能令眾生藥叉羅剎等雖近其傍目不能視由聞熏精明爍諸癡暗故鬼不能視斷滅妄想心無殺害故害不能加阿含云有大力鬼坐帝釋床帝大瞋鬼光明轉盛此同其心行故帝還發慈心鬼光明滅即去六免枷鎻難設復有人若有罪若無罪至皆悉斷壞即得解脫有罪無罪者或是推檢未定或可判入徒流若判未判俱被禁制以明聖心平等本救其囚執不論有罪無罪在手為杻在脚為械在頸名枷連身名鎻三木一銕之名也繫名繫礙檢是封檢繫未必檢檢必被繫今云檢繫者顯罪深怖重也經云七者音性圓銷觀聽返入離諸塵妄能令眾生禁繫枷鎻所不能著塵妄既離則身相不有故枷鎻自脫也問先王制法用以懲惡陰有地獄陽有囹圄人神所共用者若救無辜理或容矣釋有罪者縱惡壞紀豈聖心乎答妙哉問也魯肆大眚聖人善莊公之補過唐禁笞背君子美太宗之仁恕未聞議其傷於名教好生之仁天下所同何疑大士恤刑之慈乎傳云葢護山陰入有罪判決繫獄應死三日三夜稱名無間忽見觀音放光照之鎻脫門開尋光而去行二十里光乃息七免怨賊難若三千大千國土滿中怨賊至稱其名故即得解脫大千國土標難處也滿中怨賊正明難也國曠賊多聖力能救以顯功力之至也怨本奪命賊本劫財今怨為賊必財命兩圖如此遍滿尚能救之況少乎有一商主遭難人也商者訓量此人擇識貴賤善解財利商量得宜堪為商人之主既有商主即領商眾既涉險遠所齎者必難得之貨故言重寶險路者或是曠絕幽隘之處或是怨賊衝出之徑皆名險路勿得等安慰止其恐怖勸稱設其上䇿歎德獎令定膽三義具足俱時稱唱即得解脫此中南無翻救我經云八者滅音圓聞遍生慈力能令眾生經過險路賊不能劫葢音聞兩立物我成敵滅音圓聞則內外無待故能遍慈而却敵也傳云晉隆安年僧慧達往北隴上掘甘艸被羗人所獲閉於柵中人多擇肥者先食餘人食盡唯達并一小兒意來日食之達竟夜稱名至旦羌來取食忽一虎跳吼諸羗散走虎咬柵作穴而去達將小兒逃走二結其威神無盡意觀世音菩薩摩訶薩威神之力巍巍如是觀音勢力既大加護亦曠豈止七難當知遍法界皆能救護故言巍巍然有如是神力也二離三毒若有眾生多於婬欲至是故眾生常應心念此三稱毒者以能侵害行人喻之如毒但有單複今從複列自愛為欲愛他為婬婬欲多者不擇禽獸不避高墻不顧德行破國亡家禍延其身若能存念觀音即得離也經云九者熏聞離塵色所不劫能令一切多婬眾生遠離貪欲眾生欲習合塵故為色劫菩薩離塵欲愛乾枯根境不偶雖有妙色不能劫動自忿為恚忿他為瞋瞋恚多者今世人不喜見如渴馬護水遺教云劫功德財無過瞋恚華嚴云一念瞋心起障百法明門經云十者純音無塵根境圓融無對所對能令一切忿恨眾生離諸瞋恚瞋由違情而起對境而生圓融則無違無對則不瞋矣自惑為愚惑他為癡愚癡多者邪畫諸見撥無因果謗毀大乘於諸諦理不能明解過於漆墨經云十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗癡由妄塵所蔽無明所覆銷塵則無蔽朗徹則無覆矣無盡下結三應二求若有女人設欲求男至觀世音菩薩有如是力不孝有三無後為大無子則絕嗣矣云何獨標女人耶葢女人以無子為苦為夫所棄婦之所輕傍人所咲也又婦有七失容惡邪婬性妬不事公姑貪食拙懶無子前六猶可無子最苦故獨標女人也福慧男者若有智無福則位卑財窮有福無智則識劣見淺必智與福合彌相扶顯福則財位高昇慧則名聞博遠經云十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵如來各各佛邊為法王子能令法界無子眾生欲求男者便生福德智慧之男求男生男是大士融形涉世遍事諸佛為法王子之力加之使然女人端正七德之初但端正無相者則容惡形衰有相不端者則早孤少寡今貌與相相扶彌顯其德端正則招寵愛有相則招錄敬故云眾所愛敬經云十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來秘密法門受領無失能令法界無子眾生欲求女者誕生端正福德柔順眾人愛敬有相之女求女生女是大士圓通含界承順如來受領法門之力加之聖力甚大無所不與也無盡下結別答已竟三勸持名答又三初勸持若有眾生恭敬禮拜至皆應受持觀世音菩薩名號心敬身禮所獲之福終無窮盡故曰福不唐捐謂福不虗棄而得真實之益也上說觀音得名因緣其力廣大既不辯形質但述名論德若欲歸崇宜奉持名號故舉持名為勸也二格量無盡意若有人受持至於百千萬億劫不可窮盡六十二億舉名號多盡形壽時節多四事具足福田多若復有下正格量良以一多性不可得無有二相一則非一多則非多同入實際正等無異也三結歎無盡意受持觀世音至無量無邊福德之利經云十四者此大千界現在世間六十二億恒沙菩薩修法垂範方便利生各各不同由我所得圓通本根含容法界欲令眾生持我名號與彼共持六十二億諸法王子二人福德正等無異由大士真得圓通一多平等彼我無異故也二二番問答普門法又二初無盡興問無盡意菩薩白佛言世尊至方便之力其事云何前問何緣得名佛答眾生三業顯機為境法身靈智冥應境智因緣名觀世音今問云何遊此娑婆世界佛答普門示現三業顯應應眾生冥機云何遊問身業云何說問口業方便問意業身業現相口業說法意業鑑機無謀而應遍逗一切亦名三輪不思議化也方便非道前乃證後鑑機之方便也二如來垂答分三初正答普門法二勸興供養三總結神力初又二初普門圓應二結略指廣初中凡現三十三身十九說法束為十界身少菩薩地獄二界結文以種種形該之三十三身其類分八初聖人身佛告無盡意菩薩至即現聲聞身而為說法具答三業之問應以之言答方便意業問也何以知之意地觀機見其所宜宜示何身宜說何法隨而應之現身答身業問說法答口業問經云若諸菩薩入三摩地進修無漏勝解現圓應以佛身應之大士即現佛身而為說法若諸有學寂靜妙明斷十二緣勝性現圓即現辟支身若諸有學得四諦空修道入滅勝性現圓即現聲聞身二天王身應以梵王身得度者至即現毗沙門身而為說法眾生欲心明悟不犯欲塵欲心清淨即現梵王身說法欲為天主領統諸天即現帝釋身欲身自在遊行十方即現自在天身欲身自在遊行虗空即現大自在天身愛統鬼神救護國土即現天大將軍身愛統世界保護眾生即現四王身說法三王民身應以小王身得度者至即現婆羅門身而為說法眾生樂為人王即現人王身令其成就愛主族姓世間推讓即現長者身愛談名言清淨自居即現居士身愛治國土剖斷邑即現宰官身愛諸數術攝衛自居即現婆羅門身四四眾身應以比丘比丘尼至優婆塞優婆夷身而為說法男女好學出家持諸禁戒即現比丘比丘尼身樂持五戒即現塞夷身五婦女身應以長者居士宰官至即現婦女身而為說法內政立身以修家國即現命婦賢媛等身六童男女身應以童男童女身至童男童女身而為說法眾生不壞男根即現童男不求侵暴即現童女侵暴者謂女不貞淑以行多露乃為他人之所侵暴也七八部身應以天龍夜叉乾闥婆至即皆現之而為說法八部樂脫其倫菩薩皆現身說其本倫脫離之法八金剛身應以執金剛神得度者即現執金剛神而為說法梵語䟦闍羅此云金剛梵語波膩此云手謂手執金剛杵以立名正法念云昔有國王夫人生千子欲試當來成佛次第故拘留孫探第一籌乃至樓至探末籌第二夫人生二子一願為梵王請千佛說法一願為金剛力士護千兄教彼經多有形等四類無金剛一類此一即護佛教之正神也眾生志願勇猛護持佛法菩薩現其身說摧邪輔正之法令其成就也次結略指廣無盡意是觀世音菩薩至遊諸國土度脫眾生成就功德結略種種形等指廣以菩薩隨類變現何止三十三身應化逐緣豈局娑婆世界種種形身廣也遊諸國土所化處廣也度脫眾生得益廣也正答普門法竟二勸興供養又二初勸供是故汝等應當一心至皆號之為施無畏者佛答前問後勸持名眾生仰荷菩薩真身冥應但可持名秉字故勸受持答後問末勸供養者眾生既荷菩薩三業顯應見色聞聲故勸供養也是故汝等下勸供養是觀世下出供養意由救七難免三毒應二求普門圓應隨類說法真應二身俱為能施冥顯二益皆得無畏是故下結歎稱美二受旨又五初奉命興供無盡意菩薩白佛言至仁者受此法施珍寶瓔珞眾寶等者眾寶間珠共為嚴飾也問依瓔珞經初住銅寶瓔珞乃至等覺摩尼寶瓔珞今無盡位既高深瓔珞合用無價豈可止直百千兩金答言百千者但舉數多如云百姓萬民豈局百萬哉瓔珞本財施言法施者揀住相也當解瓔之時奉瓔之際三輪體空即此一物細不立一塵大則周法界貫四十二位之功德統八萬四千之妙行雙存俱泯錯綜交羅非法施而何二觀音不受時觀世音菩薩不肎受之不肎受者謂無盡奉命供養我未奉命那忽輙受亦是事須遜讓施受有義以有餘奉不足施受兩當此瓔俱有用以施我我有餘彼不足義安在哉三無盡重舉無盡意復白觀世音至愍我等故受此瓔珞我為四眾故施仁愍四眾故受以無所施而施諸物以無所受而受諸受也四佛勸當愍爾時佛告觀世音菩薩至人非人等故受此瓔珞此勸受也物元表禮惡可辭乎辭其物則絕其人受其物則納其情故曰當愍即愍一切眾生也正以菩薩為物故施為物故受也夫無盡施瓔意在今時觀音不受意在實際如來勸受欲顯無所求而求之無所受而受之施受皆從寂滅中來顯一瓔之福周濟無涯門庭施設勝也何如陽春一曲和者誰乎賴有持地聊知分曉所謂逢場作戲斯也人歟五受已奉佛即時觀世音菩薩愍諸四眾至一分奉多寶佛塔以一瓔作二分者表於一行必具二因理則正因事則緣因事理不二名曰妙因奉二佛者二因趣二果也勸興供養竟三總結神力無盡意觀世音菩薩至遊於娑婆世界如是神力者指普門示現三十三身說法也正答云何遊此世界之問長行竟二偈頌文後重頌什師不譯諸師皆謂梵本中有後方添入有二十六行分三初一行雙頌二問二二十二行雙頌二答三三行雙頌二勸且初一行雙頌二問爾時無盡意菩薩以偈問曰世尊妙相具我今重問彼佛子何因緣名為觀世音世尊妙相萬德莊嚴歎相即美德問彼兼含次問二二十二行雙頌二答分二初二行總歎行願具足妙相尊偈答無盡意至發大清淨願具足二句經家敘置汝聽二字勅令審諦觀音行者一心三智觀彼類音令無量苦一時解脫即觀世音成利他之行也不動真心現種種形故云善應一切國土處處現往故云諸方所弘誓者四弘願廣歷劫者經劫難量以誓深故長時不退以時長故值佛惟多隨佛作為修諸佛行方名侍佛一一佛所皆發淨願由菩薩行願深大故真智遍拔眾苦應身普度一切也二二十行別頌二答又二初十四行頌初答觀音得名二六行頌次答普門示現初又二初一行頌總答我為汝略說聞名及見身心念不空過能滅諸有苦舉要言之故云略說聞名故稱口業機也見身故禮身業機也心念意業機也諸有即二十五有聞名注念見形禮拜皆不空過悉滅三有之苦也二十三行頌別答又二初十二行頌七難曲分十二初一行頌免火難假使興害意推落大火坑念彼觀音力火坑變成池此下頌與長行事相不同又增幾種謂十四無畏特舉大略實具一切功德能救一切急難故加頌之二一行頌免水難或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒三一行加頌墮須彌難或在須彌峯為人所推墮念彼觀音力如日虗空住四一行加頌墮金剛山難或被惡人逐墮落金剛山念彼觀音力不能損一毛五一行頌免怨賊難或值怨賊繞各執刀加害念彼觀音力咸即起慈心六一行頌免刀杖難或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞七一行頌免枷鎻難或囚禁枷鎻手足被杻械念彼觀音力釋然得解脫八一行加頌呪詛毒藥難呪詛諸毒藥所欲害身者念彼觀音力還著於本人還著本人者凡呪毒藥乃用鬼法欲害於人前人邪念方受其害若人正念還歸本人如譬喻經云有清信士初持五戒後時衰老多有廢忘爾時山中有渴梵志從其乞水田家事忙不及與之遂恨而去梵志能起屍使鬼招得殺鬼勅曰彼辱我往殺之山中有羅漢知之往田家語言汝今夜早然燈勤三自歸誦守口莫犯偈慈念眾生可得安隱主人如教通曉念佛誦戒鬼莫能害鬼神之法人令其殺即便欲殺但彼有不可殺之德法當却殺其使鬼者其鬼乃恚欲害梵志羅漢蔽之令鬼不見田家悟道梵志得活東坡云還著失慈當云兩家都沒事吾不意東坡之高明而出此鄙俗語也還著一言有事有理事則邪不勝正慈能制㐫今以正念觀音自然還著喻如含血噴天返污己身將頭觸火反焦己額不期然而然非菩薩加罰於彼亦非行人起心願著彼也理則三毒十惡皆出當人妙心今正念觀音以智照神力旋流反聞復歸元真彼毒惡等應念化成無上知覺不還著本人而誰著耶九一行頌免羅剎難或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害十一行加頌惡獸難若惡獸圍繞利牙爪可怖念彼觀音力疾走無邊方十一一行加頌蛇蝎難蚖蛇及蝮蝎氣毒烟火然念彼觀音力尋聲自迴去十二一行加頌雲雨難雲雷鼓掣電降雹澍大雨念彼觀音力應時得消散二一行頌三毒二求眾生被困厄無量苦逼身觀音妙智力能救世間苦三毒熾盛眾苦逼身男女皆無困厄孤伶妙智之力悉能救之頌初答觀音得名竟二六行頌次答普門示現分四初二行明身業普應具足神通力廣修智方便至以漸悉令滅能應之由由神力及智方便若非千如全體之用不能具足神通力也通雖性具復由廣修妙智方便照性發通故得普門示現自在也常論惡趣但局三途今種種之言通指九界望佛皆名為惡別舉三途極惡故也雖三惡方沉幽昏未應得度悉令漸滅其苦也二二行意業普觀真觀清淨觀廣大智慧觀至普明照世間真以息妄淨以治染智以破惑悲以拔苦慈以與樂以此五觀加被群迷妄染惑苦應念息滅故一切眾生常願仰而依之大士之所以應身示現者實賴於此耳無垢下歎上五觀無垢慧日歎觀智之體伏災普照歎觀智之用三一行口業說法悲體戒雷震慈意妙大雲澍甘露法雨滅除煩惱𦦨說雖在口必假身意為授法之本初句為法現形本期救苦故說法之身名為悲體此身先用戒德警人如天震雷物無不肅故云悲體等次句菩薩以慈為心意無緣而被名之為妙物無不覆喻如大雲故云慈意等二輪既施然後說法三句正說法也甘露不死之神藥所宣至理解必無生若非無生焉能不死四句明利益本性常法非說那知於慈雲中澍大法雨眾生蒙潤一切煩惱猛𦦨悉皆滅除也慈雲是慈悲普澍雨是說法普能滅是利益普也四一行加頌官陣諍訟經官處怖畏軍陣中念彼觀音力眾怨悉退散事係訟庭身臨戰陣心憂刑罰命慮兵殘今昔怨仇此時合會一心致感眾難皆祛彌顯大士神智之力也三三行雙頌二勸又二初一行一句頌勸持名妙音觀世音梵音海潮音至念念勿生疑妙音者說法不滯觀音者尋聲救苦梵音者音性無著潮音者應不失時四音圓具故云勝世間音也大士具如是德度脫眾生故須時常持念不間不疑無不隨心滿願若也疑兕在懷朝勤夕怠無惑乎大士之不應也二一行三句頌勸供養觀世音淨聖於苦惱死厄至是故應頂禮觀聽反入離諸塵妄是名淨聖冥資不虗於苦惱死厄如父如母可依可怙具一切功德則隨所求而應之不止十四無畏也慈視眾生則擇可度而度之不止三十二應也其福聚如海利澤無窮故須歸命頂禮問答顯德竟二聞品得益又二初持地稱歎爾時持地菩薩即從座起至當知是人功德不少寶雲經云菩薩有十法名持地三昧如世間地一廣大二眾生依三無好惡四受大雨五生艸木六種子所依七生眾寶八生眾藥九風不動十師子吼不驚菩薩亦爾昔遇毗舍浮佛教平心地一切皆平是能以妙法內平自心外患自平故聞此品而稱歎之觀音之號或曰觀世音或曰觀自在其行或曰普門或曰圓通依悲觀慈觀應物之德言之故號觀世音以真觀淨觀照心之功言之故號觀自在自一心而出應無不遍謂之普門自萬物而反照無不融謂之圓通其實一而已矣故或以自在為號或以自在名業以自在為號言心得自在如心經稱觀自在是也以自在名業言行得自在如楞嚴稱無作妙力是也功德不少者顯自在之業普門之行實為心地法門聞持之者苟能以是平持心地則外患自平不能為害於諸怖畏能施無畏由是自在之業普門之行遂為己有故曰聞者功德不少此菩薩聊知分曉也二聞品獲益佛說是普門品時至阿耨多羅三藐三菩提心無等等者謂無同等之物與此齊等也以如來最上之德證窮法界淵底毗盧有師法身有主向上一著世出世法皆立下風無有同等之物與之齊等觀音體此以成普門之行隨類應化無等與等故聞其風者皆能發如是心也普門圓應竟妙法蓮華經陀羅尼品第二十六大法流通憑寄四依若無守衛魔事妄沮故二聖二天十神說陀羅尼呪誓以駈辟邪障消除衰患故此品為弘護流通也陀羅尼此翻總持總惡不起持善不失故有一字多字無字之異能以一字總一切法持無量義摧邪立正殄惡生善皆能總而持之其體名陀羅尼其用名呪一切呪不翻五不翻中秘密不翻也四例中翻字不翻音也又呪功用不同或專用滅罪如方等專用護經如今經專用治病如藥師或通用護經治病滅罪如請觀音消伏毒害陀羅尼六神呪護持分三初問答持經功德二請以神呪護持三會眾聞品得益且初問答持經功德爾時藥王菩薩即從座起至如說修行功德甚多藥王即喜見後身苦行持經志存弘護故發起此品然持經功德前品屢明如法師品比功不過供十萬億佛隨喜比功不過施外財得小果而已至此比功則勝供八百萬億恒河沙佛者明持行益深護功益勝也將申弘護先校功德者使後世知其福德殊勝遞為弘護耳二請以神呪護持分五初藥王呪護二勇施呪護三毗沙呪護四持國呪護五羅剎呪護初又四初請護爾時藥王菩薩白佛言至陀羅尼呪以守護之陀羅尼呪華梵雙標也呪願也祝也以是法而祝之使從所祈也例此土禁呪等法或云呪者是鬼神王名稱其王名部落敬主不敢為非故能降伏一切鬼魅或如軍中號令唱號相應無所訶問若不相應即執治罪若不順者頭破七分順者則無過失或密默治惡惡自休息如偈云無親往他國欺誑一切人麤食是常食何勞復作瞋公主諸人但念其偈不知其意呪亦如是或是諸佛密語如王索仙陀婆無有能識唯有智臣乃能知之洗時奉水飲時奉器食時奉鹽遊時奉馬呪亦如是只是一法遍有諸力病愈罪除善生道合為此義故皆存本音譯人不翻意在此也二說呪即說呪曰安爾一曼爾二至阿摩若那多夜四十三私謂呪中地字當以本音讀之四中翻字不翻音之一若途買宅解二切未有所據如三摩地亦是梵語皆以本音讀之此何不然三稱歎世尊是陀羅尼神呪至則為侵毀是諸佛已四印善時釋迦牟尼佛讚藥王至於諸眾生多所饒益二勇施呪護分三初請護爾時勇施菩薩白佛言至伺求其短無能得便富單那此云臭餓鬼主熱病者吉蔗此云所作即起屍鬼若人夜叉俱有此鬼鳩槃茶此云甕形舊云冬瓜此鬼陰如冬瓜行置肩上坐便踞之即魘魅鬼也惡世修行尺水丈波鬼神侵擾正法難通佩持神呪不怒而威強魔怪鬼無能伺其短者二說呪即於佛前而說呪曰痤𨽻一摩訶痤𨽻二至涅犁墀婆底十三三結歎世尊是陀羅尼神呪至則為侵毀是諸佛已三毗沙呪護分三初請護爾時毗沙門天王護世者至說是陀羅尼梵語毗沙門此云多聞福德之名聞四方故居半須彌北水晶埵主夜叉羅剎二部二說呪即說呪曰阿棃一那棃二至那履五拘那履六三結歎世尊以是神呪擁護法師至令百由旬內無諸衰患四持國呪護分三初請護爾時持國天王在此會中至擁護持法華經者梵語提頭賴吒此云持國以能護持國土故光明疏云上升之元首下界之初天居半須彌東黃金埵主乾闥婆毗闍舍二部二說呪即說呪曰阿伽禰一伽禰二至浮樓莎抳八頞底九三結歎世尊是陀羅尼神呪至則為侵毀是諸佛已五羅剎呪護分五初列名爾時有羅剎女等至并其子及眷屬俱詣佛所羅剎乃食人鬼亦名噉精氣鬼即第十名也以人心中有七滴甜水和養精神鬼噉一滴令人頭痛三滴悶絕七滴盡即死藍婆毗藍婆正法華云結縛離結縛一二面如藍靛色也三四五以齒名食人之具㐫也六女以髮盛為美也七貪婬無厭也八持莊嚴身之具也九晉譯何所是以無所不具為名也下文佛於此十中獨呼其名者有以也鬼子母有千子皆大鬼也因少子愛奴故歸佛戒至今有道場處便守護之二請說同聲白佛言世尊至即於佛前而說呪曰伊提履一伊提泯二至兜醯十八菟醯十九三稱歎寧上我頭上莫惱於法師至即於佛前而說偈言若不順我呪惱亂法師者至當獲如是殃凡女人鍾愛最在頭面無敢觸犯今云寧上莫惱者謂受持甚於己之頭面也毗陀羅赤色鬼也犍䭾黃色鬼也烏摩勒伽烏色鬼也阿䟦摩羅青色鬼也若一日等皆熱病鬼若男形等皆魑魅之類阿棃樹名義云其樹似蘭枝若墮地自然破為七分金光明云其有於違逆不善隨順者頭破作七分猶如蘭香稍殺父母破僧是三逆罪壓油殃者外國壓油之法擣麻使生蟲合壓之蟲多益肥此過猶甚斗秤欺人者斗則小出大入秤則輕出重入欺盜之罪也世之震銘其背者斯罪常見破僧者破和合僧也大論云調達從佛索眾佛呵之曰癡人無知我尚不以眾付身子目連等況汝癡人食人涕唾者因此結恨別構五法以誘佛眾言五法者一糞掃衣二常乞食三坐食四常露坐五不受鹽及五味等佛在王舍城有因緣集僧調達從座起行五法籌云忍此五事者是真毗尼時有五百新學捉籌調達語言不須佛僧便自將往伽耶山共作羯磨時諸比丘以事白佛佛言癡人消滅善心在於泥犁一劫莫救身子目連往伽耶山調達告曰為眾說法我今背痛便右脇臥目連現通身子說法遂將五百新學還歸佛所臥起失眾愈生瞋恨犯此二句謂法師津梁塵世化範人天若害此人毒流三界其惡當逆豈容恕哉四誓願諸羅剎女說此偈已至離諸衰患消眾毒藥五印善佛告諸羅剎女至應當擁護如是法師文中先印護持經名次況供養經卷種種燈下解見前末呼臯帝而十名全具也三會眾聞品得益說是陀羅尼品時六萬八千人得無生法忍神呪護持竟妙法蓮華經妙莊嚴王本事品第二十七前品神呪外衛此則轉邪內正內外既安乃可進於普賢常行也昔佛末法有四比丘結契山林志欣佛慧幽居日積衣粮單罄其一人云吾等四窮尚不存身法當安寄君三人者但以命奉道莫慮朝中我一人者捨此身力誓給所須於是振鍚門閭以求供給三人得展其誠功圓事辦一世之益當無量生其一人者數涉人世屢逢聲色偶遇王出車馬駢闐生心動念愛彼光榮功德熏修隨念受報人中天上常得為王三人得道會而議云我免樊籠功由此王其躭果報增長有為從此死已不復為王方沉火坑良難可救幸其未苦正可開化其一人云此王著欲而復邪見若非愛鈎無由可拔一為端正婦二作聰明男兒婦之言必當順從如宜設化果獲改邪昔時婦者今莊嚴相菩薩是即妙音也昔二子者今藥王藥上是昔時王者今華德是所以白毫東召升紫臺而西引神呪護經使流通而大益說四聖之前緣故名妙莊嚴王本事品轉邪流通也又妙法功德莊嚴諸根得大自在此王往日於妙法有緣道熏時熟諸根應淨下文云得清淨功德莊嚴三昧以是義故名妙莊嚴王也本事者託生設化轉邪歸正之事七妙嚴轉邪文分六段初略明事本二標能所化三能化方便四所化得益五結會古今六聞品進道且初略明事本爾時佛告諸大眾至國名光明莊嚴劫名喜見因行自在果智圓明一音利潤開覺群機故名雲雷音宿王華智神道設教人人愛見故國名光明莊嚴劫名喜見二標能所化彼佛法中有王名妙莊嚴至於此三昧亦悉通達一人是所化三人是能化有王下出四聖之名淨德者雖示染身其德本淨淨藏者妙理之所蘊淨眼者妙智之所顯由具此妙淨理智故能轉邪而為華德也是二子下別顯二子之德六度等釋見前三十七品者身受心法為四念處也斷惡生善為四正勤也欲勤心觀為四神足也信進念定慧為五根也又為五力念擇覺喜輕安定捨為七覺支也見思語業命進念定為八正道也大乘行法以四心為體六度為用道品為助乃成佛果二子悉皆了達久乃行之其福德智慧可涯量哉七三昧隨用立名其理不異圓離諸染名淨實智如日權智如星名日星宿本性清淨覺了名淨光普現色身名淨色本淨大慧之所照明名淨照明非素法身名長莊嚴具大神用名大威德藏二子具如是德故能現身化度轉邪歸正矣三能化方便分八初彼佛說法二二子願往三母子論議四二子現通五信子伏師六子喜報母七願求出家八勸親覲佛且初彼佛說法爾時彼佛欲引導妙莊嚴王至說是法華經說經乃時至之時彼佛出世常宣正法於王緣弱則非其時今說法華正其時矣故云欲引導等二二子願往時淨藏淨眼二子到其母所至說法華經宜應聽受先白母者父邪母正故先白母共設化方若據其本母子元知今約化儀機熟應發碪槌相扣物器方成是故云白若附世情則母慈先白利他之本慈居先故三母子論議母告子言汝父信受外道至或聽我等往至佛所為現神變等示以化父之方邪見之人不知正法決不許我等詣佛亦不許汝等出家非神通決不能動其心情見通心淨然後導其聽法也四二子現通於是二子念其父故至令其父王心淨信解現化應具十八變一右脇出水二左脇出火三左脇出水四右脇出火身上下出水火為四並上成八九履水如地十履地如水十一從空沒而復在地十二從地沒而復昇空空中行住坐臥為四共十六現大身滿空中成十七大復現小成十八心淨信解者果如母言也五信子伏師時父見子神力如是至亦欲見汝等師可共俱往覩其神變而歎未有敬信其子而問師名先陳雲雷之名顯非異端次陳法華之目揀非世典父語下初覩神變之迹已動邪心及聞佛法之名宿因觸發故虗心往見所謂利根人一撥便轉也六子喜報母於是二子從空中下至三藐三菩提心寶積云菩薩成就三法得不退轉菩提一者父母不信令其信二者父母毀戒令住戒三者父母慳貪令住捨今此二子能令父母發淨信心出家持戒捨國得記可謂真得不退轉之大菩薩也七願求出家我等為父已作佛事至欲重宣其意以偈白母願母放我等出家作沙門至願聽我出家母即告言聽汝出家所以者何佛難值故值佛難於優曇出家乃脫難之良策入道之利器故云願聽母即告下允許八勸親覲佛於是二子白父母言至諸佛難值時亦難遇如優曇者重申偈中諸佛難值也又如一等者申前脫諸難亦難也阿含云妙高山下海中有一眼之龜一孔之木龜得木孔可以濟溺然木隨水流遶須彌山三千年乃一相值且一眼趣一孔為至難矣寸陰易過人道難逢見佛之幸猶難於龜木能不親之近之哉能化方便竟四所化得益分十一段初敘宮眷德彼時妙莊嚴王後宮至令心信解好樂佛法此敘合宮有德易為勸化也後宮之德根性純利故堪受持是經一門皆菩提眷屬團圞共話無生也法華三昧者攝一切法歸一實相離惡趣者一往三途為惡具論二十五有皆乖真起妄悉是惡趣今皆離之即二十五王破二十五有也佛集三昧者即三德秘密之藏佛集其中故得是三昧則知諸佛秘密之藏王及後宮為當機淨藏淨眼為能教機教相扣所以易化方便力即上現通變也二合宮從化於是妙莊嚴王至繞佛三帀却住一面三佛為說法爾時彼佛為王說法示教利喜王大歡悅即說妙法華也王以禮進佛以法酧適其本願得大法相故大歡喜也四捨愛回心爾時妙莊嚴王及其夫人至價值百千以散佛上歷劫愛染塵欲所迷一念迴光即得三輪體空之因妙契無上菩提之果也五佛力示現於虗空中化成四柱寶臺至結加趺坐放大光明所施珠瓔化成法空之座柔忍之衣寶覺之體乃佛力示現發其正念也六邪心頓絕爾時妙莊嚴王作是念至成就第一微妙之色時王一覩勝相頓覺世間幻惑之色無可愛樂故深讚佛身微妙之色此則邪心併絕正念現前故得受記作佛七佛與授記時雲雷音宿王華智佛至其國平正功德如是助佛道法者猶護佛法也娑羅此云堅固佛號取廣蔭群生義國名取破諸邪暗義劫名取超諸貴高義皆符合因行以一念淨信風化臣妾使皆得法利即廣蔭行破邪行也由是捨王位得佛位即超諸貴高也其娑羅下明眷屬國淨八出家修行其王即時以國付弟至得一切淨功德莊嚴三昧佛具星橫藻鑑之機直指本來妙體王有見鞭隨舞之才唯然脫頴承當一句入神萬緣俱夢棄萬乘之貴披六和之衣知有其道不知有天下也於八萬四千歲修法華行所以淨塵勞也過是已後塵勞既淨三昧現前轉邪見染莊嚴為功德淨莊嚴也九感歎二子即升虗空高七多羅樹至饒益我故來生我家王與二子以國論之其君臣也以家論之其父子也今以知識稱之是師友之禮也相忘於道不子其子師其子也不自父其父友其子也宿世善根即四人入山之事宿有善根非緣不能發起陷入邪徑天性可以援溺故云來生我家所謂醉中不覺醒後方知到此妙莊嚴始與二子相見十佛述行高爾時雲雷音宿王華智佛至令住正見能作佛事外護知識也示教利喜教授知識也化導令見佛同行知識也令入菩提實相善知識也大王汝見下明二字轉邪遠因也言歷事諸佛愍念邪見眾生不獨今日轉妙嚴之邪也十一妙嚴讚謝妙莊嚴王即從虗空中下至說是語已禮佛而出甚希下歎相好功德功德智慧即福慧二嚴也頂上下即三十二相之四八十隨形好之一也頻婆此云相思果色丹而潤未曾下歎法化具足成就等者以一聞正法遂能轉邪一得三昧遂能神變皆是如來成就不可思議功德也教戒二句喜蒙佛化慶所成就也不隨心行不生邪見者皆法化教戒之力故讚而謝之總一妙嚴王始而不信佛繼而見佛終則愛佛近佛讚佛由此而知一切眾生本無定性習惡則惡習善則善入邪則邪就正即正了無定相所謂心迷法華轉心悟轉法華也所化得益竟五結會古今又二初結會佛告大眾於意云何至今藥王菩薩藥上菩薩是佛前光照者即放光東照妙音之身也言莊嚴相者謂妙音無量功德莊嚴身故前云於王後宮變為女身是也二結歎是藥王藥上菩薩至諸天人民亦應禮拜諸大功德者收上一品引導轉邪令正等已於下顯二菩薩名標因位德具佛果福慧雙隆也若有下勸供養禮敬六聞品進道佛說是妙莊嚴王本事品時至於諸法中得法眼淨塵謂邪見垢謂邪染外遠見塵內離垢染則法眼圓明絕諸瑕翳矣妙嚴轉邪竟妙法蓮華經普賢菩薩勸發品第二十八梵語邲輸𩗈陀此云普賢悲華經云我誓於穢惡世界行菩薩道使得嚴淨我行要當勝諸菩薩寶藏佛言以是因緣今改汝字名為普賢行彌法界德無不遍曰普隨心益物乘時設化曰賢上佐佛化下利羣生之號勸發者勉進義諄諄示誨開物成務之謂亦是戀法之辭遙在彼國具聞此經始末既周欲令自行化他永永無已故自東方而來勸發也窮妙法之始終然後盡出興大事合諸佛之智行然後見如來全身是經之起始於文殊問答終於普賢勸發二十八品條理一貫乃所以窮始終合智行大事因緣於是乎畢如來法身於是乎全也智能發覺所以作始行能成德所以成終中間事法無非智行互相資助故終以普賢立品八普賢勸發分四初經家敘儀二普賢勸發三如來述發聞四品成行且初經家敘儀爾時普賢菩薩至頭面禮釋迦牟尼佛右繞七帀無為應物普周法界曰自在神通德無不遍名無不聞曰威德名聞與無邊菩薩來者示萬行圓攝無盡之意普賢統事法界圓具萬行即事而真其應身無乎不在且於法會之終示從東來者以無功用行出震利物故二普賢勸發分二初請問勸發二誓願勸發初又二先問白佛言世尊至云何能得是法華經寶威德上王者利行自在之號普賢心聞能洞十方故曰遙聞前之所問唯修持讀誦而已此問云何能得者欲人深造自得也次答佛告普賢菩薩至於如來滅後必得是經文具標釋結為佛護念者道契佛心也植眾德本者福慧兩辦也入正定聚者體佛妙體也發救生心者行佛妙行也能行四事乃真得是經只此四語冠一經法華重演遠來勸發其義如此又一者開佛知見已獲理法界親承覺胤故得佛念二者示佛知見已得事法界繁興大用五十二位一念圓融故名德本三者悟佛知見已得理事法界逈超真俗寂照如如無出入相故名正定四者入佛知見已得事事法界興普賢事業平等真如故名發救一切眾生之心然此四法皆普賢之行攝華嚴二千餘門彼名雖多不出此四也二誓願勸發分二初護人二護法初中又六初攘其外難二教其內法三覆以神力四示以勝因五示以近果六總結且初攘其外難爾時普賢菩薩白佛言至諸惱人者皆不得便韋陀羅此云厭禱鬼餘如前釋二教其內法又三初行立讀誦是人若行若立讀誦此經至亦為供養法華經故六牙白象表六度清白梵行也二常坐思惟是人若坐思惟此經至得如是等陀羅尼由此經故親見普賢常行之體於一切法返本還源名旋陀羅尼既旋末歸本即旋體歸用於一切時處方便利生逆順自在名百千萬億即普賢遍一切處之行也法音方便即應機說法也三三七精進世尊若後世後五百歲至即於佛前而說呪曰阿檀地一檀陀婆地二至辛阿毗吉利地帝二十教內法中凡三番教訓初行立乘象安慰其心次坐思惟教示其經與其三昧今三七一心精進示教利喜也呪乃諸佛密語辟怪靈符或佛名號持之不怒而威或鬼王名呼之部落敬主然持之者不獨却難一切時處化㐫為吉轉罪為福隨心滿願乃至成聖成賢其利大矣教其內法竟三覆以神力世尊若有菩薩至皆是普賢威神之力若聞若持無非普賢神力也四示以勝因若有受持讀誦正憶念至為諸如來手摩其頭持經要行在正憶念憶不正則雜思變亂念不正則邪習混擾欲成深行難矣故此特明正憶念行而下文再三言之憶念既正則所行無非普賢正行故為如來摩頂印證也五示以近果若但書寫是人命終至有如是等功德利益忉利乃第二天所共唯天人兜率乃第四天所共乃菩薩倍勝可知授手乃提接義內宮天女皆化生故六總結是故智者應當一心自書至正憶念如說修行初護人竟二護法世尊我今以神通力故至廣令流布使不斷絕當知今之受持等皆是普賢神通常守護是經流通不滯也普賢勸發竟三如來述發又二初先述護法爾時釋迦牟尼佛至守護能受持普賢菩薩名者今述云汝能如是外多利益內積慈悲久劫已來作如此護我當以佛之神力守護持汝名者增進行人勇銳弘宣也二述其護人又五初述示其身教普賢若有受持讀誦至為釋迦牟尼佛衣之所覆是人見佛者述示身教法也尚見我萬德果身況汝因中六牙白象尚從佛口具聞此經況汝所教忘失句章尚為佛讚手摩衣覆況汝因人陀羅尼覆耶如從口聞等謂正憶念則即此經而見佛不滯於名相即此法而造妙不異於親聞也是為供佛謂能作佛事也佛讚善哉謂深契佛心也摩頂言得果有期衣覆言成就忍行憶念之正冥證若此二述示以勝因如是之人不復貪著世樂至能修普賢之行廣舉因中無諸過惡小欲知足修普賢行述勝因也有正憶念自然具足安樂行法而三毒垢慢所不能惱真能修普賢之行也當知正憶念力為四行之總持實妙行之真要所以再三言之世尊又復助揚意使後世知普賢所以勸發成行不在多術唯正憶念耳三述示以近果普賢若如來滅後至亦於現世得其福報其人當詣道場必成遠果況近果耶亦於現世得其近果不但生天四述攘其外難若有人輕毀之言至水腹短氣諸惡重病繚戾纏紏不申展之貌睞目傍視也夫報應之理出乎性命之微葢由性生心由命制業心以內感業以外招各從其類毫末不忒噫報應之於心業猶萬形之於規模焉是以毀持經之正見世世無眼供養讚歎則得現果出其過惡則得惡病輕笑之者則得醜狀若手脚之繚曲乖戾眼目之角睞倒視皆醜狀也又加以臭惡瘡膿鼓喘重病皆心之模範以類自招故也世之艱窮重病不無宿因故也五述信者功德是故普賢若見受持是經典者當起遠迎當如敬佛四聞品成行又二初聞品利益說是普賢勸發品時至微塵等諸菩薩具普賢道二事畢云散佛說是經時普賢等諸菩薩至受持佛語作禮而去此總結靈山一會大眾聞經獲益也一部經內兼有師資就勝為言故云佛說普賢等該列眾中菩薩眾舍利弗等該列眾中聲聞眾仍種聲聞者存本位耳其實大乘聲聞以佛道聲令一切聞也諸天等該列眾中八部眾歡喜者慶所聞故多劫飄零未聞此法今既聞已如客遇他鄉不勝忻幸故慶聞也受持者領所聞故受持不失信之不疑如遵王勅父命故領聞也作禮者重所聞故中心感激五體翹勤如蒙至極之恩拜謝無已故重聞也而去者聞已退修故古人進而聞道於師退而修道於己非如今人之入耳出口也流通已竟
