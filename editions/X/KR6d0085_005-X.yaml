body:
  text: 金臺即山居後學大義集妙法蓮華經藥艸喻品第五此品為中根人述成領解也由前品四子雖領隨宜之權會歸之實而未明一音密闡真知冥化之功如彼大雲雨於一切艸木叢林隨分受潤故說此喻顯大聖平等之慈若天地之無私萬物之自私也文中具有山川雲雨艸木叢林獨以藥艸立名者以土地是能生雲雨是能潤藥艸等是所生所潤也所生所潤通皆有用而藥艸用強喻有漏善能除惡而無漏善為最也四子以窮子喻領火宅喻深契聖心故歎善哉述其得解以喻其人故稱藥艸是世界益藥艸叢育既久一蒙雲雨力用充潤於內抽枝發榦於外如槁苗得雨浡然而興喻諸聲聞住最後身有餘涅槃更不志求佛道今得聞經兼以運人前云是真聲聞令一切聞內外自他具勝利用故名藥艸是為人益藥艸能除四大諸病補養五臟還色駐年喻諸聲聞今得聞經破無明惑是對治益藥艸樹木一蒙雲雨皆得鮮澤而各滋茂喻諸聲聞今得聞經識心作佛歡喜踊躍前云我等今日真是佛子無上寶聚不求自至是第一義益又藥艸二字言通意別別但藥艸通於三艸二木故又言別意通通七方便別但聲聞故三如來述成分二初略述成二廣述成初又二初雙歎善哉爾時世尊告摩訶迦葉至誠如所言雙稱善者美其領權領實不謬也善說者辭致曲巧故以序事有條序理按時如序窮子始而捨父繼而向父以國王疑父懼豪貴去父就父客作得父家業非異人非異財然經無限勤苦寫自己愚癡之情態如序父始而失子繼而求子門外遙見子知下劣放子設方便得子及付子家業無異心無異地然用許多慈悲明如來善誘之深恩只此一喻序盡五時教理一化始終言辭微婉義理精詳非大飲光錦心繡膓波舌海口則不能也誠如一句印定不謬二領所不及如來復有無量無邊阿僧祇功德至說不能盡雙歎一揚此科一抑謂引喻雖善陳義未周以窮子一喻止齊二乘得益先三後一之旨退不及人天進不及菩薩橫不及八法界豎不及七方便是領不及也如來復有等者假汝一身有無量口一口有無量舌一舌演無量音塵說剎說至無量億劫說不能盡所謂虗空可量風可繫無能盡說佛功德也當知如來說法一音演唱平等不可思議實不先頓後漸初三後一五乘隨類得解無有差別如龍興雲一味之雨普潤一切遍荷清涼不隔枯榮豈一窮子喻而盡如來功德哉下文佛說尚不能盡況迦葉等二廣述成有長行偈頌長行有二先述成開三顯一次復宗稱歎初又分二先法說次喻說法說又二初舉不虗以勸信迦葉當知如來是諸法之王若有所說皆不虗也佛法雖多不出權實權實之外更無別法上言無量無邊者此意難信故舉法王發言誠諦以勸信也二正述開三顯一分二先約教明開顯於一切法以智方便至皆悉到於一切智地於一切下開權也一切法謂七方便法也此法雖多以方便波羅蜜隨類演說無不逗會為人天說戒善為二乘說諦緣為小教說事度為始教說理度等其所說下顯實也地實相也究竟非二故名一其性廣博故名切寂而常照故名智無住之本立一切法故名為地次約智明開顯如來觀知一切諸法至示諸眾生一切智慧如來下明開三觀一切所歸趣者是權智能照權也知一切所歸趣者是權智能識藥也知深心所行是權智能知病也藥病俱是權法權法各有歸趣戒善等近趣人天若作遠緣低頭舉手皆趣佛果道品等近趣涅槃若作福嚴所行是菩薩道遠趣寶所六度理事等法近遠歸趣途轍不同深心所行有二若深心著於依正者起深重十惡障人天乘若深心著於所執法者起四倒三道六蔽五住障四聖乘當知深心病相不同如來以權智照之通達無碍也又於下明顯一諸法究盡明了者是實智能照實也一切權法無不入實故云究盡佛眼所見為明實智所知為了若此智照此藥此病不照彼藥彼病彼智照彼不能照此是權智照也一智遍照一切藥一切病是實智照也能示眾生如此圓融境智故言一切智慧也又上云通達無礙是約權論實也此於諸法明了者約實論權也二文互現正明實是權實權是實權當知究竟非權非實非差別非不差別以智方便權有差別悉到智地則無差別上法說竟二喻說分二初喻說二法合初中又二初有差別喻喻上權教權智二無差別喻喻上實教實智且初分六初土地喻迦葉譬如三千大千世界山川谿谷土地大千世界喻眾生世界山川等喻五陰世間世界無別法為山川等所成眾生無別法為五陰所成山喻色陰顯而可見川喻受陰水流盈涸谿喻想陰屈曲晦明谷喻行陰幽隱難見土地喻識陰通為所依又即堅固虗明融通幽隱顛倒五種妄想所成故又山喻菩薩五陰川喻支佛谿喻聲聞谷喻天土地喻人五陰一一五陰皆有習因習果所依猶山川等為艸木種子質幹所依也二卉木喻所生卉木叢林及諸藥艸種類若干名色各異卉是艸之都名木是樹之總稱眾艸成叢眾樹成林治病力用勝者為藥艸如善法治惡無漏善治惡義勝故喻藥艸五乘七方便因果種子不一故云種類若干如是種類各有稱謂即是名各有體相即是色三密雲喻密雲彌布遍覆三千大千世界喻佛三密也雲有形色喻佛應世身密也雲能覆陰喻佛慈悲即意密下佛說教即口密以慈悲熏應身說法遍十法界故言密布四澍雨喻一時等澍喻佛口密八音四辯宣澍法雨雲不密不能等澍慈不密不能廣利一雲所雨大千普洽喻一音密闡群生均被也五受潤喻其澤普洽卉木叢林至大根大莖大枝大葉法雨普潤七種眾生心地所有習因種子即生名為普洽根莖枝葉者喻信戒定慧次第相資小根等喻人天信戒定慧中根等喻二乘信戒定慧大根等喻菩薩信戒定慧也六增長喻諸樹大小隨上中下至而得生長華果敷實此明艸木隨分受潤也七種眾生習報兩因善法既蒙法雨所潤則習報兩果各得增長也稱其種性者明施權稱機小不過分大不減少即七種習報兩因也華果敷實即七種習報二果也華如習果果如報果此隔字為對應言華敷果實二無差別喻喻上實教實智分三初一地所生喻雖一地所生五乘心地地體無別然皆能生即一實相地而分五乘七方便也二一雨所潤喻一雨所潤一音所宣一乘法門開發五乘善根終是一音平等之教以被物雖五化意唯一故三三艸二木喻而諸艸木各有差別小艸力弱喻人天中艸小勝喻二乘上艸又勝喻小教菩薩小樹大樹勝於三艸喻始分二教菩薩三艸二木稟益差別不自覺知五乘善根蒙佛法雨隨分增長亦不自知五種之因皆依一佛性亦不自知五乘之教皆是大乘亦不自知同歸佛慧唯有如來乃能知之總之羣機唯是一理所說唯是一乘五性眾生習種有異立志不同進修有勤怠之別領會有淺深之異如地無私生雨無偏潤但艸木隨分受潤華實自別此則造物無私物之自私聖心無比機之自比也上喻說竟二法合分二初合有差別喻二合無差別喻初中又二先正合六喻次提喻帖合初正合中分六初合密雲喻迦葉當知如來亦復如是至遍覆三千大千國土合喻不次上喻先明五乘根性差別就機說故五乘居先此中就佛邊說先合密雲順序故也由如來出世然後說法法必被機機則受解緣別也出現於世者出現對入隱言以證窮法身常處寂光隱而入也為諸眾生倒駕慈航逆流而出應身世間出而現也如大雲起提喻帖合雲者無私成事住止不定喻如來不生不滅又覆陰義大慈現身覆育一切眾生又法身如空應身如雲此合身意二密以大音聲者舉佛口密合雲有聲普遍天人等別舉三善道稟口密之益即三乘根性三十子別稟聲益如彼一句合雲有聲遍覆一句通舉皆是佛子俱稟口密之益也二合澍雨喻分三先唱號令知於大眾中而唱是言至天人師佛世尊先唱十號令眾知歸我是之言非自伐也以佛出世九十六種各興異端今於眾中唱名令人知所崇重故也二弘誓知見未度者令度未解者令解至開道者說道者此四弘度生知見不謬也弘誓本成慈悲慈悲既緣苦樂弘誓亦約四諦而論若見苦諦逼迫悽慘楚毒辛酸緣此起誓故云未度苦者令度苦即眾生無邊誓願度也若見集諦顛倒流轉迷惑繫縛生死無涯甚可哀傷緣此起誓故云未解集者令解集即煩惱無邊誓願斷也清淨之道眾生不識行此道者能出生死至安樂地欲示眾生安立此道故云未安道品者令安道品即法門無量誓願學也滅煩惱處名為涅槃子果縛斷獲二涅槃緣此起誓故云未證滅諦者令證滅諦涅槃即佛道無上誓願成也今世二句三達洞照也宿命達過去天眼達未來漏盡達現在亦名三明一切知者具足三智也一切見者具足五眼也知道三句三業隨智慧行也知道謂意不護開道謂身不護說道謂口不護良以如來三業常與智俱則無有失故不須護也道指一乘由意證知此道故能現形開顯語言宣說也三召機來聽汝等天人阿修羅眾皆應到此為聽法故六道眾生均在悲化之內勸三善道應來聽者聞法易故又成道音聲遍聞三界大通光明遠照十方皆召機來聽意也三合土地喻爾時無數千萬億種眾生來至佛所而聽法眾生來者感應道交故他方大士不遠而來此土天人隨緣而至如雲龍風虎之狀四合卉木喻如來於時觀是眾生諸根利鈍精進懈怠上喻中有卉木差別大小不同今合中明五乘根有利鈍行有勤怠正是習因淺深與卉木義同也於時者觀機時也若論最初即鹿苑說小之時若論中間處處得論於時利鈍者三途因惡果苦不能受道為鈍七方便人聞教得益為利別譯三途受報窮劫鈍也人天聰明睿智利也人天但受果報不肎受道為鈍三乘根性斷惑出界為利精進懈怠者三途放逸為怠人天五戒十善為進人天不厭苦為怠二乘怖畏無常為進二乘貪證不求佛果為怠菩薩志求佛道為精進也五合受潤喻隨其所堪而為說法種種無量皆令歡喜快得善利隨堪為說者即是稱會五乘機宜而說也如堪以人天為說戒善堪以三乘為說諦緣六度等歡喜善利者即五乘各蒙法潤得益也六合增長喻是諸眾生聞是法已至任力所能漸得入道五乘眾生各得聞法各得增長現世至受樂者如三途聞法息苦停酸即現世安隱也或生人天中即後生善處也於人天中修道即以道受樂也人天聞法持戒福德扶身現世安隱也天生天上人生人間或天人互生者即後生善處也生能悟解即以道受樂也二乘聞法得有餘涅槃即現世安隱生方便土即後生善處於彼聞經即以道受樂生身菩薩聞盧舍那說法得無生忍即現世安隱生實報土即生善受樂又現世至受樂者習因感習果也離諸障礙即現世安隱任力入道者即後世以道受樂亦是報因感報果也又受樂釋安隱聞法釋生善處又既聞下結二乘離煩惱障菩薩離二障人天離三惡障五人於各法中各入其道也正合六喻竟二提喻帖合如彼大雲雨於一切至具足蒙潤各得生長大雲帖合形聲兩益雨於一切帖合澍雨卉木藥艸帖合受化眾生利鈍怠進加其二句帖合受潤得益各得生長帖合現世安隱等土地義含二合無差別喻分五初無差別法眾生蒙潤不知如來說法一相一味至所得功德不自覺知一相者眾生之心同一真如是一地也一味者一乘之法同詮一理是一雨也昔於一實相方便開為七相一乘法方便說為七教佛知究竟終歸一相一味也所謂下雙釋解脫相者無生死相也離相者無涅槃相也滅相者無相亦無相也此是一相中三相又解脫相者無分段變易二邊業縛之相離相者得中道智慧遠離二邊無所取著滅相者二邊因滅得有餘涅槃二邊果滅得無餘涅槃此是一味中三相又法法皆如同一相也物物皆洽同一味也眾生沾法雨而超纏縛即此一相一味之法名解脫相沾法雨而離因緣即此一相一味之法名離相沾法雨而得寂滅即此一相一味之法名滅相名雖有三究竟皆至一切種智所謂終則得為一切智果也大經云譬如眾水皆是一味隨器異故水有差別如來說法唯是一味隨眾生心地器異故有無量差別此如來觀知一切諸法之所歸趣者此也其有下明眾生不知正合上艸木差別眾生舉不知之人也法乃一音之法也若持誦等正明不知葢持誦不同修行亦異人天作戒善之解三乘作諦緣六度之解解既不同即是差別所得功德不自覺知者明五人各稟教益不知佛是一音無差別教是不知實亦不知七方便人各執己解為實是不知權故云不自覺知二唯有如來如實知之所以者何唯有如來至如實見之明了無礙唯有下約四法知過去因為種現在形貌為相主質名體自分不改名性種相體性五乘各論五乘各異即是差別如來能知同是一種一相一體一性即無差別如來亦能知差即無差無差即差如來亦能知念何事下約三法知念思修即三慧明記不忘曰念意沉默想曰思篤行無怠曰修何事者是所稟之教如小根念人天之事中根念二乘之事上根念菩薩之事思修亦然云何者有操修之功如小根以五戒十善法而念中根以四諦因緣法而念上根以六度法而念思修亦然以何法者謂用何因緣也如念人天者以福報因緣而念念二乘者以懼苦求樂之因緣而念念菩薩者以自利利他之因緣而念也思修亦然三根三慧即差別若入圓妙三慧即無差別以何法得下約二法知以何法即是因得何法即是果如戒善因人天果諦緣度因三乘果五乘之因各得其果即是差別眾生諸佛一如無二如即無差別眾法住下約一法知七方便住於七位故言種種之地此即差別如來如實佛眼見之明了無礙如眾流入海失於本味則無差別隨他意語以智方便而演說之則如來能知差別其所說法皆悉到於一切智地則如來能知無差別三舉喻帖合眾生不知如彼卉木叢林諸藥艸等而不自知上中下性所謂眾生聞法修行所得功德不自覺知也如天地之產百嘉雨露之滋眾卉自生自遂孰能知之四牒前結釋如來能知如來知是一相一味之法至終歸於空一相一味之法為緣分別解離滅等一為無量也究竟等歸空無量為一也此是牒前重釋無差別之義一相一味解脫離滅若是二乘法體猶是差別言宣今作大乘究竟涅槃終歸於空即無差別究竟一句結上諸句非是二乘有餘乃是究竟大涅槃也常寂一句結上諸句非是小乘寂滅乃是常住寂滅前云常自寂滅相即此義也終歸一句顯非灰斷之空乃中道了義第一義空也五釋疑佛知是已觀眾生心欲至不即為說一切種智恐疑云佛既知始末是一何不鹿苑即為說實釋云佛知是實因觀眾生心欲隨三悉檀而將之護之將護二字正是如來抑之在懷捨己從人恐其誹謗將導護惜故不即為說一切種智也上述成開三顯一已竟次復宗稱歎汝等迦葉甚為希有至隨宜說法難解難知前明如來無量功德億劫說不能盡恐人疑四子領解何必是實當知前約佛恩普被猶如雲雨靡不覆潤佛恩普載猶如大地靡不生成豈但為一方一機而已哉故云說不能盡上來廣明一音冥化澤被無疆已竟到此故佛歎述雖未及究竟佛地且領五時權實開佛知見分證佛果亦誠不虗兼欲引發下根令同得悟故云汝等希有二乘以無為正位捨證入實故云甚為希有能知隨宜說法述其能領開三能信能受述其能領顯實所以下釋成佛於一道隨宜說三深玄難解難知而汝等能信能受故歎希有也長行竟二偈頌有五十四行半分二先四行頌上法說次五十行半頌喻說初又二先半行頌法王不虗爾時世尊欲重宣此義而說偈言破有法王出現世間因果不亡為有二十五王三昧破二十五有如來已破此有為法中王故云破有法王次三行半頌開權實隨眾生欲種種說法至以種種緣令得正見隨眾生二句開權也隨其欲樂方便說三如來下顯實功高十地德邁三賢非尊重而何甚深無量橫竪莫窮非深遠而何深鑑小機知其未堪不輕所說是故四十餘年默而不說今大機既發方為說之何故久默而不說耶當知有智若聞能信能解其柰無智疑悔悔則謗謗則墮苦而永失矣是故下頌上到一切智地如來隨種種緣說種種教悉為令得大乘知見也此中破有對治隨欲世界久默為人正見第一義也次五十行半頌喻說分二初十行半頌上喻說二四十行頌法合初又二初九行半頌有差別二一行頌無差別初九行半分六初三行頌密雲喻迦葉當知譬如大雲至靉靆垂布如可承攬雲喻應身應身隨智慧行故為慧雲能具十二部經法故云含潤身放大光如電躍口震四辯如雷聲聞法歡喜故言悅豫九十五種邪見不現故言揜蔽除心地九十八種見思熱惱如地清涼應身現世似同三有有心往取實不可得故云如可承攬二一行頌澍雨喻其雨普等四方俱下流澍無量率土充洽八音四辯宣澍法雨一時俱聞故云四方俱下凡有心者皆蒙利益故曰率土充洽三一句頌土地喻山川險谷即七方便眾生五陰今蒙法雨身意柔軟如山川土地得雨潤澤也四二句頌卉木喻幽邃所生卉木藥艸頌上眾生習因差別喻眾生久遠習因隱在陰界入內故言幽䆳今蒙法雨悉得開發故言所生五二行三句頌受潤喻大小諸樹百穀苗稼至艸木叢林隨分受潤物理論云粱者黍稷之總名稻者粳糯之總名菽者眾豆之總名三各二十共六十蔬果之實各二十合為百穀百穀總名曰五穀謂麻黍稷麥豆也取喻五乘能生百善其實百善能生五乘也甘蔗喻定葡萄喻慧乾地一句喻未信者亦信也其雲下喻佛所說一相一味之法三乘五性隨分受益也六二行頌增長喻一切諸樹上中下等至一雨所及皆得鮮澤小不過分大不減少五乘各得增長故云皆得鮮澤二一行頌無差別喻如其體相性分大小所潤是一而各滋茂五乘體相根性不同如來法雨所潤是一初二句頌所生所潤次一句頌能潤則是無差別也各滋茂者差別不自覺知也二四十行頌法合分二初三十五行頌合有差別二五行頌合無差別初有六初一行頌合密雲佛亦如是出現於世譬如大雲普覆一切初二句正合次二句提喻帖合二八行半頌合澍雨又三初三行頌唱號令歸既出於世為諸眾生至出於世間猶如大雲諸法之實長行所無即一乘實相方便權巧分別演說皆為此也二一行半頌四弘度生充潤一切枯槁眾生至世間之樂及涅槃樂法雨滋潤枯槁眾生皆令離苦如五戒離三途苦十善離人道苦聲聞離三界無常苦緣覺離從他聞法苦菩薩離內無利智外無相好苦既離苦已皆得世出世間安隱快樂也世間樂人天也出世間涅槃樂三乘也又五乘咸有世間之樂皆令得涅槃第一之樂也充潤二句即度眾生皆令一句即斷煩惱安隱一句即學法門及涅一句即成佛道三四行頌召機來聽諸天人眾一心善聽至常為大乘而作因緣初二行召集人天等聽法也身無上相好莊嚴口無上具四無礙意無上俯察群機故云無上尊次為大眾下能說人尊故所說法妙甘露乃不死之藥妙法是真常之體稱之為淨以不染故也甘露淨法止得一味乃解脫涅槃之味也一味之法以一妙音演暢隨類得解斯義即上解脫涅槃也常為二句申明非但一時演暢斯義而已乃於四十年中雖說九部之法常為大乘解脫涅槃而作因緣也三四行頌合土地我觀一切普皆平等至充足世間如雨普潤我觀二句一性平等無有四句冤親平等恒為二句說法平等如為二句一多平等常演下久近平等說法乃如來之能事除此之外皆為他事去來坐立即四威儀中凡有機感皆為說法終不疲厭若有彼此等則有限礙疲厭世尊視四生如一子等三界以同仁為七種眾生說法如雨澍山川谿谷平等普潤也四二行頌合卉木貴賤上下持戒毀戒至等雨法雨而無懈倦文具六對貴為天子賤為庶民王民一對上而諸天下而人道天人一對持戒出家毀戒在家僧俗一對菩薩纓絡嚴身具足威儀聲聞福德淺薄不具威儀三乘一對正見內教邪見外道內外一對根利者大乘根鈍者小乘大小一對等雨者其教無私無懈者誨人不倦自貴賤至利鈍五乘展轉論之五十一行頌合受潤分三初一行總明受潤一切眾生聞我法者隨力所受住於諸地五乘受解緣別所證各異故曰諸地即下人天等二七行別明受潤或處人天轉輪聖王至如是菩薩名為大樹或處下一行明小艸受潤五戒處人道加勝施處輪王加十善處釋提四禪處梵王人天修戒善四禪八定等法暫治三惡八苦之病故喻小艸治時疾而已知無下二行明中艸受潤二乘俱有智斷無漏即道品等法修之能得小乘但二乘諦緣之法破人執之病免三界苦不能化他乃喻中艸求世下一行明上艸受潤權教菩薩自信作佛修六度行自利利他然皆住相不稱性理縱破法執不能忘相終不能治無明之病但志求精進勝於二乘故喻上艸六度中精進為最大論云施戒忍乃世間常法欲修定慧必須精進今舉精進攝餘度也又諸下一行半明小樹受潤佛所鍾愛故稱佛子有三賢四加之別故云諸位雖涉乎地前心則專乎佛道佛道雖多不出四無量心為本故曰常行慈悲佛雖未記作佛自知作佛無疑此菩薩雖順性而修二執齊破未見法身道用猶劣廕化不廣故喻小樹安住下一行半明大樹受潤此菩薩分證實相具不思議德用住於神通轉不退輪於一念頃能於十方開導利益一切眾生故喻大樹三三行總結能潤所潤佛平等說如一味雨至於佛智慧如海一滴佛平等說能潤也所稟各異所潤也佛以下顯功德智慧如大海無際以此喻種種演說如海一滴耳正是前文說不能盡之意六八行半頌合增長喻分二先二行總頌增長我雨法雨充滿世間至隨其大小漸增茂好法本一味修之不同故有差別如彼下舉喻帖釋次六行半別頌增長諸佛之法常以一味至是名大樹而得增長先明法一機異普得具足即現世安隱修行得果即後生受樂也聲聞若不值佛此身未必無後由見佛故成最後身果縛尚存聞法得果是中上增長菩薩智慧堅固了三界如幻求最上佛果是小樹增長住禪得通聞法歡喜是大樹增長此文似有缺略缺少小艸增長略則無權進實理應人天漸進三乘三乘漸入一乘由實至究竟三艸二木各有勝進方盡會權歸實之旨上頌合有差別竟二五行頌合無差別如是迦葉佛所說法至漸漸修學悉當成佛大雲一味無差別也各得成實有差別也以華喻人故云人華當知下明開權顯實非滅度者未度變易也獨言二乘者為保證心強故人天不計果為涅槃菩薩不於中間取證故但言二乘耳道因也菩薩之道須斷通惑二乘亦斷此惑故云是菩薩道二乘智斷既是菩薩之因豈宜執為果耶故斥之是菩薩道更令修習方得成佛大二乘行業不異菩薩但發心有異如不龜之藥浣者用之但充衣食士者用之則食封邑豈藥有差別哉的實而論不但二乘之行不異菩薩一切人天善業皆菩薩行豈必高巖入定虎口亡身者乎修學者勸修實相之因成佛者授其實相之果也上如來述成已竟妙法蓮華經授記品第六梵語和伽羅此云授記即讖語也讖騐也今生授記取騐於當來故聖言說與曰授果與心期曰記以諸子雖信作佛不蒙一言印許終滯猶豫既授之後則全身擔荷銘心自辦也又諸經或破授記如淨名云汝彌勒為從如生得記為從如滅得記如無生滅則知無記思益云願不聞記名大品云授記是戲論法今經云何答若見有記記人此見須破若菩薩誓記此須與記若世諦故記第一義中無有是事今經記有多種若通記如法師品聞此經一偈一句乃至一念隨喜者我皆與授記等若別記如三周授三根等若正因記如不輕云我不敢輕於汝等若緣因記如法師品以華香十種供養當知此人是大菩薩成就菩提若了因記如三周授記若遲記如聲聞速記如龍女佛記如此文菩薩記如不輕又他經但記菩薩不記二乘但記善不記惡但記男不記女但記人不記畜今經皆記亦云受記今從佛授與得名故云授記又當知開佛知見成自性佛以心印心名為授記授為授道記為記事道無涯際非師無由發生事雖夢幻非記無由起信是則由道而祿生由祿而顯道也四授四子記分二初正與中根授劫國莊嚴記二許為下根作宿世因緣說初又二初授迦葉記二授三子記初有長行偈頌長行分五初行因爾時世尊說是偈已至廣宣諸佛無量大法諸授記中奉佛多少不同隨其願力也事佛功行不同隨其才力也成佛果號不同隨其因行也告大眾者取證也奉覲等外託勝緣具足諸佛無量福德也廣宣等內積勝因成就諸佛甚深智慧也因緣雙勝福慧二嚴方得成佛宣大法者法師行菩薩道也二得果於最後身得成為佛至天人師佛世尊最後身二義一聲聞此身已盡不受後有名最後身二等覺後心金剛喻定無明斷盡異熟識空名最後身今是後義別號光明者因中然燈續明紫金塗佛世世生生身常金色故為羅漢時名飲光成佛時號光明由說法化生自利利他如日光明破一切暗也三劫國國名光德劫名大莊嚴國屬地理劫屬天時皆類其因行依正不出二儀也光德者所出皆智人故莊嚴者依正皆美勝故四壽命正像佛壽十二小劫至像法亦住二十小劫淨法界身本無出沒然住十二劫者隨大悲願力而示現耳正像之法二十劫而滅者隨眾生機感而隆替耳法性佛身固無加損於其間也五國淨眷屬國界嚴飾無諸穢惡至雖有魔及魔民皆護佛法國土淨者皆由平等淨心之所感也瓦礫荊棘雜心感也便利不淨染心感也坑坎堆阜諂曲心感也諸佛無雜染諂曲故國界嚴飾無諸穢惡唯修清淨妙行故其土平正寶華周遍淨名曰隨其心淨則佛土淨隨其心淨則一切功德淨此其證也其國下眷屬眾多魔護佛法大權示現行於非道通達佛道皆為外護眷屬又因行抖擻故果不惹魔事也此飲光未來成佛一大事因緣佛一一授之尊者一一記之矣二偈頌有十二行半分五初四行頌行因爾時世尊欲重宣此義而說偈言告諸比丘我以佛眼至修習一切無上之慧告諸下明劫數而於下頌覲佛植福為佛下頌宣法修慧梵行全攝六度二半行頌得果於最後身得成為佛三六行頌國淨眷屬其土清淨琉璃為地至乃以天眼不能數知劫國不頌文中先國淨次眷屬其心一句言慈悲之至也逮大一句言應化不測也不為而應不慮而遍異於小聖故云大神通也無漏後身即聲聞果體法王之子即大心聲聞亦得授記紹隆佛種故乃以二句極言眾多四一行半頌壽命正像其佛當壽十二小劫至像法亦住二十小劫五半行總結光明世尊其事如是二授三子記分二初三子請記二如來與記初又四初請記爾時大目犍連須菩提至即共同聲而說偈言大雄猛世尊諸釋之法王至除熱得清涼悚慄者驚懼不安之貌摹三聖希記之狀意謂我等同陳窮子一喻何故授彼記而未及於我故皆悚慄不安也若知我下意謂法喻二說皆賜我等聲聞作佛之語今授記中而不唱我名莫不心懷熱惱若如來證知我等深心見為稱名授記何異甘露灑心頓合肺腑清涼也二說喻如從饑國來忽遇大王膳至然後乃敢食此喻出自疑懼也正如有人從饑國來忽值大王賜宴之時雖珍羞盈席寶饌滿前不得王命稱名宣召不敢受食若得綸音宣召乃敢受耳三法合我等亦如是每惟小乘過至爾乃快安樂不知二句合饑人思食也雖聞下未得唱名授記不知名號劫國何等心中憂懼未敢擔荷如逢王膳不名不召故不敢食也若蒙二句合上若復二句四總結大雄猛世尊常欲安世間願賜我等記如饑須教食世尊說法安隱世間一切眾生況我等心懷悚慄安有不安隱者乎三聖說喻懇切希記之誠如是二如來與記分三初授須菩提記有長行偈頌長行分四初行因爾時世尊知諸大弟子至當修梵行具菩薩道那由他萬億也即十大數中姟數供養二句植福之廣也常修二句修慧之深也梵行舉一攝五聖天嬰病稱性無染總名梵行修證圓滿故云具菩薩道二得果於最後身得成為佛至天人師佛世尊因中心得無礙憶念受生如恒河沙在母胎中即知空寂因修空行而果號名相者因遣名相果即名相相即德相證無名之名非相之相名實不乖也三劫國嚴淨劫名有寶國名寶生至無數千萬億那由他有寶寶生者以初生時寶藏皆空七日又現今證果時劫國亦其義也華樹臺閣皆寶成者應劫國之名也所化人民亦處寶臺者享化主之福也聲聞下眷屬多也四壽命正像佛壽十二小劫至度脫無量菩薩及聲聞眾處空者第一義空也因空悟解不離本行故行道說法常處虗空所度之眾亦使由空而證實也二偈頌有十二行分分四初一行誡聽爾時世尊欲重宣此義而說偈言諸比丘眾今告汝等皆當一心聽我所說二三行頌行因得果我大弟子須菩提者至端正姝妙猶如寶山空生道德功行疑若亞聖而記果猶當供若干佛等者為小乘但念無相不修大行雖經多劫不成正覺故須發大心具大道然後成佛也三六行半頌劫國嚴淨其佛國土嚴淨第一至皆共合掌聽受佛語其佛下依報嚴淨無不愛樂也其佛法中等眷屬利根各具威德也國以菩薩為莊嚴者菩薩說法度生移風易俗足為國家觀光非莊嚴何哉縱任無礙塵累不拘曰解脫一內有色觀外有色解脫二內無色觀外有色解脫三淨解脫四空無邊解脫五識無邊解脫六無所有處解脫七非非想處解脫八滅受想處解脫其佛下由神通力處空說法也諸天下皆篤信樂善無薄惡俗也四一行半頌壽命正像其佛當壽十二小劫至像法亦住二十小劫二授迦旃延記有長行偈頌長行分四初行因爾時世尊復告諸比丘眾至具菩薩道由旬亦云踰繕那此云限量大論云由旬有三大者八十里中者六十里下者四十里文中先供八千億佛各起塔供養後復供二萬億佛亦起塔供養具菩薩道因行圓滿也要知文飾談鋒似箭辯口如河供如是之多佛起如是之塔廟種種供養舍利肖像方得福慧並隆今之具縛凡夫纔得一知半解一行未修一佛未事端居無事欲續佛道難矣哉二得果當得作佛號曰閻浮那提金光至天人師佛世尊因中別行勤掃佛殿為羅漢時名曰文飾成佛時號閻浮等此云勝金取其破盡妄惑深證法身其猶出鑛精金光色不變故又金乃眾寶之首喻佛為群聖之尊故三國淨眷屬其土平正玻瓈為地至無量萬億莊嚴其國文中先明依報嚴淨次明眷屬純善此中無劫國名者或譯人遺失也四壽命正像佛壽十二小劫至像法亦住二十小劫二偈頌有七行分三初一行誡聽爾時世尊欲重宣此義而說偈言諸比丘眾皆一心聽如我所說真實無異二二行三句頌行因得果是迦旃延當以種種至得佛智慧成等正覺三三行一句頌國淨眷屬國土清淨度脫無量至無量無數莊嚴其國斷一切有者謂其佛所化雖有三乘五性究竟皆歸一切種智至於理極情忘纖塵不立也亦即二十五有也壽命正像略而不頌三授目連記有長行偈頌長行分五初行因爾時世尊復告大眾至二百萬億諸佛亦復如是文中先供八千佛滅後起塔供養後復供二百萬億佛亦復起塔供養二得果當得成佛號曰多摩羅䟦至天人師佛世尊因中神通第一果時號多摩等者此云性無垢香也以香不離此而至彼通不捨因而成緣諸聖成佛別號皆果不違因也三劫國劫名喜滿國名意樂此佛以神通攝世教化眾生心悅誠服故劫名喜滿國名意樂也四國淨眷屬其土平正玻瓈為地至菩薩聲聞其數無量其土下先明國淨皆從正報之所感多諸下次明眷屬皆是三乘五性之機五壽命正像佛壽二十四小劫至像法亦住四十小劫二偈頌有十二行半前十行頌上長行分四初四行半頌行因爾時世尊欲重宣此義而說偈言我此弟子大目犍連至而以供養諸佛塔廟法苑云阿育王取金旛金華懸諸剎上又僧寺號剎者以柱表剎示所居處也此中長表金剎者謂塔上覆鉢柱為塔之表以金為之其塔高千由旬則表之長可知也二二行頌得果壽命漸漸具足菩薩道已至其佛壽命二十四劫三二行半頌屬眾多常為天人演說佛道至於佛智慧皆不退轉四一行頌正像佛滅度後正法當住四十小劫像法亦爾若夫國土大小劫之修短法住久近眷屬多少各隨本願功德所致也上正與中根授劫國莊嚴記竟二二行半頌許為下根作宿世因緣說我諸弟子威德具足至吾今當說汝等善聽下根之人已聞法喻二周開三顯一復見五人受記作佛而猶疑慮不了深生愧恥今欲增進故先許總記更許說宿世因緣也上喻說一周被中根已竟妙法蓮華經化城喻品第七由前五人得記會中有一類下根聲聞以佛果非己智分不發大心意謂彼為唱導之首宜乎得記又聞藥艸法一機異猶恐終不可及懷絕分之心故不敢請世尊知其意即說宿因遠引塵劫大通時覆講教化曾下一乘緣種今緣已熟正當印許之時也然謂之化城者以神力故無而忽有名之為化防非禦敵稱之為城法中以權智力無而說有為化防思禦見為城化城本無權設以止疲勞怠進之人令至寶所喻小乘涅槃非實權設以濟樂小求證之人引入佛慧問三周說法上根疑薄但取道樹以明機緣中根疑厚以譬喻明機緣下根疑更厚故明宿世久遠機緣此品說因緣事下根得悟應名宿世品何名化城答若從久遠之始則名宿世若從中間則名化城若從究竟則名寶所今從中故又因緣過去寶所未來化城現在舉現在以攝前後故問化城是權寶所是實何棄實從權答由知城是化則知寶所是實標化城不失實也又此品雖與弟子說宿世因緣實發譬喻藥艸之餘蘊喻品意在火宅白牛此品意在化城寶所出火宅入化城駕白牛至寶所兩相合而意始圓也此品雖說大通時覆講已為汝等作今日得度之緣實發藥艸法雨等澍於諸法中任力所能漸入佛道之意所謂無量功德說不能盡者此也諸子因緣遠近不同身子二萬億佛所千二百塵劫覆講教化各自言之交相發而互相明以此開發䇿進下根大眾聞說頓領昔因自信成佛乃得受記也大章第三因緣一周被下根文有三品分二初此品正說因緣二後二品正明授記例法說應有五段今少領解述成慶讚者攝在授記二品之中以文少不復分故初又二初明知見久遠二明宿世因緣初有長行偈頌長行分三初明所見事佛告諸比丘乃往過去至彼佛滅度已來甚大久遠此中欲明宿世因緣先舉過去佛為結緣之所也無量等表所證超出群數之外首於有物之初不唯顯大通成道之久正明諸子受化之深也別號大通智勝者乃一乘實相之果佛也此智之體囊括十虗為大洞照塵劫曰通物無與等名勝以迹言之乃釋迦本地之宗師以理推之是眾生本源之覺體眾生自迷色心之後故小而不大封滯無明之殻故礙而不通潛伏藏識之內故劣而不勝若能了色心之迷滯破無明之封殻則智勝現前生佛無異矣時則六合雍熈名好城人材茂異名大相諸比丘下明佛滅度久遠二喻明久遠譬如三千大千世界至百千萬億阿僧祇劫地種者地大種也婆沙論問云何名大種答大而是種能減能增能損能益是為種義千國土一佛化境也此中以非喻為喻只要釋成上甚大久遠一句以大千世界地種盡磨為墨則墨之數無量也又不隨地下點乃過千國土纔下一點其點又不甚大但如微塵至下盡地種墨其國土之數無邊也故算師等不得其邊不知其數也復將點墨不點墨之國土盡抹為塵以塵較劫復過是數無量無邊百千萬億阿僧祇劫故前云不可思議所謂塵點劫前更塵點點塵盡點劫未休無始之始始於無始者此也三見昔如今我以如來知見力故觀彼久遠猶若今日此先明如來三達遠照顯所引往事分明不謬然後說宿世因緣也當知十世古今的確不離於當念離此當念心性之外別無去來實法可得如人追思十年二十年事宛在目前便可例知心性本來竪窮三世三世不出現前一念但由無明不能遠見佛既無明斷盡心性洞徹故竪極三際之始終橫極法界之邊畔也二偈頌有七行分三初一行頌所見事爾時世尊欲重宣此義而說偈言我念過去世無量無邊劫有佛兩足尊名大通智勝二四行頌喻明久遠如人以力磨三千大千土至如是無量劫三二行頌見昔如今如來無礙智知彼佛滅度至通達無量劫當知下乃警省之語謂人人本有之大通何不審察一番無漏者大也通達者通也淨微妙者智也無所礙者勝也又三智一心故淨一心三智故微非三非一而一而三故妙體圓滿故無漏用周遍故無礙如來觀昔如今大通智勝現也大眾不知久遠事者大通智勝未現故也二明宿世因緣有長行偈頌長行分二初明結緣之由二正明結緣結緣之由有遠有近先明結緣遠由又二先明大通智佛成道次明十方梵王請法初中分五初佛壽長遠二成道前事三正明成道四眷屬供養五請轉法輪且初佛壽長遠佛告諸比丘至五百四十萬億那由他劫那由他亦名阿庾多此云萬億二成道前事又二初明所經時節其佛本坐道場破魔軍已至而諸佛法猶不在前本坐道場者即我始坐道場也魔即煩惱五陰等魔也又因果經云諸佛成正覺時魔王廣集軍眾興戈舞刃為佛所摧莫不降伏也垂及也又示也得菩提者到實智之彼岸已證諸佛智慧之體即今覩明星時也佛法不現前者未得其智慧門之用也如是下大通佛起悲思惟欲度眾生不得其方即今三七思惟欲度一切不得其法也趺坐不動即不離菩提樹演大華嚴也問釋迦得道三七思惟大通成佛十劫思惟佛法不現前者何也答諸佛道同為緣事異釋迦六年苦行艸生攢䏶至肘不覺諸天哭喚動地不聞彌勒即日出家得道彼佛十劫不現在前者非根有利鈍道有難易緣宜賖促應示長短耳又釋迦住世八十年三七不為少大通住世五百四十萬億那由他之長十劫不為多也當知諸佛說法意會一同序中文殊引自往昔傳燈明之道所化弟子今皆成佛此中是釋迦引自往昔續智勝之道所化弟子有千二百當得成佛所謂佛佛道同為緣事異師弟名號遠近有別化道因緣今古事同也二明諸天供養爾時忉利諸天先為彼佛至至於滅度亦復如是先為彼等者乃於未坐道場之前先於菩提樹下敷設也佛於此座者謂既敷座已復況願曰佛當於此座而成道也凡佛成道皆欲界主設座此常例也適坐此座等者謂欲界諸天既唯設座色界諸天自佛坐道場之始雨華供養乃至滅度四王夜摩等天天樂供養亦至滅度也面百者四面各百由旬也三正明成道諸比丘大通智勝佛至成阿耨多羅三藐三菩提佛法現前乃權法也即今尋念等權智現前也四眷屬供養有長行偈頌先長行明親近供養其佛未出家時有十六子至一心合掌瞻仰世尊燈明八子大通十六皆表在纏八識對上根正而不邪故唯八此對下根邪正兼混故云十六大通表本覺諸子表始覺所為父子依本理而起始智也子又出家者依始覺而契本覺也十六舉第一者舉長以該幼也智積者實智具恒沙功德故云積又父名智勝子名智積者亦因地心與果地覺名目相應也種種珍玩者龍鳳之胄窮奢極欲定非世人所及極耳目之娛充口體之歡宮室之美麗姬妾之媚曼無往而非珍玩之物也聞父成道捨珍而往者輕榮重道也富貴人之所欲天下之情視若浮雲騷人之志諸子抗情世表逸志大方若非外形骸如弢袠小天下如敝蹝者孰能如是又以世愛非常天年有限頓捨有為之道欲求無為之理以世道報親唯資於一世以佛法報親有益於萬劫故捨世間恩愛而去之非無返復也所謂善繼其志善述其事其達孝矣乎諸母泣送者十六非一母生故曰諸以骨肉恩愛難割難捨眷戀之情痛崩於肺腑慘然之迹著散於諸竅故涕泣而送愛其子兼近其夫君以成道也祖王隨至者有道之人父不得而子也大臣人民亦至者上行而下效也有據此父王頭面禮足為父母返拜者蓮大師問云汝號甚麼佛云不敢汝垂成正覺否云不敢且待汝成正覺坐十劫受大通佛位納父母拜未為晚也當知返者還也謂在家父母不受出家子禮而還其禮也在子曰是父母當禮也在父母曰是佛子當還禮也又此文不明大通不受父禮準今佛成道八年後回國為父王說法淨飯王領合國臣民遠迎見佛不覺禮拜佛踊身虗空隱身不現禮已然後現身方問父王安樂否二偈頌歎慶有八行分三初三行半歎佛因果以偈頌曰大威德世尊為度眾生故至安住無漏法不怒而威曰大威化洽廣深曰大德折伏攝受為物所依曰世尊為度下因行之德具足即因行圓滿之意善哉下果滿之德萬德純淨故云善哉見者無不獲益故云吉無上一坐下釋上希有五根不緣外塵故身手不動八識已離內染故心常憺怕即安靜義其猶月爽天秋寒光無際也理至情竭學無所施曰究竟二障種現俱亡曰寂二死果報已盡曰滅一證此道盡未來際故云永轉有為之染法全是性淨功德故云安住無漏法也二三行慶己所遇今者見世尊安隱成佛道至永不聞佛名見佛聞法故曰得善利善之一字即教理行果無漏之法聞教悟理依理修行依行證果此等善利必能克就故云得也沉輪六道恒為三障所煎故常苦惱自無智眼曰盲妄境如夜曰瞑一切眾生迷法迷人心境俱昏故曰盲瞑不遇知識開示故無導師由此滿腔迷晦雖厭苦不識盡苦之道忍受生死不求解脫三界長夜如夢如醉也六道唯人天屬善眾生造業墜惡趣者多故增生善道者少故損捨生受生不離惡趣故云從冥入冥恒為八難所障故不聞佛名將遇佛而未及見佛如飛狸之先陰已遇佛而不欲聞佛如快見之後身既見佛而不識佛如六師之徒黨此等迷人豈性之使然乃盲瞑之習所使然也三一行半總結今佛得最上安隱無漏道至歸命無上尊初二句結佛證果次二句慶己慶他末二句總結歸誠五請轉法輪爾時十六王子偈讚佛已至重說偈言世雄無等倫百福自莊嚴至當轉無上輪前來誦德慶己必欲聞法以取聖果故勸請也法輪者法喻雙陳輪乃車輪有運載摧碾義如來教法能載眾生從凡至聖摧伏眾生一切惑障故又車行處螳螂不能拒轍喻大教宣時魔邪不能搪揬也又三十輻為一轂當其無有車之用佛之說法如空中風畵說而無說故有利物之用也秀拔六合之表故曰世雄無等者四天無以齊其福無倫者十聖無以及其智百福約化身即三十二相約報身即九十六種大人相也度我及諸者自他同證意也為分別等者願四悉隨機開顯指示令我等聞解思修亦得是智慧也智慧即智度修福含五度世尊二句請應機說法也以所念所行向道之機智力福力受道之質宿命行業得道之因各有大小淺深佛悉知之當說法以應機也大通智佛成道已竟次明十方梵王請法分二初威光照動佛告諸比丘大通智勝佛至遍滿世界勝諸天光圓滿菩提歸無所得今言得者無得之得耳世界是眾生共相所感礙而不通堅而難動障却自己本源之智故諸佛成道先動眾生難動之地以表破無明顯智光也中間者銕圍山間也日月不能照者惡業所障蔽也皆大明者因佛成道而明也眾生久處幽冥彼彼不知一蒙佛光各得相見故驚恠云此中云何忽生眾生因果經云悉達處胎時三千國土朗然大光日月不照而皆大明其中眾生各得相見初成道時亦然此光橫則五百萬億國土竪則各國上至有頂下至阿鼻與今一光東照同也彼佛是始今佛是終彼此互顯本有之大通智勝也又眾生既蒙佛光無不獲益華嚴云菩薩足底放光照於地獄眾生蒙光皆生忉利復聞天鼓說法立證十地今經亦然佛光照處必是宿種有緣一蒙此光未離苦者必離苦未脫難者必脫難應知此光所照必不徒施也又其下明梵宮震動光勝天光二十方梵請分二先明九方次明上方此十方梵請即廣前方便品諸天請法也又十方次第而至者言不頓彰也究實而論十方一時光照同時相見同時相議同時尋光同時謁佛無有前後也且初九方中分四初東方雲集又分七初智佛現瑞爾時東方五百萬億至光明照曜倍於常明常明者即天光也言倍者佛光乃無漏之用倍於有漏之身光也二梵眾驚駭諸梵天王各作是念至以何因緣而現此相三互相問決是時諸梵天王至為諸梵眾而說偈言我等諸宮殿光明昔未有至遍照於十方云大德天生者即補處大士將欲住世先生兜率放大光明有此異瑞必有異人出焉四尋光見佛爾時五百萬億國土至及見十六王子請佛轉法輪見佛處於道場始知向光非大德天生是佛出世之光梵天作念相議推尋見佛請法與前幽冥眾生驚恠忽生真雲泥之隔也五廣陳供養即時諸梵天王頭面禮佛至一心同聲以偈頌曰世尊甚希有難可得值遇至惟願哀納受供佛亦供樹者樹乃佛之所依敬其樹實敬其人也如甘棠民不忍伐之意樹十由旬座一由旬華如須彌其相云何當知不思議事彼此不礙又如山者顯最多也非實如之如形深取海形高取山皆極顯之辭納處者留也偈初四句讚悲心道成曰德兩利曰功數不可知曰無量稱法界理無無歉曰具悲救弘遠無物不受其化曰救一切天人下四句讚慈心範圍五乘而不失幾曲成六道而無所遺言有法行有則曰天人師三惡業苦因光攝而即息五性沉流借慧棹而登岸故曰普饒益所從來下明來意之誠自遠趨風不惜一己之勞天福非常故捨四禪之樂屈己而來為供佛故先世下求鑑其誠以納其供也宮殿乃宿福所致出己所享上享於佛者借有漏之果作無漏之因也六請轉法輪爾時諸梵天王偈讚佛已至一心同聲而說偈言世雄兩足尊惟願演說法以大慈悲力度苦惱眾生七默然允許爾時大通智勝如來默然許之默然許者諸佛受請之儀法爾如是有四意一隨先佛規則故二生人尊重渴仰故三不同凡夫外道故四能令目擊道存故即四悉檀益二東南方雲集又七初智佛現瑞又諸比丘東南方五百萬億至宮殿光明照曜二梵眾驚駭昔所未有歡喜踊躍生希有心準前當有諸梵各作念等下皆準之三互相問決即各相詣共議此事至為諸梵眾而說偈言是事何因緣而現如此相至度脫苦眾生必有非常之人然後有非常之瑞以此裁之必非天生多是佛出也過千萬億等言此光不在此土當過千萬億土求之要知雖過千萬土元不離當處也四尋光見佛爾時五百萬億諸梵天王至請佛轉法輪五廣陳供養時諸梵天王頭面禮佛至一心同聲以偈頌曰聖主天中王迦陵頻伽聲至今得值世尊群賢所尊曰聖主四天所宗曰王以極果聖人統王十界故梵音鏗鏘故喻迦陵頻伽此云妙聲鳥也大論云迦陵鳥在殻未出發聲微妙勝於餘鳥正法念云如是美音若天若人無能及者唯除如來音聲三惡道等惡人多而善人少隨因感果也眾生盲瞑失於正見不知出要佛為指示引之令出故云為眾生作眼不創聖業子育生靈已入惡道者救之令出未入惡道者護之不入故日哀愍饒益也六請轉法輪爾時諸梵天王偈讚佛已至一心同聲而說偈曰大聖轉法輪顯示諸法相至忍善者增益大聖乃說法之人法輪乃所說之法法有頓漸性相隨機演說度苦眾生離苦得樂也得道者三乘賢聖受福者三界諸天故惡道少而善者多云忍善者得聞佛法勉力為善也七默然允許爾時大通智勝如來默然許之三南方雲集又七初智佛現瑞又諸比丘南方五百萬億至各自見宮殿光明照曜二梵眾驚駭昔所未有歡喜踊躍生希有心三互相問決即各相詣共議此事至為諸梵眾而說偈言我等諸宮殿光明甚威曜至為佛出世間四尋光見佛爾時五百萬億諸梵天王至請佛轉法輪五廣陳供養時諸梵天王頭面禮佛至一心同聲以偈頌曰世尊甚難見破諸煩惱者至惟願垂納受說法破眾生惑障令得無上之果又以三昧破煩惱故百三十劫乃一見故云甚難見言曠世久矣今乃得一見耳眾生不食法味如饑渴如來說法有情聞之如饑得食渴得飲頓除曠劫之饑虗也眾生不沾聖澤如艸木枯槁一聞妙法便能發心修因克果如艸木得雨枯而秀華而實不期而致也上句有機無教下句有教無機昔所下歎佛難遇祈垂納受六請轉法輪爾時諸梵天王偈讚佛已至一心同聲以偈頌曰惟願天人尊轉無上法輪至當演深遠音惟願二句請法擊於三句喻也鼓取䇿發義螺取號令義雨取潤澤義教法能令眾生破惑拒魔力破重圍如鼓催發戰士也法音宣暢能令遠者悅近者集濟濟受道如聞螺聚聽號令也一音說法隨類得解無不入道如婆伽一雨隨地各別各得受潤也如來說法有形聲二益如如意珠如藥樹王所益弘多故云度無量眾生聖人談吐貴在投機言近指遠淡中有味故云深遠音也七默然允許爾時大通智勝如來默然許之四總明六方雲集西南方乃至下方亦復如是西南西方西北北方東北下方六方例上七段皆同次明上方雲集分六初智佛現瑞爾時上方五百萬億國土至所止宮殿光明威曜二梵眾驚駭昔所未有歡喜踊躍生希有心三互相問決即各相詣共議此事至為諸梵眾而說偈言今以何因緣我等諸宮殿至為佛出世間四尋光見佛爾時五百萬億諸梵天王至請佛轉法輪五廣陳供養時諸梵天王頭面禮佛至一心同聲以偈頌曰善哉見諸佛救世之聖尊至皆共成佛道善哉下二行歎佛恩德善哉乃自幸之辭無邊法門拯濟有情故云救世眾生沉於生死宛轉無出故喻牢獄獄中不強無罪之人三界總是自迷之輩以勸誡二門令出三界故云勉出二智照法無遺曰普智羣萌者眾生雖惡不斷性善喻艸木有萌芽雖殘害非無萌蘖生焉甘露乃長生之藥喻佛法必證真常之果也宗鏡云有甘露樹中秋露滴於葉上人取之為長生藥若入地中化成珠如人聞法入識化為菩提種子也於昔下四行半明三界苦果諸天頌中有云一百八十劫一百三十劫又云無量劫者信知佛身無所不在無時不現但隨緣所感故有延促生滅之見耳色力少則形劣惡陋無復貴相智慧減則心染邪法無有正慧皆罪業所致也不得人天之福失樂也以苦為樂不知期福修因故失樂想也住於外道邪法不識聖人儀則不蒙諸佛教化所以生死往返常墮惡道佛為下三行慶其嘉遇願以下回施有情諸梵準此皆有回施之文六請轉法輪爾時五百萬億諸梵天王至時諸梵天王而說偈言世尊轉法輪擊甘露法鼓至無量劫習法甘露法鼓使將死者聞其聲不死已死者復甦將死者凡夫也已死者闡提也無量劫習法者即佛長劫修行自證之法願如所證而說也十方梵王種種佛事其意專在尋光見佛以人人有此光個個有此佛但不知光之所自故不得見佛耳若知光之從來則見佛不遠故諸天作念皆云以何因緣而現此相東方向西尋南方向北尋皆是描寫此一段光無在不在無有定處西看則東北看則南瞻之在前忽然在後其實不離大通佛邊其實不離當人一念所以諸梵王一見佛即歡喜讚歎也上結緣遠由已竟二明結緣近由分二初轉半字教二轉滿字教初又三初智佛受請爾時大通智勝如來至及十六王子請此結緣之近由也由佛受請說法王子後得覆講正作結緣二正轉教法又二先說四諦法即時三轉十二行法輪至是苦滅是苦滅道此先轉半字法輪也三轉者示勸證也示者示其相狀謂此是苦逼迫性等勸者勸其令修謂此是苦汝應知等證者引己證彼謂此是苦我已知不復更知等聲聞鈍為三轉緣覺次之為再轉菩薩利為一轉三轉十二行者一約教謂四諦各有示相勸修作證即十二教法輪二約行謂四諦三轉皆生眼智明覺即十二行法輪苦法忍苦法智苦類忍苦類智一諦有四四四十六三人各得十六心成四十八行今約一諦論十二行也愚謂三轉即四諦十二行即十二因緣此中先標下先說四諦法次說十二因緣法智者詳之教行相循共摧惑障名之為轉轉此法度入他心令彼得悟名轉法輪若沙門等不能者沙門不聞尚不能知何況能轉婆羅門雖聞不解其理亦不能轉天著樂魔破法梵味禪故皆不能轉唯佛能轉者如禮樂征伐自天子出餘人皆不得擅專也謂是苦下為聲聞先轉四諦法輪也四諦通大小偏圓謂生滅不生滅無量無作等今是生滅四諦苦者逼迫為義一切有為心行常為無常患累之所逼惱故名為苦即三苦八苦等集者招感為義即見思惑惑與業俱能招生死故名為集集為因苦為果果必有因故云是苦集此世間因果也滅者滅無為義惑業既盡則無生死之累故云是苦滅滅諦之體是二涅槃道者能通為義正道助道是二相扶能通至涅槃故名為道道能滅苦故云是苦滅道略即戒定慧廣即七科道法道為因滅為果此出世間因果也生苦之集名苦集盡苦之滅名苦滅苦滅之道名苦滅道不得單言苦道以道非生苦不同集故又非滅苦不同滅故能證苦滅故名苦滅道次說因緣法及廣說十二因緣法至生滅則老死憂悲苦惱滅此為支佛轉十二因緣法也廣前苦集為流轉門廣前滅道為還滅門十二因緣經論名義不一或名有支重城棘圍牽連苦事有云三世二世一念等說三世者破斷常故二世者破著我故一念者重性實故今以三世二重因果釋之展轉感果為因互相由藉為緣無明者過去一切煩惱皆是無明體即是癡以愚癡故迷暗不了故名無明即是惑也行者遍去世造作諸業名之為行由惑造業故云無明緣行此二屬過去因識以了別為義以業成故牽生三界意識妄念投托父母故云行緣識既托母胎七日一轉而成心色名即心色即質故云識緣名色六入者五七之後六根成此胎中六七名髮毛爪齒位七七名具根位五根圓滿故根有入塵義名入色心成就六根故云名色緣六入觸者出胎以後三四歲時由根對塵未能了知是為觸故云六入緣觸受者領納義從五六歲至十二三因六塵觸對六根即領納前境好惡等事雖能分別未能起貪欲心故云觸緣受此五屬現在果愛者貪戀為義從十四至二十貪於種種勝妙資具及色欲等境未能廣遍追求由領納故即起貪愛故云受緣愛取者追著義從二十後凡見一切境皆生取著之心由愛生著故云愛緣取此二即煩惱與過去無明同有者因果不亡既著諸境起善惡業積集牽引當生三界故云取緣有此一即業與過去行同上三屬現在因生者四生六道受生也從有還受後世五眾之生故云有緣生老死者受生之身熟壞故此二屬未來果憂悲等老死皆有故上流轉門也無明滅下還滅門約苦集即有無明乃至老死約道滅即有無明滅乃至老死等滅逆順觀察並由無明為本故無明一滅則行滅乃至生滅老死滅也其實先老死逆次觀察故緣起經云由誰有故而有老死如是老死復由何緣初句是推因智二句是審因智此十二法除無明一支各有七智以無明無因可推審故先推老死從何因生知從生因即推因智次如是老死復由何緣此是審因智細於推故三世各有二智為六第七住法智一支有七智十一支共七十七智也問諸佛皆說三乘此何不言六度答今為下根論結緣事由故不及菩薩耳三聞法得道佛於天人大眾之中至無量無邊不可稱數不受一切法者悟諦緣空盡諸有結意識滅盡了無所著也葢心本解脫有受故累性本明淨有著故昏一切法不受不著故得解脫之果又不受一切法者斷八十八使證初果見道位也諸漏即見思惑心解脫者脫子果兩縛斷盡思惑得無學果位以盡智斷惑無生智證理因亡果喪證入空理心得自在故名解脫深妙禪定者二乘觀練熏修九次第定名為深妙初說諦緣法時六百萬億那由他得道二三四會說是法時得悟之人轉多於前轉半字教竟二轉滿字教分七初王子出家爾時十六王子至求阿耨多羅三藐三菩提沙彌此云息慈自七歲至十三為驅烏因行彰故十四至十九為應法近受圓故二十上為名字未具戒故又具戒沙彌遵守二十四門儀故今是菩薩沙彌發大心故諸根二句即六根清淨通則不泥小道利則不樂權乘明則不居陰界了則不滯中途皆內因也供佛下外緣植福已廣種德已深志求佛果也二請轉法輪俱白佛言世尊至深心所念佛自證知皆已成就者明濁障已除大乘機動也諸子大乘功德悉皆具足復愍諸聲聞未為究竟故重請開顯廢半明滿與今法華同也深心所念者深心樂集一切諸善法故直心正念真如即求菩提大悲心度一切眾生攝在志願之中上求下化之心佛自證知也三所將人眾出家爾時轉輪聖王所將眾中至亦求出家王即聽許八萬億人是輪王率領之眾見王子出家頓發思齊之心故深慕聖道出世纏家入法性家也聖王十善化世所以從人出家而即許之問僕從出家序此何意答正為下王子覆講之機因為智佛疑惑之眾故為王子結緣之眾也四受請說經爾時彼佛受沙彌請至皆共受持諷誦通利二萬劫者上既為二乘說諦緣等法後受諸子請又說法華故知中間不容默然必說方等般若也下偈云說六波羅蜜及諸神通事方等教中多明不思議神通事故知說方等六度即菩薩事故知說般若受持等即拳拳不失意應上皆共修學五時眾有解不解說是經時十六菩薩沙彌至千萬億種皆生疑惑云菩薩沙彌者由聞方等般若二萬劫中修六度行故沙彌二乘即信解眾千萬億生疑即不解眾此等即於十六王子所聽經結緣也上士聞道勤而行之王子是也中士聞道若存若亡聲聞中有信不信也下士聞道大咲而已不解之眾而生疑惑也六說經時節佛說是經於八千劫未曾休廢顯說經時節之長如燈明六十小劫不起於座也七說已入定說此經已即入靜室住於禪定八萬四千劫靜室入定之處所八萬等住定之時節智佛入定是結緣之近由由入定不出千萬億疑惑之眾無所咨問故十六沙彌為其覆講法華也上結緣之由竟二正明結緣分二初法說結緣二喻說結緣初又三初明昔共結緣二明中間值遇三明今還為說初又三初王子覆講是時十六菩薩沙彌至廣說分別妙法華經知字最重智佛入定非無故而然也我釋迦一化始終皆以智佛入定而為由致以今所化之機皆智佛時覆講之緣種由彼佛說法之後入定而眾疑無所咨問故王子為其覆講自爾已來恒為受化之機若不知智佛入定之旨則昔緣不結今日何所成熟所謂適化所及非昔緣無以導心也智佛入定已知疑惑之眾是王子之機必由王子究竟得度故住定八萬四千劫王子覆講善繼善述也玄宗既唱暫示忘言故寂然禪定繼述其事欲布所聞故各升法座下繫珠喻正指此也二眾得利益一一皆度六百萬億那由他至三藐三菩提心發菩提心故云得度六百等眾生即上不解之眾示者指示教者教詔令彼得益為利喜他得益為喜即開示眾生佛之知見使其悟入而得利益也三出定稱歎又二初正歎希有大通智勝佛過八萬四千至開示眾生令入其中具內因外緣自利利他之德故甚為希有也令入其中者即度一切眾生皆令入佛慧也二勸物親近汝等皆當數數親近至三藐三菩提如來之慧能信不毀者恐得度有不信而毀者故先歎其德後勸親近所以下徵釋勸近之意三乘能信所說受持不毀當得同歸一乘入如來慧也二明中間值遇佛告諸比丘至得值四萬億諸佛世尊於今不盡世世所生與菩薩俱者無緣必不相聚有緣必不相離也四萬億諸佛得值不盡者身子利根值二萬億佛下根者值四萬億佛即數數現生滅等佛也先成熟者先得度之後成熟者後得度之如漁人前網前獲後網後獲也若中間值遇常受大乘此輩中間皆已成就不至於今也若中間值遇遇其退大仍接以小此輩中間猶故未盡今得還聞大乘之教三但論遇小不論遇大則中間未度於今亦未盡今日始受大乃至滅度後得道是也問如上經歷多佛多許時節今始得羅漢如此無生法忍何易可階答大聖善巧隨機說法為厭佛道長遠者說短於佛道生輕易想者說長言如許劫得羅漢者此是權行引諸實行合入道耳三明今還為說分二初會結古今二正說法華初又二初會師古今諸比丘我今語汝至成阿耨多羅三藐三菩提先標成道說法其二下列八方佛號阿閦此云不動東方為群動之首歡喜即動義表即動而證不動之理也佛具萬德高出物表故喻須彌頂音相乃形聲二益其聲所說無畏其形不怒而威故喻師子所證之理包遍群有其性真常如虗空住其體過去不生未來不動現在不起無生無滅故云常滅佛為教主撫育群生如世帝王化洽萬方故以帝名之梵行清淨涉有不染故云梵相無量壽法身常住教化無盡故度世苦者以智自度以悲度他自他俱出有漏苦故多摩等云性無垢如來神通能救眾生離煩惱垢得清淨智故須彌群峯之王喻佛為諸法王故雲者舒卷自如無心普廕喻聖心無私體用無礙故王者仁德浩大匡正四海喻聖德流行潤澤十方故德用難思摧魔制邪有情離怖畏得安樂故釋迦云能仁牟尼云寂默實智證理曰寂默權智利生曰能仁有二義一對待義能者善權方便曲就機宜仁者至德洪恩普洽萬類是大悲利物義寂則澄然不動頓息萬緣默則漠爾忘言永離戲論是大智冥理義二圓融義以悲即智故終日度生無生可度動一靜也智即悲故不起一念常度眾生靜一動也悲智二字佛之全德攝盡無遺矣堪忍國土乃大千世界一佛化境悲華經云是諸眾生忍受三毒及諸煩惱能忍斯惡故名忍土也二會弟子古今分二初正會二釋疑初又二初受大後退諸比丘我等為沙彌時至如來智慧難信難解我等為沙彌下明受大不退住無上道於今下種大之後中間退大向小住聲聞位佛常教化大乘諸人應以大乘之法漸入佛道所以下徵釋退住之意雖下大種緣佛慧難解所以退大而向小也以今觀之幸聞大法不無宿因安知吾徒非智勝之遺塵若能勤進其庶幾乎二正會古今爾時所化無量恒河沙等眾生者至聲聞弟子是也大通時覆講結緣所化眾生今汝等諸比丘是也此結現前及我下結未來弟子二釋疑我滅度後復有弟子至除諸如來方便說法恐疑云現在得聞法華得入一乘可是結緣之眾若未來世不聞法華而入滅度此等豈能捨小得入一乘耶答我滅度後此土弟子雖不聞經不自覺知所行是菩薩道於自所證生滅度想入涅槃者我於餘國作佛終當得聞是經餘國者此方機盡別土緣熟此土雖滅餘國又現又聞也大經云如來名號應眾生心各各不同一四天下乃至十方各各十千異名是也如來出世無有餘乘滅度唯一佛乘方便說三二正說法華又三初時眾清淨諸比丘若如來自知至了達空法深入禪定涅槃時到者諸佛出世化道將畢即說法華時也如迦葉燈明出於淨土說法華竟即入涅槃釋迦出於穢土說法華即唱當滅更說涅槃也眾清淨者既得四諦小教之益免於五濁八苦之難也信解堅固者聞方等大乘始教心相體信也了達空法者聞般若終實之教於空法中心得了達即轉教意也深入禪定者即楞嚴定也此科攝窮子喻五段經文二正說法華便集諸菩薩及聲聞眾至唯一佛乘得滅度耳集諸菩薩是聚會親族也及聲聞一句乃命其子也為說是經正付家業也世間下以二乘不可云滅度得滅度者唯一佛乘耳正開權顯實之意三釋疑比丘當知如來方便至是人若聞則便信受若無二乘得滅度者如來何故施三釋云比丘當知如來以方便權智深知眾生有小性欲著於五塵弊於五濁故先說二涅槃聞必信受令其破弊免難後必會歸於大也法說結緣竟二喻說結緣分二先喻說次法合初又二先明導師喻次明將導喻初又分五初五百由旬喻譬如五百由旬此喻上未度之眾樂著諸有輪迴處所也即擬火宅總喻其家廣大三界無安方便略頌安隱對不安隱之意約土凡聖同居為三百方便有餘為四百實報莊嚴為五百約惑見惑為一百五下分為二百五上分為三百塵沙為四百無明為五百約觀空觀能過三百假觀能過四百中觀能過五百二險難惡道喻險難惡道曠絕無人怖畏之處此喻上未度之眾煩惱垢重也即擬火宅中火起方便中不安隱五濁八苦之法分段變易二種生死即果險難見思塵沙無明即因險難由此因果故言惡道三界乃怖畏之處由險難故言怖畏三界無涯茫茫蕩蕩故言曠絕若生死煩惱中有涅槃菩提此道雖復曠絕則有人可依也若生死煩惱中無涅槃菩提如病中無藥則此道曠絕是無人可依也三多眾人喻若有多眾喻上王子所化百千萬億皆生疑惑不解之眾也即擬火宅中三十子五百人方便中知眾生性欲意四欲過惡道喻欲過此道至珍寶處二乘斷見思出三界故言欲過此道更斷塵沙無明求至佛果故云至珍寶處此處即藥艸喻一味之雨火宅中唯有一門方便中宣示佛道意五有一導師喻有一導師聰慧明達善知險道通塞之相此導師即十六王子也即擬火宅中長者方便中我字藥艸中密雲在耳曰聰在意曰達一心三智曰慧具足五眼曰明總言六根清淨也通塞者苦集十二因緣六蔽塵沙無明為塞道滅滅因緣智六度一心三觀為通問何不作父子相失驚入火宅不虗等義耶答凡喻各逐意便上取機應有無故言相失相見若取應始赴機故言驚入火宅此中正明將導眾生世世相值那言相失久久結緣那言始應為此義故不作相失驚入義也上來三周二十二番開權顯實其意已彰不虗本欲勸信下根信在不久故不須不虗耳導師喻竟二將導喻分三初所將人眾喻二中路懈退喻三滅化城至寶所喻且初所將人眾喻將導眾人欲過此難喻本初結緣未得度者本緣不失而為導師所將故云將導眾人即擬火宅見火驚怖方便見五濁起悲二中路懈退喻分二初退大二接小即火宅中不用身手而歎三車希有方便中暫息大化念用三乘也旦初退大又三初中路懈退所將人眾中路懈退將人眾者喻中間相值退大取小之人中路者非是半途但以發心為始至佛為終於此兩楹而起退大之意故名中路即擬上無大機也二白導師言白導師言我等疲極而復怖畏導師有四自有通途慈悲導師通他人故文中有一導師將導眾人是也自有結緣導師局我師故文中所將人眾白導師言是也自有權智導師取施小故文中導師多諸方便是也自有實智導師取開權故文中導師知此人眾是也四從時異人只是一並是王子也今白者正白結緣之導師也以其退大則大滅接小則小生一生一滅感於法身呼此為白王子知其退大即是聞其所白善根微弱無明所翳故言疲極厭生死為怖畏由怖畏故正宜小接即擬上不受大教也三不復前進不能復進前路猶遠今欲退還不復前路猶遠者見思塵沙無明難可卒斷也然用小接之不令頓還本處亦有進義即擬上息化也二接小又四初多諸方便導師多諸方便擬火宅中三車方便中開三四意具足故多方便也二傷其失寶而作是念此等可愍云何捨大珍寶而欲退還傷其捨寶喻知有小機而無大機也三化作一城作是念已以方便力至若能前至寶所亦可得去作是念下化作一城即權說小果也此用方便之教教化二乘斷見思惑出三界苦故云於險道過三百由旬令其權證小果故云化作一城告眾人下引入化城即三轉法輪也汝等二句勸轉勸令前進入城也今此三句示轉示城可住也可者謂僅可止息暫歇之意隨意作者即六通縱任等若入二句證轉證城安隱也若能二句但令入城更說前進於未開之前不得明彰此語今三周將盡開顯已竟即可說之四歡喜入城是時疲極之眾心大歡喜至生已度想生安隱想即擬火宅適子所願方便受行悟入也投其樂小之心故歡喜歎之我等二句釋未曾有免惡道離苦也安隱得樂也前入一句受行悟入也已度想得盡智也安隱想得無生智也即具智斷二德故此中歡喜即聞慧未有即煖位免惡即頂位安隱即忍位入城即見道位已度即無學位上中路懈退竟三滅化城至寶所喻爾時導師知此人眾至我所化作為止息耳此正說法華也即火宅等賜方便中說無上道既止息無疲倦者喻上涅槃時至眾又清淨而得免難大機當發也即滅下引向寶所即滅化城者廢權也去來方語也來字帶言以理而論眾生來不去小聖去不來皆不合佛意今即去即來回身三界利生接物莫學下劣住止而獨善也寶處下顯實以廢權也問前諸品開三顯一為有何異答通論無異別論不同方便約教文云但以一佛乘為眾生說法無二亦無三也火宅約行文云各乘大車遊於四方嬉戲快樂信解約人文中結會傭作是長者子也藥艸約差別無差別明權實七種差別是權同依一理無差即實約自行權實隨自意語故佛能知而眾生不知也今化城約理寶所化城即大小兩理除破二乘化理顯於寶所一理文中即滅化城寶處在近等上喻說竟二法合分二初正合二舉喻帖合初又二初合導師喻諸比丘如來亦復如是至險難長遠應去應度上喻有五今合三如來合上導師今為一句合多諸人眾以能將導師顯所將人眾也知諸下合險難惡道二種生死五住煩惱佛悉知之故云知諸等長遠者五百由旬故應去應度即合善知險道之相兼過險道至寶所也應去者已入化城不復前進故應去應度者未入化城多劫沉溺應以化城而濟度之二合將導喻分二先合退大接小若眾生但聞一佛乘者至為止息故說二涅槃眾生即所將人眾也一乘原被大機今樂小之人聞此不欲見不親近者乖其所好合上中路懈退無大機義也根機淺劣若除糞得價安於客作以求工食則欲見之近之若一乘大法如匹馬單刀孤身萬里說不投機謂是閑言故不欲見之近之耳佛道下合上不能前進息化之意長遠者三祇練行百劫修因如大海非一勺而竭重樓豈一日而就故云久受等佛知下合上中間退大復以小接下劣者有小機也方便者多諸方便也二涅槃合上化作一城也中道說二者三界惑盡塵沙未破於此兩楹判有餘無餘二果又分段已盡變易未除二死之間判有無二果故云中道次合滅城至寶所若眾生住於二地至於一佛乘分別說三二地即上二果未辦者以修言之四住已盡五住猶存人執既遣法執猶在以證言之則有餘雖證尚有無餘依大涅槃分段雖超未超變易故近者已過三百由旬故當觀下令其自審但是下為實施權二舉喻帖合如彼導師為止息故至此城非實我化作耳寶處在近一句當著眼看言化城者不但二乘十地等妙皆是權立接引並為化城寶所者乃真心本佛自性之寶此寶不屬情量不可建立無佛無眾生無能無所何處有城若問此既為化城何處是寶所答寶所不可指指即有方所非真寶所也故只云在近而已不可定量言之但忘言默證當體即是二偈頌有四十九行半分二先二十二行半頌結緣之由次二十七行正頌結緣初又二初十二行頌遠由二十行半頌近由初又二初六行頌大通成道爾時世尊欲重宣此義而說偈言大通智勝佛十劫坐道場至充我一切大通下三行頌成道前事過十下一行頌正成道彼佛下二行頌請轉法輪兼眷屬供養二六行頌十方梵請世尊甚難值久遠時一現至轉無上法輪世尊下一行頌威光照動東方下三行頌東方梵王尋光雲集三方下頌餘九方二十行半頌近由分二初五行頌轉半字教無量慧世尊受彼眾人請至不能得其邊無量二句頌受請為宣下一行半頌正轉教法宣暢下三行頌聞法得道十萬為億十億為兆百億為京千億為秭萬億為姟諸法不受者能伏斷見思也二五行半頌轉滿字教時十六王子出家作沙彌至八萬四千劫初二句頌王子出家皆共下一行半頌請轉法輪佛知下二行頌二萬劫中間說方等般若也般若行也神通事也方等多明不思議神通事說是二句頌受請說法華也彼佛法華有恒河沙偈今佛七卷當知一字法門海墨不盡也彼佛下一行頌說經已靜室入定以俟王子覆講結緣頌結緣之由竟次二十七行頌正結緣分二初八行頌法說結緣二十九行頌喻說結緣初又三初三行頌昔日結緣是諸沙彌等知佛禪未出至恒河沙等眾是諸二句知佛入定為無下一行半覆講結緣一一下一行眾得利益二一行頌中間值遇彼佛滅度後是諸聞法者在在諸佛土常與師俱生三四行頌今還為說是十六沙彌具足行佛道至慎勿懷驚懼是十六下頌結會現在師弟前言八方今言十方以總該別彼此隱顯也以是下頌正為說法華經結大通時之本因緣故戒勿驚懼也頌法說結緣竟二十九行頌喻說結緣又二初十一行半頌喻說二七行半頌法合初又二初三行頌導師喻譬如險惡道逈絕多毒獸至在險濟眾難譬如下頌險難惡道毒獸喻生死煩惱也無水艸者喻不修習菩提道也無數二句多諸人眾也其路二句五百由旬也時有一句有一導師也強識下聰慧明達也二八行半頌將導喻又二初六行頌中路權立化城眾人皆疲倦而白導師言至自謂已得度眾人下頌懈退也導師下傷其失寶也尋時下化作一城也諸舍宅者諸空觀境也園林者二乘總持無漏法林也九次第定為渠流八解脫為浴池重門三空門也盡智無生智為樓閣男女為定慧諸人下頌歡喜入城也二二行半頌滅城引至寶所導師知息已集眾而告言至當共至寶所廢昔日之權立今日之實使發大心求成佛果也二七行半頌法合分二初六行半正頌法合二一行頌舉喻帖合初又二初二句頌合導師喻我亦復如是為一切導師二六行頌合將導喻分二初二行頌合懈退見諸求道者中路而懈廢至所作皆已辦見諸下頌合中路懈退故以下接小也云已辦者證無學羅漢乃權教極果也二四行頌合滅城至寶所既知到涅槃皆得阿羅漢至乃是真實滅既知二句合知止息已爾乃下頌合滅化至寶所也故說二者即上為止息故說二涅槃也汝證下具三德秘藏一切智即般若三十二即法身真滅即解脫三德不縱不橫即見佛性當發精進勉而求之可也二一行頌舉喻帖合諸佛之導師為息說涅槃既知是息已引入於佛慧初二句即止息化作大城也次二句即寶處在近也此品正說因緣已竟
