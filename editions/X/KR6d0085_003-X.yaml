body:
  text: 金臺即山居後學大義集妙法蓮華經譬喻品第三此為中根人說譬喻也佛云諸有智者以譬喻得解故立品名法說五段未竟今品安於此者經家調卷故譬者比況也喻者曉訓也託此比彼寄淺訓深之謂前法說作三乘一乘之談廣明五佛開三顯一之旨上根利智圓聞獲悟中下之流抱迷未遣大悲不已巧智無邊動樹訓風舉扇類月使其悟解後文以三車一車之淺比三乘一道之深以至易而顯至難以至小而況至大故云譬喻又以世法比出世法因於曾有聞未曾有踊躍歡喜如經世間父子比出世師弟是世界悉檀以世間生法比出世間生法使蒙佛音教不失大乘如經父知諸子先心各有所好珍玩之具是為人悉檀世法者資具也故云珍玩出世法即三乘法生善中最以世滅法比出世滅法雖得諸無漏聞亦除憂惱如經我為其父應拔其苦難令免燒煑是對治悉檀世滅者火灾免也出世滅者斷惑也無漏指昔除憂指今拔其苦難本在等與大車以世不生滅比出世不生不滅令其安住實智中我定當作佛如經乘是寶乘直至道場是第一義悉檀世不生滅者大車也父之本有故不生至處不壞故不滅出世不生不滅者性德本有故不生修得常果故不滅佛以一音說於譬喻巧令中下得四悉益故名譬喻品且道靈山高會誰為上中下哉當知大聖設教不為聖賢說也只緣眾生根有利鈍惑有厚薄修有勤怠種種不同所以諸尊者或以法領或以喻解或以因緣明者無非簧鼓斯道利益末世一切眾生也二身子領解分二初經家敘置爾時舍利弗踊躍歡喜至瞻仰尊顏而白佛言文中內喜外儀持詞白佛三業䖍誠也內解在心名喜喜動於形名踊躍從妙人聞妙法得妙解開佛知見故踊躍歡喜有不知其所以然而然也文云今從世尊等內外和合致此歡喜即世界改小學大棄貧事艸庵受富豪家業今日乃知真是佛子是故歡喜即為人憂悔雙遣疑難並除內外妨障廓然大郎文云我已得漏盡聞亦除憂惱是故歡喜即對治又佛子所應得者皆已得之文云安住實智中我定當作佛是故歡喜即第一義瞻仰尊顏者無邪餘思念眷戀佛恩也又住後初行初地皆名歡喜身子上根利智必是超入之歡喜二身子自陳有長行偈頌長行分五初總標聞法得解二明昔日之失顯今日之得三明昔日之疑顯今日之解四明昔日疑悔今日疑悔盡斷五結歸領解自肎承當且初總標聞法得解今從世尊聞此法音心懷踊躍得未曾有今從二字形昔日之侍從也從昔已來或從舍衛往還或從王舍乞食或山林樹下經行或祇桓精舍行道佛住一乘實相二乘皆住小道之中但從其形未從其心也今者默契實相雅合聖意今日之從從佛心也法音即聲聞成佛之法音未曾有者喜其得於未得之道也然此理本來固有饑食渴飲何曾離了片時只因省不得所以棄海認漚及乎悟後瞬目揚眉依然只是這個豈從外來似有所得故以得言之又得者無得之得也於然燈佛時無有一法得菩提始得受記今身子亦然向上一事遍融萬法本無能所喚誰得誰正以無所得而得之方契佛心也二明昔日之失顯今日之得所以者何我昔從佛至失於如來無量知見昔聞如是法者方等中大乘實慧與今不殊故受記者方等授菩薩記云當來作佛又云得無生忍而我等不預受記成佛之事甚自感傷者淨名歎大褒圓彈偏斥小歎菩薩是佛子成佛斥二乘是焦芽敗種當爾時內疑而外鄙自感而自傷甚自二字當時就有不安小道之意以其聞同而得異也無量即甚深無量知見即如來知見失者在昔不解雖具猶失昔日感傷將謂失却今日解得自知作佛三明昔日之疑顯今日之解世尊我常獨處山林樹下至遇便信受思惟取證我常下述昔自感自傷之意山林樹下乃二乘修道之所行坐思念心中不甘為小乘也我等下正疑念也同入法性者出其執小之過正由不知小乘法性之外別有妙理菩薩得之故也謂我與菩薩同是及門受化同聞同得故云同入一涅槃無漏之法三乘共證故云同入法性所入既同則濟度亦應同也云何濟菩薩以大乘得無窮之寶藏度我等以小乘給有限之工價當時謂佛心不平等愛有偏黨今聞佛說大乘平等法等又云但教化菩薩等今日乃知是我等自己捨多取少之過咎非世尊有彼大此小之不平由我迷權何關理教由我惑實何關佛偏追述昔非仰謝如來引過自歸故曰是我等咎非世尊也所以下釋非佛咎一句待說所因有二一不受對待於前二不停待於後初照高山明三諦之慧是得菩提因以此對待於我而我不受是失之於前又諸佛久後要說真實我不停待是失之於後若待此前後必得大乘度脫由我等不待前後於此兩楹匇匇取小也私謂九部之法是入大乘之因也謂佛初說小乘是入大乘之因但我等不曾待得如來說其所因自為小乘耳若我等肎待如來說出小法因為我等心著弊欲方便說小雖說小法元為我就阿耨菩提者而我等亦同菩薩佛必以大乘之法度脫我也今乃知之非世尊咎然我下明不待所以釋上是我等咎一句然之一字有無窮感慨自懊自惱之意然我等本是著於邪見之人纔歸依佛不解如來先以小為方便隨宜而說元為拔我邪見示一小果我等不解方便一聞四諦小法即便信受以六識思惟取證小果以權為實誰知如來更有一乘之大法哉信受思惟含二乘智斷工夫四明昔日疑悔今日疑悔盡斷世尊我從昔來至聞所未聞未曾有法斷諸疑悔言我從昔來見菩薩受記作佛終於日竟於夜無一時不抑損剋刳於心責備於己憤憤悱悱不得同菩薩受記作佛而今從佛聞說聲聞菩薩皆成佛無疑又云千二百羅漢悉亦當作佛今日之聞乃昔日未聞未曾有之法也斷諸疑悔者斷其疑佛之心取小之悔也又究竟之理昔日將謂永絕及聞舉手低頭皆成佛道之說昔因一毫之緣尚踐菩提況我六通之士永絕非分乎一聞此法將四十年來自剋自責之憂悔終日竟夜自感自傷之疑惑斷盡無餘矣文殊偈云諸求三乘人等此也五結成領解自肎承當身意泰然快得安隱至從法化生得佛法分初二句謂消息撥轉慶快非常也今日下是自肎領解之言昔日說菩薩是佛子我等宛似義兒雖得小果心實未安今聞教菩薩法悉當作佛乃知真是佛子非聲聞流也成佛之言出於佛口我信佛言而成佛子則子從佛口生矣從法化生者一乘之法猶若金丹化煩惱成菩提轉生死成涅槃也又知一切法即心自性成就慧身不由他悟故云從法化生得佛法分者法謂法身分謂分證雖居因地未至究竟我真佛子乃得分證佛之法身也古德云三十年來用意猜幾度曾把此心灰而今潦倒逢知己李白元來是秀才山林樹下興疑作念用意猜也疑悔剋責幾灰心也今日歡喜自知作佛正逢知己也真是佛子李白元是秀才也上根身子言下知歸矣二偈頌有二十五行半分二初十六行半頌上長行二九行頌領前廣略開顯之文初頌長行又四初一行頌總標聞法得解二一行半頌昔失今得三六行頌昔疑今解四八行頌昔悔今斷皆約義頌之不必拘配且自肎承當略而不頌且初一行頌總標聞法得解爾時舍利弗欲重宣此義而說偈言我聞是法音得所未曾有心懷大歡喜疑網皆已除此中疑除者是身子知四眾心疑自亦未了之疑也開三顯一千二僉疑廣明五佛身子疑消二一行半預昔失今得昔來蒙佛教不失於大乘至聞亦除憂惱長行明失知見此中云不失大乘論失論得文互現耳佛教通大小二意謂方等諸會同菩薩聞大乘法昔日感傷將謂失於如來知見今日開解何曾失却此理故云不失於大乘但佛音甚為希有以小乘法除眾生憂惱以大乘法除羅漢憂惱又昔蒙小教能除我等做凡夫時五濁八苦之憂惱我已漏盡今不失大又除我等不成佛之憂惱昔小令大佛音甚為希有也三六行頌昔疑今解我處於山谷或在林樹下至我為自欺誑是事即菩薩成佛事嗚呼乃感傷之辭自責乃懊惱之意深字應上甚字云何二字是疑難之辭自欺者即自責意意謂菩薩云何就成佛我等怎麼安居小道受斥敗種豈絕然無分甘心自欺哉菩薩成佛未來世中演無上道我等亦佛子同入法性同聞同入既不得受記成佛亦不能未來演說法也金色等八句明既不得受記成佛則佛地位中種種功德皆無分也金色佛身金光聚也三十二相者相以表德令人觀德而欽敬始自足下安平終至頂上肉髻共三十二大人相十力解脫如前釋八十種好者好為嚴身令人見相欲歸依始自無見相終至手足有德相此等相好皆往昔修一百福感一相好孝養等之所致也十八者一身無失乃至十八智慧知現在世皆佛地位中所具不與二乘等共故云不共法也我獨下明三失我則山林樹下單丁獨行佛則天人風靡弟子雲從行失利也我之名聞聞五天竺國佛之名聞普遍十方名失利也我則自善其一己佛則廣饒於人天實失利也自思自惟若行若名若實而不如佛者豈佛有欺於我哉乃我不學菩薩不發大心自欺自誑是我等咎也四八行頌昔悔今斷我常於日夜每思惟是事至疑悔悉已除此中義含領解自肎兼頌我等不解方便初聞信受之文常於日夜者念茲在茲不甘小道終日竟夜思惟不忘之義為失不失者失則於己絕分不失又不同菩薩菩薩稱讚我等被斥由是日夜思惟也今聞下頌佛逐機說法也謂佛隨宜說法皆是方便無非以大乘無漏難思議法示人欲令眾生開佛知見坐道場成正覺而已我本下頌上不解方便信受取證梵志即婆羅門其人種類自計從梵天口生唯五天竺有餘國即無師者沙然死後身子領五百徒眾也空法乃小乘偏空也爾時二句是一解脫義我等同得之意而今二句是聞三乘是假非真實也若得六句是今聞作佛自慶之辭番昔小果自足之執昔證是有餘作佛是無餘小果斷四住不名永盡作佛時乃五住究盡也佛於下正明今日之疑昔日之悔除斷氷釋也二九行頌領前廣略開顯之文初聞佛所說心中大驚疑至教化諸菩薩初聞略開顯疑佛為魔謂魔惱我心神亂我禪定耶今知佛昔巧說為實施權權既即實故心安疑斷也心安如海應在疑網斷之下方順以疑斷故心始安然如海之澄湛而無波也佛說下述前三世佛及釋迦佛開權顯實之文既聞開權顯實方知世尊所說是真實道波旬此云惡常有惡意成惡法故聞佛下結前領解歡喜此法無漏故云清淨不可思議故云深遠即權即實即實即權故云微妙安住實智即根本智得此智能證實相之體可以成佛既得住此智冥契真如故云定當作佛此聊通一線直下承當之意上身子領解已竟三如來述成分三初昔曾教大二中忘取小三還為說大且初昔曾教大爾時佛告舍利弗至我以方便引導汝故生我法中此因身子昔憂今喜以呈解故佛述昔教今忘以受記也於大眾中說者一鼓舞中下故二為作證明故三明昔因顯今緣故二萬億即常不輕在二萬億威音佛時也亦即大通為王子時也無上道即佛果也長夜受學者無明未破惑暗心中故云長夜昔日大化故云隨我受學縱然未破見思所聞一句成了因種納種在識永劫不壞況今真悟寧有虗妄舉昔曾教大正顯身子領解不謬也我以方便二句兩向若昔以大化今生大解故云引導生我法中此屬昔教大也若令免惡道權以小引故云引導生我法中此屬下中忘取小也二中忘取小舍利弗我昔教汝志願佛道至而便自謂已得滅度汝今悉忘者自有中途廢大習小名中途悉忘若而今自謂已得滅度即是而今悉忘由汝忘大習小致有憂悔而得聞法不虗也三還為說大我今還欲令汝憶念至教菩薩法佛所護念汝雖善忘我則善憶今不欲汝忘還欲汝憶也先施權教成其中途小善後顯真實遂其本願大心一則完汝往昔本願二則滿我出世本懷故為汝聲聞說此大乘妙法蓮華經教菩薩法佛所秘要之藏也是知聲聞元是菩薩則汝何曾失於如來知見也如來述成已竟四與之授記問身子領解自知得佛何須記之答有四意一昔未記二乘今須記故二中下未悟以記勉勵故三令聞者結緣故四滿其本願故有長行偈頌長行文分十初明時節二明行因三明得果四明國土五明說法六明劫號七明眾數八明壽量九轉記補處十法住久近且初明時節舍利弗汝於來世過無量無邊不可思議劫佛道長遠如千尋大海非一勺而涸九仞重樓豈一日而就眾生藏識海浪曷啻千尋諸佛妙覺巍峨不唯九仞豈可造次而至乎若以理論悟得實相全身在裏許逈出思議之表超過劫數之外延促同時古今一致有何時節之可論哉問何故更經若干劫耶答諸聲聞未曾有淨土之行得記已後與物結緣物機不同致劫多少隨機長短故經若干劫也二明行因供養若干千萬億佛奉持正法具足菩薩所行之道具足即圓滿意菩薩之道立於身應於事時措合宜不致傷風犯手竪經五十五位橫收二千餘門一一行門至於理極情盡絕學無為之地方名具足三明得果當得作佛號曰華光至天人師佛世尊別號華光者華能開敷因行也光能發明果智也由修權智之因行得悟實智之果佛也四明國土國名離垢其土平正至七寶行樹常有華果離垢非今雜穢平正非今坑坎清淨非今便利安隱非今旱潦不常天人非今三惡道琉璃非今土石琉璃地滑金繩界之以便往來行樹華果以便瀟洒國土嚴淨皆七科道法之所感也問釋迦娑婆如此不淨身子國土如是美麗何師不及資乎當知在佛分中何常不淨文云我淨土不毀又三變淨土其美麗又過於此也眾生依報則國名堪忍劫名五濁其土坑坎不淨亦因行所致也反而求之離垢清淨之相皆即心地安隱豐樂之事無非性德染淨轉變常存乎人使眾生不為堪忍苦不起五濁業不行邪曲行則真離垢安隱豐樂矣五明說法華光如來亦以三乘教化至以本願故說三乘法准今佛故云亦以舍利下明說三意土淨唯應說一酧願故爾說三即施即廢也何知本願說三准大悲空藏經云身子於六十劫行菩薩道因婆羅門乞眼唾而踐之身子動瞋退作凡夫願成佛時開三乘法故云以本願故說三乘法也六明劫號其劫名大寶莊嚴至其國中以菩薩為大寶故劫名大寶以菩薩為名者不寶珠玉而寶善人也楚王孫圉答趙簡子曰楚國無以為寶惟善以為寶楚當時有觀射父左史倚相二賢人能觀光社稷故曰善人為寶華光出世多大菩薩羽翼法化護正法其猶干城濟群品乃名善見實法門之大寶也七明眾數彼諸菩薩無量無邊至如是菩薩充滿其國佛智者一切種智也數過恒沙佛智乃知降斯以還皆不能也寶華承足者寶取真實意華明因行以菩薩運動作為皆成佛真實之因行也行一行成一德故云德本淨行實踐福慧雙隆堪荷大法雅契佛心故常為佛歎深入實際妙徹本源故云常修佛慧善知諸法名通巧用佛慧名門質直者不退二邊無偽者直入中道以質直之志深窮理本以無偽之念誓願廣大方名堅固也如是二句結其數多八明壽量舍利弗華光佛壽十二小劫至其國人民壽八小劫除為王子者顯華光亦捨王位而出家也未作佛時明成佛後而壽十二小劫為王子修道時不預此數也人民受化福德殊勝不惟見佛聞法亦且享壽八小劫也九轉記補處華光如來過十二小劫至其佛國土亦復如是過十二劫乃臨入滅之時也堅滿眾數之一也堅即志念堅固所發之願無一不真實故滿即質直無偽所行之行無行不圓滿故華足安行者即寶華承足安而行之因果不謬故此中轉授堅滿者使傳續此妙道也法華妙道本於燈明傳於妙光繼於然燈燈燈相然佛佛相授光光相續身子得之號曰華光發明是道使有目皆覩堅滿得之又號華足安行率循是道使有趾共由菩薩行時寶華承足則從化者莫不由斯道也至於華足安行帶果行因寶華承足借因趨果因果互為終始展轉不離此道故有轉授補處之佛也其佛二句明華足安行佛所處國土亦如華光佛之國土也十法住久近舍利弗是華光佛滅度之後至亦三十二小劫法初盛行人能以現量體悟為正去聖逾遠人惟以比量倣效為像正法時教理行果備具像法時有教理行而無果故古多聖賢得道今乃無聞此正像之異效也及乎末法則空騰似量荒唐無實雖有教理無行根矣身子未來一大事因緣成佛之始滅度之終於天人大眾中一一授之身子一一記之矣自說經入定出定到此為一結局大事因緣信不虗耳二偈頌有十一行半分二初十行頌上長行二一行半結歎初中文分十初一行超頌得果二一行追頌行因三一句追頌時節四一句超頌劫號五一行半頌國土六一行半頌眾數七半行頌說法八二行頌壽量九一行半頌法住久近十半行明供舍利略補處不頌而長出舍利也且初一行超頌得果爾時世尊欲重宣此義而說偈言舍利弗來出成佛普智尊號名曰華光當度無量眾普智即一切智也具一切智出世獨尊故云普智尊二一行追頌行因供養無數佛具足菩薩行十力等功德證於無上道菩薩因行圓滿方證佛地功德十力等總指佛地位中百八功德也三一句追頌時節過無量劫已四一句超頌劫號劫名大寶嚴五一行半頌國土世界名離垢清淨無瑕穢至常有華果實六一行半頌眾數彼國諸菩薩志念常堅固至善學菩薩道神通波羅蜜即六神通六波羅蜜也七半行頌說法如是等大士華光佛所化八二行頌壽量佛為王子時棄國捨世榮至壽命八小劫九一行半頌法住久近佛滅度之後正法住於世至像法三十二十半行供養舍利舍利廣流布天人普供養此明華光佛化畢入滅而天人供養舍利也如今之禮塔供養等二一行半結歎華光佛所為其事皆如是至宜應自欣慶宜應一句開下四眾慶讚上與之授記已竟五四眾慶讚亦名領解問迦葉等諸大聲聞尚未得解四眾何人反先獲悟耶答四部大眾中亦具三根上同身子中同四子下同五百也又身子迦葉等並是權行中下未開故迦葉滿願示同不解淨名云眾生未愈菩薩亦未愈也有長行偈頌長行分二初經家敘置二四眾領解初分二初敘眾喜爾時四部眾比丘比丘尼至心大歡喜踊躍無量身子得記八部歡喜所謂見一華而知天下皆春記一人而知人人有分也二敘供養各各脫身所著上衣至一時俱作雨眾天華各各脫衣者語通四眾八部出家二眾言上衣者即大衣也若論三衣不可捨離如大品云三百比丘聞般若已皆以伽梨而用供養論云或亡相為法或云當日更得通說兼俗論與大品局出家衣示歸依也華供佛因同於果也虗空迴轉表聞身子得記法性自然而轉迴小向大之意百千天樂於空作者表種種權智方便皆歸實智第一性空之中也此中四部雖與身子同聞未同解也及見尊者受記始信此理人人有分不覺欣汴自發妙供爭獻以作當果之緣故下頌云我亦如是必當作佛二四眾領解而作是言佛昔於波羅柰至無上最大法輪先二句開權次二句顯實最字顯今經圓中圓故開權者半字教也顯實者滿字教也又小大麤妙可知若以方等般若二教對鹿苑則鹿苑麤二教妙以二教帶方便通滿理故若以今經對二教則二教麤今經妙以今經直說無上道顯滿理故二偈頌有六行半分二初二行頌上長行開顯爾時諸天子欲重宣此義而說偈言昔於波羅柰轉四諦法輪至少有能信者五眾者乃五陰也正法華諸天慶讚頌云於世無雙比今者轉法輪為男女講義陰衰所從起即今經五眾之生滅也二四行半自述得解迴向我等從昔來數聞世尊說至盡迴向佛道初一行自述未聞妙法世尊下自慶亦得作佛亦如是者如身子領解述成受記成佛也佛道二句領隱實施權我所下明迴向三世所有福業不為天人小果迴向無上菩提以功德迴向佛道者默領前章微因散善之旨不以有為無為為期以趣正覺果海為究竟而已上法說一周被上根已竟第二喻說一周被中根凡有四品今品是譬喻開三顯一信解品四子領解藥艸品如來述成授記品明授記也皆約喻說故為譬喻一周准法說宜應五段而缺四眾慶讚者例前後不煩文耳初正說譬喻開三顯一分二初身子代請二如來垂答初中又三初自述得記無疑二兼述同輩有惑三普為四眾代請且初自述得記無疑爾時舍利弗白佛言至三藐三菩提記疑是根本中一悔是不定中一昔日疑悔為不得同菩薩受記耳今既蒙記則諸疑悔盡釋矣二兼述同輩有惑是諸千二百心自在者至聞所未聞皆墮疑惑心自在者我執既空心得自在法執猶在未得法自在也此句舉今果昔住一句明昔因研真斷惑煉磨治習故云學地佛常三句是述昔佛誨教字對上學字教以真窮惑盡得果之方我法指小教中四諦法也生死苦諦離字含集諦必斷集而離生死涅槃滅諦究竟含道諦由修道而證涅槃是學無下明昔稟教各證小果各以者該眾之謂生死苦果由我見等為因我見即身見也有無即斷常見也等字總該利鈍十使見思之麤細惑為集諦因集因斷苦果不生眾等遵佛語以離之離即斷也謂得涅槃者謂是自計之辭所謂佛說一解脫義我等已得也聞所未聞者指法說中先權後實昔教所未聞故皆墮疑惑者昔三說是究竟今一又是真實若謂昔日究竟為是今日真實為非今日真實為是昔日究竟為非是非莫決同異不分觸藩之羊進退兩難矣三普為四眾代請善哉世尊願為四眾說其因緣令離疑悔為同輩請者是懷舊故為四眾請者是化境故今蒙授記新運大悲普為代請也不請喻而請因緣者有三一身子從因緣入道適口則云因緣故二者重請一大事因緣先三後一之旨故三者請在因緣下答譬喻喻後再說宿世因緣問一答二可謂買石饒雲移華帶蝶矣問前法說先三後一聞既不悟今還請於先三後一與前何別答言因緣者即前三後一始末根由故云因緣前四佛章略釋迦章稍廣唯明五濁用釋於權始末未明故中下不曉今以譬喻委明六道輪迴之相具列三車出宅之由兼敘索三與一之意廣示等賜等子等心如此方酧一大事因緣之請也此中四眾於前四中非但當機結緣發言領解即是發起影響二如來垂答分二初抑揚發起爾時佛告舍利弗至諸有智者以譬喻得解我先不下抑其不悟種種等指上明權皆為等指上顯實皆化菩薩者若權若實皆入佛道上已明言如何執教迷暗不解先不言三字是抑責之辭然舍利下揚其智解然字當玩有嗟歎意又佳身子代請意又過文勢前抑責既切恐鄙懟自沉今許喻說揚其智解也方便品中已盡分別因緣只應領悟不該仍疑若仍有疑則應說譬喻不應再說因緣既於一大事因緣不明必以譬喻方能決了故云今當復以譬喻更明此義若於喻上得了解者猶稱智者其或未悟再說宿世因緣之事諸有智等為下信解藥艸章本二正說譬喻有長行偈頌長行分二初喻說二法合初喻說分二初總喻二別喻且初總喻喻上方便中今我亦如是下二行頌文分六節初長者喻二舍宅喻三一門喻四五百人喻五火起喻六三十子喻且初長者喻舍利弗若國邑聚落至多有田宅及諸僮僕長者喻上我字約名行位號德業明長者國邑聚落者處所也名如實行如主行有親疏名有遠近故舉處所以顯名行也封疆為國最遠宰治為邑居中聚落隣閭最近長者名行遍於三處近不見其細陋遠但挹其高風口無擇言身無擇行意無擇法名行相稱真實之大人也國喻實報莊嚴土邑喻方便有餘土聚落喻凡聖同居土內合如來三業隨智慧行應身三土稱機施化名稱普聞德周沙界也有大長者明位號世間長者備十德一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上敬十下歸姓則三皇五帝之裔左貂右插之家位則輔弼丞相鹽梅阿衡富則銅陵金谷豐侈奢靡威則嚴霜隆重不肅而威智則胸如武庫權奇超拔年則蒼蒼稜稜物儀所伏行則白圭無玷所行如言禮則節度庠序世所式瞻上則一人所敬下則四海所歸也出世間長者德備恒沙且合十種姓則三世真如實際中生位則功成道著十號無極富則法財萬德悉皆具足威則十力雄猛降伏魔外智則一心三智無不通達年則早成正覺久遠若斯行則三業隨智運動無失禮則具佛威儀心大如海上則十方種覺所共稱譽下則七方便人而來依止是名出世間大長者即我釋迦教主也其年下四句明德業德有內外內則智略外則資財年高則博達古今喻佛智德衰邁則根志純熟喻佛斷德此句明內德財富明外德無量二字總喻富有萬德也多有二句別喻外德田能養命喻禪定可資般若宅可栖身喻實境為實智所託略則十八空廣則無量空門若論福德無行不修若論智慧無境不照故云多有僮僕者給侍使人喻方便知見皆已具足和光六道曲順萬機權智即實智之僮僕也二舍宅喻其家廣大家宅喻上安隱對不安隱不安隱喻三界也眾生宂宂皆宅三界如來應化統而家之故言廣大三一門喻唯有一門喻上種種法宣示於佛道也如來本懷唯以一乘佛道利物事不得已先以種種法門引導本意唯有一乘故言唯有一門約教唯一佛乘約理唯一知見問一乘佛教寬矣廣矣大矣一門既是佛道下文不應言其狹小答欲說一乘無機受化眾生知見即佛知見凡小不知因無機與不知故言狹小問下文三車既在門外豈諸子反出一乘知見外耶答教是能詮理是所詮眾生佛知見性具也如來佛知見究證也知見本一有在纏出纏之異四十年前覆一乘而說三就迷教理者說故假設三車而在門外下文以佛教門出三界苦今日泯三乘而說一乘生死即涅槃煩惱即菩提無明實性即佛性幻化空身即法身諸子皆住一乘道教之中豈在外哉若以門內門外為難下文如來從所燒之門安隱得出窮子行來住立門側長者又在門內不知又作何難也四五百人喻多諸人眾一百二百乃至五百人止住其中喻上安隱眾生故的眾生一百喻天二百喻人三百喻畜生四百喻餓鬼五百喻地獄惡道多者顯修白業者少而黑業者多也五百云人者泛舉五道群生共皆住止三界之中也五火起喻堂閣朽故墻壁隤落至歘然火起焚燒舍宅堂閣下明所燒宅相若以依報論欲界堂也上二界閣也地水火風四大墻壁也金水風空四輪柱根也以世界賴此支持故能所八法梁棟也若以正報論身下分堂也上分閣也骨涎息煖內四大墻壁也壽煖識柱根也意識梁棟也朽故者有情無情皆屬無常故隤落者山河減損皮肉朽壞故腐敗者天地之根危殆不安壽命之元出捨不息故傾危者外物遷變人命易終故周匝下明能燒火勢五濁八苦之火遍在四大四生故言周匝並皆無常故言俱時歘然者無而忽有也本無此苦因無明故有若推其原依正二報皆由無明不覺忽然而有一分有知覺的無明而為有情眾生一分無知覺的無明而為無情世間即此無明為因境界為緣憎愛取捨三毒猛火焚燒內外根身器界也廣上宅相正明三界無安猶如火宅也六三十子喻長者諸子若十二十或至三十在此宅中喻上知眾生性欲佛如眾生如一如無二如天性相關則子義成性欲不同故有三十十是菩薩子二十三十是二乘子三十云子特舉從化俱得出宅者言上總喻已竟二別喻喻上我以佛眼觀下四十一行半偈偈中六義全具今喻有四少歎法希有揀偽敦信至後頌中補出文分四段初長者見火喻二捨几用車喻三等賜大車喻四長者不虗喻且初長者見火喻喻上我以佛眼觀下四行頌舉五濁釋權長者見是大火從四面起至心不厭患無求出意偈中明如來在法身地上照見眾生為五濁八苦所燒而起悲應救有能見所見起悲三意今喻亦三長者見即我以佛眼觀見是標出能見之眼是大火從四面起明所見即見六道眾生等火喻五濁八苦云大者遍在六道故四面喻身受心法下法合為生老病死從字重看大火是果四面是因謂此火非無因而有以眾生於身起淨倒於受起樂倒於心起常倒於法起我倒故有五濁八苦如火從四面起也若知身不淨受是苦心無常法無我則煩惱火滅即大一句明長者驚怖喻上為是眾生二句由火大故驚怖亦大念其退大善故驚憂其將起眾惡故怖驚即對慈念其無樂怖即對悲憂其有苦也我雖能於等釋上驚怖是慈悲憂念之意雖是未盡之辭如來慈悲猶為憂火所熾故云雖也能字重看顯諸子不能以佛雖出生死所燒之門住於常寂安隱之鄉不忍捨眾生而自安隱故作念如此也不為五濁八苦所煎名安不為四倒暴風所動名隱蕭然累外名得出眾生為大火所燒故不安為暴風所動故不隱業識忙忙故不得出又所燒之門者門有件有空非件無以標門非空無以通致件可燒空不可燒喻教有能詮所詮非能詮無以為教非所詮何以得出能詮可是無常所詮非是無常如來有大智慧能尋正教得教所詮故云安隱得出能詮磨滅故云所燒之門不從所燒之門何由安隱得出大經云因無常故而果是常此之謂也又先安隱而出出而復驚今雖出而須入入而必救故以安隱釋驚怖驚怖即慈悲為是眾生故而起大悲心者此也而諸子下由前大火燒宅宅內諸子不求出離長者安得坐視正啟下思惟救子之意等字該五百人著見故耽湎四見名嬉唐喪其功名戲又著愛故耽湎五塵名嬉空無所獲名戲由樂著見愛空生徒死而無厭離如小兒嬉戲也不言有火名不覺不解火是熱法名不知不畏火能燒身故不驚不慮火能斷命故不怖喻眾生全不覺五濁八苦不知四倒三毒不驚惑侵法身不怖傷於慧命如是不覺於苦不知於集不驚失道不怖失滅也身五識身也身為八苦所逼故云火來逼身切己者逼迫切近也以一一苦皆由五識對於五塵念念相應故云苦痛切己心不厭患者心意識心也不厭無常之苦不患煩惱之集無求出意者不修道品之行不求滅諦之理也此中嬉喻見濁戲喻煩惱濁不覺二句即眾生濁火來二句即命濁心不二句即劫濁也二捨几用車喻分二初捨几二用車初捨几喻喻上我始坐道場下六行半頌明大法難投又分為三初長者念救二諸子不聽三馳戲視父且初長者念救喻喻上我始坐道場至微妙最第一明大法擬宜舍利弗是長者作是思惟至具告諸子汝等速出作是思惟者是應現人間得成道已思惟所得法妙也身喻神通荷負手喻智慧提拔依三昧斷德則有神通依智慧智德則有說法前云其年衰邁喻智斷即身手也衣裓西竺盛華之具几香几也案書案也準下法合云若我但以神通力智慧力讚如來知見力無所畏者眾生不能以是得度衣裓喻知見几喻四無畏案喻十力略說名知見名略義玄如衣裓一口而多含處中說名四無畏用對四諦如几於法小廣於物小安廣說名十力橫竪該括如案多足於法則廣於物則大安也此是思惟念用大化謂若以神通顯現智慧宣演知見力無畏等令眾生出三界宅五蘊舍故云從舍出之復更下明法大機小一門狹小者若論理教寬矣廣矣則非狹小但眾生不能以理教自通欲談無機故言狹小若理教行一一明一門狹小者理則純一無雜故言一即理能通故言門微妙難知故言狹小教則更無餘乘唯一佛乘故言一此教能通故言門此教微妙與言之二乘少知奪論之七方便皆不知也不能以教自通將談無機故言狹小行則圓因自行行大直道無諸留難故言一善行菩薩道直至道場故言門妙行難行方便無機故言狹小諸子幼稚等者雖於二萬億佛所教無上道大乘善根微弱故云幼稚此明善弱也若聞大乘能生毀謗故云未有所識此明惡強也因時深著愛見果時深著依正欲界著五塵色界著味禪無色著定故云戀著戲處或當墮落有二義一者幼稚憶本戲處故墮落喻貪著五欲而墮三途二者惡強全然無識故墮落喻毀謗大乘而墮三途若墮落必為五濁八苦之所燒煑故云為火所燒我當為說下正是思惟雖知根鈍且稱本懷也具告二句是直說華嚴圓頓大教擬宜小機以一真法界演四無礙法界擴十玄門直明中道稱性之談經云知一切法即自心性成就慧身不由他悟又云初發心時即攝五位成等正覺能令眾生疾取菩提故云具告諸子汝等速出下文急捉將還即汝等速出義問如所思惟具告諸子思惟者怖畏事也具告既釋華嚴何華嚴無怖畏事耶答華嚴遣法身大士說五十五位法門圓音落落主伴重重圓融行布行布圓融眾生不堪如窮子驚愕稱怨大喚非怖畏而何哉問法說喻說何不廣明答華嚴已過法華正說一始一終二經同旨故不廣明只此二句收攝二諸子不聽喻喻上眾生諸根鈍等明眾生無機父雖憐愍善言誘諭至何者為舍云何為失父雖善言諸子樂著不聽父言不求出離三慧何由而生焉不驚故無聞慧不畏故無思慧不知五濁八苦能燒善根不知火也不知陰界入法是諸苦之器不知舍也不知喪失法身之由不知云何為失也如此則修慧亦不生矣諸根暗鈍三慧不生亦末如之何此是中下之根不堪大法所謂積行菩薩上德聲聞是也三馳戲視父喻喻上我寧不說法等明念欲息化但東西走戲視父而已法中息化在佛此喻馳戲在機彼此互明耳背明向暗為東西生死往還為馳走於中起愛起見為嬉戲所謂東出西入隨善惡以昇沉南馳北走似循環而無已也雖用大擬不從大教故云視父而已捨几一科喻法中我始坐道場至入於涅槃六行半頌在下窮子喻爾時窮子傭賃展轉至即遣傍人強牽將還一段上捨几喻已竟二用車喻喻上尋念過去佛至我常如是說十一行頌侵大施小即雙垂兩相二始同時不動寂場化遊鹿苑也分四初擬宜三車二知子先心三歎美三車四適子所願且初擬宜三車喻喻上尋念過去佛等亦作三乘化度爾時長者即作是念至令諸子等得免斯害前云大火四面起今云此舍已為所燒前云苦痛切已猶是未死今必為所焚即有死義我及諸子必為所焚者以大乘化功為父命眾生大善為子命大善若盡即子命斷子命斷則化功亦廢即父命斷故云若不時出必為所焚上云所燒之門安隱得出今云若不時出必為所焚此義云何須知前出者約法身說也今言若不時出者即是應身示同眾生有疾若眾生有善成機受化則與應身時出若眾生善斷無機不受則不與應身時出即俱為所焚也當設方便等者實相一乘本不可言曲為中下巧示方便說三乘之權令諸子得免五濁八苦之害也二知子先心喻喻上作是思惟時十方佛皆現等明小乘得度之機父知諸子先心至種種珍玩奇異之物情必樂著昔曾習小是知先心性欲不同是知各有所好既知習小故以小接既知性欲不同故開一為三又知本曾習大名知先心中即生死名各有所好種種珍玩即諦緣六度等法三界所無故云奇異情必一句正投其所好也三歎美三車喻喻上思惟是事已即趣波羅柰等明正施三乘又分三初勸修轉二示相轉三作證轉且初勸修轉而告之言汝等所可玩好至汝若不取後必憂悔此勸其令修也謂此是苦汝應知集應斷滅應證道應修也希有難得即珍玩奇異也約三人說玩好二字當聲聞道滅二諦緣覺還滅門菩薩六度法憂悔二字當苦集流轉門六蔽法二示相轉如此種種羊車鹿車牛車今在門外可以遊戲此示其相狀也謂此是苦逼迫性集招感性滅可證性道可修性也羊車鹿車牛車喻三乘也許在門外者以見思惑盡出三界外方得此車又門即一乘實相門如來巧智於一乘之外分別說三故云門外可以遊戲者謂可以縱任六通遊戲自在也三作證轉汝等於此火宅宜速出來隨汝所欲皆當與汝此引己證彼也謂此苦我已知不復更知集已斷不復更斷滅已證不復更證道已修不復更修也皆當與汝者皆與之言正當已證亦令他證故下文云為汝保任此事終不虗也示勸證乃次第今隨經先勸後示義亦無失四適子所願喻喻上是名轉法輪一行頌明受行悟入爾時諸子聞父所說至競共馳走爭出火宅前偈略今喻廣明修因至果適願者機教相扣即聞慧勇銳者心思動慮即思慧此二句即三資糧外凡位謂五停心別相念總相念也互相下即修慧推四諦理排伏見惑邪正未決名互相即四加行中煖頂二位競者競取勝理初則遍觀上下八諦歷十六行相競趣真道後則縮觀至欲界苦諦下趣苦法忍此即內凡忍位共者即第四世第一位同觀欲界苦諦與忍位不別故云共馳走者入見道十五心速疾取理故云馳走即斷見惑盡分得涅槃預入聖位初果也爭出即修道位二三果也出了火宅斷思惑盡證無學道即四果也若作三人合論一四諦法聲聞人以苦諦為初門緣覺人以集諦為初門菩薩人以道諦為初門三人共秉三人同修三人各證故云心各互相競共爭出皆約三乘智斷而說準下法合別論者聲聞聞四諦法適其願樂勇猛精進推四諦理排見思惑欲速出三界得證涅槃是聲聞爭出火宅也緣覺聞因緣法投其願樂勇猛精進流轉還滅為推雙侵二習為排深知諸法因緣得證涅槃是緣覺爭出火宅也菩薩聞六度法適其好樂勤修精進推求真諦排伏塵沙慈悲化物度脫一切是菩薩人爭出火宅也上捨几用車已竟三等賜大車喻喻上我見佛子等志求佛道六行偈顯示真實分四初父見子免難歡喜二諸子索車三等賜諸子大車四諸子得車歡喜且初父見子免難歡喜喻喻上我即作是念如來所以出二行一句頌明佛喜無畏是時長者見諸子等至其心泰然歡喜踊躍前偈明父歡喜今明子歡喜以子喜其父亦喜謂免難歡喜者若子未免難父則憂念若得離火心即泰然故免難歡喜得為一喻四衢者喻四諦也三乘同證四真諦理未破塵沙猶在中途故云道中三界見思惑盡名露地即有餘涅槃也涅槃謂之露地者以較火宅則清涼有餘較寶車之莊嚴全無所以名偏空小果住果不進故云而坐見思既盡真諦理顯故云無復障礙不為見思所局故云泰然生已度想生安隱想故言歡喜二諸子索車喻喻上我見佛子等二行頌明大乘機發時諸子等各白父言至羊車鹿車牛車願時賜與此明索車文無索字依此請辭明索車耳索有三一機索鹿苑證小之後至方等冥有大益被斥不謗理有求大之義名機索二情索至般若會上領知大法樂大心起縱不彰言索義漸切名為情索三口索來至法華因方便品初聞佛略說動宿疑情是故發言三請名為口索問仍索三車大機何在答名同義異實大機動耳但二乘不知三車之外別有一乘也三請殷勤惟垂分別願說第一則大乘機動明矣又法說中先明機發次說除障佛喜無畏今喻先明免難次明機發具論有四句有先障除後大機發如四大弟子諸聲聞等於小乘教中障除大品法華初大機始發二障未除大機發如華嚴法華諸凡夫得入佛慧者三大機先動後障除如方便品所說四先障除後機發如今喻所說機動障除互現共成一意耳三等賜諸子大車喻喻上於諸菩薩中三句頌正顯真實分三初雙標子等車等二廣明車等三廣明心等且初雙標子等車等舍利弗爾時長者各賜諸子等一大車各賜諸子者明子等也一切眾生等有佛性佛性同故等皆是子也等一大車者明車等也以子等故則心等以法等故無非佛法喻一切法皆摩訶衍言各賜者各隨本習四諦六度無量諸法開示真實舊習不同故言各皆摩訶衍故言大車下文凡有聞法無不成佛是等賜意二廣明車等又二初明車之體相其車高廣眾寶莊校至又多僕從而侍衛之高廣者喻如來知見廣大深遠橫周法界之邊際竪徹如理之淵底也又圓收逗會總攝時機非高廣而何眾寶一句喻萬行修飾周匝一句喻總持遮護四面一句喻四辯下化眾生張設一句幰帛張車喻四無量心眾德之中慈悲最高普覆一切也珍奇一句喻真實萬善嚴此慈悲也寶繩一句喻四弘誓堅固大慈心也垂諸一句喻四攝神通等悅諸眾生也重敷一句婉美也筵舖席也喻觀練熏修一切諸禪重沓柔軟也安置一句枕有內外外枕者車若駕運隨所到處須此支昂喻即動而靜即靜而動也內枕者休息身首喻一行三昧息一切智一切行也丹即赤色喻無分別法也駕以白牛者喻無漏般若能導諦緣六度一切行到薩婆若海也白乃本色即與本淨無漏相應故體具萬德如膚充煩惱不染如色潔形體即膚色姝好即充潔此二句喻實相般若之體有大筋力三句喻觀照般若之用也又四念處為白牛四正勤中二世善滿如膚充二世惡盡如色潔四如意足稱行者心如形體姝好筋喻五根住立能生義也力喻五力排伏幹用義也行步平正喻定慧均等七覺調平也其疾如風喻八正道中行疾到薩婆若海僕從者方便波羅蜜也能屈曲隨人給侍使令即眾魔外道二乘小行皆隨方便智用故淨名云皆吾侍者僕從侍衛者供給左右也與儐從同此中長者能證之人車等是所證之法車即體大眾寶下相大白牛下用大諸子乘之即將來長者也二釋有車之由所以者何是大長者財富無量種種諸藏悉皆充溢財富藏溢喻果地福慧圓滿諸藏者謂行藏理藏也一切法不出於檀尸忍等即是約行明如來藏一切法不出於陰入界等即是約理明如來藏陰界等隨拈一法無非理藏達此理藏故使六度咸成妙行不達此理萬行徒修自行此行理為充化他為溢又實智圓滿名充權智隨用名溢非但藏多又皆充溢無有一法非摩訶衍故云種種無量三廣明心等分二初廣心等而作是念我財物無極至各各與之不宜差別此明心等由財物無極是子無偏是故心等假使富而非子或有所吝假使是子而貧或不能給則心不得等也今自行已圓財富無量化緣已熟故愛無偏黨也七寶大車等者喻今經開顯若教若行皆摩訶衍也又方等般若念處正勤根力覺道種種異名皆開示實相歷一切法亦復如是故言無量各各二句不移本習而示實相如身子於智慧開佛知見具一切佛法目連於禪定開佛知見具一切佛法餘人例知以心等故不宜差別也我財一句即佛自住大乘也不應一句即自證平等法若以小乘化皆是二句即乃至於一人我則墮慳貪此事為不可也應當二句即皆以如來滅度而滅度之不宜一句即不令有人獨得滅度也二釋心等所以者何以我此物周給一國猶尚不匱何況諸子大慈普覆故云周給初釋財多尚周一國何況諸子喻大圓因遍該善惡普周法界理亦不窮況佛知見耶次釋子等非子尚充何況是子喻無緣者尚度況有緣子耶言非子者且貶正因不同緣了故抑言非然佛慈普廕畢竟無偏況結緣子故約無緣慈對本有理則一切眾生無非佛子也若寄化儀說且以宿昔未結緣者為非子也又此等賜一科謂人天善惡體即法界故父果車即子理車但開其情假名等賜眾生無盡車亦不窮不窮故不匱不匱故無偏故云等賜大白牛車總之緣了子先結緣者今熟脫之正因子未結緣者今為下種番番種番番熟番番脫盡未來際無有已也方是出世長者大慈悲父之心等賜諸子大車竟四諸子得車歡喜喻喻菩薩聞是法一行受行悟入是時諸子各乘大車得未曾有非本所望喻上菩薩聲聞除疑成佛也三乘之人本求羊鹿水牛之車期出分段今得大白牛車盡於變易過本所望豈不歡喜上等賜大車喻竟四長者不虗喻分三初如來垂問二舍利弗答三如來歎善且初如來垂問舍利弗於汝意云何至寧有虗妄否此下喻上汝等勿有疑二行半明說無虗妄也是長者先許諸子三車諸子既出之後不與三車而等與珍寶大車這先許三後與一寧有虗妄否二舍利弗答分二先直答不虗舍利弗言不也世尊謂凡稱虗妄者以無益於人而有損於事也今長者於諸子既有益而無損實不虗妄故云不也世尊二申明不虗之意又四初免其火難不虗二結況以重奪輕不虗三不乖本心不虗四結況過本所望不虗且初免其火難不虗是長者但令諸子至便為已得玩好之具是長者先許三車者不過令諸子得免火宅之難全其身命而已今身命已全有何虗妄故云非為虗妄何以下徵釋謂我說長者為全身命不與玩好之具不為虗妄者是何以故也若全身命雖未別有所得玩好便為已得玩好之具以全於小乘五分法身入空慧命則是已得玩好之具也全身免火已得大寶濟子重命豈應有虗二結況以重奪輕不虗況復方便於彼火宅而拔濟之況復昔日體外方便於彼火宅救度一切眾生得五分法身尚不虗妄豈今日等賜大車實慧之命已得而反有虗妄哉三不乖本心不虗世尊若是長者至以是因緣無虗妄也謂諸子但免火難長者縱不與小果猶不虗妄以前苦已出小果已證那言虗妄故云乃至不與等此述長者本意若小若大俱有本心大本為本小本非本許小不與尚無所乖況更與大寧乖本意何以下徵釋是長者未許三車之前先作念云諸子無知於火宅內無求出意我今當設方便巧說三車令子得出火宅元為拔苦本非與果以是作念假設方便令子得出火宅之因緣故不虗妄四結況過本所望不虗何況長者自知財富無量欲饒益諸子等與大車昔日許三而今與一三乘是其所望一車本不知有許三與一出乎三乘望外那言虗妄三如來歎善佛告舍利弗善哉善哉如汝所言雙歎善哉美其所答不謬也問佛不自說不虗教身子說者何也答許三與一自說取信為難教身子說者取信諸人則易也初譬喻已竟二法合分二初合總喻二合別喻初中分六初合長者喻舍利弗如來亦復如是至具足方便智慧波羅蜜如來一句合上位號也如來無量德號略舉十義如上則為一句合上名行也上云國邑聚落今云一切世間者通指同居方便實報三土如來遍應三處為一切世間之父也等三界以同仁視四生如一子故云父於諸下合德業也怖畏即二種生死無明即五住煩惱永盡者即五住究盡二死永亡合上衰邁顯斷德也成就知見合上年高顯智德也力無所畏合上外德財富無量也神力者深修禪定能得神通合上田也智力者智必照境如身託處合上宅也具足一句合上諸僮僕也二合五百人喻大慈大悲常無懈倦恒求善事利益一切慈悲是施化之本一切是五道眾生恒為慈悲所被又常無一句大喜心也恒求二句大捨心也以不大喜則懈倦而不求善事不大捨則雖求善事不肎利益一切故三合舍宅喻而生三界朽故火宅朽故如下頌四合三十子喻為度眾生眾生有緣具三乘根性者先得度脫五合火起喻生老病死憂悲苦惱愚癡闇蔽三毒之火生處胎獄老厭龍鍾病臥牀席死悲離散三毒者貪對一切順情之境引取無厭瞋對一切違情之境便起怒恚癡者迷一切事理之法無明不了起諸邪行此三於諸諦理愚惑癡迷昏闇障蔽故又稱毒者以能壞出世善心故火字貫上此合歘然火起也六合一門喻教化令得阿耨多羅三藐三菩提教能詮理尋理起行即得菩提此中如來轉無量怖畏而成無量無畏力轉無量衰惱而成無量大神通力轉無量憂患而成無量知見力轉無量無明而成實智力轉無量闇蔽而成權智力具此種種廣大威力而以大慈大悲恒求善事利益一切眾生以如來永盡怖畏能度眾生生死怖畏永盡衰惱憂患能度眾生憂悲苦惱永盡無明闇蔽能度眾生愚癡暗蔽三毒由如來永盡諸障方能成就無量德業由成就故方能教化眾生令得菩提也合總喻竟二合別喻分四初合長者見火喻又四初合能見見即如來寂照智眼能見也喻中長者見法中佛眼觀見二合所見火諸眾生為生老病死至如是等種種諸苦合上所見之火從四面起也五欲如刀蜜財利如浮雲眾生癡暗貪求無晝無夜五濁八苦之火日夜燒煑故云受種種苦貪求者求不得苦也地獄人天五陰熾盛愛別離欲合而離怨憎會冤家相會三合廣前所見眾生沒在其中歡喜遊戲至雖遭大苦不以為患上種種苦如海眾生汩沒於中不以為苦反以為樂也不觀苦集故不生厭不觀道滅故不求解脫又此結束上文謂五欲財利本是苦境而眾生以為樂事故歡喜遊戲貪著追求本是苦心而眾生惟恐貪之不酷求之不巧故不覺知地獄三途本必有之苦報應寒心而恐畏者而反不信謂且顧生前奚遑死後故不驚怖天上人間貧窮困等本是苦聚應厭惡而遠離者然間植小善微因求一人身天福惟恐不得故不生厭如是等種種諸苦皆應早求解脫者而眾生且淹沒陷溺其中故不求解脫由此癡迷無有智慧故不知覺由不知覺故不驚怖由不驚怖故不生厭由不生厭故不求解脫而於三界火宅中日出而作隨善業以東馳日入而沉隨惡業以西走改頭換面往還五趣雖受百千萬劫之大苦不以為患此合諸子火來逼身心不厭患無求出意也四合長者驚怖舍利弗佛見此已至佛智慧樂令其遊戲應字即非予而誰之意拔其苦即大悲之力與其樂即大慈之力上云驚怖驚其無樂怖其有苦此拔苦與樂即上驚怖也合長者見火喻竟二合捨几用車喻分二先合捨几次合用車初中又二初合長者念救舍利弗如來復作是念至眾生不能以是得度承上拔苦與樂雖為父道所當盡然復作是念終難從實捨權也神力合上身有力智慧力合手有力如來知見合上衣裓力無畏合上几案即始坐道場大法擬宜眾生根鈍不能以此得度也二合諸子不聽所以者何是諸眾生至何由能解佛之智慧徵釋不能得度合上不聽也正由五濁障重未免生老等火所燒大乘微妙不能解入如人身在縲紲未可以語衣錦之榮故云何由能解等此句合唯有一門而復狹小無機狹小不能解佛智慧也前喻有三馳戲一科義含二合用車分二先牒前三喻舍利弗如彼長者至然後各與珍寶大車一大擬不得二小投其好三等賜大車二正合用車分四初合擬宜三車二合知子先心三合歎三車希有四合適子所願且初合擬宜三車如來亦復如是至於三界火宅拔濟眾生不用之者大法擬不得也但以方便者正用三乘也智慧方便權實並演單云智慧自受用實也連方便者明應機即實而權正顯權從實起權泯歸實之旨三界者欲界雜居色界四禪無色四空各有界限種族故俱名火宅者均在輪迴數故此合我今當設方便令子免害也二合知子先心為說三乘聲聞辟支佛佛乘三乘者乘以運載為義聲聞以四諦為乘緣覺以因緣為乘菩薩以六度為乘運出三界歸於涅槃也六度菩薩於當教亦稱大乘今名佛乘者以三十四心頓斷見思習氣而得成佛故三合歎三車希有又三初合示相轉而作是言汝等莫得至聲聞辟支佛佛乘汝等莫得等示苦諦三界火宅是苦果勿貪等示集諦貪愛是苦果之因色為男女形貌及青黃赤白等聲為男女歌詠及絲竹環珮等香為男女身香及沉水檀速等味為男女綢繆及肴膳美味等觸為男女身分及柔軟細滑等此名五欲亦名五塵揀非微妙故云麤弊若貪等者以蛾眉皓齒是伐性之斧絲竹管弦是奪心之賊龍涎象藏是牽意之媒甘脆肥膩是腐腸之藥雲繒羅縠是惰身之機眾生不知而生貪着愛取則為其所燒也汝速下示滅道二諦此二示三界外有三乘智斷之果故令速出三界當得三乘正合上三車今在門外可以遊戲二合作證轉我今為汝保任此事終不虗也無人保任或恐難成佛既自證為作保任出三界內之苦得三界外之樂為不虗矣合上隨汝所欲皆當與汝三合勸修轉汝等但當勤修精進至便得無量安隱快樂汝等下正合勸修復作下正合歎三車希有三乘是諸佛方便化物儀式故諸佛所稱揚讚歎也若知苦則無生死逼迫之苦果而有身心自在之樂故云自在若斷集則無三界繫縛之苦因而有縱任不拘之樂故云無繫若證滅則我生已盡不受後有故無所依若修道則旅泊三界無所希望故無所求又得無生智曰自在得盡智曰無繫無明糠脫曰無依所作已辦曰無求無漏等勸修道品也住於真空涅槃故安隱改麤為細易短作長故快樂四合適子所願前喻三車合說今三乘別合分三初合羊車舍利弗若有眾生至為求羊車出於火宅內有一句下二應有宿昔三乘樂欲成三乘智性故佛施三乘之教以投其好也此性即眾生本具正因佛性論中有本性住種性即此正因佛性有習以成種性即緣因佛性此正因性雖具必假教法熏起聞法信受者謂從佛聞等流教法的信無疑拳拳服膺持守不失殷勤精進者聞而思思而修也三處聞法各隨本乘欲速二句厭三界苦求涅槃樂也欲速自求是二乘病根欲速則不達自求則不大因乖萬行果缺圓常皆欲速自求之過也是名下結如彼下提喻合聲聞聞佛聲教得悟不能化他如羊不顧後群故以羊喻聲聞乘此中從佛聞法合上聞父所說適其願故聞慧也殷勤合上心各勇銳思慧也精進合上推排修慧也欲速等合上競共馳走是名一句合上爭出火宅下倣此二合鹿車若有眾生從佛世尊至為求鹿車出於火宅梵言辟支迦羅此云緣覺亦云獨覺求自然二句獨覺也以單丁自守不求伴侶觀物變遷自覺無生故深知一句緣覺也諸法即十二因緣也秉佛因緣流轉還滅推審住智滅緣顯理故十二有支除無明每支具七智先推因次審因三世推審為六後住法智為七十一支共七十七智也又求自然慧則慧不止如聲聞內有智性而已深知一句則志不止如聲聞欲速自求而已故優於聲聞劣於菩薩為中乘也支佛是法行人從他聞法少自推義多故喻如鹿鹿不依人故又鹿有迴顧之慈故三合牛車若有眾生從佛世尊至為求牛車出於火宅求一切下明求佛智慧一切智者即一切法而證實相所謂欲覔實相不離一切法欲覔一切法不離實相諸法為實相之表實相乃諸法之體故名一切智佛智者揀因智此智究竟果位超於因位故名佛智智是一但有圓缺之異故上二實智也下二權智自然智任運而知於一切機不思而應俯會無差如月落百川影含萬體不然而然名自然智無師智者以此智惠施於人應遍無方不拘成範能師一切人無人為師名無師智如來知等明求佛地不共功德也上上求自利愍念下下化利他安樂等以四無量心安樂一切眾生離苦得樂也無量總該六道以慈心利樂饒益諸人天等而與之樂故云利益人天以悲心度脫三途一切眾生而拔其苦故云度脫一切此中聞法精進前五度求四智第六度又求一切等大智心也愍念等大悲心也智悲雙運漚和不礙般若般若不礙漚和具此自利利他之大心故名大乘菩薩下釋成大乘二字謂前云佛乘此云大者以佛是大果眾生能求此大果而乘之以自利利人故名摩訶薩之大乘也菩薩慈悲化物如牛之安忍運載故以牛車喻菩薩上合捨几用車竟三合等賜大車喻分二先牒前二喻舍利弗如彼長者至等以大車而賜諸子見諸等牒前免難自惟等牒前等賜上喻有四今但合二免難兼索車等賜兼歡喜次合二喻分二初合諸子免難如來亦復如是至怖畏險道得涅槃樂此門乃方便權門也指阿含教中所詮之理苦即世間苦果怖畏一句即世間生死得涅一句即出世樂果謂小乘涅槃云出云得雙該集道二因未有不斷集而離苦果者未有不修道而得樂果者此合諸子安隱得出火宅到無畏處也二合等賜大車分三初合釋有車之由如來爾時便作是念至力無畏等諸佛法藏合上財富無量也二合廣明心等是諸眾生皆是我子至皆以如來滅度而滅度之合上我財物無極不應以下劣小車與諸子也佛之法藏既多眾生又是佛子所以不惜而等與也不令下釋等與之義如來滅度即大乘三德涅槃四十年前獨許菩薩作佛是令有人獨得滅度今經許聲聞與菩薩同得受記是皆以如來滅度也三合廣明車等是諸眾生脫三界者至能生淨妙第一之樂是諸一句牒昔所化權人悉與下結足所與大之事一相即實相法身德也一種即種智般若德也淨妙之樂樂即無苦解脫德也三德高廣具足莊嚴收羅萬億名為大乘正合其車高廣眾寶莊校等名為大車也又一相者雖有差別功德皆一實相一種者無二三之殊惟一乘之種類諸佛稱歎以此而修直至成佛故云生淨妙樂又涅槃淨也般若妙也法身第一也此三永絕諸苦故云樂上合等賜大車竟四合長者不虗喻分二先牒前喻舍利弗如彼長者至然彼長者無虗妄之咎許三誘引出宅末後等與大車既無虗妄過咎次正合不虗如來亦復如是無有虗妄至於一佛乘分別說三長者既不虗妄如來先三後一豈虗妄哉何以下徵釋先三後一之故謂初說三乘既為引導則似非實然後但度大乘曾無先期則似為妄此何以故而言無有虗妄以虗妄者無而為有能許而不能與之謂今佛既有無量諸法之藏則非虗矣又能與一切眾生大乘之法而不悋惜則非妄矣但因法大機小佛能盡與而眾生不能盡受若華嚴能受何俟開一為三舍利下結以是眾生不能盡受之因緣但為小智開一為三也因緣應前請詞上長行竟二偈頌有一百六十五行前一百行頌上長行後六十五行補頌二義初中又二初六十五行半頌喻說二三十四行半頌法合初頌喻說中分二初三十三行頌總喻次三十二行半頌別喻初頌總喻中分四初一句頌長者喻二三行一句頌家宅喻三半行頌五百人喻四二十九行廣頌火起喻前喻有六今止頌四家宅含一門五百含三十子耳且初一句頌長者喻佛欲重宣此義而說偈言譬如長者頌上位號即兼名行德業既有長人之德即知名行為國邑聚落所崇亦知內外年德俱高喻佛具足智斷慈悲萬德也二三行一句頌家宅喻有一大宅其宅久故至周障屈曲雜穢充遍宅者託也安也人所託以安身也宅久易壞故云頓弊總言曰宅別論宅內有堂舍之分堂者當也當賓客酧酢也舍者止也止身於其間也靠壁曰柱即磉曰根橫曰梁竪曰棟房址曰基堦砌曰陛東西曰墻前後曰壁圮毀也坼裂也泥塗所以飾縫隙阤壞也覆苫所以蔽風雨在簷曰椽在脊曰梠籬落四園曰周障徑巷穿叉曰屈曲若配依報大宅三界也三界無始為久非今所造為故無常卑鄙為頓弊堂舍者長行堂喻欲界此中堂喻上二界舍喻欲界柱根梁棟墻壁如上配基陛喻共相種子泥塗墻壁之表覆苫堂舍之表椽梠梁棟之表此三可喻山川林藪等高危摧朽等皆明無常敗壞之相周障二句明三界高低崎嶇三惡增盛也正報五陰宅也自迷心海已來故云久故陰身老病無常故云頓弊堂喻身之上分舍喻身之下分念念相續無常曰高危八法不整三相所遷曰摧朽諸苦所侵曰傾斜基陛喻行業衰老之時曰隤毀四大傷損曰圮坼泥塗喻皮膚老色枯朽曰阤落覆苫喻毛髮老則脫落曰亂墜椽梠喻筋骨支節不援曰差脫周障二句一身三十六物九孔長流不淨也三界不牢令人生厭是說喻之正旨故下文盡情摹寫智者觀之當絕本息輪離苦免難也三二句頌五百人喻有五百人止住其中三乘根性為五道所攝兼得三十子四二十九行廣頌火起長行周匝三句文略今廣明之諸家配釋不一智者用十使配釋其義切當十使煩惱分於三界九地具足見思方感分段生死之苦以十使為火之根本故文分四段初二十二行頌明地上事喻欲界火起二三行半頌明穴中事喻色界火起三二行半頌明空中事喻無色界火起四一行總結眾難多端初中又四初明所燒之類二明火起之由三明火起之勢四明被燒之相初中又二先正明所燒二總結所燒初中又二初明禽獸被燒喻五鈍使眾生二明鬼神被燒喻五利使眾生十使而云利鈍者前五於所緣境頑嚚不決故後五於所緣境果決割斷故為心王所役曰使又能使眾生入於生死輪迴故初明禽獸被燒又二初正喻五鈍二結顯宅變初中又五且初二句頌喻慢使鴟梟鵰鷲烏鵲鳩鴿此下蟲名獸狀鬼體神形雖非經要既喻十使亦可略知其相也慢使眾生自舉輕他凌高下視故喻如鳥凌他為慢自貴為憍必有所挾也今取文殊問經八憍喻此八鳥一壯盛憍謂人恃己強勝壯大凌他劣弱如鴟惡鳥也似鷹而白一名鵂晝不見泰山夜能撮蚤其形最大故壯盛憍如之二性憍謂人恃己種姓強大凌慢於他如梟不孝之種食母之鳥故性憍如之三富憍謂人恃己富凌慢於他如鵰有多種黃頭赤目者能取獐狸為食故富憍如之四自在憍謂人恃己長大稱意所作凌慢於他如鷲食宿山林去住自由故自在憍如之五壽命憍謂人恃己壽高凌慢於他如烏即烏鴉反哺之烏命長不死故壽命憍如之六聰明憍謂人恃己聰利明達凌慢於他如鵲性至聰能報吉凶故聰明憍如之七行善憍謂人恃己能行少善凌慢有德如鳩即𪄕鳩性至純不知自拙諺云人道𪄕鳩拙我道𪄕鳩巧只用幾根柴家緣便做了故行善憍如之八色憍謂人恃己容顏美妙凌慢於他如鴿類有多種以色取勝肆婬鳥也故色憍如之二二句頌喻瞋使蚖蛇蝮蝎蜈蚣蚰蜒瞋有三種一非理瞋謂不問可否歘起瞋心二順理瞋謂人實惱我三諍論瞋謂強執己解為是他解為非蚖蛇之大者毒盛不觸而吸喻非理蝮蝎之大者觸之則螫人也喻順理蜈蚣瞋很而行速蚰蜒漣涎而走滯喻戲論三二行頌喻癡使守宮百足鼬貍鼷鼠至𧏙蜋諸蟲而集其上於境不了曰癡即無明也無明有二一獨頭二相應在室曰守宮在澤曰蜓漢時宮中養以丹砂取血用梅華印以塗眉間宮女有邪私者其面華即散為防宮女婬亂故云守宮多足蟲曰百足似蜈蚣不能毒害者此二兀然喻獨頭鼬鼠之大者赤黃色能入穴而食鼠天若雨於樹上倒懸尾有兩岐以塞兩鼻貍狐之大者年老可成精而妖媚人者鼷鼠者甘口鼠也食人而不覺痛者此三喻相應諸惡一句謂從癡根本備起諸結使也交橫一句明諸使相緣或緣三界如交橫起之速疾如馳走屎尿二句明癡心所著之境皆無常不淨故𧏙蜋亦名烏甲蟲由癡不了於中計常樂我淨而生染著如𧏙狼集其上也則人於男女二根生欲樂想者迷倒極矣四二行頌喻貪使狐狼野干咀嚼踐蹋至饑羸慞惶處處求食貪有二一有力貪二無力貪有力者以威勢取之如五覇等荼毒萬姓如狐狼無力者但能從他乞索麤弊如豪強侵奪良善阿附之餘黨如野干似狐而小形色青黃尾大巢於危巖高木之上群行夜鳴恠獸也咀嚼下明貪心取境有用而取如口含味以咀嚼不用而棄如足蹴躡以踐蹋又小則咀嚼多則踐蹋也以唇咥血曰嚌以齒斷骨曰齧喻貪噬無厭也死屍喻麤弊五塵狼籍者狼所臥處艸皆披靡也生蟲咀嚼以殆盡死屍嚌齧以有餘故云骨肉狼籍謂食之不盡零落於艸間世人肆筵設席杯盤狼籍積聚五塵不知止足亦猶是也由是下喻王賊等有大力將彼有力無力所貪之物以強取之也兩足翻尋曰搏收聚一處曰撮貪不知足曰饑求不能得曰羸種種營覔曰慞惶多貪之人雖富而貧也處處一句馳逐五塵之境也五二句頌喻疑使鬪諍摣掣啀喍嘷吠群狗競取曰鬪群狗相吠曰諍向前相奪曰摣往來相扯曰掣即鬪之形也啣物死諍曰啀喍失物潑叫曰嘷吠即諍之聲也喻疑使眾生未決是非為鬪諍意謂為是復謂為非名摣掣發言論決是非之理名啀吠上正明五鈍竟二二句頌結顯宅變其舍恐怖變狀如是變乃改其本有狀謂新其相貌總上五鈍凡人共有苟有此者人而不盡人道則妄人也非禽獸而何人之異於禽獸者幾希庶民去之君子存之凡人物之生同得天地之理為性惟其所稟氣形偏正故有人畜之殊乃曰幾希也唯君子完其所得之理不失其所以人也小人不知而去之名雖為人而實不得其所以為人也孟氏之言吾佛之教隱顯少殊會旨不異上明禽獸被燒竟二明鬼神被燒又二初二句總明五利處處皆有魑魅魍魎五利遍緣三界四諦五陰觸處生著造次恒有故言處處皆有也西京賦云山神虎形曰魑宅神猪頭人形曰魅木石變恠曰魍魎總是物類之精有時聞聲不見其形有時見形倐然不見其形也夫鬼神有智禽獸則無故以利喻鬼神鈍喻蟲獸二九行半別明五利分五初三行喻邪見夜叉惡鬼食噉人肉至鬪諍之聲甚可怖畏邪見眾生不敬三寶不禮塔寺撥無因果故云邪見夜叉亦名藥叉捷疾鬼也此云苦活食人度命以苦自活也喻邪見之徒人是善報喻出世善因果不雜煩惱者邪見之心撥無善因果之事如夜叉食人肉也毒蟲是惡報喻世間惡因果雜諸煩惱者邪見之心撥無惡因果之事如夜叉噉毒蟲屬也諸惡下三句明善惡因果皆從自類而生毫無差舛玉篇云伏卵曰孚廣雅云孚亦生也乳者養也故烏生曰孚獸生曰乳此喻善惡之法從自類因生自類果也各自藏護者因能有果名藏必得不失名護夜叉二句謂邪見之心撥無善惡因果如夜叉競共爭取人肉毒蟲而食也食之既飽者邪見之心成就也惡心轉熾者邪見之心增廣也𩰖諍之聲者內心成就外彰言教宣於無因無果之法能令聞者墮落三途故言甚可怖畏今之外道宣唱冊卷夜聚曉散者是也古德云似此一般愚男女生遭王法死阿鼻豈不大可怖畏哉二二行半喻戒禁取鳩槃茶鬼蹲踞土埵至以脚加頸怖狗自樂戒取執邪為道名非因計因即持牛狗等戒之徒鳩槃茶此云甕形以其形似甕故可畏鬼也虗坐為蹲實坐為踞喻外道依於戒取修行十善能生六欲天六天是欲界高處如土埵也依戒取修得四禪生色界名離地一尺依戒取得四空定生無色界名離地二尺也上生二界為往還生欲界為返依戒之見所修之行安意樂心故縱逸嬉戲也捉狗等者前文狗喻貪使今兩足喻有力無力二貪聲喻貪之種子脚喻覺觀以戒取之徒非無實修但知見不正不入正道盲修瞎煉非因計因幸而高昇上界意欲伏貪現行既得伏已故云捉狗兩足又望斷貪之種子故云撲令失聲斷之不能即用覺觀加之故云以脚加頸妄謂滅除而得自在之樂故云怖狗自樂此中捉撲以怖正是外道邪修之工夫也三一行半喻身見復有諸鬼其身長大至發大惡聲叫呼求食於陰入界中妄計為身名為身見竪入三世計我名長橫遍五陰計我名大計我自在不修善法即無慚愧故言裸形以惡業莊嚴故言黑無功德資助故言瘦計我者不出三界故言常在其中計我在心發言宣說有我之相故言發大惡聲冀因此說望得道果故言叫呼求食也四半行喻見取復有諸鬼其咽如針此非果計果也見取通至非想非想非是涅槃之果計之為常如咽細命危而保其壽故云其咽如針以無色唯心名咽細也五二行喻邊見復有諸鬼首如牛頭至饑渴所逼叫喚馳走於一身見計斷計常執常非斷執斷非常隨執一邊名為邊見計常者身斷我常計斷者身斷我斷斷常二邊如牛頭二角不知善因善果惡因惡果一味執斷執常如食人肉復噉狗也或時計常或復計斷前後迴轉如頭髮髼亂也計常即破斷計斷即破常如殘害兇險也無有智定飲食自資如饑渴所逼各陳己見宣唱邪論如叫喚隨諸邪行輪迴不息如馳走上正明所燒竟二一行半總結所燒夜叉餓鬼諸惡鳥獸至如是諸難恐畏無量此總結欲界利鈍煩惱之相初句利二句鈍饑急二句通結二使並是有漏之心無道味之貪故云饑由饑故生死速疾故云急四向者向四生輪迴也窺私竊也明其邪觀空理慕仰道味雖復觀空而滯著心多不會正理如窺牕觀空不得無礙也末二句總結初明所燒之類喻十使煩惱竟二二一行明火起之由喻起五濁之由是朽故宅屬於一人其人近出未久之間三界是佛化應之處發心已來誓願度脫故云屬於一人長者在宅能令諸子慎火由出宅後諸子無知故令火起內合如來在世能令伏五濁由捨應後眾生於後復起五濁世尊在此土數數生滅今言近出約最後一番示生三界此土緣盡彼土緣熟捨此應彼也問言屬又言出者何也以屬則不出出則不屬故答不言屬則於己無干不應救濟不言出則己且被燒安能救人哉三二行明火起之勢喻正起五濁於後宅舍忽然火起至摧折墮落墻壁崩倒忽然應長行歘然四面即身受心法於此備起四倒五濁八苦等故云一時相續漸增故云俱熾呻吟悲痛為𪹼聲諸根破壞為震裂氣斷骨離故摧折墮落四大解散故墻壁崩倒世界山崩地裂樹折崖摧山河傾覆等正明三界宅五陰舍頓弊敗壞火燒不堪之相令人不當貪戀也四一行半明被燒之相喻受五濁八苦諸鬼神等揚聲大叫至周慞惶怖不能自出若計常者謂法定常已有還無無即常故計斷者謂法定斷唯此一死更無復續皆唱言定說其事已顯故云揚聲大叫鵰鷲舉鈍使鳩槃舉利使此等眾生煩惱濁心五見交攻不求正道之修不知出離之方常在三界甘受輪迴故云周慞等上明地上事喻欲界火起已竟二三行半明穴中事喻色界火起分四初一行明所燒之類惡獸毒蟲藏竄孔穴毗舍闍鬼亦住其中四禪之定如孔穴雖復不及門夜敞豁猶得免於猛燄喻入四禪定中雖未出界外猶得免於欲界麤惡也初二句鈍使下二句利使毗舍闍噉精氣鬼也二一句明火起之由薄福德故少福薄德故近惡遇苦三一句明火燒之勢為火所逼孔穴之中雖無猛火猶有熱惱喻四禪雖無欲界麤惡亦有喜樂等愛味細苦故是火逼四二行明被燒之相共相殘害飲血噉肉至臭烟蓬㶿四面充塞利鈍眾生得禪是同所計各異互相是非如共殘害也既於禪中起諸見則不能生無漏定慧但著禪味如飲血又著覺觀等五支如噉肉野干喻欲界貪於欲界修未來安已斷此貪故言並已前死禪定之貪如大惡獸能吞欲界之貪故云競來食噉欲界四倒八苦如猛燄色界四倒八苦如臭烟以烟過𦦨故喻色界色界亦通身受心法及以四大如四面咸苦故云充塞上明穴中事喻色界火起竟三二行半明空中事喻無色界火起有二初一行明所燒之類蜈蚣蚰蜒毒蛇之類為火所燒爭走出穴欲界以蜈蚣喻瞋今無色界亦喻瞋色界雖不言蜈蚣而云毒蟲即兼之阿毗曇云上界不行瞋無相害故有善欲故性寂靜故心滋潤故然止而不行非能斷也約種子三界俱有約現行欲界獨存厭色界定出向無色厭色麤法觀無色法如毒蛇被燒出穴也二一行半明所燒之相鳩槃茶鬼隨取而食至饑渴熱惱周慞悶走若得無色定必滅下界緣故言隨取而食非想居於最頂尚不免顛倒之苦如頭上火然也非想亦有八苦之火心生異念生苦也念念不住老苦也行心擾擾防定病苦也退定死苦也求定不得求不得苦也不得定必有障怨憎會苦也失定時愛別離苦也四陰心即五陰熾盛苦也無無漏飲食所資故饑渴所惱猶是輪迴故云周慞悶走也上明空中事喻無色界火起竟四一行總結眾難多端其宅如是甚可怖畏毒害火灾眾難非一十使煩惱業火所燒三界五趣受無量苦故曰其宅如是甚可怖畏灾難甚多難以盡言故曰非一上頌總喻竟二三十二行半頌別喻分三初二行半頌長者見火二十三行頌捨几用車三十七行頌等賜大車略無虗妄不頌初又三初三句頌長者能見是時宅主在門外立聞有人言宅主即長者是能見之人門外立者於所燒之門安隱得出也云立者以如來在法身地常懷大悲欲救眾生不處第一義空之座故云立也聞有人言者上云見今言聞者以聞代見也人者聞必從他故三昧法即他人也入三昧中俯察羣機三昧能令佛見故云有人言也又人指悲願若見聞者悲願使然也二一行一句頌所見汝諸子等先因遊戲來入此宅稚小無知歡娛樂著問子本未出云何因戲來入答約聖或在大通時曾發大心名出三界而復退還名之為入如人舉足欲出至門側而返亦名為出亦名為入也約凡理性本淨非三界法名出因晦昧故而起戲論便有生死名入故云先因遊戲來入此宅也昔結緣淺大善未著名為稚小退大以後流轉三界無明所覆名為無知歡喜樂著即前於火宅內樂著嬉戲等三二句頌驚怖長者聞已驚入火宅為諸眾生起大悲心出真兆聖降迹塵寰也二十三行頌捨几用車分二初五行半頌捨几二七行半頌用車初又三初四行半頌長者念救方宜救濟令無燒害至此苦難處況復大火方宜者正以大教擬宜也告喻即具告諸子也說眾患難下正明所燒重重疊疊廣列二使眾生汩沒三界眾苦蔓筵相續不絕也無定慧相資故云饑渴饑渴已是可畏況復五濁大火之所燒煑也二三句頌諸子不聽諸子無知雖聞父誨猶故樂著頌上雖聞父誨不肎信受正明無機不受即無知即上稚小無知猶故樂著者既無大志復著三界也三一句頌馳戲視父嬉戲不已正明息化嬉戲即見思見思不已大法難投故息大化耳二七行半頌用車分三初三行頌擬宜三車是時長者而作是念至即便思惟設諸方便初一行擬宜意愁恐墮苦惱不受大也又長文云此舍已為大火所燒等長者既慮與子並焚所以益其愁惱也次一行明用小之由由著見思故唯施小躭樂之甚也湎淪溺不出也舍宅無一可樂明三界五趣是苦諸子躭湎嬉戲明眾生執苦為樂也不受二句明用小之意若不用小則大小俱亡故云將為火害害故喪身喪身故失命即便二句正思用小施三乘教也二三行頌歎美三車希有告諸子等我有種種至隨意所樂可以遊戲告諸下頌勸轉也妙寶者方便教中之妙寶也小果之樂離火宅苦故云妙寶羊車下頌示轉也在門外者如示四諦令知出世也汝等下頌證轉也造作者以三車本無乃幻出耳可以二字冥斥二乘不堪任重致達僅可自利遊戲而已三一行半頌適子所願諸子聞說如此諸車至到於空地離諸苦難空地指小乘所證偏空之理頌上馳走爭出等文上頌捨几用車竟三十七行頌等賜大車喻分四初五行頌免難歡喜長者見子得出火宅至是故諸人我今快樂長者見等免難也坐師子座者一是諸子坐座得出三界故無畏也二是長者坐座見子兔難即得無畏也初在門外子猶在內是故父立今子既出宅是故安座又大機未會是故云立小化已周是故安座故知立者冥利也坐者顯利也而自慶下歡喜也得所化機是故慶快二萬億佛所教其大緣是故云生中間小熟是故云育經此多時數數成就將養不易故云甚難善根尚微故云愚小妄惑所覆故云無知無知則起濁起濁必招果故云入宅多諸二句總述三界利鈍之相大火二句總述三界八苦之勢而此二句明起見起愛不能自拔我已二句明歡喜之由是故二句結歡喜之意二三行頌諸子索車爾時諸子知父安座至今正是時惟垂給與知父安座者索車時也騐上二座父坐為正即坐無量義經之座也皆詣父所者索車儀也正同今會四眾圍繞咸以恭敬來至我所也願賜我等者正請索也如身子三請等如前所許下述許今正下結許三七行半頌等賜大車長者大富庫藏眾多至以是妙車等賜諸子初二句頌有車之由長者是能證之佛大富等是所證之法恒沙功德非因所及故云大也屋盛物曰庫喻六根等具一切法地盛物曰藏喻諸行具一切法又陰界入等具一切法喻藏約理如地故道品六度等具一切法喻庫約修如屋故其實一一法中具一切行及一切法一一行中具一切法及一切行故名庫藏眾多而大富也金銀四句明車體金銀四寶喻一真法界四智菩提眾寶兼攝萬德性具諸法總名為寶從性起修名之為造子多行多車則隨多名之為諸一一車體無不高廣名之為大又須示方知起修名造以性泯修造還本有即車之體也莊校下明車之莊嚴初四句如長行釋真珠等出幰葢相也慈門非一猶如網孔一一孔中皆一真珠如眾慈門並稱於實長文但云垂諸華纓秪是令見者欣悅今云處處垂下乃明眾機遍悅也眾綵一句喻垂化之處設應不同周匝一句喻攝物之宜無所闕少前云重敷婉筵今柔軟二句頌上婉筵二字上妙四句頌上重敷二字繒帛也纊絮也茵褥重席也喻諸禪自在故云柔軟以妙冠麤如細氎覆上意顯種種事禪並即實相不同凡小雜諸煩惱故云鮮白潔淨而上妙也有大下頌長行駕以白牛等前導曰儐後隨曰從以是二句頌車等心等以妙車等賜諸子者顯佛於群機周而不比於一乘兼濟無私也四一行半頌得車歡喜諸子是時歡喜踊躍至嬉戲快樂自在無礙初二句喜其所求者輕所得者重昔日焦芽自絕無分忽蒙授記何快如之哉得一乘妙用不滯一隅曰遊於四方不縛於諸法曰嬉戲快樂自在無礙葢嬉戲之與物毋意毋必調而應偶而會曾無縛著之心於一切法若嬉戲然乃能自由自在而無礙也上頌譬喻竟二三十四行半頌法合分二初四行頌合總喻告舍利弗我亦如是至如是等火熾然不息初二句頌合位號次二句頌合名行德業義含如來是七種方便賢聖中尊九種世間之父子義通故世間從九結緣義局故方便唯七此頌合長者一切下頌合五道兼三十子三十緣因子也眾生正因子也深著二句以五道論則著五欲之境無出世慧心以三十子論則大通時教大中間退取無有一乘之實智實慧也三界二句頌合家宅兼一門眾苦下頌合火起初二句標次二句釋後二句結二三十行半頌合別喻分四初三行頌合長者見火如來已離三界火宅至唯我一人能為救護如來已離四句頌合能見也寂然安處是蕭然無累之意正由寂然閒居能見五濁諸子今此六句頌上合所見火即見諸眾生為生老等之所燒煑也昔之三界既為佛有佛已出離今之三界為眾生有眾生亦當出離已出離者職應為父未出離者分應為子故云其中等患難即是火之燒煑也唯我二句頌合驚怖我是能救之人諸子是所救之人能為二字即應拔二字三界既為我有眾生又是吾子豈可父居界外蕭然無累忍諸子界內奔馳乎我既寂然安處豈可袖手不顧忍諸子患難燒煑乎故云唯是能救護也二四行頌合捨几用車分二初一行頌合捨几雖復教詔而不信受於諸欲染貪著深故初句擬宜即具告諸子且稱本懷也二句不得即猶故樂著等謂父雖愛子而子不如父願乃法大機小也三四句釋成不信之由兼含息化意正頌上未免生老病死憂惱等也二三行頌合用車以是方便為說三乘至有得緣覺不退菩薩以是方便者頌上但以智慧方便擬宜也為說三乘下歎三車希有三轉四諦法輪也知三界苦知苦斷集也開示二句慕滅修道也是諸子下頌合適子所願也決定者從苦法忍以上是真決定頌上合三乘奔走爭出火宅也三明婆沙論云宿命知過去苦生大厭離天眼知未來苦生大厭離漏盡能作正觀斷諸煩惱此三名明身境但工巧而已天耳但聞聲而已他心緣他別想而已此三故不名明而云通有得二句頌三人出宅證果緣覺兼聲聞菩薩云不退者以權教菩薩慈悲度生心無退屈非位次之所判也三八行頌合等賜大車分二先頌合等賜次頌合歡喜長文等賜兼歡喜免難兼索車今頌有歡喜無免難經文前後隱顯不同今先五行頌合等賜汝舍利弗我為眾生至禪定智慧及佛餘法我為眾生下頌皆是我子等與大乘乃至皆以滅度之合車等心等也是乘下頌皆是一相一種稱歎第一之樂合車體也心境不二事理雙融曰微妙斷二種死淨五住惑曰第一超三種世間之上為十方諸佛所尊妙契佛心適悅聖意故云悅可也一切下令尊敬一乘也無量下追頌我有無量無邊智慧力無畏等諸佛法藏合有車之由也次三行頌合歡喜得如是乘令諸子等至更無餘乘除佛方便得如是下明各得大乘法喜也自得中道智如日慈悲入生死如夜常行二法故言遊戲所謂常獨遊常獨步也廣化三乘同得一乘故言與諸菩薩等此乘圓頓從因至果無委曲相故言直至以是因緣下結顯以是所說一乘無三因緣於十方土審實而求唯一無二除佛方便而言餘乘耳四十五行半頌合無虗妄分二初三行半頌合不虗章門告舍利弗汝諸人等至今所應作唯佛智慧汝諸下先定父子明本欲與大既皆吾子理應平等與大也汝等累劫下明說三乘意為除障我雖先說下明既已障除還遂本心與大乘法也但盡生死者但盡分段尚有變易假言滅度而實不滅上言障除今所應作等者明遂本心令入大乘也二十二行頌合不虗分三初二行釋同皆是子理應平等若有菩薩於是眾中至所化眾生皆是菩薩謂機若大而法即大申明更無餘乘也以在眾中心聽專一一乘實智之法諸佛雖用方便權智所化眾生皆是昔日結緣佛子亦皆同有真如佛性故皆是菩薩也二七行釋不能受大乃說三乘若人小智深著愛欲至但離虗妄名為解脫謂法小元是機之自小申明除佛方便也小根障重不受大法為是方便開三接引智小故著深愛屬心欲屬境世間根境苦果也為此二句明苦諦謂佛為此著欲以苦為樂之人將一乘實相說為三乘苦諦聲聞於三乘中最小復以苦諦為初門苦以逼迫為義諦以真實不虗即六道生死也眾生心喜者稱其本習也本厭生死自求涅槃今聞出離即會宿習是故心喜佛說下謂所以得未曾有者以佛說苦真實無異也無異即不假遺教云佛說苦諦實苦不樂故若有眾下明集諦以招感為義是苦之因故言苦本謂若鈍根眾生雖知諸樂是苦尚不知苦之根本猶深著苦因時刻不能暫捨執於我見又為是等方便說言苦因非他法為本乃貪欲為本也若滅下明滅諦上二句滅集之功能下二句明滅諦得名滅以擇除為義承上貪欲既為苦本若有眾生依於寂滅理觀擇除貪欲是苦因已盡而諸苦果無所依止所謂皮既不存毛將安附哉當知但云無所依止則惑尚有餘果未證極至第四果後三品思惑斷盡始為滅盡諸苦名第三滅諦也滅前苦集顯偏真理因滅會真故名滅諦為滅二句明道諦以能通為義以能通至真空涅槃故略言即戒定慧廣即七科道法離諸二句重舉得脫集是能縛苦是所縛離此苦集名得解脫是人下徵釋循名觀諦得脫為是何脫但離下釋無明已是不實見思又附無明而起故呼為虗妄有作四諦但除此惑也名為解脫者權乘小果脫於分段未脫變易故非自在以法言之斷見思以喻言之出火宅坐露地耳三三行明後若堪能還與其大其實未得一切解脫至安隱眾生故現於世其實二句明違實以法言之則惑未斷乎無明果未極乎佛地以喻言之如在露地未得大寶白牛之車也一切解脫者五住究盡二死永亡也佛說下會三歸一謂佛說此人未得滅度者非謂昔日所說小乘統無所得但未得今日所說一乘實相成佛之無上道也若能行於非道通達佛道示於三毒不乖三善示於六蔽不失六度遍於諸道斷其因緣現於涅槃不斷生死以非道為道非二乘所及故名無上道變易尚存非大涅槃所證小果非佛本懷故云我意不欲其人令至小果滅度而捨今日所說無上大滅度也我為法王下結不虗妄法王者不住世間不住涅槃於諸法中得大自在了一切法即是佛法無入而不自得也權實之法已得自在開三顯一豈有虗妄所謂權實自在者昔因機小權大為小安隱眾生使無破法不信墜落惡道之不安隱今因機熟實小為大安隨眾生使無自欺自責之不安隱故曰安隱眾生出現於世上頌長行已竟
