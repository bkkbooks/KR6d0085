body:
  text: 金臺即山居後學大義集妙法蓮華經安樂行品第十四由前品諸菩薩敬順佛意發願於惡世中周旋往返十方國土不惜身命忍難通經諸大士自謂得無生忍故能忍諸難事新得記者畏娑婆多諸患難自謂未修忍行力所不堪願於他方受持文殊意謂末世法師流通此經雖能忍難不若無難故當機請問如來說四種安樂以示菩薩得此持經妙行能悟而修必安而樂惟此四行乃世尊之垂訓初心菩薩守護家業之良規吾人躬行是行涉惡世而持經入塵勞以應物無往而不安樂矣動靜一如身無危險謂之安道用充洋心無憂惱謂之樂深造自得躬行實踐謂之行附上文著如來衣則法身安入如來室則解脫心樂坐如來座則般若導行而進故名安樂行附下文住忍辱地故身安不卒暴故心樂觀諸法實相故行進故名安樂行二示方軌分二初文殊請問二如來垂答初又二初歎深位如是弘經爾時文殊師利法王子至護持讀說是法華經難有下指持品深位菩薩能於惡世奉命弘經次問淺行云何宣說世尊菩薩摩訶薩於後惡世云何能說是經一萬四千新記之者於惡世中云何行履能說是經得無諸難必以文殊請問者示正智發正行也二如來垂答分二先總標章門佛告文殊師利至欲說是經當安住四法四法下釋繼三業云大悲者以三業既正則正智真淨既得己利須起悲利他必悲智相濟乃於惡世演說是經方無諸難四行少一不可為人師亦無益於己豈持經哉苟持已有法諸難自遠故當安住四法次詳釋四行分四初身安樂行二口安樂行三意安樂行四誓願安樂行初有長行偈頌長行分二初總標行近一者安住菩薩行處親近處能為眾生演說是經處乃身之所踐之境行近乃身之踐境之行趨操謂之行狎習謂之近二者不違於道是菩薩行近之處此身行之要也二別釋行近分二初釋行處二釋近處初又二先明事行文殊師利云何名菩薩至而不卒暴心亦不驚二處各有事行理行非事無以涉俗非理無以契真理事兼通真俗不礙然後說法利生觸處安樂矣地以持載為義無所不載忍辱即地亦無不載無取捨愛憎故化強暴之世以忍辱自處故云住下三句釋謂行處必住忍辱地者六度雖適時為用而涉難莫尚於忍趨事而動悔吝生焉故須忍以禦之惟能忍於剛則柔和以應之則物不能挫此柔和非是媚以接物之時心氣溫和不施之於剛暴不專之於乖忤也惟能忍於逆能善順以接之則物不能害此善順非是諂曲乃人情活變不拂其性誘彼從化也惟能忍於事能審而所施不暴處事安詳外之柔和善順也惟能忍於微能察而所遇不驚心安於理內之柔和善順也所謂縱遇鋒刀常坦坦假饒毒藥也閑閑若事上見得透則一時浮議不能惑胸中持得定則一時浮氣不能動此道人處世之良方亦持經之妙訣也次明理行又復於法無所行至是名菩薩摩訶薩行處法即一切行法雖行是法而不住相名無所行若有所則有能能所角立物我成敵橫逆有不免焉即所行之法而觀一切諸法如實相無相即無所觀亦無所行亦不分別觀無所觀行無所行情識都忘是非雙泯世出世法打成一片方名平等觀法菩薩趨操如是而已此中柔和即伏忍善順即順忍又復等即無生忍不行不分即寂滅忍前二生忍後二法忍二釋近處又二初事行二理行事行中先明遠次明近初又分十初遠豪勢云何名菩薩摩訶薩親近處至國王王子大臣官長恐流俗阿師竊權勢而侈驕奢取供養苟於媚倖一有至此則荒於苞苴骯恨有所未詳奔於掉尾乞憐慮無所不至為俗人拭涕不暇何心於道哉由是誡之不可近也問如來不棄十六國王什奘等皆賴人主行道此誡不近者何也答但誡其不應為而為之非誡其當然而不然者況佛法付於王臣安得一槩絕之果有弘護之王臣必是法身大士而來非斯人與而孰與哉但戒黨不戒黨賢展縮之機貴在活潑不可泥言失意然雖近有道終不至脅肩諂咲方為吾徒之善道也二遠邪人不親近諸外道至及路伽耶陀逆路伽耶陀者不秉正教故名外道梵志即婆羅門此云淨行又云淨裔其人種類自謂從梵天口生在家事梵天名梵志即在家外道尼犍此云離繫即出家外道牛狗之戒斷常之見順之妨正逆之取怨不若遠之息諸異見所謂過我門而不入我室我無憾焉文者歌詩之流筆者銘賦之類顯德謂之讚寄情謂之詠四圍之典盡非方外之談六書奇絕總屬雕蟲之技近之無益避之者良杜異端也路伽耶此云惡論逆路伽耶此云惡問惡問非請益之機惡論非文會之友酧答則困於求疵討論則封於矛盾道不同不相為謀遠之為計離曲辯也今雖戒若欲禦外侮不妨習曉但不可忘棄本宗一味著耳三遠險戲亦不親近諸有兇戲至種種變現之戲扠打也撲小擊也那羅此云力即角力戲彩畵其身緣幢倒擲種種變現幻術之類以上諸人禮樂之家尚有恥於綱常出俗道者寧無虧於篇聚吾黨當龍象之權理合莊重翔而後集可也四遠惡人又不親近旃陀羅至則為說法無所希望旃陀羅此云屠子亦云嚴幟謂幟然造業而自嚴飾也白虎通云四時之畋總名為獵易曰以佃以漁注云取獸曰畋取魚曰漁此等皆有殺害之心名惡律儀親近者令人無慈如是人來當為善巧說法回其殺害之心不可希望利養也五遠二乘又不親近求聲聞至隨宜說法無所希求二乘之人沉空滯寂不發大心近之者令遠菩提西方三乘人不雜居故云或來既未受大化不妨順其小志隨宜而說亦不可有希求之心六遠欲想文殊師利又菩薩至不與小女處女寡女等共語欲想能殺菩提心深防欲之過患故戒之尚不起想況復形交或有染其形容姿態須以九想治之處女未嫁之稱寡女無夫之謂女非法器難為主伴之交授受不親庶免桑間之刺不生欲想乃臨事之大節不與共語斯避譏之細行不樂見者不見可欲使心不亂也七遠不男亦復不近五種不男之人以為親厚不男壞亂菩提心故五者謂生犍妒變半也生者從生已來便無犍者以刀去其勢妬者見他行婬方起變者遇男變女遇女變男半者半月能男半月不能男也五不女者謂螺筋鼓角脉也八遠危害不獨入他家若有因緣須獨入時但一心念佛昔阿難問佛如來滅後見女人云何佛言勿相見設相見勿共語當專心念佛九遠譏嫌若為女人說法不露齒咲至猶不親厚況復餘事露齒咲現胸臆增他不善心故為女說法當避譏嫌尚不宜親厚況復餘事乎十遠畜養不樂畜年少弟子沙彌小兒亦不樂與同師沙彌初入佛法多存俗情畜養易致擾惱所謂嚴訓乏慈寬待失教是皆煩於心同學無規箴之益所謂和則疑其狎切則惡其猜是皆擾於念不畜不近風節自高也先明遠竟次明近常好坐禪在於閑處至是名初親近處前離十種惱亂即戒今坐禪是定遠離喧雜念念與實相相應故云修攝其心是名一句總結二明理行復次菩薩摩訶薩至是名菩薩摩訶薩第二親近處此即慧也上近處以戒定為體此以觀智為體遠俗塵而戒行精嚴斂遊念而湛寂斯生定力既深智光灼發三學備矣六度是修為正身之妙行乃成佛之樞要也觀一切法空者謂修安樂行之菩薩從正定心中起觀照慧觀察世出世間一切三科七大生死涅槃種種當體真淨不受一塵故云空即第一義空也如實相者以一切眾生心境諸法皆同諸佛所證實相十如平等無動無壞離妄緣故不顛倒者即度一切苦危遠離顛倒乃實相之用也不動者觀江河競注而不流了知見隨緣不變乃實相之體也不退者眾生分上實未曾退真如隨緣不減也不轉者諸佛分上實不曾轉真如隨淨不增也不顛倒正見也不動轉真知也見不顛倒諸法有無亦不分別心無動轉攝心不動如須彌山菩薩具正知正見故如是觀一切法也如虗下喻也標定虗空無性言說不及不生下釋上虗空無生出起名相等性則詮示不及也觀虗空過去無所有之生性故不生察虗空現在無所有之出性故不出究虗空未來無所有之起性故不起三際皆無一空獨存空無定名壅則成色通則成空也亦無定相方器則方圓器則圓也實無所有一定之性詮說不及故言語道斷也實相理境亦如是觀實相體中亦無所有之性故是法不可示言辭相寂滅以過去不生現在不出未來不起三際不遷故察實相之無名無生佛之假名究實相之無相無生死涅槃等相故云實無所有也無量無邊者虗空不可窮極是實相之廣大也無礙無障者虗空不可分辯是實相之通達也虗空如是實相如是一切諸法性自寂滅何言說之可及哉凡可說者但從因緣而有顛倒而生故有一切言說當知不從緣有不從倒生竟不可說故云一切語言道斷也葢心體本寂相待成搖由見顛倒則法有生有起故心有動有轉若舟行而岸移也能如實相而觀於心不動不轉於法不生不起若風止而波澄也心法一也倒心觀之則妄境紛拏實相觀之則真境自寂修安樂行者常樂如是而觀一切諸法如實相者是名菩薩第二親近處也二偈頌有二十八行三句分二初二十三行頌上長行二五行三句結明行成初又二初十五行頌二處事行爾時世尊欲重宣此義而說偈言若有菩薩於後惡世至以此二處能安樂說無怖畏心即上住忍辱地心不驚也增上者謂於最上人法生慢未得謂得之類三藏者佛在波羅柰最初為陳如等說修多羅藏又在羅閱祗最初為須那提說毘尼藏又在毘舍離獼猴池測最初為䟦耆子說阿毘曇藏即小乘三藏也習近小乘妨弘大法故須遠之名字者謂假名羅漢非實證也求現滅度者欲速取證非大法器故弘大法者不得親近不希望者古有未嘗為利說一句法未嘗因法受一毫財方可謂之不希望也屠殺也分割其肉曰屠膾細切肉也販者買賤而賣貴也衒者賣也此等皆非清淨之行故宜遠之入里乞食者雜阿含云有一羊往糞聚飽食還群貢高自倨比丘亦然得四事供養已起染著想不知出要毀蔑他人我得彼不得故是為羊比丘乞食若師子王遇大獸即噉不味不著得小獸即噉不鄙不薄比丘亦然得四事供養已不起染著心自知出要無增減心是名師子比丘乞食又比丘未得食前應念為修道故補饑瘡故既得食已為報施恩念道不輟寶雲經云乞食應作四分一分奉同梵行一分與丐人一分施鬼神一分自食二八行頌二處理行分二先二行半頌行處理行又復不行上中下法至是則名為菩薩行處上中下三乘也問中下應不行上是一乘菩薩所當行者今云不行更行何法答即此一乘更無別法言不行者非竟不修一乘之意謂修而無修行而無行若實有所行之法當情即有能行之人在心物我成是非起患難生而安樂喪矣有為世間法故不實無為出世間法故實實相本自絕言不可分別等此頌又復於法無所行等也不得二句謂不得於諸法上生妄知見當起正知見也以理融之無一切差別等相法法皆同一法故也次五行半頌近處理行一切諸法空無所有至常住一相是名近處頌上觀一切法空等文無有二句即真如實相隨緣非常不變非斷不斷不常果生因滅也一切諸法本非斷常有無等但以顛倒妄想分別是有是無等竟不知不有不無非實非虗無生無滅究竟平等也在於下明置心一處不使入艸如須彌山安住不動如實相之理觀一切法如虗空常住一相無差別相也二五行三句結明行成若有比丘於我滅後至能於後世說法華經由事行成則外儀無失由理行成則內心無滯故說經無怯弱也菩薩有時下釋安樂之因因入靜室修禪定故止於過惡得人無我外則不損因正憶念修智慧故離諸取著得法無我內無顛倒心安不怯故安樂也初法即正身也身安樂行竟二口安樂行有長行偈頌長行分二先標章又文殊師利如來滅後至應住安樂行標口安樂也次釋行法分二初明止行若口宣說若讀經時至又亦不生怨嫌之心若口下不說過問人有何過經有何過答經有大乘小乘人有大機小機以乘對機隨宜難解經有顯性廢權立實之過破相隱實開權之過人有執理不信漸修之過執事不信頓悟之過苟性相雙融經有何過事理無礙人有何過若說有過則惱亂其聽受之人非口安樂故戒之亦不下不輕慢言弘經者不可倚恃法華之圓而輕蔑偏權之法師也佛尚以異方便助圓實之正道後世弘經豈可輕慢權小須順佛意將護物機故戒之不說下不歎毀先不說一切人葢受質二儀天然之性未嘗不全血氣之情未嘗不偏夫人之惡聞其失故不談人短好譽者必善毀故不稱人長善齊物者不齊而齊之則無物不齊矣次別舉聲聞此等根性不定若讚二乘之美令彼退大取小若毀二乘之惡令其小大俱失所以毀讚都不應也大論云自讚自毀讚他毀他如是四法智者不為何以故自讚者是貢幻人自毀者是妖惑人讚他者是諂人毀他者是讒賊人一有於此非口安樂矣又亦下不怨嫌若謂其所承之人及所秉之法妨害我道即是怨心若謂其人法鄙劣即是嫌心安樂行人為弘大典將護小行怨嫌俱捨方名正行心機一動聲說即發杜說過之源故不生心二明觀行善修如是安樂心故至令得一切種智善修如是承上不說過乃至不怨嫌心無所著必不執大而輕小但隨順物情不逆其意有所難問不以小乘濟度但以大乘訓導有二意若見其無大機而為說小但令得方便小益若不見其無大機而為說小則妨其大緣但為說大無二之咎又小乘但知行布不識圓融難問雖多凡聖依正之法不出十對一迷悟乖角難二事理相違難三權實未明難四體用不合難五性相隔礙難六心境分別難七智行參差難八修證淺深難九因果各別難十生佛尊卑難若未明此十對歸一實相者悉是小乘設有此難就其心之易明而引導之或問一而十難皆通令彼一言醒悟回小入大趨造菩提種智也二偈頌有十六行半分二初十一行半頌上長行二五行結明行成初又二先七行半頌止行爾時世尊欲重宣此義而說偈言菩薩常樂安隱說法至離諸憂惱慈心說法欲口安樂必說法欲說法必擇地陞座澡浴著衣內外一如然後隨問而說隨義而答皆使發心入道也懶惰妨勇猛懈怠妨精進憂惱妨安樂菩薩慈心說法方能離諸障礙上約止今約行故不詳對上文次四行頌觀行晝夜常說無上道教至是則大利安樂供養說無上道頌但以大乘解說但念成佛令眾成佛頌一切種智是則大利其利有五一晝夜無間說顯法體常恒益二緣喻無量說顯妙用無窮益三咸令歡喜說顯慈悲廣大益四不望四事說顯成就四德益五自他成佛說顯佛慧平等益二五行結明行成我滅度後若有比丘至筭數譬喻說不能盡心無等內無過惡則外難不生及罵等詳持品偈智者下內有善法所以行成其人下格量口安樂行竟三意安樂行有長行偈頌長行分二先標章又文殊師利菩薩摩訶薩至受持讀誦斯經典者標意安樂也次釋行法分三初釋止行無懷嫉妒諂誑之心至亦不應戲論諸法有所諍競無懷下不嫉諂嫉者殉自名利不耐他榮妒忌為性諂者為罔他故矯設形儀險曲為性誑者為獲供養矯現有德詭詐為性小隨之三嫉妒違慈悲之心諂誑乖智慧之道非自行之法若智慧被障將何上求佛道若慈悲有妨將何下化眾生菩薩修意安樂行者須戒之也亦勿下不輕罵倚圓行而呵責權行故云輕罵倚圓教之長求權教之短退彼學佛道者之善根故戒之也若比丘下不惱亂疑悔者疑其所得之非悔其所失之大所以下徵釋去道失智之意厭生死懶化導名懈怠悲華經云二乘為懈怠人也又亦下不諍競顛倒分別諸法有無等名戲論諍競以上皆意地微細邪行故止之遺教經云種種戲論其心則亂雖復出家猶不得脫是故比丘當須捨離也二明觀行當於一切眾生至乃至深愛法者亦不為多說十二類生都納在吾惻隱之心愍其沉迷運悲思濟捨我其誰乎慈父者我之四十二位功德盡在如來範圍之內櫽括規正捨如來又其誰乎大師者菩薩之道皆我之成法文殊成我智普賢成我行非觀音不成我普門之德捨淨藏孰能與我轉邪之益乎當深心恭敬集彼十方羣賢之法成我一身之道非師而何哉平等者無黨心之私順法者乃稱理之談不多不少者量其機之利鈍不為多說者貴不失人亦不失言也愛法多說心不平等意豈安樂三結行成文殊師利是菩薩摩訶薩至恭敬尊重讚歎意既安樂說是經時一切諸難何以加焉故云無能惱亂得好同學者我以賢黨人人亦以賢黨我所謂朋自遠來也得眾聽者內德自充必徵信於人人皆我從矣所謂德不孤也聽則學我所持之道持則詠我所誦之德誦則思我所說之義說則傳我之道書則筆之於文自書人書供養讚歎行成感報如是二偈頌有六行分三初二行頌止行爾時世尊欲重宣此義而說偈言若欲說是經當捨嫉恚慢至云汝不得佛質則朴素直不偏此苟能實踐則言行不枉何諂誑之有直乃入道之基故常修之不輕下頌上可知二三行頌觀行是佛子說法常柔和能忍至說法無障礙忍為四行之宗故文中每舉修慈下恭上平等之行能破憍慢行質直柔和忍辱之道故無障礙之難也三一行頌行成第三法如是智者應守護一心安樂行無量眾所敬智者守口如瓶防意如城護機如子敬佛如父一心安樂三業清淨能行是道孰不愛敬哉意安樂行竟四誓願安樂行有長行偈頌長行分二初明行法二歎經法初又分三初標章又文殊師利菩薩摩訶薩至有持是法華經者標誓願安樂行也四行標章五種法師互舉二釋行法於在家出家人中至引之令得住是法中在家出家者四眾也四眾雖有僧俗之別同在三界之中皆以苦為樂安樂行菩薩於此眾中應生大慈之心先拔出三界分段之苦與其三乘聖所稱讚之之樂非菩薩者不發大心二乘人也雖有聲緣之別同出三界皆以樂為苦菩薩於二乘中應生大悲之心拔出變易生死之苦與一乘諸佛智慧之樂應作下堅固願力也則為大失者以眾生具有智慧德相小聖以小智為足有如來寶藏而不能得有廣大威神而不能用故云大失此句總標下釋三失如來隨宜說法權智也謂三乘之法不得已而隨機敷演實非本懷二乘不解執為實證不求勝進大失一也不聞不知不覺者不解一乘實相也一乘妙法實為二乘所說由不聞是經是決了聲聞法則不知如來但為教菩薩事亦不覺自己所證非究竟滅大失二也不問不信不解者謂不知先三後一說法之儀式也由不問此三乘法是方便逐機之談則不信此一乘法是平等佛慧人皆有分而不解如來出現大事開示悟入佛知見故大失三也其人下正發誓願謂三失之人雖不問三乘是諸佛方便不信一乘是眾生等有不解是經為彼所說彼雖如是我當起大慈悲而度脫之得菩提上求也隨在何地下化也謂彼雖無意求妙法隨彼在何地位人天令出三界二乘令入一乘皆以如來自在神力無量智慧力引之令得住是一乘平等妙法之中究竟得一切種智之果也三結行成又二先明行成無過文殊師利是菩薩摩訶薩至說是法時無有過失由誓願安樂則無嫉恚懈怠諂曲諸過失也次明行成利益常為比丘比丘尼至現在諸佛神力所護故常為下有大慈悲故大眾悅服四事供養也虗空下行與法勝故諸天歸向尊法敬人也凡有問難必有折挫得其衛護則正念不失說必投機皆得歡喜也所以下徵釋顯三世佛皆護此經不但諸天侍護也二歎經法分二初法說文殊師利是法華經至何況得見受持讀誦昔未顯說故昔不得聞無量國中者約處則邊下里不聞不見約時四十年前無量土中久默斯要也何況下顯今日得聞二喻說分二初不與珠喻喻昔未顯說二與珠喻喻今日得聞初又二先喻說文殊師利譬如強力至王諸眷屬必大驚怪喻有六譬如下威伏諸國喻俱舍云南洲人壽八萬歲時有輪王出人壽減損眾惡漸盛故佛出金輪旋轉應導威伏一切名轉輪王具說有四若剎帝利種受灌頂王位於十五日齋戒之時東方忽有金輪寶現其輪千輻具足轂輞舒妙光明來應王所此王定是金輪王餘三例知四王威定諸方亦有差別慈恩云金輪望風順化銀輪遣使方降銅輪威鎮乃服銕輪奮戈始定今以輪王喻如來有禪定智慧故云強力輪王為正統之主握六龍以象乾參七鳳以膺鼎帝心簡在作百世之君師四海一人當萬民之父母故云聖王威伏諸國者喻陰處界等境乃文乃武大彰赫奕之風來享來王坐受玉帛之貢乃輪王之威伏也得法國土王於三界說法教化降伏煩惱諸魔乃如來之威伏也而諸下小王不順喻小王乃傍僭之主方命虐民喻諸煩惱五陰等魔未得無漏智慧調伏名不順命時轉下起兵往伐喻鳴鼓聲罪曰討伐種鍾兵者七賢中所修方法為前軍初二果所修方法為次軍三四果所修方法為後軍所破者三毒等分八萬四千之寇讎能破者八萬四千法門之官兵王見下有功歡喜喻喻佛見眾生修進斷惑有功亦大歡喜也隨功下隨功賞賜喻田即三昧宅即智慧聚落城邑喻四果衣服喻慚忍善法嚴身具喻助道善法種種七寶即七覺支象馬車乘即盡智無生智奴婢即神通得有漏善法如人民即七賢位也小乘破見思有微功佛隨其精進功能而賜諸禪定等唯髻下不與珠喻髻喻權珠喻實言髻中明珠有實為權所隱也在頂上者極果所宗也有出分段生死之機為小功勳有出變易生死之機為大功勳未有大功忽賜髻珠諸眷驚怪喻眾生大機未動忽說此經二乘疑惑菩薩驚怪也所謂輪王之寶不落餘人之手也二法合文殊師利如來亦復如是至而不為說是法華經次第合上六喻如來下合威伏諸國喻而諸下合小王不順喻如來下合起兵往伐喻王有象馬車步種種之兵佛有賢聖諸將小乘初果為賢二三四為聖又初果為聖者揀前凡位故大乘住行向為賢十地為聖其有下合有功歡喜喻於四下合隨功賞賜喻根力即七科中根力修此根力不漏落於六道生死故名無漏涅槃即小果真空能防見思之非禦生死之敵故名城而不下合不與珠喻二與珠喻喻今日得聞分二先喻說文殊師利如轉輪王至不妄與人而今與之如轉下有大功勳勤王有補衮之勞征伐有勘亂之策喻滅惑有智斷之功進修有大乘之機故心甚歡喜也以此下與珠四十餘年為權所覆故云久解髻即開權與珠即顯實喻法華開顯久默斯要秘而不談故云不妄與人次法合如來亦復如是至乃與汝等而敷演之如來下合大功勳大集經云知苦壞五陰魔斷集離煩惱魔證滅離死魔修道壞天主魔即欲界主樂著邪見憎嫉一切賢聖道法名天主魔大功勳者如來見此賢聖已除界內煩惱不為魔網所滅三毒苦因出三界苦果破眾魔之孽網得自法性證自涅槃故大歡喜也此法下合與珠一切智者一切法能知能解也多怨者如五千退席猶多怨嫉也難信者如中下之機譬喻因緣方始信解也於諸說中者於已說今說當說中為第一也如彼下提喻秘密者諸佛心宗如珠在髻中也最上者如在王頂也四十年於生死長夜守此時機故云長夜守護也二偈頌有三十七行半分二初十四行半頌上長行二二十三行總結行成初又二先四行頌釋行法爾時世尊欲重宣此義而說偈言常行忍辱哀愍一切至為說此法令住其中初一行明忍辱哀愍乃能弘經下頌上可知次十行半頌歎經法分二初四行頌喻說二六行半頌法合初又二先三行頌不與珠喻譬如強力轉輪之王至奴婢財物歡喜賜與前喻有六今頌隨功賞賜餘皆義含次一行頌與珠喻如有勇健能為難事王解髻中明珠賜之力能趣實故云勇健依理起精進之行故云能為難事今佛解權賜實如王解髻賜珠也二六行半頌法合分二初三行半頌合不與珠喻如來亦爾為諸法王至以大方便說此諸經雖為法王於法自在先以忍辱為涉俗之大力智慧為自利之寶藏次以大慈悲心觀機逗教也受諸一句世間因果也欲求一句出世安樂也與五陰魔戰破世間果不受諸苦與煩惱魔戰滅世間因不受諸惱也為是眾生說諦緣種種之法三乘九部之經令出三界而得解脫也二三行頌合與珠喻既知眾生得其力已至今正是時為汝等說其力者精進力也不妄開示者大機未熟也正是時者開顯時也對長文可知二二十三行總結行成分三初一行半結勸四行我滅度後求佛道者至應當親近如是四法二二十行半行成感徵分二初四行半明三障感報二十六行明夢境徵相初又三初一行報障清淨讀是經者常無憂惱又無病痛顏色鮮白此轉現報也轉報障者滅順現衰惱故心持呪印顧盻雄毅由中達外理誠然也二二句業障清淨不生貧窮卑賤醜陋此轉生報也轉業障者滅順生惡業故惡業之因應感惡果由持經力轉業因而得好果現在不作貧窮業未來不生卑賤處也三三行煩惱清淨眾生樂見如慕賢聖至智慧光明如日之照此轉後報也轉煩惱障者滅順後麤報故眾生下明轉貪障多貪欲者為人忽慢障生梵天今貪欲障轉故人人樂見不敢忽慢人人景仰如慕賢聖天童給使者不障生梵天也刀杖下明轉瞋障瞋如刀箭瞋似毒藥瞋能惡口內瞋障轉內之刀杖既捨則外刀不傷內之毒藥既除則外毒不害內瞋既無不觸犯於人縱欲惡罵非理枉加口則閉塞不能惡罵也既不為人加害罵辱則遊行之處無所畏憚怖障永離游優自在故如師子王智慧下明轉癡障愚癡能障智慧今愚癡既轉則智慧灼發光明如日之照也二十六行明夢境徵相分六初一行半夢諸佛說法若於夢中但見妙事至諸比丘眾圍繞說法由前四行功成加以弘經之力化功歸己果相先彰故於夢中見種種妙事並是未來後報之相二一行夢八部圍繞又見龍神阿修羅等數如恒沙恭敬合掌三二句夢自身說法自見其身而為說法四六行半夢聞法得記又見諸佛身相金色至亦有四眾合掌聽法又見下見佛放光說法見身下聞法歡喜供養得證佛知下蒙佛授記五一行半夢修禪見佛又見自身在山林中至深入禪定見十方佛六五行夢八相成道諸佛身金色百福相莊嚴至如烟盡燈滅初四句結前起後又夢下歷見脩進成佛始終之行也諸佛之果由行以致安樂行人先見其相克果必矣夢作國王即降兜率託陰降生三相捨宮殿五欲詣道樹等即出家之相成道必降魔即成道降魔二相轉法輪入涅槃二相如文畑盡燈滅喻機盡應滅也然皆以夢而說者欲令行人觀一切法空無所有但以因緣顛倒生自雖見佛聞法乃至圓成佛果皆為夢事了不可得無有常住亦無起滅常觀是相然後於一切處得真實安樂行也三一行總結利益若後惡世中說是第一法是人得大利如上諸功德上因迹門弟子通經文殊請問如來示規四行已竟妙法蓮華經從地涌出品第十五由前安樂四行能令行人現生轉障當來成佛有此勝利恐人聞是法無有證據故假他方菩薩聞四行之妙即請娑婆弘經佛即止之意顯此土自有能修此行之人故從地涌出若干等眾唱導之首以四行立名證佛言不虗發事不妄為使而今而後諦信無疑進修有據也師嚴道尊鞠躬祇奉如來一命四方奔涌故言從地涌出又以人顯法借事明理以立其名所言地者菩薩智所住地諸佛本所源地一切諸法寂滅無為實際理地言涌出者一切賢聖皆以無為法而有差別不動而變無為而成圓彰化育也又前明所修四行住忍辱地為宗今能修之人若干等眾皆從忍辱地涌出故文中不許他方者從門入者不是家珍從地涌出者自己胸中流出方始葢天葢地此品雖是結前妙行之要實為破近顯遠開本壽量之由致也二發本門弟子通經彌勒騰疑如來開本壽量分三初從地涌出二彌勒疑問三如來詳答初中又三初他土菩薩請命二如來止他召此三下方菩薩涌出且初地土菩薩請命爾時他方國土諸來菩薩至當於此土而廣說之他土菩薩聞四行功德發願住此弘宣是故請也二如來止他召此爾時佛告諸菩薩摩訶薩眾至護持讀誦廣說正經如來止他有三意他方菩薩各有己任若住此弘經廢彼利益又他土菩薩於此土結緣事淺雖欲弘經必無巨益又若許他方不得召下方下方菩薩不出近迹不得破遠本不得顯有此義故止而不許召下方菩薩亦三以是我弟子應弘我法又結緣深廣必獲巨益又得開近顯遠是故止彼召此也三下方菩薩涌出分二初經家敘相二讚歎問訊初又分五初地裂涌出佛說是時娑婆世界至菩薩摩訶薩同時涌出地裂者地下覆本眷屬如迹隱本今欲開迹顯本故地裂以表之夫聖賢之道出處有時地未裂之先乃潛龍之象故群賢之道屈而隱之既裂之後乃見龍之象群賢之道當申而顯之此隱以處己顯以利物悲智兼濟也承召而來如龍吟霧起虎嘯風生之狀故云同時涌出二菩薩身相是諸菩薩身皆金色三十二相無量光明三菩薩住處先盡在此娑婆世界之下此界虗空中住屈子天問云何闔而晦何開而明角宿未旦靈曜安藏周拱辰曰安藏者藏於何所也山海經云常陽之山日月所入穹天論云日繞辰極沒西而還東不出入地中據山海則日藏地中據穹天則日藏空中也吾安得凌倒景騎日月出入天地而一捫視乎晉書天文志云日晝行地上夜行地下苟地不空日何行焉是皆不知日月繞須彌也今準內教日月在須彌山腰轉照四洲因娑婆是側世界故見日月有上下也華藏世界有無量幢一幢有二十重世界今娑婆在華藏一幢中第十三層涌出之眾在十三層下十二層上虗空中住也晉書雖云地空不知地下有世界也又下方者法性之淵底玄宗之極地在下不屬此空中不屬彼非彼非此住中道也出此不在上亦不在此下不上不下住在空中亦中道也問能修之人不言別世界而言此娑婆者何也答娑婆名堪忍安樂行以堪忍為棲止之地故問在此界不在上方在下方空中住者何也答四行以忍為宗修忍以謙下為本住下空中者則謙卑忘我以無住為空故四聞召故來是諸菩薩聞釋迦牟尼佛所說音聲從下發來發來之意聞命故來弘法故來破執故來顯本故來五眷屬眾多一一菩薩皆是大眾至算數譬喻所不能知唱導之首是師也各將六萬恒沙是六萬恒沙之師一一各將六萬恒沙之徒也此一師有六萬恒沙之徒而六萬恒沙之師所有之徒不可知其數也此是能況況將下是所況文有八層皆是前止他召此科中自有六萬恒沙等等字中之所發出今所況之眾是六萬恒沙首領之外更有首領徒眾之外更有徒眾故佛以等字攝之經家以五萬四萬乃至一千一百一十一弟子等表而出之所況之首領所將之徒眾各各不同有將五萬恒沙眷屬者四萬三萬二萬一萬恒沙眷屬者此一層徒少師多轉過上也況復乃至一恒沙至那由他分之一者此二層亦師多徒少而過上也況復千萬億那由他眷屬者此三屠減其徒而增其師也況復億萬眷屬者此四層亦減徒而增其師也況復千萬乃至一萬者此五層徒少師多也況復一千乃至一十者此六屠徒少師多也況復將五四三二一弟子者此七層亦徒少師多也況復單己者此八層不領徒眾之人反多於上領徒眷之數也愈況愈多彌顯無窮無盡故以七重況復字顯出單己樂遠離者上無佛道可成下無眾生可度人我雙忘情識都遣生佛平等無二無別故云單己遠離者離二種生死之行二種涅槃之行唯樂常寂滅相終歸於空故上云虗空中住也此中以人情往望謂領六萬五萬者為多三二一者為少單己者隻獨若依文推尋六萬五萬者為少單己者為多下偈云單己獨處者其數轉過上乍觀之有師弟之分多少之別細察其人則後後多於前前之數詳審其行則後後勝於前前之德此涌出之來儀甚妙而經家之行文更巧也如是等眾從下發來雍雍肅肅如水涌雲奔塞滿虗空難以數知故云如是等所不能知二讚歎問訊分五初海眾讚歎是諸菩薩從地出已至百千萬億國土虗空種種讚法者或讚多寶願力弘深處處聽法或讚本師隨機敷演不生疲勞或讚分身神通妙用感應自在故默然坐者攝盡今時全歸實際也四眾亦默然者師資道合不動纖毫也五十小劫如半日者明不思議延促之事自在神通之力也令眾如半日者促彼長劫令其見短也問降生皇宮入滅雙林自始至終僅八十年今菩薩讚佛五十小劫如來默然亦五十小劫令諸大眾如半日得無大荒唐乎答此佛不思議境界一念即無量劫無量劫即一念延促自在念劫圓融不可心量測其長短大經云過去無量劫安置未來今未來無量劫安置過去世即長即短又何疑乎爾時四眾下即狹而見廣也凡夫肉天二眼通礙不同聖人法慧二眼勝劣各別任其自力所見不遠今忽見遠者即如來神力也遍滿虗空者顯菩薩所證彌法界之真理也二上首問訊是菩薩眾中有四導師至爾時四大菩薩而說偈言世尊安樂少病少惱至不令世尊生疲勞耶身乃履踐萬行賴修故正身名上行口能宣說無邊妙義故正語名無邊行意無嫉諂平等說法故正意為淨行大悲願力令眾住是法中故正大悲為安立行啟發法門名之為唱引接物機名之為導此四菩薩乃六萬恒沙師中首領故云唱導之師少病少惱二句問如來安樂已離世間有漏五陰豈有病惱葢欲示同人法順土常儀故須問病惱耳所應度下問眾生易度身乃載道之器吉凶憂豫日用相關故首問之眾生乃受道之資道之窮通葢係乎此故次問之偈頌二問可知三佛答安樂爾時世尊於菩薩大眾中至得聞是經入於佛慧先答安樂次答易度所以下徵釋易度之意有二是諸下明根利德厚者世世已來常受大化正顯壽量本門所化故始見我身即秉華嚴入如來慧果熟易落此一類眾則易度也除先下明根鈍德薄者世世已來不受大化樂小求證為此等人故須開頓說漸歷前諸教而調伏之亦令此人今聞法華入於佛慧所謂諸有所作常為一事去來坐立曾無他事也四偈頌隨喜爾時諸大菩薩而說偈言善哉善哉大雄世尊至聞已信行我等隨喜重言善哉者讚佛權實雙用大小等利也能問者身子等三請也甚深智慧者三周開示諸法實相也信行即信解體信又信作佛時行菩薩行也又能問四句起下彌勒請問開本壽量我等隨喜也五如來述歎爾時世尊讚歎上首至汝等能於如來發隨喜心嘉其能發隨喜故重言善哉正顯能於滅後護持讀誦廣說此經也上從地涌出竟二彌勒疑問分二初此土菩薩疑二他土菩薩疑初又二初長行疑念爾時彌勒菩薩至合掌向佛以偈問曰彌勒并諸菩薩所以疑問者自初寂場已來至今靈山已往十方大士來會雖不可限我以補處智力悉知悉見而於此眾不識一人然我遊化十方覲奉諸佛所有大眾決所諳知今就履歷之處推之亦所不識又彼大士前進彌勒末學後不知前故所不識又彼大士本實相底應現十方所有真應非彌勒境界是故不識又佛託弘經召諸菩薩密開壽量非時眾所知故假彌勒等疑念以發起耳時彌勒下意謂羣賢下涌已駭眾心多劫半日孰能不怪八千恒沙菩薩既惑已然之迹慈氏以補處之智欲究所以然之故故疑迹成頌而請用釋自他之疑也二偈頌正問十九行半分五初一行一句問從所來無量千萬億大眾諸菩薩至是從何所來問發足之處也意謂黃河九曲出自崑崙人行萬里豈無原籍依正相依原居何地二一行三句問何緣來以何因緣集巨身大神通至為從何所來問地涌之由也凡物之動變猶關休咎人之舉措能無謂乎故云以何因緣集巨身下謂地涌之眾容儀挺特智力異常眾所樂見故聳動眾問也三九行敘數無量一一諸菩薩所將諸眷屬至猶不能盡知四二行問師是誰是諸大威德精進菩薩眾至修習何佛道誰為說法教化者謂聞思之益非無所師開茅塞者其誰乎誰發心者謂圖南九萬貴在初步指南者又誰乎稱揚佛法以利他受持讀經以利己修之習之非無授受敢問所宗之師復是誰乎所謂師唱誰家曲宗風嗣阿誰也五五行半請答原委如是諸菩薩神通大智力至惟願決眾疑初二句歎德住在空中神力也種種讚法智力也四方下請答來處如是涌眾不遠而來必自何處願說其國土當何名乎我常下請答因緣我所經之國周遊亦多所師所友會亦不少如斯之眾曾不識一忽從地涌不無因由惟願說之今此下大眾樂聞是諸菩薩本末因由不無所自聖言一舉方釋眾疑也二他土菩薩疑爾時釋迦牟尼分身諸佛至汝等自當因是得聞其佛侍者即他土菩薩是分身眷屬橫在八方者與彌勒同疑俱不知如來本地成佛甚久於是各各以疑陳於己佛佛皆抑待彌勒故云汝等自當因是補處之問得聞從地涌出之所以也八方侍者問意要分身證成化迹發起壽量之義分身不答意謂此事不輕世尊一化未曾顯說因此一問廣顯壽量一代玄秘在佛自開之耳彌勒疑問竟三如來詳答分二初誡聽二正答初又二初長行爾時釋迦牟尼佛至諸佛威猛大勢之力阿逸多是名此云無能勝如是大事者乃開近迹顯遠本三世益物化化不絕之大事也彌勒為補處之主不識地涌之眾示此一問開發諸佛甚深智慧故雙讚善哉以美之汝等下誡一心誡勿散亂被鎧誡勿懈怠精進誡勿退怯堅固誡勿疑惑將欲說而先誡者令其勇猛諦聽聞已信行不可以意趣幽深而生疑退也如來下明果智諸佛智慧甚深無量人不能知今借地涌之眾開示壽量以顯如來甚深智慧故云顯發等始於一光圓現始終乃至七寶塔涌三變雲集是如來今會所作佛事名為自在神力今涌無數菩薩讚歎五十小劫謂如半日正顯成佛已來歷劫所化因緣應念自在故云今欲顯發自在神通之力始於華嚴終於法華中開三乘今入一乘但知一生出世本懷唯為一事是師子奮迅今地涌之眾純是菩薩皆得一切智正顯如來多劫出世本懷唯為一事故云今欲顯發師子奮迅之力而來授記聲聞有數有限但見四十年中為人不倦是威猛大勢今則地涌無量無邊稱性無窮正顯如來度生不息如大將威猛故云今欲顯發威猛大勢之力若發下品之意自在神力者即方便現涅槃而實不滅度令顛倒眾生雖近而不見此過去益物也師子奮迅者即每自作是念以何令眾生得入無上慧速成就佛身此現在益物也威猛大勢者即億載阿僧祇常說法教化無數億眾生令入於佛道此未來益物也今欲宣示如此大事故從地涌出無數菩薩也二偈頌爾時世尊欲重宣此義而說偈言當精進一心我欲說此事至汝等一心聽當精進下誡也佛智下頌果智也信為道元生之可以入道善為道資忍之可以成果疑懼者疑其所化之迹懼其所成之大也佛無下誡聽誠言所謂日月墮落須彌傾動諸佛實言無有異也二正答分二初略開近顯遠二廣開近顯遠初又二初開近顯遠二因疑更請初有長行偈頌長行又二初答師弟爾時世尊說此偈已至調伏其心令發道意由我教化調伏其心由我開導令發道意此答誰為說法教化從誰發心之問二答處所此諸菩薩皆於是娑婆至一心精進求無上慧此界即下方也此答願說所從國土名號之問於諸下讚地涌之德半滿之教精練於胸中堂奧之宗默識於言外故云通利正憶念者推窮尋逐惟念實相也性分之學貴於自得不貴人知故不樂在眾貴得於心不貴於辭故不樂多說貴乎內全不貴於外為故常樂靜處所謂真知生於恬靜妄惑起於世務欲修正智要須靜處以宅身也造道之要不容玩怠故云勤行精進廢寢忘食不知其勞故云未曾休息亦不下釋住下方空中之意人多滯著天住淨福不依人天表住中道義空也常樂下志求佛智法乃教道慧乃證道教為證因證乃教果二者相資故須並舉耳二偈頌有八行半分二初五行半頌長行爾時世尊欲重宣此義而說偈言阿逸汝當知是諸大菩薩至其心無所畏當知下頌答師弟依止下頌答處所志念下頌歎德金石之心遇難益精曰堅固念茲在茲克果是期曰勤求此自利也說種下利他應機說法縱橫不一曰種種依言釋意皆契玄機曰妙法風雲之辯應物無私曰無畏二利之德悲智相導漚和般若其在斯乎二三行動執生疑我於伽耶城菩提樹下坐至教化是等眾此亦答前本末因緣也此中文似近迹實指遠本我今下正敦信久遠二字應下塵點劫前成道甚大久遠之文略開近顯遠正指此也二因疑更請有長行偈頌長行分二初疑念爾時彌勒菩薩摩訶薩至三藐三菩提彌勒等既聞菩提樹下乃教化之又聞久遠教化等由此故動執生疑也二陳請分二先法說次喻說初又三初執近疑遠即白佛言世尊至當成阿耨多羅三藐三菩提此疑成道近所化甚多也為太子時者佛為護明補居兜率駕香象日輪託陰王宮於四月八日從摩夜右脇而生名悉達太子也伽耶此云山城去菩提場約二十里西域記云城甚險固城西南五六里至伽耶山谿谷杳冥峯巒危險印土俗呼為靈山也云何於少時等者觀耕夫而厭浮世遊四門以求出家參鹿豕而居木石蔭覺樹而成道果提謂覩金人而受戒陳如聞正法以還真方等般若已來日居月諸僅過四十餘年今地涌之眾德業恢宏數過恒沙佛之功德勢力教化如是等以時校功難可易知且嘉禾蒙春秀實事由漸成智者入道因果理豈躐等云何少時作莫大之佛事化如許之多眾成無上菩提哉二執遠疑近世尊此大菩薩眾至成就菩薩道常修梵行此疑所化多眾行位深妙也斯等下植因非淺以修行必經多劫發心定非一佛時長行遠道果始就豈少時之可及哉問彌勒既不知其數又不識一人云何得知久植善根耶答正由不知不識並由佛歎住處奇絕故疑此等菩薩豈近成道所化必於久遠無量佛所植諸善根成就梵行也三結其難信世尊如此之事世所難信事近於誣理涉於誕反覆推徵疑信何決舉世不信拒而擊佛令必有答也二喻說分二先喻說譬如有人色美髮黑至生育我等是事難信譬如下喻上成道近意其百下喻上所化多意是事一句結其難信如次喻上三科當仁之道理不容於姑息矜式之閑事不宜於激抗故微婉其辭借喻申情刮膜欲待也色美髮黑總在年少比如來是父指百歲人比地涌是子如來闡化甚近地漏成德既久化近迹久理不相當其猶二十五父而百歲子也必言二十五及百歲者取其少猶未壯老又過耄益見相違恐是異姓故言生育生則體之所從遺育則身之所從長等言付業家庭之事足顯天性之不妄矣古人以喻釋喻謂父服還年之藥貌同二十五歲雖老而少也子不服藥形如百歲雖少而老也若知藥力不疑子父不知者怪之合云如來橫服垂迹之藥示伽耶始生諸菩薩直論本地久發道迹今住不退若佛與佛決所諳知自下不達不得不疑故結云是事難信以父老子少天下之大經容何議焉今子老父少人道之變常孰能不疑此彌勒迷壽量之遠因執伽耶之近迹也次法合分三初合成道近喻佛亦如是得道已來其實未久二合化多喻而此大眾諸菩薩等至一切世間甚為希有此言菩薩久種善根非止伽耶發心也畢法性三昧為善入謂窮法性故首楞嚴為善出能現威儀故二十五王為善住如王安國故又勝進道為善入無間道為善出解脫道為善住也具四弘辯故云巧於問答超七方便故云人中之寶三合難信請答又三初舉佛語今日世尊方云得佛道時至乃能作此大功德事今日下舉佛言世尊下顯疑也二明請意我等雖復信佛隨宜所說至而起破法罪業因緣我等下明為現在彌勒意謂現在見聞我雖未達信佛隨宜說法變常不一曲成物性各有攸當也然諸下明為未來今之請問正為未來新發意等善根未熟逆耳之談多不允諧反致其咎也三正請答唯然世尊願為解說至聞此事已亦不生疑唯然者確定之辭定前二段之意希決現未之疑也二偈頌有十四行分二先五行頌法說爾時彌勒菩薩欲重宣此義而說偈言佛昔從釋種出家近伽耶至如實分別說佛昔等頌執近疑遠釋種者出其氏族乃師子頰王之胄白淨王之儲也此諸下頌執遠疑近事應今時理遊劫外如蓮華在水香潔不染也云何下頌結其難信次九行頌喻說分二初二行頌喻說譬如少壯人年始二十五至舉世所不信二七行頌法合又三初二句頌合成道近喻世尊亦如是得道來甚近二三行半頌合所化多喻是諸菩薩等志固無怯弱至於下空中住三三行頌合難信請答我等從佛聞於此事無疑至而住不退地我等二句頌信佛隨宜所說願佛下頌未來不信破法罪業願今下頌正請答上略開近顯遠已竟妙法蓮華經如來壽量品第十六由佛說弘經能修之人從地涌出是佛所化彌勒騰疑故世尊自說壽量竭盡本懷以顯本迹之妙有二意一此經初說無量義經方便智慧無量譬喻善巧無量藥艸法雨無量化城劫數無量寶塔分身無量地涌菩薩無量悉是應化門頭事然未明法身慧命平等無量也故此品談壽命無量以顯如來本在塵點劫先成道已竟由此方知如來從無量劫現無量身入無量土演無量法化無量眾皆是方便豈止伽耶出家菩提成道為方便哉二前寶塔品云如來不久當入涅槃恐人生斷滅之見故下說醫師一喻發明本末究竟平等法身本無生滅其壽量寧有數量哉壽量者詮量也詮量十方三世諸佛之功德故今正詮量本地三佛功德故曰如來壽量如來者非因非果有佛無佛性相常然法身如來也乘如實道來成正覺報身如來也處處示成正覺轉妙法輪應身如來也毗盧遮那此云遍一切處法身也盧舍那此云淨滿報身也釋迦牟尼此云能仁寂默應身也此三不一不異非縱非橫假名如來故壽量者即論三如來壽量也法身非壽非不壽無始亦無終故以理為命文云非實非虗非如非異此詮法身壽量報身一得永得有始無終故以智慧為命文云我智力如是慧光照無量壽命無量劫久修業所得此詮報身壽量應身示同生滅有始有終故以機緣為命文云數數現生數數現滅此詮應身壽量又須知法身非量非無量報身金剛喻前則有量金剛定後則無量應身隨緣則有量應用不斷則無量也佛本無身無壽隨順世間而論三身三壽此品正輪報身壽量智慧上冥下契三身義具三身功德悉是本時塵劫道樹先久成就名之為本中間今日寂滅道場名之為迹非本無以垂迹非迹無以顯本互古今而無生滅之期邁始終而無修天之限自本而迹無量即量自迹而本量即無量三身無礙本迹圓融命非一異之別量出有無之表塵點喻其無始醫師喻其無終始終既無量絕對待方稱如來之壽量也二廣開近顯遠分二先誡信次正答初又三初三誡爾時佛告諸菩薩至汝等當信解如來誠諦之語將欲開近迹而顯遠本故先誡信佛旨嚴諭為誡眾機領受為信必三誡者顯本壽量奇特大事殷勤珍重也汝等當信解等者不疑近成曰信明了遠本曰解誠是忠誠諦是審實昔為眾生方便說三隨他意語非告誠實今法華開顯隨自意語不欺於物言則詣真故云誠諦之語菩薩既奉誠誡不敢致疑聞必取信信受誠言也二三請是時菩薩大眾彌勒為首至如是三白已如來既垂三誡機眾乃申三請三請之殷如渴思飲如饑思食仰金錍而刮膜希玉杖以撥雲淨信生焉三重請重誡復言惟願說之至而告之言汝等諦聽既申三請之後復言惟願等乃成四請既垂三誡之後復告諦聽乃成四誡次正答有長行偈頌長行分二先法說次喻說初又二初三世益物二總結不虗初又二初明過去益物二明現在益物初又分二初出執近之情如來秘密神通之力至得阿耨多羅三藐三菩提一身即三身為秘三身即一身為密又昔所未說為秘唯佛自知為密神通力乃三身之用神是天然不動之理即法身也通是無壅不思議慧即報身也力是幹用自在即應身也一切下出執近之情佛於三世等有三身於諸數中秘之不傳故一切天人修羅皆謂今佛始於道樹得此三身故執近以疑遠耳二明破近顯遠分二初顯遠舉喻二過去益物初又二初正明顯遠然善男子我實成佛已來至百千萬億那由他劫成佛者因果兩圓始本一致位極群賢之上名標三覺之尊無量等者顯道越眾中非世數可比德遊物外豈代謝可論哉上文誠諦之誠即為此也如來既說成佛久遠則伽耶近成之執即破矣二舉喻格量又三初舉喻難問譬如五百千萬億至可得思惟校計知其數不那由他云萬億阿僧祇云無數諸經說數多以不可說塵沙為喻今經喻壽命長遠以若干世界抹為塵過若干世界下一塵明下塵之界已不可說況不下塵之界寧當可說下塵不下塵之界尚不可說下塵不下塵世界之塵豈可說耶下文云成佛已來復過於此又寧可說耶於意下難問二答其難知彌勒菩薩等俱白佛言至如是諸世界無量無邊文中舉三人不知阿惟越致此云不退轉地三合顯長遠爾時佛告大菩薩眾至那由他阿僧祇劫二過去益物分三初益物之處二拂迹中疑三正明益物且初益物之處自從是來我常在此至阿僧祇國導利眾生上舉喻中既言成佛甚久未審久居何處故云常在此土及餘國土然此娑婆即本應身所居之土今日迹居不移於本但今昔時異見燒者謂近照本者達遠故下文云大火所燒時我此土安隱常在靈鷲山及餘諸住處豈離伽耶別求常寂非常寂外別有娑婆世界亦於下顯益物處廣多二佛迹中疑諸善男子於是中間至如是皆以方便分別昔見諸教所說處處行因不同即疑因又見處處得記不同即是疑果如此行因得記皆不知是果後方便故生疑也中間者以塵點劫前為始盡未來際為終於此兩楹悉名中間今指然燈佛時行因即拂因疑又指然燈授記及入涅槃即拂果疑如此因果非復一條皆成方便非實說之故名拂疑前三句舉事後一句為拂也又復一句言其中間示化及涅槃也如是一句於昔教所說行因得果皆是方便分別故此一句為拂疑也又既言然燈佛等則行因得記之事該在等字之中又復一句即今經唱滅悉是方便三正明益物又二先明感應諸善男子若有眾生至諸根利鈍隨所應度至我所者即是過去眾生頓漸兩機冥扣法身也佛眼觀者即久已成佛佛眼照機無有差謬起勝劣兩應而利益之信等即五根也慧即了因餘即緣因此二善各有利鈍五乘隨機應度而現形聲二益也次明施化處處自說名字不同至能令眾生發歡喜心處處下形益也橫論即昔日十方國土豎論即過去中間之處處行因國土也名字不同者形既現矣則有名字因名召體機有大小形有勝劣劣是劣應被小機勝是勝應被大機此約示現佛法界身名字不同也若現九法界身無量無邊可以意得年紀大小者此明壽命長短大即勝應小即劣應劣應現壽有量勝應現壽無量壽命不同名字不同現身亦異此皆隨所應度而利益之亦復等者佛在世間不生難遭之想言入涅槃令其戀慕渴仰而得解脫所請應滅度者即現滅度也又以下聲益也小身短壽說於漸教故云種種方便大身長壽說於頓教故云說微妙法又一乘大法眾生無機以種種演說即先權後實意也能令等四悉施化二益隨機投其所好故得利益發歡喜心也過去益物竟二明現在益物分二初明機感諸善男子如來見諸眾生樂於小法德薄垢重者如來見者即佛眼照也樂小法即所見之機貪於二十五有即人天機貪著涅槃求自解脫即二乘機樂於漸次迂迴佛道即菩薩機此等皆名樂小德薄者緣了二善功用微劣垢重者見思二惑未能伏斷此約迹論樂小若約本論樂聞出釋宮近成之小不樂聞長遠久成之大也此等小心非始今日若先樂大佛即不說始成說始成者皆為樂小法耳二明應化分二先非生現生次非滅現滅初又二初明非生現生為是人說我少出家至令入佛道作如是說為樂小者迹現於生說少出家苦行得果也然我下明本實不生若斯者如上喻我成佛來甚大久遠豈今日始生始成哉問既非實生何故現生答但為樂小垢重者使得佛道故作如是說我少出家等二明現生利益又二初明益物不虗諸善男子如來所演經典至諸所言說皆實不虗說即聲益示即形益說己身者如說過去王子國王不輕皆我身也說他身者如說過去阿私是達多喜見是藥王過去聞法眾生現在聲聞弟子皆他身也示己身他身者如集分身地涌眾多是也示己事他事者示自己修行成佛事弟子修行成佛事自己說法度生事弟子說法度生事也諸所二句結言說不虗雖偏據聲益聲必兼形故二徵釋不虗又二初照理不虗所以者何如來如實知見至如來明見無有錯謬如實知見者即是實智如理而照三界之實實無三界之因相也無有生死者無有二種生死之苦果也若退出者有五住集名退有二死果名出結上二句因果也亦無在世等者亦無在生死之世及入涅槃之滅此二俱滅故云亦無非實虗者非於滅度之實非於生死之虗也非如異者非於出世之真如非於世間之隔異以六道眾生見三界為異異即有也三乘見三界為如如即空也佛見三界非如非異雙照如異即中道也不如三界等者如同也佛具權實二智必不同彼二種三界凡小所見三界之相也如斯一句束上諸句唯佛實智照之亦是隨自意語亦是說示己身之事所謂無因果無生死無退出無生滅無實虗無如異實際理中一法叵得大品云第一義中無所分別者此也如來實智雖無分別不妨權智即同三界之見雖無二死隨他說有二死雖無退出隨他說有退出雖無生滅隨他說有在世有得滅者雖無實而說涅槃之實雖無虗而說三界之虗雖無真諦之如而說有如雖無三界之異而說有異同於三界見於三界皆是隨他意語說示他身事也文中唯實智照實今增明權智現權顯如來二智明審形聲兩益皆實不虗無有錯謬即不虗也二稱機不虗以諸眾生有種種性至所作佛事未曾暫廢性即根性根性不一隨機演說為人益也欲即樂欲樂欲不一隨欲設化世界益也行者操修所修之行有障須除對治益也憶想即相似解因有善根故樂欲樂欲故修行修行故得相似解隨其憶想之解更為說法令得入理第一義益也習以成性何先性而後欲耶因有本日根性能起今日樂欲如有煩惱故有五陰復因五陰更有煩惱性欲亦爾眾生性欲等種種差別令生善根故以若干等也所作二句隨根說法皆令入佛知見不為人天二乘小事故云佛事若一人獨得滅度餘人不得者佛事即為有廢豈云真實不虗今七方便咸入一實所以得云皆實不虗佛事無暫廢也上非生現生竟二非滅現滅分二初非滅現滅二現滅利益初又二初本實不滅如是我成佛已來至今猶未盡復倍上數如是下明果位常住成佛是果甚大久遠是常常故不滅既不滅益至未來故寄此四字明未來益物也諸善下舉因況果以明常住本行菩薩道者若取大通威音然燈等為本皆是迹中之本也要取五百千萬億那由他阿僧祇三千大千之微塵過五百千萬億那由他阿僧祇國乃下一塵盡塵著國復為微塵一塵一劫成佛已來復過於此遡推其源本初發心之際行菩薩道為本也本行菩薩道時所感因壽尚自未盡已倍上無量阿僧祇數況果壽乎故知以不盡之因壽況不盡之果壽以明因果俱常也二迹中唱滅然今非實滅度至如來以是方便教化眾生迹中三身並有非滅唱滅之義法身非滅唱滅者如淨名云法本不生故無可滅即法身不滅意又云是寂滅義即唱滅也報身非滅唱滅者誰有智慧誰有煩惱而言智慧能破即報身非滅意眾生未了聞此便謂是佛而生憍恣不復修道故復唱言道能滅惑即唱滅也應身非滅唱滅者應是法報之用體既不滅用豈有窮即應身非滅意但為眾生常見憍恣故唱云我於中夜當取滅度即唱滅也如來下結非滅現滅方便教化二現滅利益又二初不滅眾生有損二唱滅於物有益初又二先不滅有損所以者何若佛久住於世至入於憶想妄見網中如上薄德樂小之人見佛常住不種善根貧窮下賤不生二善不斷二惡不滅常在無益有損也五欲即思惑憶想即見惑由此垢重故須唱滅也二釋有損意若見如來常在不滅至不能生難遭之想恭敬之心若見佛常在世便起憍怠故有損不生難遭恭敬故無益憍恣即增見惑厭怠即生思惑不生想即不能生見諦解故不能斷見不恭敬不能生思惟道故不能斷思為是義故宜應現滅也又聞三佛不滅悉有憍恣義聞法身不滅者便謂一如無二如由是生於憍心上慢言一切煩惱本自不生今亦無滅何須修道即便恣情放逸為是唱言法身是寂滅義聞報身不滅者便謂一切眾生即涅槃相涅槃相即煩惱相由是復起慢恣不復修善懈怠放逸為是唱言報身智慧能滅煩惱聞應身不滅者便謂佛大慈悲常覆護我由是復起憍恣貪著弊欲懷厭怠心不種善根為是唱言我今當入涅槃眾生聞此唱滅便於三佛生難遭想恭敬心也二唱滅於物有益又二初歎佛難值是故如來以方便說比丘當知諸佛出世難可值遇諸佛難值遇者眾生樂小法見思障重聞三身不滅則不修道故難得契會於佛也二徵釋難值所以者何諸薄德人至雖不實滅而言滅度若見三佛其人多善少惡不為斯人唱滅是人見佛常在靈山也或不見佛者其人障重善輕為說三佛難遇也眾生聞之便作是念三佛雖復非生非滅必須生善滅惡乃得證見此事不易故云難遭心懷下現滅無損有益也是故下總結非滅現滅上三世益物已竟二總結不虗又善男子諸佛如來法皆如是為度眾生皆實不虗諸佛出世先三後一開近顯遠三世益物法皆如是為度眾生說本來常住又復示現涅槃無非以佛壽命示悟眾生皆實不虗也上法說竟二喻說分二先喻說次法合初又二初良醫治子喻喻三世應化所宜二治子實益喻喻三世利物不虗初又分三初醫師遠行喻喻過去益物二還已復去喻喻現在應化三尋後來歸喻喻未來應化初又二初喻應化二喻現滅初又二先喻應化譬如良醫智慧聰達明練方藥善治眾病此喻我以佛眼觀有能應之智也良善也醫有庸時名良之別佛未出世外道眾苦之行不得禪定不能斷結如世之庸醫也二乘斷見思證有餘治一兩種有緣者如世之時醫也漸教菩薩雖能治病不能一時遍治一切病如世之名醫也此三雖能療病所治不遍不得喻如來唯良醫善能應病與藥一時遍治一切病喻如來隨機說法廣度一切眾生也智慧聰達者喻佛實智甚深無量也明練方藥者喻佛權智難解難入也教如醫方理如妙藥如來內有三達洞照五眼圓明妙得藥性外識一切眾生起病之根源說十二部教法藥方遍治眾生種種性欲行想分別煩惱眾病也如來說法原為治病若眾生無病如來亦不說法也次喻機感其人多諸子息若十二十乃至百數其人喻佛也多子息等者十喻菩薩二十喻二乘百數喻十類眾生言受化少不受化多也子義有三一正因子就一切眾生皆具正因佛性即是佛子故云其中眾生悉是吾子今文多諸子息是也二緣因子如王子覆講聞法生解起行資助了因之解開發正因之性在昔結緣並屬緣因也三了因子即今法華安住實智中我定當作佛從佛口生等名為真子也二喻現滅以有事緣遠至餘國此喻過去應化中現滅也以此土機盡彼方緣熟此土應滅彼土現生故云有事緣至餘國也醫師遠行喻喻過去益物竟二還已復去喻喻現在應化又二初喻機感諸子於後飲他毒藥藥發悶亂宛轉於地此喻機應相關見諸眾生德薄垢重於佛滅後樂著邪師之法故云於後飲他毒藥也不知出世要道故云悶亂墮於三界輪轉諸趣故云宛轉於地二喻應化又二初非生現生二非滅現滅初又二初喻形聲二益二喻利益不虗初又二先明形益是時其父還來歸家至願見救療更賜壽命還來歸家者喻佛復應生此土正是形益非生現生也言受邪法名為飲毒失不失者貪著三界五欲失先所種三乘善根不成大小機感佛為是人非滅唱滅也又雖著五欲而不失三乘善根有大小機感佛為是人非生現生也遙見者佛出世時眾生亦見佛身但為見思障却五分不得奉覲法身故云遙見見聞佛出皆有喜敬之事故云歡喜拜跪善安下求救之辭例諸梵王之偈次明聲益父見子等苦惱如是至速除苦惱無復眾患諸經方者十二部教也藥艸即教中所詮八萬法門也從佛出十二部即頓藥艸也出九部即漸藥艸也色喻戒戒防身口事相麤顯故香喻定功德妙香熏一切故味喻慧能得理味故空三昧如擣無相三昧如篩無作三昧如合一一三昧具戒定慧以此法說與眾生修行故云與子令服而作下勸服法藥因服他毒則苦患日增服此法藥則苦患速除矣二喻利益不虗其諸子中不失心者至即便服之病盡除愈既不失心有三乘機感一秉法藥病皆除愈其利益豈虗妄哉非生現生竟二非滅現滅分二初不久應死喻二諸子醒悟喻初又二先明唱滅之由餘失心者見其父來至如是好藥而不肎服此現滅之由由眾生德薄見佛常在世間但增憍恣而不修行即不肎服藥也所以下徵釋父作下愍眾顛倒不求正法也次正唱應死喻我今當設方便至遣使還告汝父已死我今二句喻佛住世有損現滅有益也即作下喻現滅化期將竟故云衰老死時已至者當入涅槃也佛雖滅度留經教住世故云良藥在此復至他國者即此方現滅他方現生也遣使等者四依菩薩語眾生言佛已滅度但留此法我今宣說汝當受行也後世若無四依傳述經法眾生豈能自知故四依菩薩即如來遣使也二諸子醒悟喻又二初現滅利益是時諸子聞父背喪至今者捨我遠喪他國諸子因知父喪方能醒悟喻如來現滅眾生方始憂惱感念也二未來機感自惟孤露無復恃怙至即取服之毒病皆愈良由如來滅後眾生醒悟服藥修行以作因緣能感未來應化如遺教云其未度者皆悉已作得度因緣上還已復去喻喻現在益物竟三尋後來歸喻喻未來應化其父聞子悉已得差尋便來歸咸使見之此喻未來益物也父聞子差即成能感之機咸使見之是起未來之應方將形聲二益也此中得差之言不全斷惑但有三乘之機不論斷與不斷皆名得差上良醫治子喻喻三世應化所宜竟二治子實益喻喻三世益物不虗諸善男子於意云何至虗妄罪不不也世尊良醫為治狂子實在言死如來為度眾生非滅現滅事似虗妄利益弘深故云頗有等不也一句直答不虗假死而救將死之毒斯須之權真良醫哉聖人之心以百姓為心益物之道有經有權無可不可但於眾生有益何法而不可施乎是知示生示滅之大權皆是曲順時機豈虗妄哉上喻說竟次法合佛言我亦如是至亦無有能如法說我虗妄過者成佛已來已經塵劫為諸眾生方便言滅本實不生處處現生本實不滅處處現滅三世益物化化不絕真實不虗故云亦無有能等長行竟二偈頌有二十五行半分二初二十行半頌法說二五行頌喻說初又二初十九行半頌三世益物二一行頌皆實不虗初又分三初四行頌過去益物二五行頌現在益物三十行半頌未來益物且初四行頌過去益物爾時世尊欲重宣此義而說偈言自我得佛來所經諸劫數至雖近而不見自我下頌成道已久補註云百生千千生萬萬生億億生兆兆生京京生秭秭生姟姟生壤壤生溝溝生㵎㵎生正正生載也常說下頌中間益物自從是來常說法教化既云常說奚啻水流風動即至盡未來際塵說剎說也為度下頌住處昔日娑婆即今日忍土眾生穢即諸佛淨域無古無今故云常住於此雖常住於此而眾生不見者顛倒障隔也二五行頌現在益物分二初三行頌非生現生眾見我滅度廣供養舍利至常在此不滅眾見下明機感以供養渴仰心意柔軟苦刻精勤欲見如來也時我下明現生令彼見靈山一會未散即告言我常在此說法實不滅也二二行頌非滅現滅以方便力故現有滅不滅至但謂我滅度眾生渴戀故現生憍恣怠逸又復現滅皆以方便有滅不滅本何生滅也為應餘國此土現滅於彼說法汝等不聞不知謂我實滅度耳三十行半頌未來益物上長文但寄常住不滅四字今偈廣出分四初一行半未來機感我見諸眾生沒在於苦惱至乃出為說法因眾生渴仰故出世現身因度苦惱復為說法二四行明常住不滅神通力如是於阿僧祇劫至散佛及大眾靈鷲指實報土也餘住處指方便有餘土即上餘國報土即他受用土若據常在之言即自受用土若據寶莊嚴之言即本時他受用土也他受用者即他報身所居之土名實報土屬事也他報是勝應身從機感見故名他報自受用者即自受用所居之土名常寂光屬理也他報即智慧文云久修業所得慧光照無量也劫火洞然大千俱壞眾生土也此土安隱不壞諸佛土也常寂乃大寂滅之場大安樂之鄉故云此土安隱天人下十聖三賢總持禪觀天鼓無問自說天華賢聖因行可思三二行明不見因緣我淨土不毀而眾見燒盡至不聞三寶名淨土如上三變憂怖等如三途山林等三寶者四生導首六趣舟航故有六一最初三寶謂如來四諦五人也二小乘三寶謂丈六佛諦緣法果向僧也三大乘三寶謂三身十身佛二空理等法三賢十聖僧也四住持三寶謂刻繪圖形佛貝葉黃卷法剃髮染衣僧也五別相三寶謂法報應化佛教理智斷法三乘階次僧也六一體三寶謂真如覺了佛全體軌持法事理和合僧也大方便經云三寶為所歸以救護為義如有罪人投向異國以求救護異國王言汝來無畏莫出我境莫違我教必相救護眾生亦爾繫屬於魔有生死罪歸向三寶以求教護若誠心三寶更無異向不違佛教魔王邪惡無如之何四三行得見因緣諸有修功德柔和質直者至久修業所得諸修功德者以緣了二因具足則得見實報土他報身為此等說壽無量五濁垢重者為說難值久久乃見我智下結智慧壽命無量無數皆久遠修諸行業之所報得也上頌三世益物竟次一行頌皆實不虗汝等有智者勿於此生疑當斷令永盡佛語實不虗舊疑當斷新疑勿生如來誠諦之語皆不虗也二五行頌喻說又二初一行頌喻說如醫善方便為治狂子故實在而言死無能說虗妄長行既廣今頌略點二四行頌法合我亦為世父救諸苦患者至速成就佛身我亦下頌合三世益物每自下足成上義謂常作是意以何等法令諸眾生得無上慧速成佛身也大章第三悟佛知見已竟妙法蓮華經分別功德品第十七此品至常不輕四品為入佛知見由前佛說壽命長遠三世益物化化不絕法會大眾已悟法身常住不生不滅又聞淨土不毀眾見劫盡以了三界唯心不離當處到此生滅情忘淨穢見泯深心信解妙悟已極個個入佛知見有證入解入之別故如來與之分別焉下隨喜一品亦是解入之餘所得功德殊勝無比一念隨喜尚然況五種法師所以繼下又明法師功德六根清淨內外莊嚴此但明證入之法不輕一品引自往昔之事正顯能證入之人以勸當來進修故此四品為入佛知見甄別行位疏通聞證謂之分造道證性淺深不同謂之別地涌過去弟子靈山現在弟子聞壽命長遠得種種益謂之功德群賢聞法默識心融龍蛇莫辨彼此相蒙佛為分別稱揚則物色自分如剖璞出玉博沙見金有如是人如是法機教兩妙故天人興供慶法慶人也大章第四入佛知見文有四品分三初明證解功德二明持經根淨三顯能證之人初又二先明證入次明解入初有長行偈頌長行分三初經家敘益爾時大會聞佛說壽命至阿僧祗眾生得大饒益壽命如是指上一品三世益物非生現生非滅現滅真實不虗等無量下總標得益之眾二如來分別分三初入道功德二得果功德三發心功德且初入道功德於時世尊告彌勒菩薩摩訶薩至能轉清淨法輪此中人數有多小不一所證有淺深不同如來三達洞照皆實不虗也每條先舉人數次明所證聞佛壽量了無生滅頓悟自心即獲無生法忍此忍不同楞嚴三漸後之忍彼是實教次第修進之位此是圓教頓入聖道之悟即准仁王五忍中第四無生忍也證此理時了諸法空寂不見少法生滅忍可於心故云無生法忍此得七地八地功德下偈或住不退地是頌此忍也文義雙持得大總持諸餘總持自此而出故名為門此得陀羅尼乃五地難勝之功德也樂說無礙左右逢源誨人不倦兼法義詞此得無礙辯乃九地善慧之功德也轉破無明顯出性德於一切法返本還源方便度生逆順自在故云百千等乃得十地法雲之功德也轉不退法逈超二乘方便利生無復退轉亦是八地功德修證不無染汙不得即離心垢頓圓淨戒故能轉清淨法輪此得二地離垢之功德也二得果功德復有小千國土至當得阿耨多羅三藐三菩提八生當得菩提者超入聖位如生佛家之生非出沒生死之生也言八生者謂聞佛壽量之法即超入四地功德取妙覺之位有八故下偈云餘各八生在當得成佛道是也四生當得者即超入八地功德取妙覺之位有四生也三生當得者即超入九地功德取妙覺之位有三生也二生當得者即超入十地功德取妙覺之位有二生也一生當得者即超入等覺取妙覺之位一生直入也故曰餘有一生在當成一切智也如來壽量是本覺不壞之實相即前如是大果報種種性相義我及十方佛乃能知是事至上品和盤托出徹底掀翻無復餘蘊故有如許等眾悟入實相隨根各證而如來與之分別問古以信住行向次第配釋今不用者何也答一此經圓頓大教本無位次一超直入不論利鈍聞即悟證雖有淺深皆是頓超非漸次修進故二靈山大會無有凡材聞此妙法即得授記超入聖位故三得益之人乃地涌之眾皆是塵點劫前所化所修豈有三賢十信之類文云菩薩身金色具三十二相已具佛德矣三發心功德復有八世界至皆發阿耨多羅三藐三菩提心如許眾生聞即娑婆而顯華藏就堪忍以明淨土即今時而顯遠本就三身以明壽量故各發正因心同求正覺果也如來分別竟三時眾供養佛說是諸菩薩摩訶薩至歌無量頌讚歎諸佛時眾聞深遠法得大饒益故獻種種供養也事論當佛分別已竟虗空雨香雨華供養三佛大眾天鼓音聲深遠天衣纓絡垂下執葢際天妙音讚佛儼然華藏世界主伴重重亦是借事顯理從性空中發四種因行上契三身果佛下遍九界因人也旛者轉義葢者覆義表智斷番番轉慈悲番番覆高下淺深不失次第際於梵天者表菩薩聞法頓證隣於極果也二偈頌有十九行分二初十一行頌如來分別爾時彌勒菩薩從座而起至合掌向佛而說偈言佛說希有法昔所未曾聞至如虗空無邊世尊說長文彌勒說偈頌以世尊是現在果佛彌勒是未來因佛子承父業父作子述同條共貫接拍成令師資成辦利益故佛說下頌大會蒙益無數下頌入道功德復小千下頌得果功德隨數生成佛者隨四四三三二二生入妙覺而得成佛也如是一行結上頓悟漸證等眾聞佛壽命長遠之妙法三身清淨之果報各得證入無量無邊清淨法身當得修證無漏無為圓滿報身亦得應用非生非滅千倍化身故曰得無量等復有下頌發心功德世尊下一行總結利益弘廣次八行頌時眾供養雨天曼陀羅摩訶曼陀羅至以助無上心如鳥一句狀上香華之亂墜也如是種種下時眾饒益具善發心也上證入竟二明解入分二初明理在解入二明未來解入初又分四初一念信解二略解言趣三廣為人說四深信解相初有長行偈頌長行分三初標舉其人爾時佛告彌勒菩薩至乃至能生一念信解無疑曰信信本成壽量明了曰解解法身常住謂隨所聞處豁爾開明無有罣礙也二格量功德又三初標德無量所得功德無有限量二舉格量本若有善男子善女人至除般若波羅蜜舉前五度為格量本也般若是智慧即一念信解故除之檀云布施尸羅云戒羼提云忍毗黎耶云精進禪云靜慮此五非是彼岸由此勤求無上菩提故亦是彼岸也三格量多少以是功德比前功德至乃至算數譬喻所不能知一念信解功德比上長時行五度之功德不及其一者五度之福有限而信解之智無量故也三結明不退若善男子善女人至三菩提退者無有是處聞壽量功德自外而資一念信解自內而熏所以於佛果菩提不退也二偈頌有十九行半分三初十四行頌格量功德爾時世尊欲重宣此義而說偈言若人求佛慧於八十萬億至其福為如此若人下頌為求佛果行前五度也於是下明檀度若復下明戒度若復下明忍度若復下明進度又於下明禪度是人下結上五度功德有善下格量多少二四行頌結明不退其有諸菩薩無量劫行道至說壽亦如是無量劫行道者久修諸度也願我下起慈悲願也既聞長壽一念信解願同如來說法壽命等於佛果菩提豈有退轉三一行半深心信解若有深心者清淨而質直至於此無有疑深心謂窮理不二質直謂始終一揆多聞生信隨義演說一念信解功等久行深心信解能有疑乎二略解言趣分二初標舉其人又阿逸多若有聞佛壽命長遠解其言趣前但一念信解不能為人演說今此少為人說所聞義趣故二格量功德是人所得功德無有限量能起如來無上之慧聞本壽量少為他說說法之力能起如來無上之慧功德寧有限量三廣為人說又二初況舉人相何況廣聞是經至香油蘇燈供養經卷廣聞廣解廣為他說廣修供養令他亦爾二格量功德是人功德無量無邊能生一切種智能以一種智知一切諸佛道法知一切眾生因種廣為人說非具佛慧不能也四深信解相又二初舉示其人阿逸多若善男子至聞我說壽命長遠深心信解深心者揀前一念信解也二極顯觀成則為見佛常在耆闍崛山至當知是為深信解相見佛等有餘土相也又見等實報土相也若有下結其深解當知如來常在靈山說法忍土本來平坦唯開示悟入佛知見者則能見此境界一切眾生無明深厚諂曲濁心故不能見昔智者大師見此一會可為深信解相矣現在解入竟二明未來解入分二初五種持經功德二格量隨喜功德初有長行偈頌長行分五初直起隨喜又復如來滅後至當知已為深信解相隨者隨順喜者喜悅謂如來滅後從善友處聞此妙經直起隨喜心毫無拂逆不生毀訾也當知一句判定深解言滅後聞經起隨喜者即同現在聞經深信觀成也此科但標人相至下品方校功德又上科但明觀成不曾校量下品校隨喜功德亦即校深信解相功德也二加自受持分二初況舉人相何況讀誦受持之者斯人則為頂戴如來以上隨喜況出受持之人也頂戴者此經是如來全身若專心誦持則為頂戴義也二格量功德阿逸多是善男子至千萬億劫作是供養已不須下標所以下徵釋經是能詮如塔能盛故不須起事相塔實相是所詮即法身舍利故不須安生身舍利經文能容第一義僧專心誦持即供養僧故不須供養相從僧云相從者以從佛有法從法有僧故則為下明供養舍利起塔但專持誦此經即是於無量劫作種種供養舍利也三加他受持分二初標舉人相阿逸多若我滅後至若自書若教人書上但自誦持今復教他人受持書寫也二格量功德則為起立僧坊至及造僧坊供養眾僧則為下明教他受持書寫就是起僧坊殿堂種種供養我及僧也多羅亦云貝多羅此翻岸形如此方椶櫚直而且高極高者長八九尺果熟赤色大如石榴人多食之有云一多羅樹高七仞七尺為一仞是則樹高四十九尺西域記云南印建那補羅國北不遠有多羅林三十餘里其葉長廣其色光潤諸國書寫莫不採用八表八正道園林表總持浴池表解脫大涅槃為禪窟忍為衣服法喜為飲食是故下結顯四兼行六度分二初況舉人相況復有人能持是經至忍辱精進一心智慧其人持經為正於六度亦行但未全備為兼也二格量功德其德最勝無量無邊至疾至一切種智先標德勝次喻後合十方虗空有三不思議一過去無始不思議二現在廣大不思議三未來究竟不思議疾至一句明近佛果也五備行六度分二初標舉人相若人讀誦受持是經至利根智慧善答問難若人下明自利利他供養讚歎說法也復能下備行六度清淨持戒者五篇輕重無違犯也柔和者忍度也志念等禪度也精進等進度也利根等智度也此中起塔供養為人說法施度也二格量功德阿逸多若我滅後至皆應供養如佛之塔如來於樹下成等正覺是悟此妙法也今行人持誦此經已趣成道之場已近無上菩提已坐道樹之下也問古判五品今何不爾答兼行六度疾至種智備行六度道樹成覺五品尚在凡位若得是功德未審三賢十聖更修何行得何功德坐何道場成何果覺耶豈未來男女等皆賢聖耶但格量功德欲人末世弘經不論賢聖豈局凡品是善下四儀之處應起塔一切供養如佛之塔長行竟二偈頌有十九行半分四初五行半頌加自受持爾時世尊欲重宣此義而說偈言若我滅度後能奉持此經至具足諸供養二三行頌加他受持若能持此經則如佛現在至種種皆嚴好慈恩云栴檀樹似白楊其質涼冷蛇多附之大經云摩羅耶山出之塗身入火不燒正法念云北洲有高山山峯如牛頭山中有此香故名牛頭栴檀若諸天與修羅戰為刀所傷以此塗之即愈故翻與藥三三行頌兼行六度若有信解心受持讀誦書至其福亦如是須曼具云須曼那又云蘇摩那此云善攝意華其色黃白極香樹高三四尺下垂如葢瞻蔔此云黃華小而極香阿提目多伽此云善思惟艸華也形如大麻赤華青葉子堪為油亦堪為香四八行頌備行六度況復持此經兼布施持戒至經行及坐臥生心如佛者所謂若有能持則持佛身又具如上之德決定成佛故也法勝人尊踐履之處皆植福之地故當種種供養佛子下明所住之處則為有佛之意上五種持經功德已竟
