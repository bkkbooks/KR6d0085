body:
  text: 法華經大成目次卷首序始末提綱懸談經題弘傳序釋卷第一序品第一卷第二方便品第二卷第三譬喻品第三卷第四譬喻品之餘信解品第四卷第五藥草喻品第五授記品第六化城喻品第七卷第六五百弟子受記品第八授學無學人記品第九法師品第十見寶塔品第十一提婆達多品第十二持品第十三卷第七安樂行品第十四從地涌出品第十五如來壽量品第十六分別功德品第十七卷第八隨喜功德品第十八法師功德品第十九常不輕菩薩品第二十如來神力品第二十一囑纍品第二十二藥王菩薩本事品第二十三卷第九妙音菩薩品第二十四觀世音菩薩普門品第二十五陀羅尼品第二十六妙莊嚴王本事品第二十七勸發品第二十八法華經大成目次終序蓋聞鷲峰提印留妙諦於竺乾馬寺傳經啓宗風於震旦諸法寂滅不可言宣大事因緣亦由解説發揮幽賾乃傳白日之心導達天人斯吐青蓮之舌不然則琅函亦等乎糟粕貝葉何異乎故紙必有廣長爰通顯密妙法蓮華經者演自耆闍晚流赤縣入佛知見以了義度無邊開上悟根以圓教垂浩劫觸處明真現種種之瑞相即權顯實放的的之毫光人天百萬盡轉法輪經軸四千總輸妙偈洵諸佛之心宗千聖之輨轄也微辭祕旨經三譯而已明臆詁俗詮亦殊門而莫粹自非具大慧力孰與剖剝真源乃有半翁法師法門龍象出世鵷鸞歷訪名山稱彌天之獨步直超塵剎息慧可之諸緣晚栖迹於長安仍冥懷於荒寺時登法席頑石為之點頭大闡覺緣空華因而布彩念妙法為三乘之最上而離言實五教之指歸箋釋雖繁紛呶莫一乃發願力大肆探尋啓佛藏之金繩採禪真之玉屑字櫛句比指久遠於行間意得言忘會不二於象外覩廬山之面目宿霧頓披哆滄海之咽喉諸流畢滙謂之大成豈小補哉良內典未諳實似元稹之陋佛頭僭著不避大顛之嗤欽師道行勉竭管蠡云爾康凞三十四年乙亥歲春三月二十二日賜進士出身詹事府左春坊左贊善兼翰林院檢討前日講官起居注充三朝國史大清一統志纂修等官戊辰科會試同考充殿試收掌官庚午科特簡浙江鄉試正主考前翰林院編修前翰林院庶吉士楚黃張希良拜題編集始末余自甲午年金陵剃染遊於吳越諸大禪師之門丙午懷香清涼過都門始入先子之室採討華嚴懸談考核十門五教始知大哉聖典汪洋浩瀚而莫可測量也間嘗與師論及法華而竊留意焉先攻文句要解知音會意正量論後閲正意都會大要旨如是解并問辨易解品節科注等疏研味參伍融會諸説間有管見而是集可以編矣戊申歲集二卷己酉冬隨師應講長椿余首衆參請之暇又集一卷庚戌遊盤山集一卷至乙卯寓涿鹿之延壽寺後三卷始完而草本成矣丙辰再遊江浙就正碩德宿學僉曰此集乃法華之大成也癸亥春因先大師六旬返都師以應講天津命余主席觀音開演此經丙寅冬師回命余再演師亦與聽囑以真稿待緣就梓丁卯春余退觀音院卜居地藏破屋敗椽僅蔽風雨自顧福涼德薄撥置世務不事逢迎故有即山活埋之題亦嘗謂客曰十字街頭即山居紅塵堆裏罷攀緣非活埋乎壬申夏諸子攢單啓請再為開演亦有願募就刻者余未之許也癸酉冬豫木兄來京極為勸勉首輸三十金余又謀諸同門皆歡喜贊助參衆達如等領緣倡募一雲監院亦竭力任勞而是刻有不容己也權輿於甲戌春三月告成於乙亥夏四月書成十卷其序則張老護法椽筆護法即今之無盡也爰記其始末如此竊惟吾宗順祖立三觀雲華開十門賢首判五教清涼疏之鈔之一乘圓極之理大備其猶庖羲畫卦文王有辭孔子立傳思孟莫不祖述憲章而聖神功化幽明消長之旨以大明之矣至於十門懸解五教析理三觀修證十玄圓融具如華嚴懸談并法界觀推本窮源吾深有望於後之學賢首宗者時大清康凞三十四年乙亥夏四月佛誕日金臺傳講沙門大義題於即山居之活埋室提綱菩提場中悟此法已即欲以此惠施衆生奈何根器不堪雖知根鈍且稱本懷演大華嚴獨被上根中下在座如聾若啞不得已而為實施權説四阿含小教諸子保證偏空次以方等彈斥又以般若淘汰四十年內東語西話牽藤引蔓循循善誘節節調停只至於今時至機熟靈山高會人天百萬三乘賢聖八部該羅若萬派以朝宗似群星而拱北世尊欲令轉新條掀翻舊案但説法既久慮不尊重故現種種瑞相駭變常情先説經次入定天雨四華地搖六動大衆一心觀佛如來眉際分輝放白毫相光照東方萬八千世界上至有頂下至無間一方既爾方方皆然於一光中圓現十法界生佛事相始終將一卷離言法華不啓唇皮呈現諸人面前無奈大衆只知雨華者天震動者地不肯回頭轉腦何孤負如來這番鼓動矣由是彌勒騰疑覩光中瑞相而請問文殊文殊領答引燈明事迹證今佛瑞相二大士隱明示暗曲唱傍通佛未出定法未出口引例攀條將令佛出世本懷罄盡無餘及佛出定又何有別法之可説哉此品為序分自方便至不輕十九品為正宗然如來出世本懷為一大事因緣所謂一大事因緣者開示悟入一切衆生佛知佛見故也正宗就分四章自方便至法師九品為開佛知見寶塔天授二品為示佛知見持品至壽量四品為悟佛知見分別至常不輕為入佛知見第一開佛知見之中文分三周由前入定放光直欲會衆目覩親證默契不言之表奈何根鈍頭迷不達離言之道故我世尊出定稱歎諸佛權實二智歎到恰好處乃云止舍利弗不須復説所以者何諸佛所得之法是為甚深微妙難解第一希有無上無等之法一切聲聞所不能知唯佛與佛乃能究盡諸法實相隨又拈轉話頭乃云諸佛法久後要當説真實言中有響鈎頭著餌由是千二百聲聞興疑作念當機三番申請如來許以分別解説向下廣開三顯一若過去未來現在一切諸佛出現於世唯為一大事因緣更無餘事實不先三後一只因鈍根將一乘道分別説三蓋為小智樂小法不自信作佛是故以方便分別説諸果正明三乘是假又云今我喜無畏正直捨方便但説無上道正顯一乘是實佛佛道同先佛既爾今佛亦然先三後一率由舊章而已約人但教化菩薩無聲聞緣覺約理唯此一事實餘二則非真約教十方佛土中唯有一乘法約行諸有所作常為一事長行偈頌發揮已竟當機言下知歸出班領解序昔年疑悔顯今日解悟如來與之述成證以領解不虗授以劫國莊嚴之記是為法説一周被上根也奈中下之機抱迷未遣身子自解已圓悲他未悟代為啓請世尊不免動樹訓風舉扇類月故有譬喻之談將世間長者比出世如來三界喻家一乘教理喻門五道衆生喻五百人五濁八苦喻火三十子喻三乘長者見大火從四面起即大驚怖愴惶無措思惟救子之方先以身手几案救之不得然後巧設門外三車誘引諸子得出火宅不與三車各賜諸子等一大車問其當機審定不虗正合如來在法身理地以佛眼觀見衆生為五濁八苦之所燒煮戀著戲處不求出離向今時門頭應化三界先以微妙大法擬宜根器不堪然後巧説三乘逗會時機只至今經開三乘之權顯一乘之實等賜諸子不令有人獨得滅度其猶長者先三車而後一車了無虗妄之咎也然此一喻是如來縱無礙之辨明三界生死之苦狀令人極生厭離長行偈頌已竟四子異口同音説窮子一喻始自父子相失相見終至領付家業序如來一代時教始自華嚴終至法華序事有條序理按時縱散之談極盡精詳故如來以藥草述成先歎四子善説謂窮子一喻將如來一化始末發揮殆盡可謂善説矣然如來功德不特此也復有無量無邊如一相一味教法等施大千有教無類差別在機若一雲一雨三草二木不隔枯榮豈一窮子喻而罄盡如來功德哉雖然汝等亦甚希有以能解得四十年中隨宜説法故也四子得記是為喻説一周被中根也向下無問自説於偈中先開宿世因緣之談我諸弟子威德具足其數五百皆當授記於未來世咸得成佛我及汝等有宿世因緣今當説之故有化城喻品為下根説因緣也結緣之由由於塵點劫前大通成道王子諸天雲集智佛酬機説法然後入定禪寂王子默契佛意各升法座覆講妙法各各得度六百萬億恆沙之衆自爾已來結緣之衆世世相值有先世成熟者有今世成熟者如漁人捕魚前網前獲後網後獲只至今日四十年後法華高會開權顯實會三歸一結大通時未了之公案暢此番降靈之本懷故説化城虗設為止息疲勞之衆以明三乘是假寶處在近令諸子欣樂前進以明一乘是實由是五百弟子得記歡喜説繫珠一喻以酬因緣之開示千二百聲聞二千學無學各蒙授記是為因緣一周被下根也三周授記已竟猶恐收機不盡又於法師品廣記懸記四衆八部歡喜踊躍識心作佛故此九品為開佛知見也第二示佛知見者由前諸子得記唯恐染淨生滅等執不除故假多寶願塔涌現其前塔中出大音聲歎言善哉釋迦能以平等大慧教菩薩法佛所護念妙法華經為大衆説如是如是樂説請問因緣如來與之雲集分身三變淨土除染淨之執開寶塔門示真實之相入塔就座無去來生滅之見唱滅募人要以斯文不墜又説天授一品達多通經釋迦資之成道文殊弘經龍女因之成佛正顯妙法神功無冤無親不論男女人畜平等大慧人人本有故此二品為示佛知見也第三悟佛知見者由前寶塔品募人通經以妙法付囑有在故持品藥王與二萬大士發願在此娑婆世界弘通此經一萬二千新記之聲聞自知道力未充畏娑婆之難調難伏發願於他方世界弘通此經若此土若他方分籌定欵不愜聖意故世尊以青蓮目顧盻八十萬億那由他菩薩諸大士默契佛心願在此土他方周旋往返弘通此經住於忍辱之地縱有惡世比丘諂曲不實假名練若好出我等過數數見擯出如是之輕賤毀謗念佛忍受然忍難弘經固為盡善不若以無難為美忍諸難於己然之後不若杜諸難於未然之先所以文殊忍俊不禁請問世尊於惡世中云何能説此經謂得何法而遠離一切諸難事也如來示以四安樂行身安樂住忍辱地遠離一切惡人口安樂不説他人好惡長短意安樂平等説法教化衆生誓願安樂隨衆生住於何地皆以神力慧力引之令得住是一乘之中弘經法師果能三軌自持四行自守則無入而不自得焉向下廣讚此經神妙如王頂上明珠不妄與人先所未説而今説之求佛道者欲得安隱當親近如是四法轉三種障八相成道有此利益故他土菩薩數過八恆河沙啓白於佛願在此土廣説此經如來止而不許以既是他方菩薩此土結緣事淺若住此教化失本利益我娑婆自有六萬恆沙菩薩一一各有六萬恆沙眷屬是諸人等能於此土護持廣説此經所謂是我弟子應弘我道善繼善述子承父業必然之理也如來一命當爾之時三千大千世界地皆振裂有無量無數菩薩同時涌出各詣虗空禮二世尊種種讚法而讚於佛四導師出班問訊如來歎云善哉汝等能於如來發隨喜心由是彌勒率八萬恆沙菩薩騰疑致問是諸菩薩修習何道何因緣集師為是誰誰之弟子我於此衆中乃不識一人佛告彌勒是諸菩薩修習佛慧悉是我化是我弟子向下動其執近之情乃云我於伽耶城菩提樹下坐得成佛道乃教化之又云我今説實語汝等一心信我從久遠來教化是等衆彌勒再疑説父少子老一喻執近迹而疑遠本故有壽量之談開師門之近迹顯佛地之遠本三誡令其誡聽三請極盡殷勤乃告之言汝等一切天人阿修羅皆謂今佛出釋氏宮去伽耶城不遠坐於道場得成菩提然善男子我實成佛已來經無數無邊塵點劫前自從是來常在此界説法教化名字不同形聲二益教化衆生非生現生非滅現滅諸所言説皆實不虗如世良醫為治狂子方便現生方便現滅無非令諸衆生入無上慧成就佛身也如是開顯法會大衆悟得毗盧性海佛地遠本三世益物法身常住無古無今空劫已前未為始盡未來際猶未終佛之知見極盡窮源故此四品為悟佛知見也第四入佛知見者由前説壽命長遠三世益物化化不絶法會大衆證得法身真理深信解相妙悟已極個個入佛知見有證入解入之不同故如來分別功德或得生忍或得總持或得辨才無礙等或一念信解或深心信解有直起隨喜者有加受持者勸人受持者兼行六度者備行六度者所得功德一一格量已竟未盡其極又以一念隨喜隨其所聞喜為人説展轉相傳至第五十人復六根清淨何況受持讀誦等其功德愈校愈不可窮矣又以五種法師持説此經會旨情忘根塵兩淨五種功備六千德圓六根互用之妙功德豈可涯量不輕一品如來引自往昔之事虗心弘道忘己利物一聲佛號遍記四衆見人則拜逢瞋不怒打罵謗毀歡喜忍受非入佛知見深達實相人法兩空者不能故此四品為入佛知見之文正宗已竟向下八品為流通分以正宗既竟本懷已彰故如來現大神力嘉讚經德發起群心將此一卷妙法遍空遍界顯説密説塵塵剎剎一切大衆見聞信解大喜充身故有神力之談嘉讚已竟應當付囑使道統相傳斯文不泯當知末世之下升堂據座弘通大法者是諸佛一片慈悲之禍祖禰不了殃及兒孫遞代相續故也付囑已竟猶恐新得記者自恃天真怠於進修故以藥王之苦行妙音之弘宣觀音之普門神呪之護魔嚴王之轉邪普賢之四行勗勉大衆為法當如藥王苦行弘法當如妙音觀音護法當如神呪之降魔修行當如嚴王之轉邪勸發必如普賢要祈四行成就審如是則妙法流傳無有窮已而今而後宣演大法者孰非法華之付囑哉夫妙法絶待本無言象智行差別故多注述既有多注安逃取捨欲會旨趣須究其槩輒録其要以提其綱云爾時康熙歲次乙亥四月十八日中州榮澤櫟村大義識妙法蓮華經大成懸談金臺即山居後學大義集將釋此經啓以十門一教起因緣二藏教分攝三義理分齊四教所被機五教體淺深六宗趣通別七部類品會八傳譯感通九總釋名題十別解文義且初教起因緣夫聖人設教必有由致若須彌巨海大因方為搖動今搖如來融金之德山動深廣之智海非小緣矣因緣有總有別總因緣者謂佛一代聖教總為酬因酬請顯理度生所顯之理即本經中諸佛世尊出現於世唯為一大事因緣開示悟入一切衆生佛知佛見蓋此知見衆生等有迷不自知故淪生死佛於因中悟此發願成佛普示故今五時設教雖言有權實顯有遲速原其本意唯為此一大事因緣也別論因緣則有多種今略示十義一法應爾故而説此經夫王道坦坦千古同規一乘實相諸佛齊證所以一切諸佛法爾於無盡世界常轉如是無盡妙法教化衆生無有休息故下文人天衆集説經入定雨華動地一光智境全彰圓開其端二士曲唱傍通助發其緒引二萬燈明佛皆説此經乃至大通智勝佛威音王佛皆説妙法蓮華經佛佛道同古佛如是今佛應然文云我常在此娑婆世界説法教化等二暢本懷故而説此經道場悟已即欲開示奈何根鈍不堪受持故爾四十年前將此妙法抑之在懷五乘隨機本懷不暢只至而今靈山高會方説此經本懷始暢文云如我昔所願今者已滿足又云如來所以出為説佛慧故三順時機故而説此經夫至道無古今應機有時節久默斯要不務速説故四十年前不説此經者時未至故機不堪故文云衆生諸根鈍著樂癡所盲如斯之等類云何而可度循循善誘根器純熟教被乘時得預高會文云今正是其時決定説大乘如是妙法諸佛時乃説之兼之一化將終涅槃時至順時順機不得不説四會權乘故而説此經四十年前將一乘説三乘一性説五性權為小機止啼黃葉故有三乘之別五性之分豈知五性是一性三乘是一乘哉如來説法但教化菩薩無聲聞緣覺今經三根得記泯二乘之權果全付家業廢草庵之滯情聲聞得記作佛會歸總是菩薩若不會歸必權終權矣五示真實故而説此經十方佛土中唯有一乘法無二亦無三三乘方便受解緣別今經開方便門示真實相指示衣珠髻珠出離化城火宅共登長者之室前至菩提寶所皆示真實之談也六酬宿緣故而説此經夫根深則枝茂源遠則流長宿因既深教起亦大故經云我在大通智勝佛時各各教化無量恆河沙衆生從我聞法此諸衆生於今有住聲聞地者我常教化阿耨菩提大通未了之案今當酬之廣如化城説七顯佛慧故而説此經文云我見佛子等志求佛道者咸以恭敬心皆來至佛所我即自思惟如來所以出為説佛慧故佛慧即實相三周法竟多寶塔現即顯示平等佛慧也文云塔中出大音聲歎言善哉釋迦牟尼能以平等大慧教化衆生云平等者無生滅冤親故也八開本迹故而説此經師之本迹但取最初先得真應名之為本中間大通威音時今之王宮誕相道樹成尊時皆為迹也如梵網云八千番示生娑婆大寶積云八萬億番來臨此土今經開本壽量塵點劫前更塵點點盡塵點劫未休非生現生非滅現滅常在此處説法教化豈今日菩提成尊云乎文云我實成佛已來久遠若斯但以方便教化衆生作如是説若夫弟子本迹久已成佛今為簧鼓內祕外現豈真聲聞哉九成始終故而説此經始即本也本即華嚴故吉藏立華嚴為根本法輪終即末也末即法華故吉藏立法華為攝末歸本法輪所謂非海無以潛流非本無以攝末始終一貫本末一事故下文云始見我身聞我所説即皆信受入如來慧即始説華嚴如日初出先照高山又云除先修習學小乘者我今亦令得聞是經入於佛慧即終説法華如日沒時還照高山等一本一末成始成終事無不窮理無不盡出世本懷畢於此矣十利今後故而説此經説三周法授三根記凡有聞法者無一不成佛今之利益也如來滅後聞此經一句一偈我亦與授阿耨菩提之記後之利益也若以佛在當機為今今之見聞為後今之見聞為今後之見聞為後如是弘傳無盡利益無窮如食金剛終竟不銷通上若總若別教起因緣已竟二藏教分攝分三初明藏攝二明教攝三明分攝初明藏攝二初明三藏已知此經有如是大事因緣未委此經於藏教分中何所攝屬故次前明之通言藏者皆能含攝出生一切義理故言三藏者一修多羅藏亦名修妬路亦名素怛囕此皆梵音楚夏古譯為契經契謂契理契機經謂貫穿攝化契理合機之經依主受名契經即藏持業釋也若按五印土有四名謂線席經井索聖教皆修多羅之異稱古德見此方儒墨皆稱為經遂借彼席經以目聖教則雙兼二義俱順兩方借義助名更加契字揀異席經故稱契經又雜心論云經有五義一曰涌泉謂流注無竭故二曰出生謂展轉滋多故三曰顯示謂能顯事理故四曰繩墨謂楷正定邪故五曰結鬕謂線能貫華故此五義不出貫攝二義以佛聖教貫穿攝持所應説義所化生故二毗奈耶藏亦名毗尼梵音略耳此云調伏謂調練三業制伏過非調練通於止作制伏唯明止惡就所詮之行彰名即調伏之藏依主受名或能詮藏有調伏之能有財釋也毗尼或翻為滅有三義一滅業非謂不殺等二滅煩惱謂不貪等三得滅果即無為果或名尸羅此云清涼從因果得名謂離熱惱因得清涼果故亦名波羅提木叉此云別解脫就因得名有二一揀異定道名之為別二三業七支各別防非亦名為別亦名隨順解脫就果立名謂隨順有為無為二種果故亦名性善性本善故三阿毗達摩藏此云對法法有二種一勝義法謂即涅槃是善是常故名為勝二法相法通四聖諦對亦二義一者對向向前涅槃二者對觀觀前四諦其能對者皆無漏淨慧及相應心所等亦名優波提舍此云論議亦名磨呾哩迦此云本母謂以教與義為本為母故此三藏約所詮有二義一者尅性則經詮三學律唯戒心二學論唯慧學二約兼正經正詮定毗尼詮戒論詮於慧兼則各三今此經者在三藏之中正唯修多羅藏所攝餘二不攝良以此經非律非論故若以經義攝彼三藏三藏俱含良以此經亦有議論之慧如龍女身子文殊智積等亦有起行之戒如三軌四行等二明二藏一聲聞藏二菩薩藏即由前三藏詮示聲聞理行果故名聲聞藏詮示菩薩理行果故名菩薩藏若約教行別故即開為三藏以緣覺人多不借教出無佛世佛在世時攝屬聲聞故但名二藏今此經者於二藏中菩薩藏攝文云但教化菩薩無聲聞緣覺以此經演説大乘自利利他與華嚴同宗但華嚴為根本一乘法華為破疑一乘故又為諸聲聞説大乘經名妙法蓮華亦攝聲聞正授聲聞成佛之記故藏攝已竟二明教攝如來一代所説通名十二分教西天東土有十八師判教廣如華嚴懸談今略引其名一後魏菩提流支北印土人宣武永平年至洛陽判一音教以如來一音同時大小並陳一音具異二姚秦羅什龜慈人弘始三年至長安判一圓音教以一音平等無二無私機聞自殊三西秦曇無讖中印土人玄始元年至中國判二教謂半字教即聲聞藏滿字教即菩薩藏四隋朝遠法師燉煌郡人判二教同上五隋延法師判二教謂頓漸約漸悟機大由小起所設具有三乘約頓機直往於大不由於小六唐海印法師判二教一曲屈教釋迦逐機性故二平道教舍那逐法性故七齊朝隱士劉虬字伯龍判二教謂頓漸以華嚴為頓餘皆漸故八宋朝岌法師判三教謂有相教無相教常住教九真諦法師西印土人判三教一轉法輪教二轉照法輪教三轉照持法輪教十宋慧觀法師判五教一有相二無相三抑揚四同歸五常住教十一後魏光統律師判三教謂頓漸圓十二唐吉藏法師判三教一根本法輪教二枝末法輪教三攝末歸本法輪教十三梁光宅法師判四乘教以臨門三車即權教三乘與等賜大車即實教大乘十四陳隋智者大師判四教十五海東曉法師判四教一三乘別教如四諦緣起經等二三乘通教如般若深密等三一乘分教如梵網等四一乘滿教如華嚴等十六賢首弟子慧苑法師判四教一迷真異執教二真一分半教三真一分滿教四真具分滿教十七波頗判五種教一四諦教阿含也二無相教般若也三觀行教華嚴也四安樂教謂涅槃説常樂故五守護教謂大集經守護正法事故十八賢首大師康居人判五教已上諸師判教各有理據皆謂莊嚴聖教故茲今海內流傳唯有二宗一天台大師依此經判一代時教為藏通別圓如四教儀説二賢首大師依華嚴經判為五教謂小始終頓圓初小教者以隨機宜説諸法數一向差別揀邪正辨凡聖分欣厭明因果故名為小若約法相止七十五法但説人空縱少説法空亦不明顯但依六識三毒建立染淨根本未盡法源故多諍論部執不同二始教者亦名分教以深密第二第三時教同許定性聲聞無性闡提俱不成佛故今合之總為一教此既未盡大乘法理故名為初有不成佛故名為分廣説法相少説法性所説法性即法相數説有百法決擇分明故少諍論説有八識唯是生滅依生滅識建立生死及涅槃因法爾種子有無永別是故五性決定不同故説一分衆生決不成佛名生界不減等如是義類廣有衆多三終教者亦名實教定性二乘無性闡提悉當成佛方盡大乘至極之説故立為終以稱實理故名為實少説法相多説法性所説法相亦會歸性所立八識通如來藏隨緣成立生滅與不生滅和合而成非一非異一切衆生一性平等但是真如隨緣成立依他無性即是圓成一理齊平故説生界佛界不增不減等如是義類亦有衆多四頓教者但一念不生即名為佛不依地位漸次而説故立為頓如思益云得諸法正性者不從一地至於一地楞伽云初地即為八乃至無所有何次等不説法相唯辨真性亦無八識差別之相一切所有唯是妄想一切法界唯是絶言五法三自性俱空八識二無我雙遣呵教勸離毀相泯心生心即妄不生即佛亦無佛無不佛無生無不生如淨名默然即其意也五圓教者明一位即一切位一切位即一位故十信滿心即攝五位成等正覺依普賢法界帝網重重主伴具足故名圓教所説唯是無盡法界性海圓融緣起無礙相即相入如因陀羅網重重無際微細相容主伴無盡十十法門各攝法界故良以賢首五教與天台化法四教但開合不同彼則開前合後此則開後合前小即藏教第二始教有二一始教但説諸法皆空即彼通教二分教但説一切法相即彼別教第三終教明如來藏隨緣成諸染淨緣起無性一切皆如即彼圓教中雙照義也第四頓教唯辨真性即彼圓教中雙遮義也第五圓教明性相俱融即彼圓教中遮照同時義也此三教所詮唯是一心具一切法即彼圓教不思議中道也故此三皆屬圓攝此則合彼通別為一始教開彼圓教為終頓圓三教彼即開此始教為通別二教合此終頓圓為一圓教雖開合有異而法體無殊也若論所攝此經於五教中正屬圓教所攝若以經攝教統該前四以圓滿具足開權顯實一代所歸五時極唱故三明分攝舊云部古德見濫於部帙之部改為十二分一契經謂始從如是終至奉行二應頌謂與長行相應而頌故三授記謂佛記弟子當來成佛事故四諷頌謂孤起不頌長行故五因緣謂因請因事方説故六自説謂不因請而説故七本事謂説佛及弟子往因事故八本生謂説佛及餘人往昔受身故九方廣謂説方正廣博平等稱性普利樂故十未曾有謂德業殊勝法體希奇故十一譬喻謂比類發明誘令信解故十二論議謂妙理深奧直言不了須分別審明故若論所攝十二分中正屬契經若以經攝分收餘十一經中多頌則攝應頌正授聲聞成佛則攝授記龍女讚偈則攝諷頌三請殷殷三周開示則攝因緣出定召告則攝自説嚴王轉邪藥王焚身則攝本事生為王子生為國王則攝本生平等大慧凡聖同均則攝方廣法如優曇光瑞變涌則攝未曾有廣説譬喻則攝譬喻有問有答則攝論議上藏教分攝竟三義理分齊已知此經攝於圓教未委圓教義理分齊云何夫義者文之實也理者事之主也又義相也理體也由是聖人設教理以統之義以析之理雖至一而逐機遂有淺深義雖成多而歸理原無別體是則諸經義理既有淺深而明經者若不辨析何以知其分齊所詣乎先略明五教分齊依起信論有五重淺深亦不離前五教但此則從淺至深彼則從深向淺故不同耳初唯一心為本源即一真法界該四法界此圓教分齊也二依一心開二門即該二教一心真如門謂心性不生不滅即頓教分齊也二心生滅門謂如來藏與生滅和合名阿賴耶識即終教分齊也三依此識明二義一覺義謂心體離念等二不覺義謂不如實知真如法一不覺心動等四依後義生三細一依不覺故心動名業相二依動故能見名轉相三依見故境界妄現名現相即始教分齊也五依最後生六粗一智相二相續相三執取相四計名字五起業相六業繫苦相三四二相小教分齊第五人天分齊也次別明此經圓義然圓教義理如海宏深能攝百川百川不攝大海雖攝百川同一鹽味故隨一滴逈異百川前之四教不攝於圓圓必攝於四雖攝於四圓以貫之十善五戒亦圓教攝尚非三四何況初二今經功高一化理冠群經全收五乘之機不説人天等教言廢昔日之權意顯今時之實所謂圓收逗會教乘總攝時機方便如是圓理無以加矣總括全經十義該收以顯圓妙一出世本懷妙原夫世尊以大事因緣故出現於世開示衆生本有佛知佛見令其悟入唯此一事更無餘事悟此知見即登佛地故名一乘出世唯此一事故説法唯有一乘更無餘乘故二放光現瑞妙一光東照生佛始終昭然在目意顯實相理境乃諸佛所證衆生所迷要人人心領神會當下薦取三曲唱傍通妙彌勒覩光中瑞相而問為説妙法為當授記文殊引燈明故事而答極盡精詳指點分明四出定歎德妙一光之中智境全彰不言之道終難領會不得已而又假言説方便以開導之乃告之曰諸佛智慧甚深無量其智慧門難解難入不獨一往四十年中所説為智慧之門即今入定放光現瑞之事皆入智慧之門也離言之道唯佛與佛乃能究盡非心識思量可到故曰甚深無量昔時曲説容可不悟今特直示尚爾茫然信乎難解難入也五開權顯實妙開三乘之權顯一乘之實以三車一車之淺況三乘一道之深説因緣久窮曠劫策疲怠前至寶所六普授記莂妙説三周法授三根記普記現在懸記未來凡所見聞無不成佛七佛慧平等妙寶塔出現樂説請問如來三變淨土却染淨之執入塔就座除生滅之見無去無來無冤無親平等大慧人人本具八開迹顯本妙本門弟子從地涌出彌勒不識一人執近迹疑遠本父少子老舉世不信如來説壽量一品開師門近迹顯佛地遠本如世良醫方便治子九六根清淨妙五種法師於此妙法會旨情忘根塵兩淨五種功備六千德圓妙法神功不可思議十智行相成妙全經開示皆顯圓理此理非智莫照故先以文殊大智以創始非行莫證故後以普賢妙行以成終若夫起行造修在人自肯如藥王焚身觀音圓應等皆是依圓理而起妙行依妙行而成妙德智行冥合方成圓妙之果所謂無不從此法界流無不還歸此法界也四教所被機已知此經義理宏深未委此經被何機宜夫聖人説法必有所為之機機有通別通則普收一切如涅槃云一切衆生莫不有心凡有心者皆當作佛別則揀其當機若約尋常料揀五種非機謂樂著名相以文為解者繫滯行位高推聖境者情尚於空觸言賓無者自恃天真輕厭進習者固執先聞擔麻棄金者此五非機反此皆機謂令善於義莫著於文一念頓超忘言默證涌斥斷滅策勵勤修昔謬即離今真實契若論此經有十種機前五非機一無信不住無信即不信也文云優婆夷不信四衆皆有此舉重言又不信之罪衆罪之首如後經云不信生謗輕毀破法乃至出法師過輕笑等報是也二違真自去違真即執俗也文云優婆塞我慢亦舉重言若聞而能説我見未忘亦是增長魔業三乖實退席乖實即就虗也文云未得謂得未證謂證佛許説已五千退去上三不堪大法三止不説正為此也三請許説此等即去若論實行衆中糟粳佛威故去若論權行大權示現為進增慢四狹劣種大一切二乘雖歷諸會聞説大法但念空無相等尚不發大心何況得自受持機志雖劣緣種未熟佛意在大皆為一乘五守權含實謂三乘共教菩薩隨宗所修六度之行未聞一乘實相守是權理文云行菩薩道者不見不聞此經去阿耨菩提尚遠因根未熟故謂非器時節若至實理自彰此五非機佛不厭捨開而誘之熏其成種不輕一號遍記謗者千劫受罪罪畢復受教化不信誹謗亦成善根此法只恐不聞逆順皆有益焉後五是機一正為之機一乘圓機久修梵行方堪領受是法所謂此衆無枝葉唯有諸貞實為此諸佛子説是大乘經我記如是人來世成佛道説三周法授三根記乃至五百受記等皆正為也二兼為之機學無學二千人等雖在學地未得無學今聞廢三歸一之妙悟四果三乘之假信得一乘圓理一心觀佛神與境會心歡喜充滿如甘露見灌即兼為也三引為之機即是求佛諸菩薩大數有八萬我見佛子等志求佛道者無量諸佛所而行深妙道即引為也四現為之機即廣記也文云天龍八部四衆三乘咸聞此經一句一偈一念隨喜者我亦與授記等五遠為之機即懸記也文云佛滅度後得聞此經一念隨喜皆與授記等在機則有是有非在佛如海納流一切衆生具有智慧凡有心者即是所為法性圓成感應道交無非所被之機也五教體淺深已知此經收機普遍未委此經何為教體清涼判為十種教體一音聲語言體二名句文身體三通取四法體四通攝所詮體五諸法顯義體六攝境唯心體七會緣入實體八理事無礙體九事事無礙體十海印炳現體圭峯約之成四一隨相門謂聲名句文與所詮義皆屬相故依清涼通收四者以聲為教主名者次第行列詮法自性句者次第安布詮法差別文者次第聯合上二所依此名句文三者屈曲為聲上詮表唯聲不能詮義唯名句文則無自體兼此四事是為教體以假實體用兼資也此聲名句文若無所詮之義同乎篇韻殊無意況若徒義無文妙理憑何顯示文隨於義義隨於文文義相資乃成教體今經始從如是終至而退是聲名句文為體其中所詮一乘實相中道了義是所詮之義以是二者交相隨故而為教體二唯識門此文此義皆識所變而有本影四句一唯本無影即小乘教不知教法皆唯識現謂如來實有説法故二亦本亦影即始教以佛自宣説若文若義皆從妙觀察智淨識所現名本質教聞者識上所變文義名影像教諸佛衆生互為增上故三唯影無本即終教以離衆生心更無有佛唯大悲大智為增上緣令彼根熟衆生心中現佛説法是故佛教全是衆生心中影像四非本非影即頓教非唯心外無佛衆生心中影像亦空以性本絶言即不教之教所謂尊者無説我乃無聞説聽皆無唯識而已是以識為教體三歸性門前以所變之萬境攝歸能變之八識今以所現之八識攝歸能現之一心謂此識無體唯是真如故下經云是法不可示言辭相寂滅故以性為教體四無礙門心境理事本自交徹故境與事是隨相門心是唯識門理是歸性門云交徹者一心原有二門真如即是生滅故理不礙事境心生滅即是真如故事境心不礙於理故以無礙為教體若會上十門隨相攝前五唯識攝第六歸性即第七無礙即後三今此經者本地甚深之奧藏乃一化之根源五時之極唱以前四説融為一味方順圓宗自淺至深攝盡衆生是屬圓教總以一乘實相而為教體略示十義以顯圓妙一入實相定即入無量義處三昧也無量義者從一實相生無量法衆集先説無量義經經畢又入無量義定者發實相妙法之端緒也示於一事一理一動一寂之間莫不具無量義然後可入實相妙法故此定為實相定也二放實相光即一光周亘全彰實相妙體也圓現法界事相生佛始終未説妙法先現此瑞者依智境示諸法實相也文云今佛放光明助發實相義故此光為實相光也三説實相法即世出世間諸法性相體力本末究竟等一切諸法不離此十如是則一切諸法無非實相文云唯佛與佛乃能究盡諸法實相又云諸法實相義已為汝等説故此法為實相法也四開實相見即開示衆生佛知佛見令其悟入更無餘事佛知見者徹了實相真知真見也然此知見本來清淨但無明所覆必假如來開示而得悟入一經所詮不出開示悟入佛之知見而已故經云如來如實知見即為開實相見也五喻實相理如火宅內等賜大車使知無二無三即喻廢權立實之理乃至寶所喻大乘繫珠明理性鑿井得水喻聞法華等無非多方開示令人悟入一乘真理故為喻實相理也六記實相果既悟實相妙法當成佛果菩提故記大因大果經劫供佛行菩薩道廓其大心成就萬德萬德具備方成十號果佛文云我以相嚴身為説實相印是為記實相果也七示實相境寶塔出現顯示法身之象三變淨土全彰實報真境所謂開方便門示真實相欲令衆生知此見此實相真境耳故為示實相境也八悟實相心心本無相離諸虗妄真實有體不可破壞無相之相強名實相也斯則由開示而了悟此心因信解而當下頓證故云安住實智中我定當作佛是悟實相心也九修實相行既悟實相妙心當修實相妙行果能三軌自持四行自守涉俗利生無不安樂如戰勝有功而得髻珠之賞故當修實相行也十具實相德由前內悟妙心外修淨行內外清淨實相之德備矣故普賢勸發云如來滅後云何能得是經如來答以成就四法必得是經一者諸佛護念已得理無礙法界悟入實相開佛知見故得諸佛護念二者植衆德本已得事無礙法界繁興大用一事一行皆名實相德本三者入正定聚已得理事無礙法界寂照不二故名實相定四者發救衆生之心已得事事無礙法界發起普門事業救脫衆生各得證入實相故得是名成就此四為具實相德也若論一經所顯一事一理一句一字乃至彈指謦咳無非實相妙法故此經以實相為體六宗趣通別已知此經實相為體未委宗趣何如語之所尚曰宗宗之所歸曰趣通論佛教以因緣為宗所謂因緣故生滅因緣故即空因緣故即假因緣故即中一正因緣揀異無因邪因故因緣攝盡一代聖教清涼十宗自我法俱有至圓融具德後後前前次第淺深詳具華嚴懸談今觀此經總顯師弟本迹因果共為一經宗趣但不同他部局在本經華嚴但舍那釋迦為本迹菩薩亦有本迹聲聞不聞不解故無本迹今經發聲聞有本本有因果示為二乘迹中因果發佛之迹王宮生身生道樹法身生乃至中間生法二身悉皆是迹但取最初先得真應名之為本故師弟本因本果與餘經逈異別顯十義五對以明宗趣一智行一對謂以智照理為因以行成德為果二心境一對謂悟實相心為因證實相境為果三位號一對謂授法師位為因記法王號為果四行德一對謂三軌四行為因二智十如為果五體用一對謂開迹妙用為因顯本真體為果已上皆因為宗果為趣一經始終不離因果故以一乘因果為此經宗趣也七部類品會已知此經宗趣沖深未委部類品會凡有幾幾言部品者一經三譯故成三部一正法華十卷二十八品二添品法華八卷二十七品今妙法蓮華經文成七軸二十八品言類者不同其部而同其類如世昆弟不同其父而同其祖亦名比肩相為等夷此經與華嚴同宗是其類也如華嚴遮那品有四遮那佛出世是引古證今與此序品大同小異諸聖寄位一周與此三周授記大同世主妙嚴品顯遮那自性因果與此經如來自敘往昔行因得果同如來壽量阿僧祇品與此開迹顯本同入法界善財一生圓證與此龍女嚴王一生親證同離世間是諸佛道後普賢行門與此經普賢勸發四行大同也會者説此經兩處三會一處在靈鷲山一會也二處在寶塔中接大衆在虗空二會也三復至鷲峯三會也八傳譯感通已知此經部類品會不同他部未委此經譯自何時讀誦受持有何感通傳譯如下序明言感通者李山龍日誦兩卷死見閻君請讀一題免衆囚苦則七日而蘇釋道裕生讀千遍終告慧廓埋地十年舌根不壞則起塔供養嚴法華贖黿放生烏客五十送錢還家尼法信寫經精誠法師請講不見一字窗雞聽法立脫毛羽之狀山牛嗅經坐亡戴角之形若夫誦一行而消山獄之罪聞一句而得菩提之果事迹昭彰備於傳記茲不繁引九總釋名題妙法蓮華經發祕密之奧藏稱之為妙示權實之正軌故號為法指久遠之本果喻之以蓮會不二之圓道譬之以華聲為佛事目之為經乃如來自命之題也按七種立題法妙法是法蓮華是喻是以法喻為名今釋先判通別次釋題目判通別者妙法蓮華名異衆典謂之別稱之為經謂之通若約教行理而判者夫教本應機機宜不同故教部各別是教別一音演唱同是佛説是教通又昔稟化他權實四時設教四味不同是教別今稟自行權實開前四味同入佛乘是教通此教之通別也一音説法隨機得解依解起行故三草二木之行位不同是行別同入法性是行通又如五百比丘各説身因是行別三十二士入不二門是行通今經乘是寶乘遊於四方是行別直至道場是行通此行之通別也理則不二是為通名字各異謂之別故智度論云般若是一法佛説種種名或言實相或言寶所或言實事或言知見大乘家業平等大慧等是為別同是一法謂之通此理之通別也次釋題目者若從義便當先法次妙故曰我法妙難思若從名便則先妙次法故曰妙法蓮華如美其人曰妙人若無其人何所稱妙必先有人而後稱妙也題從名便故先云妙釋從義便故先解法字法即十界十如權實之法不出三種一衆生法二佛法三心法如是三法元是一心本無衆生及於諸佛只因迷悟有差所以生佛有異妙字是能讚之辭讚上三法皆妙法也衆生法者因迷有故以不了真如法一妄受五蘊色心雖為垢衣所纏其性本來淨妙且如孩提之童唯愛乎親若見餘人發聲啼哭及其長也外受五欲內馳一心隨念攀緣心生形取如眼見色心馳乎色乃至行住坐臥折旋俯仰無不隨心運轉其見聞覺知真實妙性本來不生不滅衆生迷而不知如來出世原為開示衆生本妙知見知見一開則一切色是佛色一切聲是佛聲此衆生法何其妙哉佛法者佛乃大覺聖人覺世出世法本來寂滅性相常住循業發現十界差殊而十法界九界皆權佛界為實如造上品惡因報在地獄中品惡因報在餓鬼下品惡因報在畜生修下品善因感人趣中品善因感修羅趣上品善因感天趣説四諦法證聲聞果説因緣法證辟支果説六度法證菩薩果此九皆權不得云妙唯一佛界方始云妙以證窮果海無有與等唯佛乃能究盡諸法實相所謂諸法有如是相如是性等窮十法之源底盡十法之邊際明識衆生種非種芽非芽熟不熟可度不可度如實知之此佛法何其妙哉心法者以十法界千差萬別唯一心造此心能相能性能凡能聖能善能惡能佛能衆生故曰心如工畫師作種種五蘊特人不自觀心若能修攝其心觀一切法本來不動不退不轉如虗空無所有性觀心無心法不住法當下了悟當下解脫如大圓鏡普照十方此心法何其妙哉佛無別法即心是佛心不自心即衆生心心佛與衆生是三無差別此三非三即一非一非三非一即三即一以此三法不可心思不可言議故稱為妙文云是法不可示言辭相寂滅又云止止不須説我法妙難思是也約本迹二門皆具十妙迹門十妙者一境妙境有多種有十如是境十二因緣境四諦境二諦境三諦境一諦境無諦境如上諸境是諸佛之所證文云難解難入之法唯佛與佛乃能究盡諸法實相者境妙也二智妙有世間智出世間智皆自一切種智之所出諸佛智慧無上一切所不能及文云甚深微妙法難見難可了唯我知是相十方佛亦然者智妙也三行妙一行一切行一了一切了方為妙行文云無量諸佛所而行深妙道又云盡行諸佛無量道法者行妙也四位妙位者行之階進之級也但有權實布在衆經今經圓位不落階級文云乘此寶乘直至道場者位妙也五三法妙三法即三軌一真性軌二觀照軌三資成軌名雖有三其實一大乘法耳文云如其所得法定慧力莊嚴者三法妙也六感應妙感是衆生之機感應是如來之赴應有四句感應三十六句感應二十五句感應四句者冥機冥應冥機顯應顯機顯應顯機冥應一句復開四句謂冥機顯機亦冥機亦顯機非冥機非顯機四四十六機有十六則應亦有十六為三十二加根本四句故成三十六句二十五者以二十五王三昧應於三界二十五有也有有皆有三十六句如一月在天影含衆水水不上升月不下降一月一時普現衆水諸佛不來衆生不往慈善根力法爾如然文云脫珍著斃師資道交此感應妙也七神通妙神謂難測通謂無礙如來天心慧性難測無礙故文云入於無量義處三昧者神通妙也八説法妙諸法寂滅相不可以言宣有因緣故亦可得説所以四十年前隨他意語皆屬權巧今經隨自意語廢權立實文云正直捨方便但説無上道者説法妙也九眷屬妙説法被機成法眷屬有五一理性眷屬一切衆生皆有佛性理性相關皆是子義二業生眷屬自大通時覆講結大乘父子之緣或現在得度未來成熟者是也三願生眷屬先世結緣未得斷苦發願生於佛世或作內眷因之受道若得度者成法眷屬未得度者法外眷屬是也四神通眷屬先世值佛發真見諦生猶未盡或在上界或在他方以神通力來生此界為冤為親輔佛行化者是也五應生眷屬華嚴云佛初托胎諸法身大士侍衛下生散降餘胎作親中冤引諸業者如淨飯摩夜乃千佛父母羅云是千佛之子調達是善知識諸聲聞等內祕外現者是也如是眷屬前後圍繞群臣豪族剎利居士如雲籠月者眷屬妙也十功德利益妙三周得記諸品獲益見光聞法皆不唐捐文云不令有人獨得滅度皆以如來滅度而滅度之者功德利益妙也本門十妙者一本因妙我成佛來復過於此百千萬億那由他阿僧祇劫如此證果之時遡而推之至於本初發心之時必修圓妙之因為本因妙二本果妙本初所行圓妙之因證得常樂我淨之妙果因既久遠果亦稱之故塵劫已來磨古磨今而本無移易為本果妙三本國土妙自從是來我常在此説法教化昔日之娑婆即今日之忍土衆生之穢即諸佛之淨域故曰我淨土不毀我此土安隱昔本非古今亦非今無古無今而家山常在是本國土妙四本感應妙古今既常在此説法教化必有能感之機當知今之機由昔之機昔之應即今之應是本感應妙五本神通妙神謂天心通謂無礙天然之性通古通今通自通他塵點劫前宛同今日無邊剎海不隔毛端所以彈指咳聲動大千界為本神通妙六本説法妙既曰我常在此説法不惟水流風動塵説剎説乃至盡未來際虗空口大地舌莫非本地之説法為本説法妙七本眷屬妙下方之來補處不識一人亦不知其數目多衆成少少衆成多數尚不知況其人耶又下方弟子尚不知況上方耶況八方耶是本眷屬妙八本涅槃妙從本以來處處現生本實非生數數現滅本亦非滅非生現生本何益焉非滅現滅本何損焉昔本不生今本不滅不滅不生而現生滅是本涅槃妙九本壽量妙佛無壽者相所以壽無量法性之身超出劫濁誰論壽命方便為説本行菩薩道時所成壽命今猶未盡是本壽量妙十本利益妙如今之成熟者由於大通時覆講之益然六百八十萬億恆沙之衆獲益豈無先世之緣哉若非有益安得覆講而得度當知今世之得益又待後世之成熟況後世之得益豈無成熟之得哉如是諸佛三世益物化化不絶是本利益妙妙義無窮難以盡演約教則機應妙但以一乘法教化諸菩薩約理則性相妙觀十法界一界十如十界百如百界千如約行則因果妙但有聞法者無一不成佛以是題名故曰妙法蓮華者以妙法幽微假喻易彰諸有智者以譬喻得解故借物以明法也問通部七喻皆有開權顯實之義當喻妙法何獨取蓮華而立題耶答蓮華為總七喻為別以總攝別法喻為名也有云蓮華非喻當體得名例如劫初萬物無名聖人觀理準則立名今蓮華之稱即是法華三昧當體之名謂此法華法門清淨無染因果微妙故名妙法為蓮華耳今作法喻為釋以蓮華喻上妙法不可求其幽玄如扇喻月不可求其明暗如月喻面不可求其眉目是不得已而借喻以顯妙法也問華有多種必取喻蓮華者何也答有粗妙故如狂華無果喻外道法空修無獲或一華多果喻凡夫之獨奉其親而報在梵世或多華一果喻聲聞修種種行止得涅槃或一華一果喻緣覺一遠離行亦得涅槃或前果後華喻初果却後修道或前華後果喻菩薩先借緣修生後真修此皆粗華粗果不堪喻妙法唯此蓮華在淤泥而不染出水清香遠徹喻實相在纏其體本淨出纏圓明則名聞十方又為蓮故華喻為實施權文云思唯是事已即趣波羅奈等華開蓮現喻開權顯實文云十方佛土中唯有一乘法無二亦無三唯此一事實餘二則非真等華落蓮成喻廢權立實文云正直捨方便但説無上道等又為蓮故華喻從本垂迹文云我實成佛已來久遠若斯但以方便教化衆生合入佛道作如是説華開蓮現喻開迹顯本文云皆謂今佛出釋氏宮去伽耶城坐道場成菩提我實成佛已來無量無邊等華落蓮成喻廢迹立本文云諸佛法皆如是為度衆生皆實不虗如上粗妙權實本迹種種義便故以蓮華喻上妙法所云妙法非去粗取妙蓋即粗以顯妙也所云一乘非離三説一蓋會三而歸一也即粗顯妙猶蓮之即染而淨會三歸一猶蓮之自華而實法喻雙彰名實並顯故名妙法蓮華焉經是能詮之文具貫攝常法四義貫如線貫華乃貫穿所應知義攝如經持緯乃攝持所化衆生常者不變義三世不易為常法者軌持義十界同軌曰法廣如前釋能所合成故曰妙法蓮華經序文分三初序題二人題三序文且初釋序題弘傳序弘傳二字即序之名題大師先作此序無弘傳二字疑是宋元時方添或是祥師安此名目意謂大師作序意在流布此經以廣人人之妙法也弘推廣也傳轉授也序綜提也南山雅契此經之旨洞見如來之心欲報護念之恩乃當付囑之託故述此序也弘則鼓揚聖道自狹而廣自今而後等法界而無遺衍塵劫而不滯傳則授受此道自我而人自少而多轉相傳受凡有識者同登長者之室秉彞者共受王髻之寶序則綜諸佛出興之志列三朝翻譯之由提要義於博文伸己情於聖化故云弘傳序又三義釋弘傳一約時貫古貫今那畔目前大而塵劫小而剎那一切時流通故二約處徹上徹下此界他方龍宮海藏窮巷闕里遍微塵處流通故三約人則是凡是聖貫貴賤通人神一賢愚總善惡凡具血氣者皆可流通作利益故蓋妙法無盡而流通此經之心必靳如此方是大師弘傳之意弘傳二字即序末弘讚永貽二句二釋人題終南山釋道宣述終南山名距長安城南八十里在扶風武功縣東連太華西接太白以形脈發自西北勢盡於南故名終南關中記云一名中南在天之中居都之南故名中南此地有崇山峻嶺茂林修竹多産百嘉遠離囂塵藏修養靜遺世觀心者無不隱居求志於此標此者以大師栖真此山示不忘本也釋者靈山之法胤也梵語釋迦此云能仁佛之姓也凡出家者皆以佛為姓故阿含云四河入海同一鹹味四姓出家皆名為釋是也此則出自金口創於彌天大師標此以示紹隆佛種故道宣序主之名也師湖州長城人溯其閥閲遠為上古彭祖之後近是隋朝吏部尚書籛申之子生於開皇之代始生時母夢日輪貫懷而孕又夢梵僧曰所孕者梁之僧祐律師也天性卓特九歲遍覽羣書十二善文墨十五師日嚴頵公十六誦法華兩旬而徹十七落髮二十依律宗八祖弘福智首律師學律三衣唯布當坐一食唐高祖武德七年徙住終南常修般舟三昧於清宮精舍前後總二十會常感天人送饌侍衛後在西明寺行道中夜臨砌足蹶且仆有年少介胄擁衛之師問為誰答曰弟子乃博乂天王子張瓊也以師戒德故來給衛因以佛牙授師夜捧行道晝藏地穴又授餌方即天王補心丹也師問世尊在世滅後事瓊一一為説隨問隨録為感天侍衛傳一卷在藏曾隨奘師譯經推為上座坐夏有功庭生芝草隱居之地水涌白泉外通百氏內洞三學操觚續傳則鴻儒服膺築土封壇則梵僧稱讚存護法城著述無輟故有弘明僧傳內典録等百餘卷在藏曾撰法華義苑唯此序在師於乾封二年入滅於長安西明寺一衆皆聞天人請師歸彌勒院諡號澄照大師穆宗讚曰代有覺人為如來使龍魔歸依嶽神奉侍聲飛五天辭驚萬古金烏西沉佛日東舉稽首歸依肇律宗主述者揀非作故文則始起名作理則本有名述樂記云知禮樂之情者能作識禮樂之文者能述大師謙退之辭即述而不作之意初作此序以法華尊尚未易冠言稟告十方諸佛護法稱善告報故慈照云南山大師最幽玄撮成樞要在經前韋馱天將親垂報十方諸佛許師言三釋序文分五初牒經標本二序經緣起三序經詮旨四讚較祈願五結歸序題且初牒經標本妙法蓮華經者統諸佛降靈之本致也例法界觀序云法界者一切衆生身心之本體也蓋是大開全提明今經之大本顯諸佛之能事彰出世之本懷揀教法之都會焉上句牒經下句標本謂總括收攝該盡無餘曰統三覺圓明萬法徹照曰佛出真兆聖涉俗益物曰降靈心願同然儀規一定曰本致蓋此妙法諸佛出興獨此一事千聖本意無有餘乘由此佛佛不得不出興同亦不得不出興為此一事同也如二萬燈明盛烈弘於往劫為此説此也然燈妙光遺芳纂於末代助此續此也遡而推之過塵點劫之大通説畢而王子各為覆宣窮那畔之威音説竟而不輕重為開演者亦為此也是故吾佛世尊雖已分乘隨語然開顯會歸尚在此經而本意又與佛佛同也不然何故三周才竟忽現多寶佛塔能來分身諸佛圓證於靈山勝會哉知此則過現未來一切諸佛為説此經同一本意明矣經云唯佛與佛乃能究盡諸法實相此諸佛開權顯實之理致根本同也又云諸佛唯以一大事等此諸佛之為一事同也又云過去諸佛以種種因緣等此諸佛為實施權之本意同也又云十方佛土中唯有一乘法此諸佛出興功畢開權顯實之本意大同也古云此經為諸佛之心宗千聖之輨轄乃深見諸佛本致全同可謂知言哉二序經緣起分三初序兩土出處二序三朝翻譯三明獨宗秦譯且初序兩土出處蘊結大夏出彼千齡東傳震旦三百餘載蓋標本中既云此經統諸佛本致未審此經從西傳東出自何時故此云爾上二句明處時蘊結猶停積也大夏稱西域以此地多聞解脫凡聖叢集如九夏時生物榮盛故此句即此經西藏之處下句明此經西出之時序主意謂此經自衆聖結集之後停止天竺唯傳一隅經歷此方周秦漢晉之朝千有餘年在於西域故云千齡延及惠帝時法護東來創傳此經出彼西域到於東土故云出彼下二句明出時按佛滅度後千年之外聖教仗聖力顯現始傳東土時漢永平三年四月八日明帝寢於南宮夢一金人身長丈六項佩圓光飛至殿庭至旦大集羣臣以占所夢通事舍人傅毅奏曰臣讀周書異記昭王二十四年甲寅四月八日西域有聖人出祥光遠臨中夏有十二道白光貫於太微太史蘇由原其事千年之後像教傳於我國立石牌記之至穆王壬申五十二年示滅詳考曆數正當千年陛下所夢必是其由帝命太子博士王遵中郎將秦景定遠將軍蔡愔等十八人賫旨往西求法經歷殊方期及五年入南天竺國一日途中逢摩勝法蘭二僧因而相問愔以明帝夢中事告之二僧歎曰佛法流行皆由聖力因緣合會於此相值隨出優闐王畫像及四十二章等經愔以白馬馱來永平十年七月十八日始至洛陽奏上大悅館二僧於鴻臚寺敕內宮供養後於雍門外立寺以白馬馱經故曰白馬寺當時佛法始至人未盡知十四年五嶽道士儲善信等議曰帝尚佛法必輕我道衆推善信堪為奏首表文不録帝覽畢宣諸道士曰朕遠求佛法福國祐民何言邪法善信等奏曰巧拙真偽乞試驗之帝敕有司於白馬寺敷陳道場選正月十五日定二教優劣二教書置二壇帝親臨合國人民奔赴道場觀其得失時道士飛符走印二僧一事不為帝問二僧佛家有何神變二僧曰龍吟霧起非蚯蚓之所為虎嘯風生豈跛驢之所及僧遠持佛法流通濟世請用火焚真偽可知舉火時二僧西望泣曰佛滅度後聖教付囑國王大臣次及弟子我輩賫至於此今日火中燒驗願佛威靈冥加護持當時烈火亘天浮煙蔽日道經火燒佛經不壞帝異之人民稱歎善信哽咽而死道士宰官人民出家者無數由是二僧習漢言久之譯四十二章十地斷結等經自此佛法始興於世時此經未至今東傳二句單明此經傳東土之時也震旦即我國之名按八卦東方屬震為群動之首故曰震以震為雷一陽初動義故旦者日出之始也以此方乃日初出之處故詩云旭日始旦二義和合故曰震旦東傳對西停而言上句此經所傳之處下句此經東傳已過之時諸疏不一有云自明帝至惠帝二百餘年有云自漢至秦三百餘年有云自晉至隋三百餘年皆不合序意序主意謂此經自西晉之代創傳此方歷南北朝洎隋至唐初時凡經三譯僅過三百餘載蓋取自西晉至唐初作序之時而言也按東西二晉共十五主一百五十六年南朝宋有八主六十年齊有五主二十四年梁有四主五十四年陳有五主二十二年北朝魏十二主東魏一主北齊六主西魏三主後周五主為楊堅所篡有隋歷三主三十八年歸唐自西晉至唐初共三百五十四年除武帝在位二十五年止三百二十九年故曰三百餘載載者年也唐虞曰載取物終更始之義二序三朝翻譯又三初西晉譯二東晉譯三隋朝譯初西晉譯又四初譯經時二譯經處三譯經主四初譯名且初譯經時西晉惠帝永康年中西晉乃司馬氏有天下之稱國號晉都洛陽次遷長安對下元帝江東建都故云西晉惠帝名衷字正度武帝次子為第二帝永康是惠帝年號惠帝是庚戌四月即位立永熙年號一年改元康三年改永平六年改永康止一年法護譯經在永康年中此初譯之時也二釋經處長安青門長安即關中都邑以周秦漢唐歷代建都此地古稱咸陽漢高祖建都改為長安取子孫千秋百世可長久安樂以山河百二地險兵強甲天下故青門乃長安東壩城門俗呼為青門以極目來青望故即邵平種瓜之處然譯主於此門外立寺行道故今序總別處焉此初譯之處也三譯經主燉煌菩薩竺法護者燉煌即今甘肅沙州路古流沙地禹貢雍州之域也漢為燉煌郡菩薩者以師有上求下化之德故竺法護三藏之名也梵語曇摩羅剎此云法護月氏人師八歲出家依外國竺高座為師依郡立名故云燉煌菩薩連師為號故云竺法護者大師善究三十六國道術兼通其語日記萬言篤志於學萬里尋師博達古今世務毀譽未曾懷抱泰始二年自天竺達玉門關徙居燉煌以師譯經弘道光揚象教一象傾心故嘉此美名即初譯之主也四初譯名初翻此名經正法華譯主以沖深之識通方之才傳道五天不滯一隅遂於西晉之代來化洛陽後在青門外設像立剎開覺生靈初翻此經名正法華蓋取此經楷定權實會歸一乘無他道也的指演説正法文成十卷二十八品其真言文字皆作晉言囑纍在末二東晉譯分三初譯經時二譯經主三二譯名準前後亦應有四今三處則義該之且初譯經時東晉安帝隆安年中後秦弘始言東晉者五胡亂華之時西晉懷愍二帝被劉氏所弒洛陽大亂元帝渡江建都江東對洛陽故號東晉共十一主安帝是東晉第十主乃孝武之子諱德宗隆安即安帝年號繼孝武即位初改隆安凡五年什師於弘始三年入洛陽當晉隆安五年也後秦對前秦而言姓姚名萇前秦苻堅字永固有雄師十萬自稱秦王後僭位都長安為前秦也姚萇初仕苻堅為兗州刺史後擢龍驤將軍討慕容泓等兵敗懼奔時渭北馬牧等紏扇羌衆率其戶口歸萇者五萬餘家推萇為盟主萇至陝西入長安弒苻堅僭帝位亦號秦王因別前秦故云後秦萇卒子姚興立弘始是姚興年號晉居正位秦為傍僭什師譯經於秦境必先晉而後秦者存正統也此二譯之時代二譯經主龜茲沙門鳩摩羅什龜茲國名是什師之梓里非譯經之處所沙門此云勤息有四一聖道沙門即佛菩薩等二説道沙門即説正法者三活道沙門即修善品者四汙道沙門即諸邪行者鳩摩羅什譯主之名也具云鳩摩羅耆婆此云童壽以童年而有耆德故什者深善此方文字之什也華梵兼舉故名鳩摩羅什師七歲隨母入寺見鐵鉢舉之俄念鉢重即不勝重遂悟萬法唯心之旨是故出家父卒母亦出家得證三果初携師訪道於北印土有一羅漢謂曰此子非常過三十不毀戒度人不減掬多若破戒只為聰明法師耳母常謂曰汝學解足為人師但自道未成奈何師曰菩薩之行利物忘軀大化必行爐鑊無恨母臨滅讖曰方等深教應闡秦都但於自身少有不利師於內外諸典無所不知西域諸王請師説法必長跪座側命踏而登焉其後前秦苻堅西討太史奏曰異星現於西域分野當有大德智人入輔中國堅曰朕聞龜茲有羅什襄陽有道安得非此二人耶即遣驍騎將軍呂光率兵七萬伐龜茲迎什師至涼州聞苻堅為姚萇所害呂光據涼州即三河王位國號大涼師亦止之萇聞師之名屢請而呂光不允萇卒子興立復請不允興怒加兵伐之時涼州呂隆在位上表出降弘始三年方得迎師入闕秦王奉為國師此二譯之主也三二譯名次翻此經名妙法蓮華譯主以簪纓之裔作法門之胤德星現於外國聲名溢於前秦雖有西涼鈍滯厥後教化大行秦主敬奉如佛以弘始四年於草堂寺廣集義學沙門譯大品等經論共三百九十餘卷此經是一次者次西晉也名妙法者取此經觸處明真即權顯實故也的指止止不須説我法妙難思故云妙法文成七卷二十八品即今經師入滅於弘始十五年四月十三日臨終自誓吾所譯之經果不謬佛意當焚身之後舌根不壞後果如之師舌與諸佛廣長舌讚歎此經不二故也三隋朝譯分四初譯經時二譯經處三譯經主四三譯名且初譯經時隋氏仁壽隋即楊氏建國之號也高祖文皇帝姓楊名堅弘農華陰人父楊忠仕周有功封為隋國公忠卒堅襲爵後受周禪都長安國號大隋自東晉瓜分至文帝方合一統共三主計三十八年以國號大隋故曰隋氏仁壽即文帝年號文帝在位二十四年有二號初開皇次仁壽此三譯之時代二譯經處大興善寺即文帝所建此譯經之處也三譯經主北天竺沙門闍那笈多北天者五天之一也天竺總名印土此云月以此土賢聖繼化導凡御物如月之臨照故闍那笈多二譯師之名也闍那半梵語具云闍那崛多此云志德剎利帝種笈多具云達摩笈多比此法密二師皆北天竺人此譯經之主也四三譯名後所翻者同名妙法然二師誓志弘通來遊此土躡霜雪以前迹冒煙霞而進影遂際明時得面聖君於時樹剎懸幡誠建此寺頒衣賜食以示優寵闍那為主譯笈多為輔佐凡有潤色以二師為準後者對前故義符秦本但加添品二字以添合改移有五一於秦晉二本添普門品後偈二於秦本藥王品後補日光喻之全文三合天授品於寶塔品內四移囑纍品於普賢品後五回陀羅尼品於神力品後文成八卷二十七品與正法華俱未流通存於大藏問三朝聖師同譯一經何取名並卷品各不同耶答兩晉一隋時代不同月氏龜茲風土又隔譯主各隨處沿時闡揚聖教而已名題之別品卷之殊如眼目之稱何足異哉當求三譯宗旨同處可也三朝翻譯竟三明獨尊秦譯三經重沓文旨互陳時所宗尚皆弘秦本自餘支品別偈不無其流具如序曆故所非述初句明雜糅二句明影略二譯曰重三譯曰沓載道不紊曰文趣味有準曰旨彼此隱顯曰互陳謂文詞旨趣交互陳述如十如晉本無秦譯則有藥草喻後半品晉隋兩譯則有秦本則無故云文旨互陳宗者觸言崇尚故弘者開張闡明故以此經雖有三譯然古今所宗尚者皆弘傳秦朝羅什所譯之本也獨尊有三義一約影響以什師七佛已來譯經一人故二約投機以什師約義翻經契合此方機益故三約感通以什師譯經願力殊勝秦主信力超絶故有此三義故得家喻戶曉流傳誦持天上人間實相不泯喻之三光亘天杲日獨明秦本之視二譯亦猶是矣自餘下結指品偈不述上序三經名題惟明綱領若不略指條目未委差別何似大師為此故又詳細如此意謂除此三經名題之外自餘三經分品多少不定別偈全缺有異品偈依經皆有等流義類相從毫不紊亂具如次序歷然明白但非經之大綱故不詳述然此四句疑者多矣今再解之的指經文支取分義別目差別則品偈即指經中品偈也分品者如隋本則天授一品合入寶塔品內而秦本分為兩品此分品開合不定也移囑纍於經末而秦本則置神力品後此分品前後不定也別偈者如晉本不輕品中偈云五百清信士五百清信女而秦本此偈不分止言尼思佛等如隋本普門品中有偈而秦本則後來方添此則三經偈頌差別不同也序經緣起竟三序經詮旨分二初泛序一化始終以明機教差別二的序本經詮旨以顯權實正理初泛序又二初序義夫以靈嶽降靈非大聖無由開化適化所及非昔緣無以導心所以仙苑告成機分小大之別金河顧命道殊半滿之科豈非教被乘時無足核其高會云泛序者以機教約一代明故夫以二字乃文之造端起首處如未雨先雲未火先煙為前相故故五峯師云油雲知雨沛金電覺雷奔理勢然也靈嶽指鷲峯即經中耆闍崛山以古佛所處今佛説法在此故云降靈問靈嶽降靈一句古謂山蘊英靈之秀生此靈明之聖人此則降靈之靈指佛鍾嶽靈而生明矣故引詩意證成於理無爽今子以降靈之靈屬佛不屬山何申甫憑地靈而人傑而佛反不借地靈而降神耶答此亦有理今正其説大雅嵩高八章每章八句第一章云嵩高唯嶽駿極於天唯嶽降神生甫及申維申及甫維周之翰四國於蕃四方於宣此詩乃周宣王中興申伯出封於謝尹吉甫作此詩以送之以美申伯之降生實鍾靈嶽而生也此地靈人傑之常談耳此意在申伯則可在如來則不可當知佛之示迹以修證圓極現化自在無始悲願度生力故故佛之心即法界圓明之心佛之身亦法界圓明之身但應機有隱顯耳而謂此身憑靈嶽而降生者非也又當知降靈之靈即以佛之臨蒞於此敷演今經謂降靈也大師借文不借意耳慧日高升朗萬法之幽邃性海圓湛超四大以獨尊故稱大聖開化有二一現形二説法開者抉膜剖執決斷情塵化者點凡成聖鎔冶幻妄此則佛為能開化機為所開化也此二句序主意謂此山乃古佛所處如來在此事非唐捐蓋謂開佛知見會權歸實顯示一乘法耳然此法不有大聖何能開化三乘哉況靈山接武無非聖賢或積深厚養內祕外現如身子富那等或道全德備鄰功極高如文殊彌勒等如此偉人不有大聖又何以開化受此法哉所以能開化者以如來色心殊勝理量超絶鑒機無差施行有準故由此今經三乘普得釋滯開蒙俱能袪迷獲記故反顯云非大聖無由開化適化二句序感藉緣合適者稱也及也當也謂無緣必不受化緣淺亦不革心故神化相投之處必是昔有大緣且緣而深者也佛雖大聖必不能化無緣之人以靈山所化之機皆昔於大通時聽王子覆講已下一乘緣種故反顯云當教化所及之處非昔緣無以導心謂之導心者以機勝感深非止結種得益增長信心亦各明解圓滿終到佛地故如大通法衆威音三乘昔蒙化者今在靈山或得受記或沾利益皆由有緣在昔今方有分不有昔緣而今何能得度哉問大聖開化意在普及今何止有緣耶既在有緣何謂普及一切耶答佛心普及亦普及有緣也舍衛九億家不其然乎三億見佛聞法則昔緣可導心也三億特結種而已三億不見不聞無緣障之矣古謂狐貉不能暖無氣之人扁鵲不能醫必死之病天雨不潤無根之草黃金不富命窮之人知此則佛法不能度無緣之人信矣昔緣時義大矣哉所以二句序如來始成佛時半滿無心而機自差別也雖言初時實序一代法被之機故所以二字承前因昔緣之深淺所以今根有大小故仙苑即古仙人修道染塵受墮之處也佛於此告成者泛明有四意一得四無畏故二警覺羣迷令知故三有緣五人在此應度故四真心直説警增上慢故的指告成有二處意一為五人三轉四諦法輪時作證轉云此是苦我已知等此告成者即舉果勸樂激勵義也二今經藥草品云我是如來應供等此告成者即宏開度門普覺義也告成豈我慢自伐云乎哉然此告成雖拘法華末時其意實序佛初坐道場宣度生事知出興意也機分小大者小如二乘及事行菩薩以知見偏枯不了自心故大機如圓教菩薩等以解行圓明徹悟真源故故阿含云如來初轉四諦法時諸聞法者有證大乘位者有證小乘果者據此則知諦緣一而機自異者則生滅無量攸分例六度一而機自殊者則事修理修兩別佛初無是心也如莊生不龜手之藥用者各別知此則五時設化機之大小可以類推問仙苑轉法時即頓演華嚴時仙苑現丈六覺場現千丈二始同時圓遍可爾雙垂兩像優劣昭然即説大小法之前相著矣是則被機大小在佛有心何云機分佛無是心也答一月而千江普現雖有晦明水也月無異心一雨而萬卉均沾雖有豐嗇物也雨焉有別仙苑覺場丈六千丈亦機之大小彼此不定見耳法界身雲豈住思議境中有意如是哉大師敘此二句恐人謂法華之前在佛宜當説實便了一期大事却不自省權實兩分而今復用開顯會歸一番何也序主謂佛初成道已鑑機宜故不得已而權實之今則純熟亦不得已而開顯之始終為機故耳若唯説實何以逐機哉此意含隱智者詳之金河二句序一化云終因機大小而教分偏圓也上句是分教之時處以金河即處顧命即時故梵語阿利羅跋提此云有金河此河即出尸那城之屬境以河水迅速表生死不常金沙不動表一真常恆故河畔有娑羅樹乃佛世力士生處往昔古佛所居其林四雙八株四榮四枯如來於此般涅槃表本末二四倒已斷故極證常樂我淨四德故顧命者臨終出命謂之顧將去意也以彼成王將終作顧命之誓誥今言如來化緣將終説涅槃經捃拾五時之教此是最後遺囑究竟垂範也下句道字指一代教法小乘九部不盡法義故曰半字大乘十二部圓極心性故曰滿字如來於涅槃經中説半滿二字分大小兩乘故彼經云譬如長者唯有一子懼不速成晝夜殷勤教其半字而不教其毗伽羅論以其幼稚力未堪故科字取楷定義言如來於涅槃經內以半滿二字楷定一代大小乘俾不紊亂也然前後四句機舉初時大小教舉最後偏圓以二文影綺故機教互言俱通一代也又前後二義遞為由藉以機分則教殊教殊則機分序主序此蓋謂法華開顯之所以也豈非二句承前二義以序法華時至方可説也豈非二字猶言若不是也教被等者指法華已前教法被於三乘者教則至此已極機則至此已熟此可乘之時也無足豈非俱反顯意亦序主謙退不敢直云耳核者考究也質明也約義取之即見聞緣起義也高會指法華會上意謂若不是教被乘時難得見聞高會若順明應云因教被乘時方得考核高會蓋此高會興起良由教到機熟時至緣勝勢可乘耳若非機熟教到之時雖過百千生高會無緣興起我等豈能考究權實之正理質明開顯之通軌亦豈得普得記莂獲殊勝見聞之利益乎然法華一會特言高者略有十意一此經諸佛同説故如大通威音燈明等二時而後説故三權實正印故上二初卷意四授記普遍故如三周授記等五諸佛圓證故如多寶分身等六需此成佛故如聞解修習必得菩提等七法力上妙故如釋迦資以為因龍女借以證果等八本迹甚深故如本迹開顯之説九功德無盡故如隨喜之福德持誦之功德等十智行雙顯故如正宗以智起行流通以行契智等有此十意故稱高會況超出五教逈異餘經雖華嚴圓極若非法華則開顯不成必權終權實終實矣二釋疑是知五千退席為進增慢之儔五百授記俱崇密化之迹恐疑云上云高會則時至緣熟如旃檀林內無有凡材據今經身子三請如來許説五千禮佛而退者何也故釋云當知五千退席乃大權示現深生慈愍憐其會中未證謂證滯濡化城迷棄寶所者令進其空心濡滯深信一乘之法故序主作此舉也影響之衆如此益明法華為高會矣五百即富樓那等授記事通因記果記如後文説上云退席是權其致叵測今云授記是權益顯前義隱勝現劣故云密化五百同然故曰俱崇意謂因緣一周雖指屬下根言授記之事其實五百聖衆皆多劫熏修本大迹小權現以輔法化啓迪未信者也故下文云內祕外現等上泛序竟二的序本經詮旨以顯權實正理分二初略序三周開顯所以放光現瑞開發請之教源出定揚德暢佛慧之宏略朽宅通入大之文軌化城引昔緣之不墜繫珠明理性之常在鑿井顯示悟之多方言的序者此中依經法喻序故所以二字通承前義以時至緣熟方現相表彰興起法會故上句序大覺標本圓發以光瑞全顯妙法體用故佛表實相體光表實相用從眉間白毫發揮表此理超乎二邊具四德故瑞有六謂説經入定雨華地動衆喜放光此六言瑞者約時則世間方覩約處則塵剎罕遇約人唯證極乃能皆希有之瑞也下句序大士承流助發以問答援引實為起豫故開通能所能開即光瑞所開即二士問答以光瑞不興助發不起故教源亦指光瑞以光瑞即起教之源頭故以佛不放光現瑞則無以開發請之端此會歸大教不得興故故云放光等出定二句序法説一周全提之文言出定者即出無量義處定也在佛無不定時前後言出入者為物示軌實無出入義言出入也揚德者揚即稱揚讚歎意德指權實二智之德也如來知見廣大等歎實智證法德也如來種種分別等歎權智説法德也蓋實雖證理不妨涉俗權雖導俗豈礙證真若二偏枯則非唯實難涉俗權亦不能達本故故佛特讚揚之下句暢字以宣演開敷為義佛慧即諸佛權實二智也下文諸佛智慧甚深無量等此宣暢佛慧之大略也大略猶言大綱佛如此歎者將欲引權入實會三歸一欲發二乘之願慕耳朽宅下序喻説一周開顯之文朽宅二字直序喻名通入六字序喻説開顯大意宅即火宅今言朽者以衆苦煎逼故多緣速壞故文云三界無安猶如火宅是朽故宅屬於一人是也言通者疏通義文即文言軌即軌轍意謂火宅喻中疏通入大乘之文以改中根人昔三之轍良以法説一周示多方便上根身子聞已疑惑氷消故悔責領解如來與之述成授記但中根聞旨猶墮疑網氷炭交懷無能開解身子悲他未悟重為請決乃開喻説一周之旨文云我今無復疑悔親於佛前得授記等此上根領悟無疑也又云是千二百心自在者昔住學地乃至聞所未聞皆墮疑惑此中根有疑未決也又云願為四衆説其因緣令離疑悔此則請決其疑也故佛重為開喻云我先不言諸佛世尊以種種因緣乃至今當復以譬喻更明斯義諸有智者以譬喻得解自下乃説火宅一喻以三車一車之淺比況三乘一道之深使知長者許三賜一不涉虗妄則知吾佛始權而終實全是真慈至此則三一之文言會通開顯之軌轍一致而中根根心之疑從此拔盡無餘蘊矣窮子一喻四子領解感佛深恩藥草一喻如來重為述成而授記一品四聖方受記莂良在喻説權實中根疑惑決通者焉此則雖序火宅一語實四品卷半經文皆在其中矣文軌出中庸借其文勢耳化城下序因緣一周開顯之文其化城二字非單指喻蓋指化城一品之文若單釋喻無而忽有曰化防非禦侮曰城以喻二乘涅槃權果非實而防見思之非究竟必廢會入一乘寶所故古德云化城本無而權設以濟阻修願息之人而進之令至寶所喻小果非實而權設以濟要小求證之人而引之令入佛慧也若連下六字釋應云化城喻品中引昔緣之不墜昔緣指大通佛時佛為十六王子代闡妙法結緣之事故後文云我等為沙彌時教化無量百千萬億恆河沙數衆生乃至爾時所化無量恆河沙衆生者汝等及我滅度後未來世中聲聞弟子是也次後開化城寶所喻文據此則知昔日之緣猶在不失耳然此引昔緣之意蓋為下根人開權顯實也何者以前喻説一周之旨統言法一機異恐下根怯弱不達此旨謂已定二地難近佛慧故佛引昔緣之後乃設化城一喻令知汝所住地近於佛慧庶幾昔三化城不勞肯綮而可達一乘之寶所矣繫珠下序五百領解得記之文蓋往因已明下根滯權之疑斷故富羅等感悟領解如來述成與記決知前失今得由自迷自悟也故五百千二説此一喻以明昔因今緣一乘猶在不曾遺失亦感佛深恩意也珠喻一乘因種繫況悲願任持親友繫珠喻佛在十六時説此經結大乘因也醉不覺知喻無明未破廢忘大心資生艱難喻動被法縛悲智不失喻衣珠現在故下文云譬如有人乃至我今乃知實是菩薩得受阿耨菩提等是知今日之得乃昔緣結種在懷也豈今日為然哉然此句或可云繫珠明悲願之常在以理乃本具性以習成故蓋能繫者即吾佛之悲願所繫者即一乘之理性序主從所繫邊為言無他異説鑿井下序法師品廣記之文以此喻是三周法竟三根記圓廣記文後説故夫妙法玄源澄湛圓滿誰人不具喻水於地中無處不遍也然水雖遍含須鑿井而顯法雖同有必依經而明經之信解有無則果之遠近天壤井之穿鑿巧拙則水之隱顯懸殊故經云藥王多有在家出家行菩薩道乃至未善行菩薩道此如濟渴而不知須水也若有聞是經者乃善行菩薩道此如渴時知須水也其有衆生求佛道者若見若聞是法華經者當知是人得近阿耨等此如人鑿井已近泉源也又喻云譬如有人渴乏須水乃至知水尚遠此如前行菩薩道不見是經不得其要也施功不已轉見濕土此如前聞是經乃善行菩薩道也遂漸至泥知水必近此如前得聞是經得近阿耨等也又云所以者何一切菩薩阿耨菩提皆屬此經釋曰佛果菩提皆屬此經未聞未解安可得到又曰此經開方便門示真實相乃至無人能到今佛教化菩薩而為開示釋曰開方便門猶鑿井也示真實相猶見水也無人能到唯菩薩可以開示也以法映喻以喻顯法多方開示令人悟入足顯此經之妙也喻之多方開示則井之乾土濕泥水之遠近是也法之多方開示則善行不善行及供養讀誦見聞思惟信解修習能否果之遠近是也故云顯示悟之多方問此經據文二十八品三周七喻序文何不具述止序四喻十品者何也答説三周法授三根記罄盡如來出世本懷故大師止序三周之文縱有後義以該攝故二總結全經幽深詞義宛然喻陳惟遠上句謂七軸之文言全經之義理乍觀之如指掌目前可見可知下句謂三周之開曉九喻之鋪陳徐行也如雲光天表難聞難到所謂此經也一念萬年今時劫外泛泛端如五兩輕堆堆何啻千鈞重大哉教乎蓋無得而思議者焉四讚較祈願分二初讚較明三寶殊勝二祈願申作序之意初讚較又三初讚佛慈悲二讚法較勝三讚機因深且初讚佛慈悲自非大哀曠濟拔滯溺之沉流一極悲心拯昏迷之失性初二句能拔所拔次二句能拯所拯憐憫一切曰大哀慈航普渡曰曠濟二乘鈍滯化城遠視菩提非分凡夫沉溺苦海求出生死無期淪有淪無總名沉流佛為此等故説此經會衆善之小行同歸佛道開二乘之漸門並入一極況未兆之機亦為懸記大哀曠濟利益圓遍莫此加矣故序主反顯若此無上無等曰一極觀生拔苦曰悲心昏言識情汩沒罔明實理迷言苦樂漂沉不達自心二者均之失性一也故佛悲門浚切度門宏開拔拯於識情之場提挈於苦樂之域俾明權實正理擴徹靈明自心而後已不然則迍邅苦集之域者終處長夜結縛蓋纏之內者亦竟難出頭佛心如此得不謂之一極乎二讚法較勝自漢至唐六百餘載總歷群籍四千餘軸受持盛者無出此經前四句能較後二句所較佛法自漢明帝永平年間始來故曰自漢歷東西晉南北朝隋氏故曰至唐六百餘載約時代而言明群籍經歷時之久也總歷者前後翻譯合集融攝故群籍有三義約部帙則多少不等故約宗旨則偏圓殊致故約藏乘則三藏各別故四千餘軸約唐時大數而言此明所來之經多也受持二句謂今經約時則西晉始傳時不久也約部則諸經中一卷不多也雖時近卷少而在處流通人天捧持反過於諸經者何也蓋此經也諸經中王如優曇鉢華時一現耳約體即當人本覺之真心約用即一乘實相之妙法如藥王本事品較量一切江河海為第一等然一品較量如此之勝況全經較量難以盡言據此益信此而不持無可持者此而不受無可受者此經一部敵群籍之四千亦猶持觀音之名勝持六十二億恆河沙菩薩名矣三讚機因深將非機教相扣並智勝之遺塵聞而深敬俱威王之餘績機有五種權為影響開化遠為有緣結種現為法會廣記兼為有學歡喜正為二乘受記教指此經蓋此經顯實法門同歸一乘教故云相扣者機被教而機緣得蓋教扣機也教逐機而教化大行機扣教也下句明扣者有昔緣也謂大通説此經於塵劫之前十六王子代佛開闡則此法之入人深結緣勝也久矣今之得蒙記莂見聞法化者孰非當時之遺芳哉故曰並智勝之遺塵將非二字反明或序主不定意聞而下讚機之信心有因也法音達耳曰聞身心歸命曰深敬以身敬非深故下句即經中二萬億威音王佛俱説此經不輕菩薩先以佛性遍記四衆復聞此經教化三乘是已然法流塵劫至今隆盛不絶故云俱威王之餘績夫子期云喪伯牙絶絃蓋悲無知音者也今聞此經而慶幸捧持亦曾蒙古佛教化知音之人也念其昔則酬其今感其恩則戴其德而聞而深敬不為過也二祈願申作序之意輒於經首序而綜之庶得早淨六根仰慈尊之嘉會速成四德趣樂土之玄猷輒於下明作序意意謂此經三譯綺互意趣多端文言浩瀚非提綱挈領無以究其旨歸故擅於此經之初專總意焉如經之有緯𮈔之有緒者矣綜有二意一綜文二綜義以能所兩詮互相隨故綜文如朽宅等言綜義如喻説一周義等問據上釋則輒字是專義擅義大師何故作此説耶答大師以法華尊尚未易冠言故安此輒字雙含二義擅則大師謙退之心也專則大師敬謹之心也豈無味而然哉庶得下發願普益庶得二字希慕祈請仗願意也一念相應或現生圓備故云早淨六根即眼等六也下文云善男子女人若讀若誦若解説若書寫眼得八百功德等謂之淨者以父母所生常眼常耳無雜無壞而能徹見洞聞故慈尊指彌勒以慈隆即世悲臻後劫故此名之嘉會即龍華三會序主意謂此根一淨不但見靈山一會儼然目前亦可仗今經之妙緣憑慈氏之願力當來龍華會上得預記莂耳故上句云庶得下句云仰也上約下生經釋若約當經亦可指第四天內院故如勸發品云若有受持讀誦是人命終為千佛授手令不恐怖不墮惡趣即往兜率天上彌勒菩薩所菩薩有三十二相大菩薩衆所共圍繞有百千萬億天女眷屬而於中生有如是等功德利益據此則知大師作序流通此經蓋欲現生兜率當遇龍華臨終請入內院者是其驗也嘉會二字出周易亨者嘉之會也不涉躐等行願滿足曰速成四德古謂常等四德然此極果所證非今序意今指勸發品中一者諸佛護念二者植衆德本三者入正定聚四者發救一切衆生之心以此四乃普賢勸發之切要處又大師作序欲真得是經以成普賢常行必求諸佛護念乃至發救一切衆生之心故樂土指極樂世界以藥王本事品云若如來滅後後五百歲若有聞是經典如説修行於此命終即往安樂世界阿彌陀佛大菩薩衆圍繞住處生蓮華中寶座之上等趣字有向往求生意序主謂述此序功德普願速成四德同生安養直到彼岸不涉迂曲故又云玄猷也此二字如心經序妙道玄猷猷即道也道即能通之義謂因此玄妙之道即能通至樂也五結歸序題弘讚莫窮永貽諸後云爾魯史成而遊夏不能贊一辭蓋夫子之文章不可窮也況法華經藏深固幽遠無人能到哉即辨擬天女智似菩薩以一人而生無量口以一口而生無量舌以一舌而出無量音聲以一音而讚無量功德其於此經殆如管窺耳如斯經者唯佛能知信矣永貽一句即利澤萬方無盡之意蓋妙法無盡則此經此序流通亦無盡也猶滴水入海同海俱永者焉凡吾人遇此經當以無盡心流通斯善矣哉為述此序故云云爾妙法華經大成懸談終
