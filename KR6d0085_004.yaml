body:
  text: 金臺即山居後學大義集二有六十五行偈補頌歎法希有揀偽敦信二義古判勸信流通以三周未竟授記未完故今改之法説諸佛章中既有喻中應有長文既無偈中補出細研經文義甚切當分二初九行半頌歎法希有二五十五行半頌揀偽敦信初中分五初一行頌上三世諸佛説無分別法汝舍利弗我此法印為欲利益世間故説法印者一乘實相也諸佛授受以心傳心契此心者當下是佛如世傳國之璽得此印者即是天子説此法印開示悟入一切衆生佛知佛見豈非無分別法乎二二句頌上諸佛出興懸遠説是法復難在所遊方勿妄宣傳一乘心印非器不堪領受故誡勿妄宣傳如輪王之寶不落餘人之手囑當機凡所到處不可一槩朧非時莫説非機莫傳豈非説是法復難乎三四行頌上聞法歡喜讚乃至過於曇華若有聞者隨喜頂受至及比丘僧并諸菩薩若有聞下明聞法頂受定非常説住不退轉現在益也若有信下明供養一切諸佛由昔曾聞過去益也若人有下明一言讚歎信汝所説親見一會未來益也以聞此妙法能讚歎能信受能供養獲三世利益豈非是人希有過於曇華乎四一行頌上多劫聞法難斯法華經為深智説淺識聞之迷惑不解一乘大法唯具深智方能信受凡小識見淺薄迷自心惑聖教經無數劫聞此法者亦復難也此一行亦是結前起後若聞而供養讚歎信受此人具深智慧乃可為説結上也若夫小智迷惑不解不可非時而説開下也五三行頌上能聽是法者斯人亦復難一切聲聞及辟支佛至隨順此經非己智分顯直信之人難得二乘力所不及身子大智尚以信入況餘人乎入字重看應領解之文由法説種種開示方得信入也其餘己智不堪惟信佛語隨順此經豈非能聽之人亦復難乎問前云是法不可示言辭相寂滅獨許信力堅固菩薩能解此中又許身子以信得入餘人以信隨順當云何信耶答傳曰不言而信者天也又曰有諸己之為信今欲解寂滅之法當依不言之信信乎己而已即華嚴五位之初也彼經以自性不動智以立信體信得自心與佛無異由是智佛不動萬法不遷因果不移凡聖不二心境泯然印契實相一切相應是為不言之信也能發是信頓翻無明業識見聞覺知成一切種智矣所謂以信得入以信隨順者此也二五十五行半頌揀偽敦信分二初三十六行半頌揀偽次十九行頌敦信且初揀偽者揀去非機約大悲門莫為惡人説也頌上以五濁惡世下三行頌文又分四初二行囑其非機莫説又舍利弗憍慢懈怠至聞不能解亦勿為説憍慢者貢高不信懈怠者放逸無勇計我者知見不達著欲者耽荒世染如此之流聞不解悟必起惡謗後獲惡果若為説之不為無益而且有損大悲愍念不可為説二四行半明其謗毀罪因若人不信毀謗此經至此人罪報汝今復聽此經為五時極唱收一代了義總詮三因佛性之種開衆生知見即佛知見顯正因佛種觀一切法如實相了因佛種舉手低頭皆得成佛緣因佛種憍慢者我見自封不信此道淺識者荒於世務不知有此道不信不解若強為説必謂大言欺己視為流言故紙反加毀謗上遮玄化下阻他聞遂使道無由行人無由聖則三因佛種斷滅也或聞此經而憂愁形於面見此經而猶豫萌於心未信則為厲已故顰眉蹙額未信則為謗己故懷疑迷惑日夜欲滅其教高低欲毀其人也汝當二句結聽其報若佛下增明罪因輕賤憎嫉等謂見有持經者輕若糟粕賤若瓦礫憎惡其他聞嫉妒其勝己視之若芒刺思之若寇讎欲除不能結恨於懷此人二句重結罪報三二十八行示其毀謗罪報分三初一行半明地獄報其人命終入阿鼻獄至如是展轉至無數劫由前毀謗等因感此地獄之報此界壞時更生他方展轉更生無有窮已百千劫不見日月之光無量生恆受鼎鑊之苦如石投水易沉難浮其勢然也二十行半明畜生報從地獄出當墮畜生至謗斯經故獲罪如是謗經之罪地獄報畢又作五種畜生謂拘野干馲駝驢蟒也𩑔頭無毛也黮黑雜毛也騃無知貌三十六行明人報若得為人諸根暗鈍至謗斯經故獲罪如是常生難處者八難也永不見佛佛前佛後難永不聞法世智辨聰難聾啞盲聾瘖啞難常處地獄地獄難在餘惡道餓鬼難驢駝等畜生難不見佛不聞法北洲難長壽義含常處下申明謗經之人常在三途而無休息也時出時入故云常處不去朝夕故喻舍宅時時來往故云行處若得為人下從三途出而後為人又以盲聾等為莊嚴者不自知其醜也以水腫等為衣服者終身不覺其在體也身常下更起三毒謂謗經者素無見佛聞法之因不知改悔而且著我見受此劣形人或憎惡不識醜恧而反增瞋恚人畜異類不當野合淫心熾起不擇雲雨著我貪也增恚瞋也熾欲癡也有此三毒又將墮入三途矣所謂劫盡更生展轉無數有何窮已哉然此果報一科皆因謗此經而感以此經出世本懷普記成佛是人天眼目而謗之者感畜生無目為人盲瞽此經能治衆生心病是大醫王而謗之者順方治病更增他疾此經若供養等則六根清淨顧盼雄毅舉身輕清而謗之者六根不具作畜生時身常負重恆被杖捶為人時淫欲熾盛不擇禽獸此經是慈悲室忍辱衣法空座而謗之者惡道為園宅疥癩為衣服豬狗是行處此經一念隨喜則口不臭口亦無病舌亦無病等而謗之者口氣常臭諸根暗鈍此經實相法印開解者念念與實相相應即得見佛聞法而謗之者斷佛種永不見佛聞法也當知讚歎者功德無量謗毀者經劫三途若讚若毀不出當人一心心者萬形之模範業者一心之影響三世善惡唯一心造如器出模無不相類如影隨形在處莫逃欲得不招無間業莫謗如來正法輪者此也又三惡之與人趣其文重沓者顯謗法之罪罄竹難盡展轉惡道無有停寢試觀今世之小人往往趨風邪教者無非宿世邪習我見自封不信憍慢之所使然噫可慨矣四二行結其大悲莫説告舍利弗謗斯經者至無智人中莫説此經一謗之罪劫舌難盡不可輕談遺害愚人故云無智莫説若不得其人而説者惟恐青囊見於愚婦犀纛落於嬖人不唯陷彼之愚亦使所珍有損弘道之士可不忌哉問謗經生罪則經非罪緣乎答佛之説法唯為生福迷者不信自獲罪殃如四大本為養育人物而犯者有損耳今佛諄諄告示既令弘法觀機亦令彼知苦止謗可為徹底大悲矣上揀偽約大悲門莫為惡人説竟二十九行頌敦信約大慈門為善人説也分二初十七行敕其是機應説二二行結其大慈與傳初中文分五對初三行過現一對若有利根智慧明了至如是之人乃可為説利根智慧決了權實多聞強識志希佛果現在也親近諸佛植衆德本大心堅固不為物動過去也如是之人方荷此道聞必信受當為説之二二行半上下一對若人精進常修慈心至如是之人乃可為説精進勇猛拖泥帶水修慈與樂愍下也無雜異念獨處禪思意定身安恭謹敬順尊上也如此人者載道之良器也三三行內外一對又舍利弗若見有人至如是之人乃可為説損我之友惡友也故捨之益我之友善友也故近之外求也持戒如珠六根清淨之因求大乘經開佛知見之緣內求也如此人者法門之表也四三行半自他一對若人無瞋質直柔軟至如是之人乃可為説形端內柔不為人辱愍人敬佛不辱於人自行也清淨説法不為利養具無礙辨種種方便利他也得此人者慧命有續也五五行始終一對若有比丘為一切智至如是之人乃可為説取實擇權遵現佛之大法四方覔求請益之始也追求舍利欽去聖之恩澤不念外書厭糟粕之無味頂受專修歸憑之終也如此之人好正惡邪克荷此道也上敕其是機應説竟二二行結其大慈與傳告舍利弗我説是相至汝當為説妙法華經相即上五雙十隻之相善相多矣略舉十種以示可説信解二字為下品章本如此之人善根成熟一聞此經必能信解言下知歸全身擔荷於法不辜於人不誤上有補於玄風下不失於悲願故云汝當為説妙法華經上正説譬喻開三顯一已竟妙法蓮華經信解品第四前文云如是等人則能信解經家本此二字立品以信則不疑解則明理也夫根有利鈍惑有厚薄説有法喻悟有先後初聞廣略開顯上根領悟中下之機朧未曉不信不解今聞喻説疑去理明生信起解故名信解又中根人聞説譬喻初破疑惑入大乘見道為信進入大乘修道為解文云我等今日真是聲聞令一切聞是也又云我等居僧之首不復進求菩提是不信不解不謂於今忽然得聞希有之法獲大善利不求自得是自信自解也又信則信法信得如來種種因緣方便説法皆為阿耨菩提解則解人解得是諸所説皆為化菩薩故四子有如是信解故異口同音説窮子一喻以酬如來火宅開示也問四子衆僧之首領悟後於身子者何也答若事論但觀序悟之文身子尋常自疑悔責不肯甘於小道一聞聲聞作佛便能信受如睡輕者一呼便覺四子尋常自足疲怠昔無悔責之念直待身子受記然後生疑更聞喻説方始信解如睡重者搖撼方醒若以理論此經融會二智身子當機故先領悟諸尊者內祕外現根非中下悟無前後助揚法化利益今後故次第敷陳二中根領解分二初經家敘喜二自陳領解初又二先內喜爾時慧命須菩提至發希有心歡喜踊躍上品為千二百説喻唯敘四人者所謂智者以譬喻得解也若從正敘當先飲光今先善吉者以解空第一也諸聲聞但念偏空今將捨偏空證入實道故先之至下説偈授記仍是飲光居先從正敘也善吉獨稱慧命三稱摩訶者通論皆大皆慧別論善吉解空以空慧為命故又諸慧人中佛慧第一佛於般若命其轉教其為慧人所命故從佛聞下是歡喜之由由遠聞方便法説近聞譬喻開示未曾有法指身子以聲聞人得同菩薩授成佛之記為未有之法也發希有心者謂空生等一向安於小果不曾發作佛之心今聞法喻之談開佛知見信得自心作佛生大歡喜手舞足蹈即信解意次外儀即從座起整衣服至瞻仰尊顏而白佛言三業虔誠請法之式梵漢兩儀聽衆咸坐欲有所問從座而起如理請益則起更端則起將有承聽必須復坐偏袒者肉袒也西方俗禮見王必肉袒示非敢有謬佛教亦用表將荷佛法之重擔耳春秋鄭伯降楚示為臣僕肉袒羊迎又禱則跨燼祭則跪奠皆致敬之極也若作表法小乘偏空座起向大乘第一義空座衣即聲聞智斷為菩薩法忍慚恥忍辱之衣未開權如肩被覆今已開故偏袒也著地者著一實之地權實不二不二即是非權非實之一心融會二邊歸於中道故云合掌曲躬二句以身之權趣佛之實也二自陳領解有長行偈頌長行分二初法中略説二喻中廣明初中又二初明昔日不求二明今日慶得初中又三初正明不求我等居僧之首至不復進求阿耨多羅三藐三菩提不求有三一居僧首二年朽邁三已得證居僧首者謂我等法臘既高晚學以我為軌忽改途易轍棄小求大為後學所嫌自固護彼所以不求然執小臘則大法全缺不棄小由未識開三自固則小執未移護彼乃迷於大軌年朽邁者朽謂將死對無所堪其進而言邁謂老耄對無所任其求而言若作菩薩當專任大道廣度衆生今既朽老形衰力怠無所堪任是故不求然一生斷證是以自鄙年高敗種未祛是以妄作不任已得證者已得涅槃無為正位所以不求不發大心故無所堪任盡智無生智已立無所依求故云不復進求等然高原陸地不生蓮華昔迷實義徒計正位之功由斯固情不知所行是菩薩道二釋不求之意世尊往昔説法既久至成就衆生心不喜樂既久在座釋僧首也身體一句釋朽邁也但念下釋得證也空等名三解脫門觀諸法無我我所名空門觀男女相一異相等實不可得名無相門若知一切法無相即都無所作名無作門又於三界無所願求名無願門遊戲神通者作空華佛事建水月道場降伏鏡裏魔軍證得夢中菩提遊戲一句妙用也淨佛一句上求也成就一句下化也但念空故不喜樂於妙用念無相故不喜樂於上求念無作故不喜樂於下化由心不喜樂所以不復進求菩提也其實空等三法大小同具故身子云同入法性肇論云三乘等觀性空而得道是也但小乘過在一念字起信云一切衆生不名為覺以念未淨故三徵不喜樂之意所以者何世尊令我等至不生一念好樂之心此徵釋上樂小不喜犬之義謂遊戲神通是菩薩成佛時自住持之三昧淨佛國土是成佛時自受用之報土成就衆生是自莊嚴之法嗣所以不喜樂者何也以世尊昔言我法能離生老病死究竟涅槃令我等依教修行皆得出於三界之苦得證涅槃之滅故安於小而不求於大也又今下謂既證涅槃年又朽邁以是之故於菩薩阿耨菩提不生一念好樂也二明今日慶得我等今於佛前聞授聲聞至無量珍寶不求自得聲聞成佛昔所未聞今得聞之所以心甚歡喜也不謂下慶詞申明歡喜之義謂若有求而得則不為希有今無求而得故云忽然得聞等分所當得則不為慶幸今經乃昔日分所不當得而今得故云深自慶幸又得解之由由遠聞廣略二番開顯是故慶幸獲大善利者正得解也是近聞譬喻希有之法而獲開悟之善利也無量等喻昔不求而今自得一乘希有之法寶也昔日般若轉教謂是菩薩法豈圖今日全蒙等賜四十年前無分今日忽然授與不求自得何歡喜慶幸如之哉二喻中廣明分二初喻説二法合初又二先咨發世尊我等今者樂説譬喻以明斯義應如世禮欲有所決須先咨發也斯義者欲明如來慈悲訓誘自己愚癡情態也我等二句為下四段喻文章本以明一句為下法合之本所謂智者以譬喻而得解也二説喻文分四段一父子相失喻二父子相見喻三遣使追誘喻四領付家業喻前品如來以火宅開示今品四子説窮子喻以酬答以喻領喻立言各異會旨大同師資默契於此益見二品皆以父子相稱者佛於弟子有作成之德故比之如父弟子於佛有纘述之功故況之如子父子二字兩品經文節節相承前品以大富長者喻如來資財不匱故曰等賜大白牛車此品以幼稚貧兒比弟子無心希取故言忽得如來寶藏之分前品寫如來慈愍為子之心最切故云驚入火宅此品寫弟子愚癡背父之事居多故曰疾走而去前品明如來引諸子出三界門故云今在門外此品明窮子恐怖疑父不肯入門故曰住立門側父子二人各吐心膽説出四十年中許多間關曲折今日始得父子投機師資道合故二喻各盡本懷若尋其文則父一行子一行語句頓挫父子之懷抱昭然可觀詳其義序述一代時教四十年來荷如來無限慈悲之深恩形自己許多愚癡之情狀以喻開示以喻領解接拍成令同一鼻孔矣又有義若推當經三車並許之説大雲一雨之喻諸宗所判皆失聖意以三車一雨皆非次第故今就此喻文勢窮子有先疏後親之義是知一代聖教大小權實不無次序準雙林五味之談覺場一日之照諸家所判咸符此喻之旨今初父子相失喻近領火宅總喻遠領方便略頌分四初子背父而逃走二父求子而中止三覔衣食而漸還四慮家業以無傳初中又二先背父而去譬若有人年既幼稚至或十二十至五十歲有人單約二乘四子自況以菩薩深位難知凡夫未受教化且齊已領耳無明厚重未有所識曰幼稚爾雅云幼鞠稚也又云幼冥也喻聲聞冥昧不知也退大為捨無明自覆曰逃趣向生死曰逝是離師適意背覺合塵之義問佛捨應後衆生起惑是父離子何云子捨父耶答由衆生不感佛則去世還成子捨父意久住言時之長也涅槃法界是自國生死五欲為他國即恆離佛教常習世法之義五十指五道一天二人三畜四鬼五地獄約一人備歷五道常在三界升沉不定有時人有時畜等故置或言又一念心動五陰俱生即具五十惡故此是迷子惑重智淺無明自覆退大受淪也二向本而還年既長大加復窮困至漸漸遊行遇向本國善根熏被稍稍欲著故名長大不見佛父不知本有知見珍寶為窮五濁八苦所燒為困既加二字當玩是內智既發外乏緣因資助也馳騁馬奔忙貌喻凡小依身受心法起四倒之見又於四諦法中求正道如求食求助道如求衣又奔走四方求師覔道外求明師以嚴三業如衣蔽形內求良道以資一心如食充飢漸漸者難以頓悟也悟既非頓則乏本智乃是偶然故云遇向上云捨父逃逝喻背真逐妄此云遇向本國喻返妄歸真又生生持戒修福得遊天上人間而值佛出世之時故云遇向本國此是迷子惑輕智長宿因感發得值佛出也二父求子而中止又二先求子不得其父先來求子不得其父先來者佛觀有可度之機先來示生三界求子不得者鈍根無方難可得度上言子捨父而遊行故云遇向本國此言求子不得故下云中止一成一行一止寫得頓挫又先來二字領方便思惟之文喻中長者救子不得出宅之義若依文勢父既先來子猶漸進前後相左故曰不得二中止一城中止一城其家大富至商估賈客亦甚衆多一城者先現勝應身居華嚴法菩提場也其家大富者實相境為家具足萬德為富也五度福德名財般若智慧名寶福慧無盡故云無量金銀等總喻無量無邊智慧十力四無所畏等法盛糧穀曰倉盛物器曰庫充於內曰盈流於外曰溢喻實智為倉盈法喜之食充於內自利也權智為庫溢諸法之財流於外利他也僮僕是使役之人喻華嚴五位之初十信位也初入信時即起自利利他之心故十信如僮僕也又即世主等各寄一德助發玄化如充使役之人也臣佐吏民者輔弼聽教之衆喻四十位法身大士初入佛境界率土之賓莫非王臣故十住如民修習諸法種種驅馳故十行如吏事理稍深職近王邊故十回向如佐輔佛行化降魔制敵故十地如臣象馬等無數者十地如象乘十向如馬乘十行如牛乘十住如羊乘又圓頓二教如象乘運物終教如馬乘運物始教如牛乘運物小教如羊乘運物無量還一名入一為無量名出又化他用為出自行用為入出法益衆生為息化功歸己為利滋息廣被大千世界故云乃遍他國行曰商以有易無坐曰賈覆藏待價小販曰估朝買暮賣者喻此土菩薩往他土聽法如商他土菩薩來此土聞經如客神力加被法身大士説華嚴大教如賈往還採利領本生息如估圓音落落主伴重重故云亦甚衆多此是覺父示生接物雖知根鈍且稱本懷也三覔衣食而漸還又二先到城之由時貧窮子遊諸聚落經歷國邑接上遇向本國而言不發大心曰貧未修大行曰窮以邪慧觀察五陰如聚落十二處為邑十八界如國遊歷於此推求真理名求衣食又聚落荒野喻欲界人天五趣雜居之地國邑盛麗喻色無色界乃三賢同修之處此二乘人三生植福百劫修因常遊人間恆歷天上由斯因緣遂得遇佛大會也二遂到父城遂到其父所止之城前云其父求子不得中止一城此言子遊聚落等到父之城父子只在一城只是兩不相見處處總是本地風光只是不見本來所謂不識廬山真面目只緣身在此山中也又父先求子子元不求父因覔衣食而亦來者喻佛與衆生法性相同如世父子天性相關雖似不相知機緣當會不得不來也此是迷子宿因既發智性漸長斷惡修善遇佛勝會也四慮家業以無傳又二先念失子苦父每念子與子離別至是以殷勤每憶其子接上亦甚衆多而言如來自昔至今恆思子大機時刻心在衆生故云每念退大已來諸子流宕五道故云與子離別等開鬼出修羅故言餘又五十者金剛三昧經云譬如迷子手執金錢而不知有遊行十方經五十年貧窮困苦求索養身而不充足其父見子有如此事而謂子言汝執金錢何不取用諸子醒已而得金錢心大歡喜父言所得金錢是汝本有云何可喜無住菩薩問言父知子迷云何經五十年方始告言佛言五十年者一念心動五陰俱生五陰生中具五十惡故正同今經父每念子原在一處由彼一念心動五陰俱生具五十惡遂與離別五十餘年遠逝他方不復相見也未曾向人説者喻華嚴會上未曾向諸大士説此二乘人本是大乘之子亦未曾向二乘説汝等有大乘之分如此事皆未説故由未曾説自華嚴已來不解佛法或如聾若啞去華拜座轉教不取等種種之不逮也悔恨者悔昔之教誨未深遂使退失本解恨今之執小棄大不能精進固志又此二字乃潤色之言大聖不謀而應如月落百川何悔恨之有哉自念下申明悔義老朽者化期將畢也亦可喻佛久成正覺金等如前無有下申明恨義具足法財萬德若無弟子傳持大法一旦滅度法道斷滅無所付託也是以下結足悔恨殷勤憶子所謂老覺情濃念兒孫也心印不傳古佛之業幾息誠為可憂然此亦是對機之語其實衆生心內時時諸佛説法諸佛心內念念衆生成道何有付無付乎二念得子樂復作是念我若得子委付財物坦然快樂無復憂慮復字有展轉反側冀得之義有可度之機名為得子授成佛記名付法財稱於本懷則坦然快樂無復憂慮矣此是覺父身應勝會念在小機思方欲救之深衷也上父子相失竟二父子相見喻近領火宅長者見火遠領方便頌明五濁分二初子見父二父見子初中又四初見父之由世尊爾時窮子傭賃展轉遇到父舍接上遂到其父所止之城而言以身雇人曰傭任力取利曰賃進前曰展退後曰轉由厭苦欣樂推求理味漸漸積習遂成出世善根猶窮子之傭貨展轉也以此善根能扣佛慈悲之舍故言遇到父舍不期而會曰遇機趁於應曰到道後法身曰父無緣慈悲曰舍城乃集衆之處故前喻勝會舍為一己之宅故喻慈悲以大小二機雙扣如來慈悲之舍有大機故故下云遙見其父有小機故故下云住立門側若唯小無大則下文子不應見尊特之身父不應言我財物今有所付若唯大無小則子不應住立門側又不應言非我傭力之處故知小善之內冥入大乘因門二機雙扣理應具足經文自國而城自城而舍摹寫漸漸遊行極矣二見父之處住立門側遙見其父二觀為方便即門二邊圓中之機當門正見二乘偏真故言門側雖值佛慈悲未入佛正慧志在偏空意念小乘偏真慧眼傍窺法身耳大機始發相召事遠故言遙見前法喻皆明父先見子此中子先見父者約佛則靈智先知約生則機成扣應子見即父見父見即子見不前不後不可思議互舉耳三見父之相踞師子床寶几承足至種種嚴飾威德特尊此科正説華嚴時也踞師子床者即華藏莊嚴赫赫天光師子座也佛為人中師子故居此座又師子吼無畏説表佛具無畏之德故寶几承足者衆寶之几承於二足也定慧為二足實諦為几無生定慧依於真諦之境故又佛居萬行之尊依定慧之本即定慧力莊嚴也諸婆羅等圍繞者婆羅門名淨行高潔即等覺菩薩也剎利名王種貴族即十地以下初地等菩薩也居士在家修道潔白其操富而不貴即三十心菩薩也即華嚴中一華一國土一葉一釋迦一一佛一一土皆有諸大士環拱圍繞極十方而齊唱該十剎而頓周前文商賈估客亦甚衆多者此也以珍珠等嚴其身者即戒定慧陀羅尼三昧四種纓絡以嚴法身也吏民等者即行住信諸大士為方便波羅蜜故白拂者拂能去塵不偏也白言純素不染也表方便權智之用不偏不染故云手執白拂侍立左右者右即入空智用拂四住塵左即入假智用拂塵沙塵此二為中道方便故言侍立寶帳者真實慈悲也慈悲廣被故言覆華幡者華喻四攝幡喻神通衆善下化故言垂香水名華者水智也華因也灑地者以妙智之水淨衆生心地散華者以妙因之華嚴衆生心地羅列寶物者示實智自證證他之法隨人玩好也出內取與者出內義同出入自行為取化他為與示權智自利利他之法隨人欲樂也如是等種種者總結如來一切未曾有法皆悉成就也威德特尊者即光明無邊色像無邊巍巍堂堂舍那之身非化身可並也四見父避去窮子見父有大力勢至作是念已疾走而去其實華嚴會上二乘有眼不見今四子自陳已蒙開示皆是菩薩故云見也有大力勢者收上一假智大故名大力神通大故名大勢即身手有力也恐怖者小機劣弱怯懼大道也悔來者佛本以大法擬之應不稱機但有退大之意故言悔來至此總之法大機小不惟畏懼抑且悔來也竊作念者機中潛密冥有此事非是顯對見勝應身故云竊念是王是王等者謂或是魔王或是波旬今聞略説尚疑魔作況昔日乎又佛法身為王報身為王等大乘法報非小乘得益之處故竊念而去小機不受大化自甘無分故云非我等不如下向一乘小道也肆力者進修有方也爾雅云肆力訓極力也淨名云能以貧所得法度斯下劣但空之理不含萬德非如來藏故言貧里偏空稱於小智故言有地依此小智得有餘涅槃無漏衣食行行名衣慧行名食小果福慧皆易求之故言易得久住強作者行大乘道經無量劫故言久住我本厭怖生死若修大乘必入生死廣學萬行故言逼迫我本樂小而今令我發大心修大行是為強我作也作是二句捨大取小於菩薩法不生好樂此是迷子見覺父而不識棄富業以求貧里也二父見子喻有四初見子之處時富長者於師子座接上無復憂慮而言謂如來法身居第一義空無畏之境洞照群機是見子處也法中以佛眼觀見等喻中長者見是等二見子便識見子便識如來鑒機知是往昔結緣衆生也三見子歡喜心大歡喜佛恆伺子機今機來稱慈子雖不識父父却識子事與願諧故大歡喜法中起大悲喻中大驚怖前明大悲拔苦故云驚怖此明大慈與樂故歡喜也四見子適願即作是念我財物庫藏至我雖年朽猶故貪惜昔見衆生退大取小貧里求食資生艱難常欲與財無機不得今日機來一乘大法有所傳授稱大慈心故言庫藏有付我常思念者明其非但貧無大財又流轉生死衆苦所逼為大悲所痛故常念也雖欲救拔無機叵濟故言無由見之今有可度機發故言而忽自來彌大悲心故言甚適我願年朽貪惜者釋上適願之由年朽同前老朽曠劫所修證大菩提未見大機不妄與人法無委付將來之徒從誰得脫為無可度故言貪惜今機自來無此憂念適其夙志所有昔願今已滿足此是覺父見迷子而便識欲窮子以得富足也上父子相見竟三遣使追誘喻近領喻中捨几用車遠領法中侵大施小分二初即遣傍人追二密遣二人誘初中又三初強追將還近領喻中長者念救遠領法中大法擬宜即遣傍人急追將還至使者執之逾急強牽將還此即雖知根鈍且稱本懷敕諸大士七處九會演大華嚴也遣傍人者若以理釋智為能遣教為所遣理正教傍從佛出十二部大乘擬宜衆生無機不受故云遣傍人也事論佛為正菩薩為傍即臣佐吏民諸大士説大乘法門也如法慧説十住功德林説十行金剛幢説十回向金剛藏説十地皆承佛威力故言遣傍人也直説圓頓大教擬小機故曰急追昔有大種故曰將還經云一切衆生具有智慧德相急追意也使者往捉者理論大乘明義顯露直指一真法界能令衆生疾取菩提經云初發心時即攝五位成等正覺疾走往捉意也如大車其疾如風事論菩薩自有神力又被佛加能令衆生疾入菩提也小乘緩昔發大心廢久不憶卒聞大教乖心故驚不識故愕故云窮子驚愕稱怨大喚者圓頓教中煩惱即菩提生死即涅槃小乘以煩惱為怨賊生死為苦縛若聞煩惱即菩提便大喚云怨枉若聞生死即涅槃便大喚云苦痛心驚口怨我本不求大何以用大化我也故云我不相犯何為見捉執逾急者即諸大士承佛力領佛命而直談大法內既無機外逼大化故云強牽將還如無厭示以王刑勝熱示以火炙等計我者為説無我計常者為説無常等又云若人欲了知三世一切佛應觀法界性一切唯心造皆執急強牽意也喻中説怖畏事具告諸子也二執急悶絶近領喻中諸子不聽遠領法中衆生無機於時窮子自念無罪至轉更惶怖悶絶躃地自無心而被強卒不能解所以自念無罪也二乘以見思為罪以三界為囚執入滅盡定為生出定為死所謂變易生死也今教斷見思之機觀法界性出定度生是無罪被囚而必定死也又罪者業也有世出世善惡之不同衆生有貪瞋惡業之罪而無慈悲善業之罪常隨三界生死牢獄但能入而不能出菩薩無貪瞋惡業之罪而有慈悲善業之罪當示三界生死牢獄能入亦能出二乘無貪瞋惡業之罪亦無慈悲善業之罪常厭三界生死牢獄但能出而不能入若修大乘必定常入三界生死牢獄故曰而被囚執無大方便而入生死必當永失三乘慧命故曰此必定死自作此念不惟不解且轉增迷惑故曰轉更惶怖強以大教小智不解故言悶絶即起誹謗必墮三途故言躃地如人心熱發昏尚不自知生死何能識色音由是暴腮鱗杜視聽眼不見耳不聞也三暫放得喜近領喻中馳戲視父遠領法中如來息化分四初愍癡命放父遙見之而語使言至令得醒悟莫復與語小乘去大乘遠故為遙是結緣子故名見是機志近於小而遠於大也語使言者約理智本説教智知無機大教宜息也約事囑諸菩薩不須現汝尊妙之身令二乘見如淨名云攝汝身香無令彼諸衆生而起惑著又普賢入娑婆促身令小是其意也不須此人者不必強與説一乘難信之法也既無大機若現勝身説大乘法恐傷其善根故云勿強將來是姑息愍癡之意冷水灑面者知有小志宜以小乘灰斷理水除見思之熱面厭生死名背向涅槃為面以有背生死向涅槃之機故令得醒悟者開小教逗小機令得離煩悶悟四諦也莫復與語者決定應息大乘之教也二徵釋放意所以者何父知其子至不語他人云是我子徵息化之故二乘志意下劣畏難大法且任其小志抑佛本懷故云父知子下劣自知法財萬德無不具足二乘智淺福薄於此大法難信故云自知等一則志劣一則豪貴知己知彼所以息化也審知是子者審知昔在二萬億佛發大心之子也而以方便等於昔小乘教中隨他意語方便覆護稱是聲聞不説隨自意語云是菩薩昔教未説故云不語他人等三使正放使者語之我今放汝隨意所趣我今放汝即知大機弱隨意所趣即知小善強以此二緣故息大化四喜往貧里窮子歡喜得未曾有從地而起往至貧里以求衣食喻順小機將欲隱勝現劣投其所好遂其本願故諱實以開權也不為大教所逼投其好樂故歡喜無謗大罪得免三途故言從地小善得生故言起又前擬大法迷悶不解臥無明地今逗以小可得醒悟故云從地而起往至二句但空之理不含萬德故云貧里於四諦中求助道衣正道食故依二乘貧所樂法為入道資糧是捨明珠而求魚目也上即遣傍人追竟二密遣二人誘然追誘一喻領火宅捨几用車方便侵大施小前科即捨几大法擬宜不得此科應是用車三乘隨宜可得也文分為四初徐誘除糞領上三車擬宜爾時長者將欲誘引其子至其父見子愍而怪之此下正明鹿苑時也將欲者且然未然意既息大化不容孤棄欲設方便故言將欲喻中當設方便法中尋念過去佛所行方便力此體外方便也密遣二人者前遣傍人表一實諦一大乘一菩薩人今明方便隱實為密指偏真為遣約教隱滿字為密指半字為遣約人菩薩示生三界內祕為密外現為遣二人者四子齊已分領不涉菩薩約法則因緣四諦理則有作真俗人則聲聞緣覺也二乘教中不修相好但説苦空無我不淨等即形色憔悴也內怖無常曰憔外遭八苦曰悴無十力無畏等故曰無威德是菩薩內隱自在威神之力外現枯木寒灰之狀下文知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺等用同事攝化隱實施權也汝可徐語者大乘明理真實故言疾走往捉小教明理迂隱故云徐語若闢以直辭必暴戾不受令其巽言開導不使聞言生怖是囑其當以小法徐徐誘引不當以大乘之法急追將還也如今時未見道人接以婉容笑言必心悅受化若以本色鉗鎚必棄而別附也此中密遣誘引徐語番上即遣急追疾捉等字面此有倍與者倍者加一倍也直者工價也言汝若向貧里傭作而求衣食則此有可作之處其價復倍於他處也見道修道是斷見思之作處也昔修五戒十善止出三途今修四諦因緣能出三界是為加倍也又外道六行但能伏惑今修四諦則能斷惑得至涅槃是為二倍也若許將來者有機是許即設教令修無機是不許即不設教也若言欲等者設彼若問欲何所修即以貧所樂法度之使除見思惑取證涅槃不可更以淨佛國土等告之言除糞者斷煩惱也煩惱惑業糞穢心地二乘作諸觀以除之二人共作者理即智諦相資人即權人共實人修行以同事攝導人也菩薩煩惱涅槃不相妨礙故可共作二使既已得者即求窮子是菩薩依教奉行也審知有機故言已得具陳者即以如來叮囑之言告之是順佛揚化也上事即雇作除糞之事先取除糞者二乘慕果行因所以先問價直故云先取四諦法中先果後因謂先取道滅之價後除苦集之糞也見子愍怪者愍其取阿羅漢怪其不求佛道所失者大所得者寡是故愍怪問既愍怪何故密遣教其取果答傍追不來事須密遣雖教除糞非佛本懷欲以彰言委付故先愍而怪之二他日遙見領上知子先心又以他日於窗牗中至除糞之器狀有所畏對華嚴而説小教故云他日因子立門側見父威德無量相好之體而生恐怖之念故退大向小佛於窗牗中遙見子身者用權智觀機逗教非當門正見之實智也去大乘遠故曰遙知昔曾種大故曰見子法味不充曰羸瘦福德不具曰憔悴糞土喻見惑塵坌喻思惑見粗思細故也脫上服者喻隱報身無量功德四十二地戒定慧陀羅尼等纓絡寂滅忍柔軟上服大小相海為嚴飾之具容服若盛子則畏懼二乘不宜見此相好故隱千丈舍那之形應上尊特之身為子所難更著等者現丈六老比丘相也生忍法忍為粗弊之衣塵土坌身者現有煩惱有為有漏也左手喻實逆也右手喻權順也權用順宜自以此權法斷結成佛又以此權法化人除衆生見思之糞故曰右手執持等狀有所畏者狀似也示同小乘怖畏生死也如寒風馬麥等報此是如來屈尊就卑現相人中亦毀生死讚涅槃也三親勸安意領上歎美三車分三初勸修轉語諸作人汝等勤作勿得懈息以方便故得近其子此下即三轉四諦法輪而有法僧差別之名也語諸修行者此四諦法是聖所稱讚超生脫死自在無繫汝等當勤修習又誡懈息者所謂無有一法從懈怠懶惰中生無有一法從憍養自恣中生前云當勤修精進者是也以方便得近者以種種善巧方便然後父子始得相見而子不生疑怖也二示相轉後復告言咄男子至我如汝父勿復憂慮咄男子者欲示四諦之相先喝厲之此法如金剛劍驚發大丈夫之志氣斬斷二十五有之結縛故先咄之又咄非喝叱之聲乃呼召撫之之語如今大家若愛一人不對衆人説其愛語到無人處低聲云咄男子不要去了欲彼常作故咄而撫之汝常作勿去者上句勸其恆修此法下句復誡其勿學諸外道也加價者自預流進至四果也諸須之屬示正助之相也盆器總喻三十七品道法米麵別喻三無漏學資糧等法鹽醋和味六和五德之德而於諸法均調適中也老弊使人即密遣人使同修證也須者相給者謂所修正助法中或有不明莫生疑難當問同修老輩彼即一一指教所謂有疑以咨問也好自安意者示修道諦之義也如云此是道可修性汝等當安心此道而修即得自在適意我如汝父者示證滅諦之義也文影一句如云此是滅可證性汝等好自安意修行此道必證此滅也我已證故如父汝當證故如子本是嚴親而云如者正喻法身同體報化分真似也勿復一句示斷苦集之義也如云此是苦逼迫性此是集招感性若斷苦無生死逼迫之憂若斷集無煩惱招感之慮而得解脫之味也三作證轉所以者何我年老大至更與作字名之為兒徵上如父而汝勿復憂慮之故我老者我已修道已斷苦集已證滅諦之理久矣故云老大汝少壯者汝等應修應斷應證故云少壯汝常作時者謂修習此法既久也無欺怠等者內不見自欺之心外不見怠惰之相口不見瞋恚怨恨之語欺等亦名五障欺為信障等餘作人者人天外道也今諸惡既無結使已斷故勝一切餘修人也自今已後下自從三轉之後一切樂小之者皆從此法所化如從佛口所生之子也作字為兒者他後承父家業始於此矣阿含説五種佛子四果辟支是佛真子菩薩不斷結子義未成又菩薩稱子者取義各別故此即鹿苑中能説者佛所説者法能證者羅漢僧三寶之名由此而始也四欣遇久住領上適子所願爾時窮子雖欣此遇至於二十年中常令除糞此結是鹿苑之時鈍滯小果也謂當時我等得此法門欣然欲樂何幸得此隆遇哉雖遇此法而無樂大之心故云自謂客作若得小果厭小樂大大乘機發者佛即授以大法正由不捨小志大機不發以是無樂大之故佛且令於二乘法斷除十使煩惱之糞二十年者一無礙一解脫斷見九無礙九解脫斷思故云二十年也連下三處説二十年意各不同隨文釋之總上明佛隱實施權降尊就卑成就小志之事四子自謂怖大樂小滯權迷實不受大化之態盡情摹寫意謂過不在佛而在自己根志狹劣故也上遣使追誘喻已竟四領付家業喻近領火宅等賜大車遠領法中顯實分二初領家業二付家業初中又二初心相體信二命領家業初又二先明體信過是已後心相體信入出無難此正領方等時過鹿苑之後即方等也心相體信者父子互相體悉信順也謂於阿含教中得涅槃價此既不虗今為菩薩説此大乘亦復不虗此子信父也佛知此等斷結證果之後聞方等教歎大褒圓而不謗無漏根利聞必生信此父信子也入出無難者由此見尊特身聞大乘教名此為人復被呵斥猶見丈六説小乘法名此為出又進可語大亦不怖退不滯小亦不迷小大出入而無疑難也二猶居本位然其所止猶在本處二乘雖於小大入出無難然聞大乘之法謂是菩薩之事非己智分不肯回小向大猶居羅漢之位確守無為之理昔年行處半步不移所謂但念空等於菩薩法不生一念也其猶窮子心雖互相體信身不難於出入其實未居子舍猶以客作自處也二命領家業分二初父命子知家事二子受命領知家業初中又四初明時節世尊爾時長者有疾自知將死不久此下領般若時也爾時者命知家事轉教大機漸引入實之時有疾者方等之後名相未遣人多法執之病佛亦病之將死不久者有機則應為生機盡應謝為死今化機將畢應謝非久也二命知家事語窮子言我今多有至所應取與汝悉知之金銀大乘教理也珍寶一切法門也多有者理則非多約種種門亦得言多例空非十八破十八法而名十八空也倉是定門即百八三昧庫是慧門即十八空境般若教中六度萬行具備權實二智雙顯內充外溢故云盈溢其中多少者説於般若則有廣略二門略則為少廣則為多或取以自利或與以利他大品云汝當為菩薩説故云汝悉知之三誠令體心我心如是當體此意所以者何今我與汝便為不異佛以般若為心汝今轉教當體我心為心即隨佛意而為菩薩説也我汝不異者不異有三一被加令説與佛不異二就理以諸法皆如故得不異三就今時始悟父子天性本來不異二乘自謂被加異耳四敕無漏失宜加用心無令漏失我汝既不異我有即汝有不可推是父物恣意拋撒故誡小心勿失也一者為菩薩説般若教無漏失二者就理此即汝法後時當用汝等當加意用心體證此理即可自利利他不可遺漏忘失也二子受命領知家業又四初正受佛命領知衆寶爾時窮子即受教敕領知衆物金銀珍寶及諸庫藏喻四子遵受佛命卒以小果而領知大乘教理一切法門轉教菩薩隨順佛語以演説之二心無希取自甘無分而無希取一餐之意窮子不解無漏失之言疑父吝惜故執守不取一餐敢多自用哉如善吉轉教付財雖説般若自謂是菩薩法我無其分不生一念好樂之心也三未捨劣心猶居本處然其所止故在本處下劣之心亦未能捨所止在本處者住羅漢位雖復慕大亦未定言欲作菩薩是居白淨地坐無為坑也未捨下劣者雖復恥小而未定言捨於小證但念空無相無作而已此述如來激發進修轉教使悟漸引入實之意序自己甘為下劣悅彼小道恆不離權之事世尊處處顯實四子念念滯權昔日之迷失如是也四鄙棄先心欲求大道復經少時父知子意漸以通泰成就大志自鄙先心少時者不多時也父知子意者所謂知子莫若父也漸以當是漸已下文漸已曠大是也不滯於小曰通安心於大曰泰成就者有趣大之志自鄙者有捨小之心此正索車之意子志既大始定父子付家業也又此中少時經文未的指何時私謂楞嚴時也若論索車之意楞嚴明顯當知厭多聞自鄙先心也欣妙定成就大志也非索車何及序悟文中身心泰然蕩然非通泰何又許通達實相入佛知見正許説今經也楞嚴即法華之定法華即楞嚴之慧定慧相資發明實相本根洞徹一乘源底開示悟入佛之知見堪授劫國莊嚴之記蓋般若之後慧學方盛定力未全人或溺於多聞失於正受於是示楞嚴大定資般若大慧使定慧均等學行兩全而究竟趣於一乘實相寶所楞嚴在法華之前於此益見矣上領家業竟二付家業分二初正付家業二得付歡喜初中又四初付業時節臨欲終時時字重看即時一現耳今正是時之時臨欲二字應上將不久字面正是化緣將畢靈山高會説法華經唱涅槃之時也此句是四子直言無諱之辭二集衆為證而命其子并會親族國王大臣剎利居士皆悉已集此科即靈山法會大衆也二萬億佛所受化之徒為子文殊普賢等影響大人為親族雲集分身各控一方為國王彌勒等皆等覺大人為大臣十地菩薩法王種姓為剎利十住行向從佛受化為居士悉集者即四衆八部圍繞世尊也三結會父子即自宣言諸君當知至此實我子我實其父自宣言者出定無問自説也諸君當知者即吾今於天人大衆中説也前文我昔曾教化汝生我法中此云此是我子我之所生從我受學是我之子從我起解是我所生也於某城捨我者即捨父逃逝自昔退大後汝今悉忘也某字活看不可拘大通時以從二萬億佛所教化故自昔受大根性未定後還退墮流宕六道故曰竛竮等竛竮行不正貌辛苦該前馳騁求食傭賃等其本二句指本名字以證父子之的也本城即前中止之城華嚴為根本一乘故曰本城阿含已來種種方便循循善誘恆念大乘子機故曰懷憂推覔忽於二句始於今日法華會上大乘機發得授記莂也實子實父者判天性定父子也父子傳體天性不異以心印心平等無二也實子者領諸衆生皆我子也實父者領我是一切衆生之父也四正付家業今我所有一切財物皆是子有先所出內是子所知此等賜大車全付家業授記作佛紹法王位也我有皆子有者今佛所證一切大乘萬行萬德既授記已皆是子有汝所證與我同也所謂皆以如來滅度而滅度之是付成佛實智證法自證證他之事先所出內等者昔日大品領教説種種法門是汝熟知也是付度生權智説法自利利他之事喻中放出多少收內多少皆子經管故曰所知法中諸佛自證化他法門諸子備聞窮玄盡妙曉若指掌故曰所知所以此經不談修行次第但明開佛知見意在昔教備明子所共知也二得付歡喜世尊是時窮子聞父此言至今此寶藏自然而至此領上得車歡喜也貧子拾金白衣拜相出乎望外故曰我本無心等而今忽聞授記作佛不求自得故曰自然而至又阿含教中本心不求方等雖聞大自謂絶望故不求般若雖領知自謂非己分故不求如此無心希求而今自得安得不欣抃而暢悅也亦即結歸略法説中昔日不求今日慶得之意然此歡喜之由有遠有近若不先教傭作與一日之價豈得心相體信委業付財由於斷結取證方堪並聞大集受斥淨名轉教般若而致今日開顯授記故傭作取價是遠由體信委知是近由上喻説竟準涅槃具論五味者即遣傍人所説喻華嚴圓頓此教最初傍人如牛所説如乳故云從佛出十二部即初味也若以此擬二乘則無機不受迷悶躃地全生如乳次明密遣二人説除糞法喻鹿苑説三於小即信革凡成聖如轉乳為酪故云從十二部出修多羅即第二味也次明心相體信入出無難喻説方等淨名諸經揚大折小二乘聞揚大不謗折小不毀良以三藏斷結取一日之價故得恣其褒貶既親證小故信大不虗得涅槃價故體折不瞋雖非己事而不疑謗此心純熟如從酪出生酥故云從修多羅出方等經即第三味也次長者將死不久下喻般若會中使其領教為諸菩薩説摩訶般若既知衆物貫統法門心明口辨彌益慕樂但恨住小非是己物脫更開許豈不樂哉於是心漸通泰成就大志如從生酥出於熟酥故云從方等出摩訶般若即第四味也次臨欲終時下喻般若之後判天性定父子會三歸一付財與記説法華大教開佛知見示真實相菩薩除疑聲聞作佛皆以如來滅度如從熟酥出於醍醐故云從摩訶般若出大涅槃即第五味也四子深得佛意一喻盡領三時五味之教始終次第極盡精詳所以下品讚云善哉迦葉汝等善説如來功德等若以一雲一雨一相一味又何差別之有始終唯演一華嚴至今猶説妙法華要須吾人諦信忘言默證一會儼然可希冀矣二法合前喻有四今逐段取義略合不必拘配且初合父子相失世尊大富長者則是如來我等皆似佛子如來合父似則合子似有二義一取大機為子昔未逃逝既非真位猶居外凡故云似二取小機為子小機似像大乘根性故云似子既背父而逃故貶為似子義含相失二合父子相見如來常説我等為子義合長者見子便識釋成為子之義歸於佛説非敢自認也三合遣使追誘喻分二先合傍人追世尊我等以三苦故至迷惑無知樂著小法三苦由三受生苦受生苦苦若根若境乖違逼迫故樂受生壞苦因樂變異生諸憂惱故不苦不樂受生行苦即念念遷謝之相故由三苦故五濁加重生死無邊熱惱煎心迷於聖教惑於自心無明暗覆大法難投是強追執急迷悶意也大機既無樂著小法但堪小化是暫放得喜意也又苦多故熱惱熱惱故迷惑迷惑故無知無知即無明有此無明故迷自己本具一乘知見不作外道即著小法何異窮子怖親父而喜往貧里哉二合二人誘前四今但合三先合徐誘除糞今日世尊令我等思惟至得至涅槃一日之價今日者對多生之昔日樂小而此生之今日猶滯於權也又今日指阿含時也謂阿含時佛知我等往日受苦樂小所以教我等思惟等也思惟即六識蠲除即修斷義戲論之糞乃集下見思惑此述佛教知苦斷集也我等下修道證滅也一日價者小乘有餘較大乘無餘若一日工價比萬貫之富也工人一日使得筋出力盡只覓得三二分銀子二乘苦修斷惑只成個羅漢理孤事窮終不得大受用故云一日工價耳二合欣遇久住既得此已心大歡喜至勤精進故所得弘多一日之價自以為足便謂所得弘多自足自滿坐守偏枯小乘之病正在於此其猶河伯井蛙之見以為天下美盡在乎己而不知海之大也三合他日遙見然世尊先知我等至當有如來知見寶藏之分上言遙見今言先知上言羸瘦憔悴今言心著斃欲上言脫纓絡等今言縱捨不為分別等總之祕實施權投其所好不云當有成佛之分四合領付家業二先合領家業世尊以方便力説如來智慧至我等不知真是佛子世尊下合方等體信承上謂佛於阿含教中不為我等分別而於方等會上以方便權智之力説六種根塵皆是大乘實相智慧然我等既從佛在阿含教中得一日之價以為大得也故於此方等大乘雖曰心相體信入出無難然亦無有志願求於大也此合上所止猶在本處我等下合般若轉教謂佛於方等教中見我等無志求大者以權實在佛故也故於般若會上俾權實在己便於自求我等又因如來智慧威力加被為諸大士開示演説既承佛加如佛心而説又為菩薩開演將謂是菩薩法所以自於此大乘無有志願不生一念希取也所以下徵釋無志願之意謂佛知我等樂小以方便權巧隨順我等而説無非淘汰其樂小之心䇿進其憤大之志也而我等不知昔日轉教付財時我等業已真是大乘佛子所以無志希求其猶窮子雖受教敕領知衆物而無希取一餐義也二合付家業今我等方知世尊至如佛子所應得者皆已得之此合今經授記也承上言謂我等初不知真是佛子疑佛但以如來智慧敕我等為菩薩説似於我等深有吝惜今佛説以種種方便皆為菩提是諸所説皆化菩薩今日我等方知世尊於佛智慧於我等無一毫吝惜也所以下徵釋謂先疑似吝而今方知不惜者何也以我等從昔已來真是佛子而但樂小法所以將真作假而為小果聲聞也若我等昔有一念樂大之心佛於四十年中所説方等般若之大乘皆為我等所説豈真單為菩薩哉何以知然以於此經之中佛每每言諸佛唯説一乘故也而昔下結足上義毀訾者如楞伽於大慧前動則以聲聞同外道為愚夫跋驢上不得楞伽山維摩喻盲人敗種永不成佛圓覺教人發願莫值聲聞外道如此皆昔日毀訾也謂今法華之授記驗昔方等會上於菩薩前毀訾聲聞樂小法者非毀訾我等實以大乘法教化我也我等不知都作毀訾而會以是之故今日授記我等説本無心有所希求今法王大寶自然而至云自然而至者謂不測之富得之於不期所謂莫之為而為者莫之致而致者此也如佛子等者謂如往昔方等般若會上諸佛子所應得者我等今已得之不復更用修得也此合得付歡喜之意上長行竟二偈頌有八十六行半分二前七十三行半頌上長行後十三行歎佛恩德初中又二初二行頌略法説爾時摩訶迦葉欲重宣此義而説偈言我等今日聞佛音教至無上寶聚不求自得今日對四十年前言音教者八音四辨之音方便火宅之教歡喜約心言踊躍約身言佛説下正明得未曾有無上一句喻阿耨菩提四十年前無望故言不求四十年後授與故言自得二有七十一行半頌喻説分二初四十一行頌喻説二三十行半頌法合初又四初十三行頌父子相失二七行半頌父子相見三十行半頌遣使追誘四十行頌領付家業且初父子相失又四初一行半頌子背父而逃走譬如童子幼稚無識至周流諸國五十餘年火宅中明長者所王國邑聚落語寬此中明窮子輪回三界為諸國六道為五十餘退大忘本為他土升沉不停曰周流總言背真之地遠而逐妄之時多也二七行頌父求子而中止其父憂念四方推求至豪富如是有大力勢四方與長文不同前在機約四諦推理以求正助衣食此中在佛觀四生中恆覔可度之機也此頌求子不得一城者覺場也云頓止者華嚴屬圓頓大乘但稱本懷直明法界故曰頓止造立舍宅者起慈悲舍依性空宅也云造立者以華嚴世界成就品及華藏世界品二十種世界海皆普賢菩薩於一真法界正位唱出故云造立其中所詮五周四分明佛依正自在受用因果故云五欲自娛其家一句總明貫朽粟陳之積紫標黃榜之藏故云大富喻富有萬德也多諸下別明大富之七寶大富之四乘田業人民情與無情親疏之大富息利他國生意遠近之大富出其本入其利行商坐賈以有易無遍一切處為物景仰也上明大富多財千萬億下明尊貴大勢王者君也群臣牧也記云體群臣王愛念隆聖眷也臣宗重尊德性問學也十方諸佛稱讚善哉第一導師故云王者愛念四衆圍繞恭敬尊重故云群臣宗重以諸二句近悅遠來諸大士往來聽法也豪富一句結上富貴財利有大一句明威神之力此中表顯悉如長文三二行超頌慮家業以無傳而年朽邁益憂念子至庫藏諸物當如之何頌上失子之苦無所委付故憂念耳夙早也夜暮也謂從朝至暮時刻不忘也死時者涅槃時也癡子下父心痛子之詞前云童子以無知故此云癡子甘流蕩故下云窮子衣食艱故當如之何一句父念子深有展轉不安之意四二行半追頌覓衣食而漸還爾時窮子求索衣食至漸次經歷到父住城根塵相涉如邑十八界如國修三界善如有所得修外道邪行如無所得又從人間修至天上有所得也天福盡墮人間無所得也飢餓見其枵腹不得大乘法食故羸瘦見其形醜無大力用功德故瘡癬見其病纏有漏法中起見思故漸次二句謂漸次熏陶修習得遇佛大會也上頌父子相失竟二七行半頌父子相見分二初六行半頌子見父傭賃展轉遂至父舍至借問貧里欲往傭作傭賃二句見父之由也爾時下見父之相上云見父處處是門側今言長者於門內者見相亦兼處也門內者喻佛居阿蘭若法菩提場內也施大等見父之處也施大二句依報蓋覆無畏也眷屬下正報主伴攝護也注記券疏即授記明修行也以廣顯略為注如雲興二百問瓶瀉二千酬也授決為記入法界傍論授記也四弘誓為券修行為疏喻為大根廣量功德疏明行位而與授記也窮子見父下頌見疑避去也思惟是已下是窮子住回默忖做定主意決其去就謂與其受制於富貴之強作不若安心於貧賤之自便也二一行頌父見子長者是時在師子座遙見其子默而識之長行有四今單頌見子便識餘三不頌三十行半頌遣使追誘喻分二初三行頌即遣傍人追即敕使者追捉將來至不信我言不信是父長文有三此中即敕三句頌上強追將還也即敕二字緊頂遙見默識字面父念子心切忽然一見即教人追由追急窮子無所措手故稱怨驚喚也迷悶下五句頌執急悶絶也迷悶一句當在使我至此下方合長文而義且順使者執之急牽之強非是雇人作工之情乃欲殺我之狀豈有能衣食我者使我如此乎惶怖無措驚懼不已故悶絶於地耳長者知子四句頌暫放得喜也上有四今但頌愍癡放去愚癡即惑重狹劣即器小因無大機方乃息化應上父知其子志意等夫親生父子一旦離久而不相知若此吾人之於本有心性曾無彈指間顧盻浮世幾何一失此身千生萬劫改頭換面視親如怨以惡為美者何限二七行半頌密遣二人誘長文有四今頌前三初三行頌徐誘除糞即以方便更遣餘人至為除糞穢淨諸房舍既息大化故以方便説小乘法而誘引之餘人者即二人也現聲聞形為大乘之餘耳眇目喻偏空所見不正故矬竪短也陋橫狹也見偏空者竪不能窮實相之源故如矬橫無大乘衆善莊嚴故如陋德非四無所畏名無威異常樂我淨名無德汝可語之下正敕使徐徐引誘也歡喜者投其所好樂為鄙事淨六根房五陰舍也又窮子聞之四句長行有窮子若許等文皆長者教諭之詞頌中略之但頌窮子受命服役之事各自一義譯師斟酌華梵語義諄切委悉不可忽也二二行頌他日遙見長者於牗常見其子至執除糞器往到子所於牗見子者易云納約自牗終無咎注云牖非所由之正而室之所以受明也始雖艱阻終得無咎喻大法難投接以小法終得大法如納約自牖之象也念子樂鄙事者父知子樂小也長者下脫珍著弊毀生死讚涅槃也淨名云釋迦佛隱其無量自在之力乃以貧所樂法度脫衆生也三二行半頌親勸安意方便附近語令勤作至又以軟語若如我子油塗足能履水赤足而不皴裂如不龜手之藥喻神通智慧飲食二句喻觀練熏修小乘禪觀如薦席厚暖不如大乘禪定如白氎婉筵也汝當勤作正親勸意三轉義含又以軟語如子者即作字為兒也本是親生之子曰若曰如則人之貧富貴賤唯業是定雖慈如至親不能一時一毫可移易於愛子達乎此凡不安命者非愚則妄矣四十行頌領付家業喻分二初三行半頌領家業長者有智漸令入出至父知子心漸已曠大有智二句頌上心相體信也出世長者具大智慧循循誘引方等會中聞歎大不謗彈偏不疑進可語大退不滯小也經二十下領家業也二十年執事者般若時長二十二年之談執作等領佛命教化菩薩也未捨下劣故宿門外草庵喻不肯向大鈍滯化城小道也自念貧事故無希取於菩薩神通不生好樂也漸曠大者大乘機動也二六行半頌上付家業欲與財物即聚親族至甚大歡喜得未曾有欲與下頌聚親族也心既曠大堪授大法故云欲與此中二十年者言從有二乘之機而來感佛故云自見子來已二十年判天性定父子也凡所有等正付家業也子念下得付歡喜也上頌喻説竟二三十行半頌法合長文略此中廣分三初半行頌合父子相失相見佛亦如是知我樂小若但以上句合相失意仍未顯但以下句合相見意亦未顯上句借下句成下句借上句成知樂小故義當相失佛知樂小故當相見樂小由退大所以相失退大由樂小所以相見上文常説我等為子也二一行半頌合遣使追誘未曾説言汝等作佛至成就小乘聲聞弟子初二句頌合傍人追也長文在機言三苦五濁交加無明迷惑暗覆所以大法難投此中在佛言直以大法擬宜未曾明説汝等二乘當有成佛之分而説下頌合二人誘也示我等除糞之法無漏涅槃一日工價成就小乘羅漢也三二十八行半廣頌合領付家業分二初十八行半頌合領家業二十行頌合付家業初中又二初六行頌合領家業佛敕我等説最上道至而不為我説斯真要最上道即空慧般若更無過其上者意謂當時般若會上佛敕我等説無上道能修習此者當得成佛我承下奉敕轉教諸佛子下菩薩聞法修習是時下佛授菩薩記一切諸佛下明自無願樂謂我等轉教佛子聞法得記當時意謂諸佛祕藏但為菩薩演其真實修行成佛之事而不為我等説斯真實成佛之要道也二十二行半頌合無希取分二初二行正明無希取如彼窮子得近其父至自無志願亦復如是初一行提喻帖合次一行正合無取二十行半增明無取之意又分三初二行標不喜大我等內滅自謂為足至教化衆生都無欣樂內滅即惑體三界見思惑盡故名內滅餘事者淨土度生也以此為餘事正小乘之病視為他有自甘無分之意都無欣樂者無樂大之失顯執小之過也二六行徵釋所以所以者何一切諸法至則為已得報佛之恩謂不喜大而安於小者何也以根塵等一切諸法皆空寂故既空寂則國土衆生亦空寂矣又何求焉一切諸法者從五陰至於涅槃八十餘科皆真如隨緣生起緣生無性惟一空耳無生下以三解脫釋空寂義無生無滅空解脫也無大無小無相解脫也無漏無為無作解脫也謂觀三科七大世出世間諸法無我我所名空空故諸法一異等相實不可得名無相無相故於三界無所造作不起願念不受後有名無作亦名無願也如是二句結不喜大我等長夜下一行半申明上聞淨土化生四句凡人不知本性有大般若雖證聲聞小果皆是無明長夜既居長夜則於淨土化生般若智慧都無所見如窮子於父之富有大業不為己有甘心棄置於度外無貪著之志願也而自二句謂我等於佛智慧無志願者非佛有吝於我也乃我等自己於所證未究竟之空法錯認即是佛之究竟大乘之空法也自證既謂究竟所以於淨土度生都無欣樂也我等長夜下申明我等內滅四句謂我等處長夜五濁八苦交煎一秉如來空法修習得脫三界生死苦惱之患證阿羅漢此身已盡不受後有故云最後尚未謝滅故曰住有餘者此後身見思雖斷無明尚餘無明雖餘而實不來受生故曰有餘涅槃佛所教化下以得顯失謂果雖有餘乃佛所教為因因果皆真故為得道不虗道既不虗即為心不負教已報佛之恩矣得道不虗又報佛恩所以我等內滅自足更無餘事也三二行半結無希取我等雖為諸佛子等至初不勸進説有實利雖為二字承上已得言在己則果已得在佛則恩已報所以雖為菩薩説六度大因以求佛道而我等於是大乘之法皆視為餘永無願樂矣永無二字昔日小乘於大法絶望極矣導師下謂佛昔所以見捨我等於大乘之外者以觀知我等心樂小法故也以是在般若會中不勸進我等所轉之法説於我等有成佛之實利也上頌合領家業竟二十行頌合付家業分二初三行頌合付家業如富長者知子志劣至調伏其心乃教大智如富下提喻帖合佛亦下正合付業鋾鑄之權非餘人所能故云希有知樂三句收前三時種種善導其心調伏純熟也乃教一句指今經授一乘實相記也二七行頌合得付歡喜我等今日得未曾有至普於其中應受供養聲聞作佛事出望外如客作窮子承受家業也世尊我今下慶信今得謂我向也安住小道今得無上道矣向也得聲聞果今得菩提果矣向也得無漏法今於無漏法中得清淨正法眼矣又道即大乘之因果即大乘之果無漏法所證實相之理清淨眼能證實相之智皆言得者以智契理故於道果雙證即開佛知見見實相理境也我等下較今昔果之大小謂從昔已來持佛淨戒得果在於今日於法王法中久修梵行證灰身偏空之小果於今方得無漏無上大果矣揀有漏有上小果也得果無漏了因義也持戒梵行緣因義也清淨眼正因義也我等今下較今昔名實有異謂昔之聲聞聞四諦法始得自利非真聲聞以隨言取證未得佛意豈真聲聞乎今者聞一乘妙法自得佛道而能以此佛道音聲令一切聞始得名為真聲聞矣以其言下得旨默契聖意自利利他方名真聲聞也向之羅漢斷見思惑出三界苦以為大得不信佛乘非佛弟子非阿羅漢豈真應供乎我等今者得聞佛乘獲如來寶藏於三世間或天或人或魔而惡者或梵而善者普於其中受其供養也當知名與昔同而受用之實利與昔雲泥之隔此中真字翻法説中非字上頌長行竟二十三行歎佛恩德分三初六行半歎佛大恩莫能報世尊大恩以希有事至於恆沙劫亦不能報世尊大恩者總收一代教化皆大恩也始自華嚴大法擬宜我等聾啞孤負大恩也阿含投小保證偏空世尊憐愍我等也方等般若彈斥淘汰世尊之教化我等也四十年來蒙如來循循善誘之大恩直至今日説經入定放光圓現授記利益我等皆希有事也如是憐愍如是教化如是利益莫大恩德無可言報矣我等先得小果謂心不負教足報佛恩以今較之豈一生一劫縱無量劫誰能報者手足等執勞運力不能報頂戴等身為牀座不能報非一時乃恆沙劫也非輕易乃盡心力也非怠玩乃謹恭敬也美膳等四事供養不能報牛頭等塔廟供奉不能報牛頭者華嚴云出離垢山若用塗身火不能燒正法念云北洲有山名曰高山多有牛頭栴檀以此山峯狀如牛頭於此峯中生栴檀樹故二二行半歎佛實智不思議諸佛希有無量無邊至取相凡夫隨宜為説諸佛所證是希有法形上供養皆常有也諸佛之法無量無邊形上供養皆有量有邊也諸佛之法不可思議形上報恩供養皆思議也諸佛神通是無滅無為形上報恩供養皆小知小解有作有盡之心也此明所證實智深廣難思諸法下謂法中大聖能為我等鄙賤取相之凡夫忍可一大事因緣於四十年中不為開示隨其機宜而説也三四行歎佛權智度衆生諸佛於法得最自在至於一乘道隨宜説三於諸法中得大自在所以明照不謬也衆生好樂不同志向各別隨其堪任者以喻演説皆隨宿根大小而説也又熟未熟者籌量分別隨其根器大則大之小則小之熟者成之未熟者待之以是之故四十年前於一乘法隨機説三上中根領解竟
